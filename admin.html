<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
    margin:0;
    font-family:Arial;
    display:flex;
    background:#0f172a;
    color:white;
    transition:0.3s;
}
.light {
    background:#f1f5f9;
    color:#111;
}
.sidebar {
    width:220px;
    background:#020617;
    padding:20px;
    height:100vh;
}
.sidebar h2 {
    color:#00eaff;
}
.sidebar button {
    width:100%;
    padding:10px;
    margin:5px 0;
    background:none;
    border:none;
    color:white;
    text-align:left;
    cursor:pointer;
}
.sidebar button:hover {
    background:#0ea5e9;
}
.content {
    flex:1;
    padding:20px;
}
.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
.light .card {
    background:white;
}
.btn {
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.approve { background:green;color:white;}
.reject { background:red;color:white;}
.map {
    height:300px;
    border-radius:10px;
}
.topbar {
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>KuryeAI</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('applications')">Başvurular</button>
    <button onclick="showPage('orders')">Siparişler</button>
    <button onclick="toggleTheme()">Tema</button>
    <button onclick="logout()">Çıkış</button>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboardPage">
    <div class="topbar">
        <h1>Dashboard</h1>
    </div>

    <div class="card">Toplam Sipariş: 0</div>

    <div id="map" class="map"></div>
</div>

<!-- APPLICATIONS -->
<div id="applicationsPage" style="display:none;">
    <h1>Restoran Başvuruları</h1>
    <div id="applicationsList"></div>
</div>

<!-- ORDERS -->
<div id="ordersPage" style="display:none;">
    <h1>Siparişler</h1>
    <div class="card">Henüz sipariş yok</div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
 apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
 authDomain: "kuryeai.firebaseapp.com",
 projectId: "kuryeai"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SAYFA
window.showPage = function(page){
    document.getElementById("dashboardPage").style.display="none";
    document.getElementById("applicationsPage").style.display="none";
    document.getElementById("ordersPage").style.display="none";

    document.getElementById(page+"Page").style.display="block";

    if(page==="applications") loadApplications();
}

// LOGOUT
window.logout=function(){
    sessionStorage.clear();
    location.href="login.html";
}

// TEMA
window.toggleTheme=function(){
    document.body.classList.toggle("light");
}

// HARİTA
const map = L.map('map').setView([39.92, 32.85], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔥 BAŞVURULAR
async function loadApplications(){
    const list=document.getElementById("applicationsList");
    list.innerHTML="Yükleniyor...";

    const snapshot=await getDocs(collection(db,"applications"));
    list.innerHTML="";

    snapshot.forEach(docSnap=>{
        const data=docSnap.data();

        const div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <b>${data.name}</b><br>
            ${data.email}<br><br>

            <button class="btn approve" onclick="approve('${docSnap.id}','${data.name}','${data.email}')">Onayla</button>
            <button class="btn reject" onclick="reject('${docSnap.id}')">Reddet</button>
        `;

        list.appendChild(div);
    });
}

// 🔥 APPROVE (UPDATED)
window.approve = async function(id, name, email) {

    const password = "123456";

    await addDoc(collection(db,"restaurants"),{
        name:name,
        email:email,
        password:password,
        createdAt:new Date()
    });

    await deleteDoc(doc(db,"applications",id));

    alert("Onaylandı!\nŞifre: 123456");
    loadApplications();
}

// ❌ REJECT
window.reject = async function(id){
    await deleteDoc(doc(db,"applications",id));
    alert("Reddedildi");
    loadApplications();
}

</script>

</body>
</html>
