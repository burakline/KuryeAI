<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        #map { height: 42vh; width: 100%; z-index: 1; }
        .stat-card { background: rgba(30, 41, 59, 0.5); border-radius: 1.5rem; padding: 1rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .moto-container { width: 34px; height: 34px; background: #000; border: 3px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #22d3ee; }
        .moto-container::after { content: "AI"; color: #22d3ee; font-size: 11px; font-weight: 900; }
        #sidebar { transition: transform 0.3s ease; z-index: 9999; }
        .target-btn { width: 44px; height: 44px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; bottom: 10px; right: 10px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="text-white flex flex-col h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 transform -translate-x-full p-6 border-r border-slate-800">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-3xl">✕</button>
        </div>
        <nav class="space-y-4">
            <button onclick="showPage('profile')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800">👤 Profilim</button>
            <button onclick="showPage('reports')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800">📊 Geçmiş Raporlar</button>
            <button onclick="showPage('earnings')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800">💰 Geçmiş Kazançlar</button>
            <button onclick="showPage('main')" class="w-full text-center p-4 rounded-xl bg-cyan-600 font-bold mt-10">ANA EKRAN</button>
        </nav>
    </div>

    <header class="h-16 px-5 flex justify-between items-center bg-slate-900/50 z-[2000]">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="text-2xl">☰</button>
            <h1 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h1>
        </div>
        <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold bg-rose-500/20 text-rose-500 border border-rose-500/50 uppercase">Vardiya Kapalı</div>
    </header>

    <main id="main-view" class="flex-grow flex flex-col">
        <div class="relative">
            <div id="map"></div>
            <button onclick="reCenter()" class="target-btn">📍</button>
        </div>

        <div class="px-4 py-3 grid grid-cols-2 gap-3 bg-slate-900/20">
            <button id="btn-start" class="bg-emerald-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest">Vardiya Başlat</button>
            <button id="btn-end" class="bg-rose-600 py-4 rounded-xl font-black uppercase text-xs tracking-widest opacity-30" disabled>Vardiya Bitir</button>
        </div>

        <div class="flex-grow p-4 bg-slate-900/50 grid grid-cols-3 gap-2 overflow-y-auto">
            <div class="stat-card"><p class="text-[9px] opacity-40 font-bold">HIZ</p><p id="speed" class="text-2xl font-black text-cyan-400">0</p></div>
            <div class="stat-card"><p class="text-[9px] opacity-40 font-bold">TOPLAM KM</p><p id="km-display" class="text-2xl font-black text-yellow-400">0.0</p></div>
            <div class="stat-card"><p class="text-[9px] opacity-40 font-bold">SÜRE</p><p id="timer" class="text-2xl font-black">00:00</p></div>
            <div class="stat-card"><p class="text-[9px] opacity-40 font-bold">ORT. HIZ</p><p id="avg-speed" class="text-2xl font-black text-blue-400">0</p></div>
            <div class="stat-card"><p class="text-[9px] opacity-40 font-bold">BİRİM KM</p><p class="text-2xl font-black text-emerald-400">₺8.0</p></div>
            <div class="stat-card"><p class="text-[9px] opacity-40 font-bold">KAZANÇ</p><p id="earnings" class="text-2xl font-black text-emerald-500">₺0</p></div>
        </div>
    </main>

    <div id="km-modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-[10000]">
        <div class="bg-slate-800 p-8 rounded-[30px] w-full max-w-sm border border-slate-700 space-y-5 text-center">
            <h3 id="km-title" class="text-xl font-black text-cyan-400 uppercase">KM GİRİŞİ</h3>
            <div class="text-left space-y-2">
                <label id="file-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest"></label>
                <input type="file" capture="camera" id="km-photo" class="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:bg-cyan-600 file:border-0 file:text-white">
            </div>
            <input type="number" id="km-input" placeholder="Kilometre Değeri" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 font-black text-2xl text-center outline-none focus:border-cyan-500">
            <button id="save-btn" class="w-full py-4 bg-emerald-600 rounded-2xl font-black uppercase shadow-lg">VERİLERİ KAYDET</button>
        </div>
    </div>

    <div id="profile-view" class="section-view hidden flex-grow p-6"> <h2 class="text-2xl font-bold">👤 Profilim</h2> </div>
    <div id="reports-view" class="section-view hidden flex-grow p-6"> <h2 class="text-2xl font-bold">📊 Raporlar</h2> </div>
    <div id="earnings-view" class="section-view hidden flex-grow p-6"> <h2 class="text-2xl font-bold">💰 Kazançlar</h2> </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, marker, pathLine, watchId, startTime, lastPos, startKMValue = 0, route = [], speeds = [], wakeLock = null;

        // HARİTA
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#22d3ee', weight: 5, opacity: 0.8}).addTo(map);

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        }

        function showPage(page) {
            document.querySelectorAll('main, .section-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(page + (page === 'main' ? '-view' : '-view')).classList.remove('hidden');
            toggleMenu();
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        function track() {
            watchId = navigator.geolocation.watchPosition((pos) => {
                const current = [pos.coords.latitude, pos.coords.longitude];
                const speedKmh = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                
                document.getElementById('speed').innerText = speedKmh;
                if(speedKmh > 1) {
                    speeds.push(speedKmh);
                    route.push(current);
                    pathLine.setLatLngs(route);
                    if(lastPos) {
                        const dist = L.latLng(lastPos).distanceTo(L.latLng(current)) / 1000;
                        const currentTotal = parseFloat(document.getElementById('km-display').innerText);
                        const newTotal = currentTotal + dist;
                        document.getElementById('km-display').innerText = newTotal.toFixed(2);
                        
                        // Kazanç: (Saatlik 215 / 3600 sn) + (Metre başı kazanç)
                        const durationSecs = (Date.now() - startTime) / 1000;
                        const totalEarned = (newTotal * 8) + (durationSecs * (215/3600));
                        document.getElementById('earnings').innerText = '₺' + totalEarned.toFixed(1);
                    }
                }

                if (!marker) {
                    marker = L.marker(current, {icon: L.divIcon({className: '', html: '<div class="moto-container"></div>', iconSize: [34,34]})}).addTo(map);
                } else { marker.setLatLng(current); }
                
                const avg = speeds.length > 0 ? (speeds.reduce((a,b)=>a+b)/speeds.length).toFixed(0) : 0;
                document.getElementById('avg-speed').innerText = avg;
                map.panTo(current);
                lastPos = current;
            }, null, { enableHighAccuracy: true });
        }

        let mode = '';
        document.getElementById('btn-start').onclick = () => { mode = 'start'; openModal(); };
        document.getElementById('btn-end').onclick = () => { mode = 'end'; openModal(); };

        function openModal() {
            document.getElementById('km-modal').style.display = 'flex';
            document.getElementById('file-label').innerText = mode === 'start' ? 'Vardiya Başlangıç KM' : 'Vardiya Bitiş KM';
        }

        document.getElementById('save-btn').onclick = async () => {
            const val = parseFloat(document.getElementById('km-input').value);
            if(!val || !document.getElementById('km-photo').files[0]) return alert("Eksik veri!");

            if(mode === 'start') {
                startKMValue = val; startTime = Date.now(); track(); requestWakeLock();
                document.getElementById('status-badge').innerText = "AÇIK";
                document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 uppercase";
                document.getElementById('btn-start').disabled = true; document.getElementById('btn-start').style.opacity = "0.2";
                document.getElementById('btn-end').disabled = false; document.getElementById('btn-end').style.opacity = "1";
            } else {
                await db.ref('arsiv/harun_kaya').push({
                    tarih: new Date().toLocaleString('tr-TR'),
                    km_fark: (val - startKMValue).toFixed(1),
                    yol: document.getElementById('km-display').innerText,
                    kazanc: document.getElementById('earnings').innerText,
                    sure: document.getElementById('timer').innerText
                });
                location.reload();
            }
            document.getElementById('km-modal').style.display = 'none';
        };

        setInterval(() => {
            if(startTime) {
                const diff = Date.now() - startTime;
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }
        }, 1000);

        function reCenter() { if(lastPos) map.setView(lastPos, 17); }
    </script>
</body>
</html>
