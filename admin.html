<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfd; color: #101828; overflow: hidden; }
        
        /* Mobil Menü Animasyonu */
        #mobile-sidebar { transition: transform 0.3s ease-in-out; }
        .sidebar-open { transform: translateX(0) !important; }
        
        /* Bildirim Paneli */
        #notif-panel { display: none; transform-origin: top right; transition: all 0.2s; }
        #notif-panel.active { display: block; animation: fadeIn 0.2s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .active-link { background-color: #f9f5ff; color: #7f56d9; border-right: 3px solid #7f56d9; }
        .card-shadow { box-shadow: 0px 4px 20px rgba(16, 24, 40, 0.05); }
        #map { height: 100%; width: 100%; border-radius: 20px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <div id="sidebar-overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden lg:hidden"></div>

    <aside id="mobile-sidebar" class="fixed lg:static inset-y-0 left-0 w-72 bg-white border-r border-gray-200 flex flex-col z-50 -translate-x-full lg:translate-x-0">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-2">
                    <div class="w-9 h-9 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-purple-200">
                        <i data-lucide="zap" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight">KuryeAI</span>
                </div>
                <button onclick="toggleMenu()" class="lg:hidden p-2 text-gray-400">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <nav class="space-y-1">
                <a href="#" class="active-link flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                    <i data-lucide="map" class="w-5 h-5"></i> Canlı Takip
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                    <i data-lucide="users" class="w-5 h-5"></i> Kuryeler
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Raporlar
                </a>
            </nav>
        </div>

        <div class="mt-auto p-6 border-t border-gray-100 bg-gray-50/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center font-bold text-purple-700 border-2 border-white shadow-sm">A</div>
                <div class="overflow-hidden">
                    <p class="text-sm font-bold truncate text-gray-900">Harun Kaya</p>
                    <p class="text-xs text-gray-500 font-medium">Baş Yönetici</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col min-w-0 bg-[#fcfcfd] overflow-hidden">
        
        <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-6 lg:px-10 sticky top-0 z-30">
            <div class="flex items-center gap-4">
                <button onclick="toggleMenu()" class="lg:hidden p-2.5 bg-gray-50 rounded-xl text-gray-600 border border-gray-200 hover:bg-gray-100 transition">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h2 class="text-xl font-bold text-gray-900 hidden sm:block">Operasyon Merkezi</h2>
            </div>

            <div class="flex items-center gap-3 relative">
                <button onclick="toggleNotif()" id="notif-btn" class="p-2.5 text-gray-500 hover:bg-gray-50 rounded-xl border border-gray-200 transition relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span id="notif-dot" class="absolute top-2.5 right-2.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white hidden"></span>
                </button>
                
                <div id="notif-panel" class="absolute top-full right-0 mt-3 w-80 bg-white rounded-2xl border border-gray-200 shadow-2xl z-50 card-shadow">
                    <div class="p-4 border-b border-gray-100 flex justify-between items-center">
                        <span class="font-bold text-sm">Bildirimler</span>
                        <button onclick="clearNotifs()" class="text-[10px] text-purple-600 font-bold uppercase">Tümünü Temizle</button>
                    </div>
                    <div id="notif-list" class="max-h-64 overflow-y-auto p-2 space-y-1">
                        <p class="text-center py-8 text-gray-400 text-xs">Yeni bildirim yok.</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="p-6 lg:p-10 space-y-8 overflow-y-auto flex-grow custom-scrollbar">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white p-6 rounded-[24px] border border-gray-200 card-shadow">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="p-3 bg-blue-50 text-blue-600 rounded-2xl"><i data-lucide="truck"></i></div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Aktif Kurye</span>
                    </div>
                    <h3 id="stat-active" class="text-3xl font-bold text-gray-900">0</h3>
                </div>
                <div class="bg-white p-6 rounded-[24px] border border-gray-200 card-shadow">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="p-3 bg-orange-50 text-orange-600 rounded-2xl"><i data-lucide="alert-triangle"></i></div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Sapma Bildirimi</span>
                    </div>
                    <h3 id="stat-alerts" class="text-3xl font-bold text-orange-600">0</h3>
                </div>
                <div class="bg-white p-6 rounded-[24px] border border-gray-200 card-shadow">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="p-3 bg-purple-50 text-purple-600 rounded-2xl"><i data-lucide="bar-chart"></i></div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Günlük Ciro</span>
                    </div>
                    <h3 id="stat-money" class="text-3xl font-bold text-gray-900">₺0</h3>
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="xl:col-span-2 bg-white rounded-[32px] border border-gray-200 card-shadow overflow-hidden">
                    <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center">
                        <h4 class="font-bold text-gray-900">Canlı Vardiya Takibi</h4>
                        <button class="text-xs font-bold text-purple-600">Filtrele</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50/50">
                                <tr>
                                    <th class="px-8 py-4 text-xs font-bold text-gray-500 uppercase">Kurye</th>
                                    <th class="px-8 py-4 text-xs font-bold text-gray-500 uppercase text-center">KM (Manuel/GPS)</th>
                                    <th class="px-8 py-4 text-xs font-bold text-gray-500 uppercase text-center">Durum</th>
                                    <th class="px-8 py-4 text-xs font-bold text-gray-500 uppercase text-right">Detay</th>
                                </tr>
                            </thead>
                            <tbody id="driver-logs" class="divide-y divide-gray-100">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-[32px] border border-gray-200 card-shadow p-3 min-h-[400px]">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </main>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        
        // 1. MOBİL MENÜ FONKSİYONU
        function toggleMenu() {
            const sidebar = document.getElementById('mobile-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('sidebar-open');
            overlay.classList.toggle('hidden');
        }

        // 2. BİLDİRİM PANELİ FONKSİYONU
        function toggleNotif() {
            const panel = document.getElementById('notif-panel');
            panel.classList.toggle('active');
            document.getElementById('notif-dot').classList.add('hidden');
        }

        // Dışarı tıklayınca bildirim panelini kapat
        window.addEventListener('click', (e) => {
            const panel = document.getElementById('notif-panel');
            const btn = document.getElementById('notif-btn');
            if (!panel.contains(e.target) && !btn.contains(e.target)) {
                panel.classList.remove('active');
            }
        });

        // Firebase Ayarları
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Veri Akışı ve Tablo Güncelleme
        db.ref('arsiv').on('value', snap => {
            const table = document.getElementById('driver-logs');
            const notifList = document.getElementById('notif-list');
            table.innerHTML = "";
            let alertCount = 0;
            let totalMoney = 0;

            snap.forEach(driver => {
                driver.forEach(log => {
                    const d = log.val();
                    const isSupheli = Math.abs(d.manuelKM - d.gpsKM) > 3;
                    if(isSupheli) {
                        alertCount++;
                        document.getElementById('notif-dot').classList.remove('hidden');
                    }
                    totalMoney += parseFloat(d.kazanc || 0);

                    table.innerHTML += `
                        <tr class="hover:bg-gray-50/80 transition group">
                            <td class="px-8 py-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-500 border border-gray-200">
                                        ${driver.key.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <p class="text-sm font-bold text-gray-900 uppercase tracking-tight">${driver.key.replace('_',' ')}</p>
                                        <p class="text-[10px] text-gray-500 font-medium">${d.tarih}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <span class="text-sm font-semibold text-gray-700">${d.manuelKM} / ${d.gpsKM}</span>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <span class="px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest ${isSupheli ? 'bg-orange-50 text-orange-600 border border-orange-100' : 'bg-green-50 text-green-600 border border-green-100'}">
                                    ${isSupheli ? 'Sapma Var' : 'Onaylı'}
                                </span>
                            </td>
                            <td class="px-8 py-5 text-right">
                                <button onclick="alert('KM Kanıtı: Fotoğraf Yükleniyor...')" class="p-2 hover:bg-white rounded-lg border border-transparent hover:border-gray-200 transition text-gray-400 hover:text-purple-600">
                                    <i data-lucide="external-link" class="w-4 h-4"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
            document.getElementById('stat-alerts').innerText = alertCount;
            document.getElementById('stat-money').innerText = '₺' + totalMoney.toLocaleString();
            lucide.createIcons();
        });

        // Harita Başlatma
        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    </script>
</body>
</html>
