<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Akıllı Teslimat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; overflow: hidden; color: white; }
        .slogan-text { letter-spacing: 0.2em; text-transform: uppercase; color: #94a3b8; font-weight: 300; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(6, 182, 212, 0.15) 0%, transparent 70%); }
        @keyframes slow-bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .animate-bounce-slow { animation: slow-bounce 3s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative px-6">

    <div id="loader" class="fixed inset-0 z-[9999] bg-[#0f172a] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative">
            <div class="w-24 h-24 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
        </div>
        <p class="mt-6 text-cyan-400 font-['Orbitron'] tracking-[0.3em] text-[10px] animate-pulse">KURYEAİ YÜKLENİYOR...</p>
    </div>

    <div class="fixed inset-0 hero-gradient pointer-events-none"></div>

    <div class="z-10 text-center space-y-8 max-w-2xl">
        <div class="animate-bounce-slow">
            <img src="1000413588.png" 
                 onerror="this.src='1000413588.jpg'; this.onerror=null;"
                 alt="KuryeAI Logo" 
                 class="mx-auto max-w-[240px] drop-shadow-[0_0_20px_rgba(6,182,212,0.4)]">
            <p class="slogan-text text-sm animate-pulse mt-6">Akıllı Teslimat.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="window.location.href='restaurant.html'" class="glass hover:bg-orange-500/10 transition-all p-8 rounded-[2rem] border border-orange-500/20">
                <i class="fa-solid fa-store text-3xl text-orange-500 mb-2"></i>
                <span class="block font-semibold text-lg">Restoran</span>
            </button>
            <button onclick="window.location.href='courier.html'" class="glass hover:bg-cyan-500/10 transition-all p-8 rounded-[2rem] border border-cyan-500/20">
                <i class="fa-solid fa-motorcycle text-3xl text-cyan-500 mb-2"></i>
                <span class="block font-semibold text-lg">Kurye</span>
            </button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
            }, 1000);
        });
    </script>
</body>
</html>
