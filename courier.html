<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KuryeAI ULTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:50vh}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#020617;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.online{background:#22c55e;color:black}
.offline{background:#ef4444}

.card{
background:rgba(15,23,42,.7);
padding:12px;
margin:10px;
border-radius:12px;
}

button{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:10px;
font-weight:bold;
}

.blue{background:#00d4ff;color:black}
.green{background:#22c55e}
.red{background:#ef4444}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="card">
<button class="green" onclick="goOnline()">Online</button>
<button class="red" onclick="goOffline()">Offline</button>
</div>

<div class="card">
<h3>📦 Siparişler</h3>
<div id="orders"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";

import {
getDatabase, ref, onValue, update, set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const db=getDatabase();
const auth=getAuth();

let map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* CACHE */
let user,courierData={},ordersCache={},marker,routeLayer,routeCache={};

/* AUTH */
onAuthStateChanged(auth,u=>{
if(!u) location.href="login.html";
user=u;
});

/* GPS SMOOTH */
let anim;

navigator.geolocation.watchPosition(pos=>{

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
map.setView([lat,lng],15);
}else{
let s=marker.getLatLng(),i=0;

function step(){
i++;
marker.setLatLng([
s.lat+(lat-s.lat)*(i/15),
s.lng+(lng-s.lng)*(i/15)
]);
if(i<15) requestAnimationFrame(step);
}
step();
}

/* FIREBASE */
set(ref(db,"couriers/"+user?.uid),{
lat,lng,online:true
});

});

/* REAL ROUTE */
async function getRoute(from,to){

let key=from.lat+","+from.lng+"_"+to.lat+","+to.lng;

if(routeCache[key]) return routeCache[key];

let url=`https://router.project-osrm.org/route/v1/driving/${from.lng},${from.lat};${to.lng},${to.lat}?overview=full&geometries=geojson`;

let res=await fetch(url);
let data=await res.json();

routeCache[key]=data.routes[0];
return data.routes[0];
}

/* SOUND */
function playSound(){
let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
audio.play();
}

/* ORDERS */
onValue(ref(db,"orders"),async snap=>{

orders.innerHTML="";

snap.forEach(async o=>{

let d=o.val();
ordersCache[d.id]=d;

if(d.courierId!==user.uid) return;

/* NOTIFICATION */
if(d.status==="assigned"){
playSound();
}

/* ROUTE */
if(marker && d.lat){

let route=await getRoute(marker.getLatLng(),d);

if(routeLayer) map.removeLayer(routeLayer);

routeLayer=L.geoJSON(route.geometry,{style:{color:"#00d4ff"}}).addTo(map);

let km=(route.distance/1000).toFixed(2);
let min=Math.round(route.duration/60);

orders.innerHTML+=`
<div class="card">
<b>${d.address}</b><br>
${d.status}<br>
${km} km | ${min} dk

<button class="green" onclick="accept('${d.id}')">Kabul</button>
<button class="blue" onclick="complete('${d.id}')">Teslim</button>
</div>
`;

}

});

});

/* ACTIONS */
window.accept=id=>{
update(ref(db,"orders/"+id),{status:"accepted"});
};

window.complete=id=>{
update(ref(db,"orders/"+id),{status:"delivered"});
};

/* STATUS */
window.goOnline=()=>{
status.innerText="Online";
status.className="status online";
};

window.goOffline=()=>{
status.innerText="Offline";
status.className="status offline";
update(ref(db,"couriers/"+user.uid),{online:false});
};

</script>

</body>
</html>
