<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #0f172a;
    color: white;
}

.sidebar {
    width: 220px;
    background: #020617;
    height: 100vh;
    padding: 20px;
}

.sidebar h2 {
    color: #00eaff;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    background: none;
    border: none;
    color: white;
    text-align: left;
    cursor: pointer;
}

.sidebar button:hover {
    background: #0ea5e9;
}

.content {
    flex: 1;
    padding: 20px;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.btn {
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.approve { background: green; color: white; }
.reject { background: red; color: white; }
</style>
</head>

<body>

<div class="sidebar">
    <h2>KuryeAI</h2>
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('applications')">Başvurular</button>
    <button onclick="logout()">Çıkış</button>
</div>

<div class="content">

    <!-- DASHBOARD -->
    <div id="dashboardPage">
        <h1>Dashboard</h1>
        <div class="card">
            Sistem aktif 🚀
        </div>
    </div>

    <!-- APPLICATIONS -->
    <div id="applicationsPage" style="display:none;">
        <h1>Restoran Başvuruları</h1>
        <div id="applicationsList"></div>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

// 🔥 SENİN CONFIG
const firebaseConfig = {
    apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
    authDomain: "kuryeai.firebaseapp.com",
    databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kuryeai",
    storageBucket: "kuryeai.firebasestorage.app",
    messagingSenderId: "655930514402",
    appId: "1:655930514402:web:379321cbb83f48daf077bb",
    measurementId: "G-JYQP30LJG3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// SAYFA DEĞİŞTİR
window.showPage = function(page) {
    document.getElementById("dashboardPage").style.display = "none";
    document.getElementById("applicationsPage").style.display = "none";

    document.getElementById(page + "Page").style.display = "block";

    if(page === "applications") loadApplications();
}

// LOGOUT
window.logout = function() {
    sessionStorage.clear();
    window.location.href = "login.html";
}

// 🔥 BAŞVURULARI ÇEK
async function loadApplications() {
    const list = document.getElementById("applicationsList");
    list.innerHTML = "Yükleniyor...";

    const querySnapshot = await getDocs(collection(db, "applications"));

    list.innerHTML = "";

    querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <b>${data.name}</b><br>
            ${data.email}<br><br>

            <button class="btn approve" onclick="approve('${docSnap.id}', '${data.name}', '${data.email}')">Onayla</button>
            <button class="btn reject" onclick="reject('${docSnap.id}')">Reddet</button>
        `;

        list.appendChild(div);
    });
}

// 🔥 ONAYLA
window.approve = async function(id, name, email) {

    // restaurants'a ekle
    await addDoc(collection(db, "restaurants"), {
        name: name,
        email: email,
        createdAt: new Date()
    });

    // applications'tan sil
    await deleteDoc(doc(db, "applications", id));

    alert("Restoran onaylandı!");
    loadApplications();
}

// ❌ REDDET
window.reject = async function(id) {
    await deleteDoc(doc(db, "applications", id));
    alert("Başvuru reddedildi!");
    loadApplications();
}

</script>

</body>
</html>
