<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Login</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0f172a;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
position:relative;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
background:#00d4ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}

.password-box{position:relative;}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:black;
}

.remember{
display:flex;
align-items:center;
gap:5px;
font-size:14px;
margin:10px 0;
}

.link{
font-size:13px;
color:#00d4ff;
cursor:pointer;
display:block;
}

.loading{
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
border-radius:15px;
}

.shake{
animation:shake 0.3s;
}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.lang{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<div class="box" id="box">

<div class="lang" id="langBtn">TR / EN</div>

<h2 id="title">Giriş Yap</h2>

<input id="email" placeholder="Email">

<div class="password-box">
<input id="password" type="password" placeholder="Şifre">
<span class="eye" id="eye">👁</span>
</div>

<div class="remember">
<input type="checkbox" id="remember">
<label id="rememberText">Beni hatırla</label>
</div>

<span class="link" id="forgot">Şifremi unuttum</span>

<button id="loginBtn">Giriş Yap</button>

<div class="loading" id="loading">⏳</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
setPersistence,
browserLocalPersistence,
browserSessionPersistence,
sendPasswordResetEmail,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* CONFIG */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* ELEMENTS */
const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const eye = document.getElementById("eye");
const remember = document.getElementById("remember");
const forgot = document.getElementById("forgot");
const loading = document.getElementById("loading");
const box = document.getElementById("box");

/* 👁 SHOW PASSWORD */
eye.onclick = ()=>{
password.type = password.type === "password" ? "text" : "password";
};

/* 🔐 AUTO LOGIN */
onAuthStateChanged(auth, async(user)=>{
if(user){
redirectByRole(user.uid);
}
});

/* 🚀 LOGIN */
loginBtn.onclick = async ()=>{

const mail = email.value.trim();
const pass = password.value.trim();

if(!mail || !pass){
shake();
return;
}

loading.style.display="flex";

try{

await setPersistence(auth,
remember.checked ? browserLocalPersistence : browserSessionPersistence
);

const userCred = await signInWithEmailAndPassword(auth, mail, pass);

await redirectByRole(userCred.user.uid);

}catch(e){
alert("❌ "+e.message);
shake();
}

loading.style.display="none";
};

/* 🎯 ROLE REDIRECT */
async function redirectByRole(uid){

const snap = await getDoc(doc(db,"users",uid));

if(!snap.exists()){
alert("Rol yok!");
return;
}

const role = snap.data().role;

if(role==="admin") location.href="admin.html";
else if(role==="restaurant") location.href="restaurant.html";
else if(role==="courier") location.href="courier.html";
else location.href="index.html";
}

/* 🔁 RESET */
forgot.onclick = async ()=>{
if(!email.value){
alert("Email gir!");
return;
}

await sendPasswordResetEmail(auth,email.value);
alert("Mail gönderildi 📧");
};

/* 💥 SHAKE */
function shake(){
box.classList.add("shake");
setTimeout(()=>box.classList.remove("shake"),300);
}

</script>

</body>
</html>
