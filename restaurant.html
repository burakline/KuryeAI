<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RestoranAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:40vh}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#020617;
}

.card{
background:#0f172a;
padding:12px;
margin:10px;
border-radius:12px;
}

input,button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:10px;
}

.blue{background:#00d4ff;color:black}
.green{background:#22c55e}
.red{background:#ef4444}

.status{
padding:4px 8px;
border-radius:10px;
font-size:12px;
}

.waiting{background:#64748b}
.assigned{background:#f59e0b}
.onway{background:#00d4ff;color:black}
.delivered{background:#22c55e}
.cancelled{background:#ef4444}
</style>
</head>

<body>

<div class="header">
<h3>🍽️ Restoran Panel</h3>
<div id="stats"></div>
</div>

<div id="map"></div>

<div class="card">
<input id="customer" placeholder="Müşteri adı">
<input id="address" placeholder="Adres">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<button class="blue" onclick="createOrder()">Sipariş Oluştur</button>
</div>

<div class="card" id="orderList"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import {
getDatabase, ref, onValue, set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const db=getDatabase();
const auth=getAuth();

let user=null;
let map=L.map('map').setView([39.92,32.85],12);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let orderMarkers={};
let orders={};

/* AUTH */
onAuthStateChanged(auth,function(u){
if(!u){ location.href="login.html"; return; }
user=u;
});

/* MAP CLICK */
map.on("click",function(e){
lat.value=e.latlng.lat;
lng.value=e.latlng.lng;
});

/* CREATE ORDER */
window.createOrder=function(){

let id="ORD-"+Date.now();

let order={
id:id,
customer:customer.value,
address:address.value,
lat:parseFloat(lat.value),
lng:parseFloat(lng.value),
status:"waiting",
restaurantId:user.uid,
createdAt:Date.now()
};

set(ref(db,"orders/"+id),order);

};

/* STATUS CLASS */
function getStatusClass(s){
return s==="waiting"?"waiting":
s==="assigned"?"assigned":
s==="onway"?"onway":
s==="delivered"?"delivered":
"cancelled";
}

/* ORDERS */
onValue(ref(db,"orders"),function(snap){

orderList.innerHTML="";
orders={};

let total=0;
let revenue=0;

snap.forEach(function(o){

let d=o.val();

/* SADECE BU RESTORAN */
if(!user || d.restaurantId!==user.uid) return;

orders[d.id]=d;

total++;

if(d.status==="delivered"){
revenue+=d.price||50;
}

/* MARKER */
if(d.lat && !orderMarkers[d.id]){
orderMarkers[d.id]=L.circleMarker([d.lat,d.lng],{
radius:5,
color:"#00d4ff"
}).addTo(map);
}

/* UI */
let html=
"<div class='card'>"+
"<b>"+d.customer+"</b><br>"+
d.address+"<br>"+
"<span class='status "+getStatusClass(d.status)+"'>"+d.status+"</span>";

if(d.courierId){
html+="<br>Kurye: "+d.courierId;
}

html+="</div>";

orderList.innerHTML+=html;

});

/* STATS */
stats.innerHTML=
"📦 "+total+
" | 💰 "+revenue+"₺";

});

</script>

</body>
</html>
