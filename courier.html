<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #F8FAFC; --card: rgba(255, 255, 255, 0.98); --text: #1E293B; }
        .dark-mode { --bg: #0B1120; --card: rgba(30, 41, 59, 0.98); --text: #F1F5F9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 0; }
        
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #0F172A; z-index: 300; transition: 0.4s; padding: 25px; color: white; }
        .sidebar.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 150; background: #1E293B; color: white; padding: 10px; border-radius: 12px; }

        /* Konum Bul Butonu */
        .locate-btn { position: fixed; bottom: 210px; right: 20px; z-index: 150; background: white; color: #1E293B; padding: 12px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }

        /* Hız Göstergesi - Kazanç Verisinin Üstüne Binmemesi İçin Yukarı Kaydırıldı */
        #speed-overlay { position: fixed; bottom: 280px; left: 20px; z-index: 200; width: 60px; height: 60px; background: #1E293B; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid white; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Alt Kart ve Buton Boyutları Küçültüldü */
        .bottom-card { position: fixed; bottom: 15px; left: 12px; right: 12px; background: var(--card); border-radius: 24px; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; color: var(--text); }
        #main-btn { width: 100%; padding: 12px; border-radius: 16px; font-weight: 800; text-transform: uppercase; font-style: italic; transition: 0.3s; }
        
        .ai-marker-wrapper { display: flex; flex-direction: column; align-items: center; }
        .ai-marker-label { background: #0F172A; color: white; padding: 2px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-bottom: 4px; border: 1px solid #06B6D4; white-space: nowrap; }
        .ai-marker-circle { background: #06B6D4; width: 40px; height: 40px; border: 3px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; }

        #stats-modal { position: fixed; inset: 0; background: #0F172A; z-index: 400; display: none; padding: 20px; overflow-y: auto; color: white; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
    
    <button class="locate-btn" onclick="locateUser()"><i data-lucide="locate-fixed"></i></button>

    <div id="speed-overlay">
        <span id="live-speed" class="text-xl font-black">0</span>
        <span class="text-[8px] font-bold uppercase">km/s</span>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black italic">KURYE<span class="text-cyan-500">AI</span></h2>
            <button onclick="toggleMenu()"><i data-lucide="x"></i></button>
        </div>

        <div class="flex flex-col items-center mb-6">
            <div id="p-img-box" class="w-20 h-20 bg-slate-800 rounded-2xl mb-3 flex items-center justify-center border-2 border-cyan-500 overflow-hidden relative">
                <img id="p-preview" class="w-full h-full object-cover hidden">
                <i id="p-icon" data-lucide="user" class="text-slate-500 w-8 h-8"></i>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="uploadPhoto()">
            <button onclick="document.getElementById('file-input').click()" class="text-[10px] font-bold text-cyan-400 uppercase tracking-widest">Fotoğraf Değiştir</button>
            <p class="text-[10px] text-slate-500 mt-2 font-mono">ID: <span id="kurye-id-display">Yükleniyor...</span></p>
        </div>

        <div id="profile-form" class="space-y-2">
            <input type="text" id="p-ad" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl text-sm" placeholder="Ad Soyad">
            <input type="text" id="p-marka" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl text-sm" placeholder="Araç Marka / Model">
            <input type="text" id="p-plaka" class="w-full bg-slate-800/50 border border-slate-700 p-3 rounded-xl text-sm" placeholder="Araç Plakası">
            <button onclick="saveProfile()" class="w-full bg-cyan-500 py-3 rounded-xl font-bold mt-2 text-xs uppercase">Kaydet ve Güncelle</button>
        </div>

        <hr class="my-6 border-slate-800">
        <button onclick="openStats()" class="flex items-center gap-3 font-bold text-slate-300 mb-6 text-sm"><i data-lucide="bar-chart-3"></i> Geçmiş Kazançlar</button>
        
        <div class="mt-auto flex justify-between items-center pt-6">
            <button onclick="toggleTheme()" class="flex items-center gap-2 text-xs font-bold"><i data-lucide="moon"></i> Tema</button>
            <button onclick="logout()" class="text-rose-500 font-bold flex items-center gap-2 text-xs"><i data-lucide="log-out"></i> Çıkış</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-card">
        <div class="flex justify-between items-end mb-3 px-1">
            <div>
                <h4 class="text-[9px] font-bold text-slate-400 uppercase">Toplam Kazanç</h4>
                <p id="earnings" class="text-xl font-black text-slate-900 italic">₺0,00</p>
            </div>
            <div class="text-right">
                <h4 class="text-[9px] font-bold text-slate-400 uppercase">Vardiya Süresi</h4>
                <p id="timer" class="text-md font-bold text-slate-800">00:00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-1 mb-4 border-y border-slate-100 py-3 text-center">
            <div><h4 class="text-[9px] text-cyan-600 font-bold uppercase">Mesafe</h4><p id="distance" class="text-md font-extrabold">0.0 km</p></div>
            <div><h4 class="text-[9px] text-cyan-600 font-bold uppercase">Ort. Hız</h4><p id="avg-speed" class="text-md font-extrabold">0</p></div>
            <div><h4 class="text-[9px] text-rose-500 font-bold uppercase">Saat/₺</h4><p id="hourly-rate" class="text-md font-extrabold">₺0</p></div>
        </div>

        <button id="main-btn" onclick="handleShift()" class="bg-cyan-500 text-white shadow-lg shadow-cyan-500/20 flex items-center justify-center gap-2">
            <i data-lucide="zap" class="w-4 h-4 fill-current"></i> Vardiyayı Başlat
        </button>
    </div>

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();
        
        // 9: Gerçek Sıralı ID Sistemi (KAI-0000001)
        let kuryeID = localStorage.getItem('kuryeAI_ID');
        if (!kuryeID) {
            db.ref('sistem/kuryeSayaci').transaction(current => {
                const next = (current || 0) + 1;
                kuryeID = 'KAI-' + next.toString().padStart(7, '0');
                localStorage.setItem('kuryeAI_ID', kuryeID);
                return next;
            }, (error, committed, snapshot) => {
                document.getElementById('kurye-id-display').innerText = kuryeID;
            });
        } else {
            document.getElementById('kurye-id-display').innerText = kuryeID;
        }

        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        let lightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
        let darkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/dark_all/{z}/{x}/{y}{r}.png');

        let isActive = false, marker, pathLine, currentPos = null;
        let totalDistance = 0, lastCoord = null, pathCoords = [];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        
        // Konum Bulma Fonksiyonu
        function locateUser() {
            if (currentPos) map.flyTo(currentPos, 17);
        }

        // 8: Profil Fotoğrafı Yükleme (Tamir Edildi)
        function uploadPhoto() {
            const file = document.getElementById('file-input').files[0];
            if(!file) return;
            const ref = storage.ref(`kuryeler/${kuryeID}/avatar.jpg`);
            ref.put(file).then(snapshot => {
                ref.getDownloadURL().then(url => {
                    db.ref(`kuryeler/${kuryeID}/profil/photo`).set(url);
                    document.getElementById('p-preview').src = url;
                    document.getElementById('p-preview').classList.remove('hidden');
                    document.getElementById('p-icon').classList.add('hidden');
                    alert("Fotoğraf güncellendi!");
                });
            }).catch(err => alert("Yükleme hatası: " + err.message));
        }

        function handleShift() {
            if (!isActive) {
                isActive = true;
                document.getElementById('main-btn').innerHTML = 'Vardiyayı Bitir';
                document.getElementById('main-btn').className = "bg-slate-800 text-white flex items-center justify-center gap-2";
                startTracking();
            } else { if(confirm("Vardiyayı bitirmek istiyor musun?")) location.reload(); }
        }

        function startTracking() {
            pathLine = L.polyline([], {color: '#06B6D4', weight: 5}).addTo(map);
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                currentPos = [latitude, longitude];
                const s = speed ? (speed * 3.6) : 0;

                document.getElementById('live-speed').innerText = Math.round(s);

                if (!marker) {
                    marker = L.marker(currentPos, {
                        icon: L.divIcon({
                            className: '',
                            html: `<div class="ai-marker-wrapper"><div class="ai-marker-label">Sen</div><div class="ai-marker-circle">AI</div></div>`,
                            iconSize: [100, 60], iconAnchor: [50, 60]
                        })
                    }).addTo(map);
                } else { marker.setLatLng(currentPos); }
                
                map.panTo(currentPos);
                
                if (lastCoord && s > 2) {
                    const dist = map.distance(lastCoord, currentPos) / 1000;
                    totalDistance += dist;
                    pathCoords.push(currentPos);
                    pathLine.setLatLngs(pathCoords);
                    document.getElementById('distance').innerText = totalDistance.toFixed(1) + " km";
                }
                lastCoord = currentPos;
            }, null, {enableHighAccuracy: true});
        }

        function saveProfile() {
            const data = {
                adSoyad: document.getElementById('p-ad').value,
                marka: document.getElementById('p-marka').value,
                plaka: document.getElementById('p-plaka').value
            };
            db.ref(`kuryeler/${kuryeID}/profil`).update(data).then(() => alert("Profil buluta kaydedildi!"));
        }

        function logout() { window.location.href = "login.html"; }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    </script>
</body>
</html>
