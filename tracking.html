<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Canlı Takip</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0}
#map{height:100vh}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const db=getDatabase();

const urlParams=new URLSearchParams(window.location.search);
const orderId=urlParams.get("id");

let map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let courierMarker,orderMarker;

/* ORDER */
onValue(ref(db,"orders/"+orderId),function(snap){

let o=snap.val();
if(!o) return;

if(o.lat){
if(!orderMarker){
orderMarker=L.marker([o.lat,o.lng]).addTo(map);
}
}

/* COURIER */
if(o.courierId){
onValue(ref(db,"couriers/"+o.courierId),function(cSnap){

let c=cSnap.val();
if(!c || !c.lat) return;

if(!courierMarker){
courierMarker=L.marker([c.lat,c.lng]).addTo(map);
map.setView([c.lat,c.lng],15);
}else{
courierMarker.setLatLng([c.lat,c.lng]);
}

});
}

});

</script>

</body>
</html>
