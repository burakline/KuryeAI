<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurye Paneli - KuryeAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        #map { height: 250px; border-radius: 1rem; z-index: 1; background: #1e293b; }
    </style>
</head>
<body class="bg-slate-900 text-white pb-24">

    <nav class="p-4 bg-slate-800 border-b border-slate-700 flex justify-between items-center sticky top-0 z-10 shadow-xl">
        <h1 class="text-xl font-bold text-cyan-400">KuryeAI</h1>
        <div class="flex items-center gap-3">
            <button onclick="window.location.href='index.html'" class="text-xs bg-slate-700 px-3 py-2 rounded-lg border border-slate-600">Çıkış Yap</button>
            <div id="statusBadge" class="px-2 py-1 rounded-md text-[10px] bg-rose-500/20 text-rose-400 border border-rose-500/50 uppercase font-bold">Kapalı</div>
        </div>
    </nav>

    <div class="p-4 space-y-4">
        <div id="map" class="shadow-2xl border border-slate-700"></div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="startShift()" id="startBtn" class="py-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-bold shadow-lg shadow-emerald-900/20 transition active:scale-95">Vardiya Başlat</button>
            <button onclick="endShift()" id="endBtn" class="py-4 bg-rose-600 hover:bg-rose-500 rounded-xl font-bold shadow-lg shadow-rose-900/20 transition active:scale-95">Vardiya Bitir</button>
        </div>

        <div class="space-y-3">
            <h3 class="text-cyan-400 font-bold flex items-center gap-2 text-sm italic">
                📦 Yeni Sipariş Havuzu
            </h3>
            <div id="orderPool" class="space-y-3">
                <p class="text-slate-500 text-xs text-center py-4 italic">Siparişler bekleniyor...</p>
            </div>
        </div>

        <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 space-y-4 shadow-xl">
            <h3 class="text-slate-400 font-bold border-b border-slate-700 pb-2 text-xs uppercase tracking-wider">Gün Sonu Raporu</h3>
            <div class="grid grid-cols-2 gap-2">
                <input id="packages" type="number" placeholder="Paket" class="bg-slate-700 p-3 rounded-lg outline-none text-sm border border-slate-600 focus:border-cyan-500">
                <input id="hours" type="number" placeholder="Saat" class="bg-slate-700 p-3 rounded-lg outline-none text-sm border border-slate-600 focus:border-cyan-500">
                <input id="km" type="number" placeholder="KM" class="bg-slate-700 p-3 rounded-lg outline-none text-sm border border-slate-600 focus:border-cyan-500">
                <input id="revenue" type="number" placeholder="Ciro" class="bg-slate-700 p-3 rounded-lg outline-none text-sm border border-slate-600 focus:border-cyan-500">
            </div>
            <button onclick="saveDayEnd()" class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 rounded-lg font-bold shadow-lg transition active:scale-95">Raporu Kaydet</button>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 p-3 flex justify-around items-center z-20">
        <button class="flex flex-col items-center gap-1 text-cyan-400">
            <span class="text-[10px] font-bold">ANA SAYFA</span>
        </button>
        <button onclick="alert('Profil: Burakline\nBölge: Ankara')" class="flex flex-col items-center gap-1 text-slate-400">
            <span class="text-[10px] font-bold text-white">PROFİL</span>
        </button>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script type="module" src="js/courier.js"></script>
<script src="google-util.js"></script> </body>
</html>
