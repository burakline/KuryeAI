<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI | Yapay Zeka Destekli Lojistik</title>

<style>
body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: #fff; margin: 0; background: #0b0e14; }
header { background: #000; padding: 1.5rem 0; text-align: center; border-bottom: 1px solid #333; }
.hero { background: #1a1a1a; padding: 3rem 2rem; text-align: center; }

.logo-container { margin-bottom: 20px; min-height: 150px; }
.logo-container img {
max-width: 180px;
animation: float 3s ease-in-out infinite;
}

@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-15px); }
100% { transform: translateY(0px); }
}

.cta-button {
display: inline-block;
background: #00d4ff;
color: #000;
padding: 15px 30px;
border-radius: 8px;
font-weight: bold;
margin-bottom: 10px;
border: none;
cursor: pointer;
}

.login-container {
display: flex;
justify-content: center;
gap: 15px;
flex-wrap: wrap;
margin-top: 20px;
}

.btn-login {
border: 1px solid #00d4ff;
color: #00d4ff;
padding: 12px 24px;
border-radius: 8px;
background: transparent;
}

.services {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
padding: 2rem;
max-width: 1000px;
margin: auto;
}

.service-card {
background: #111;
border: 1px solid #333;
padding: 1.5rem;
border-radius: 12px;
}

.footer {
margin-top: 60px;
text-align: center;
color: #888;
border-top: 1px solid #333;
padding: 2rem 0;
}

/* MODAL */
#courierModal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.8);
z-index: 999;
justify-content: center;
align-items: center;
}

.modalBox {
background: #1e293b;
padding: 20px;
border-radius: 15px;
width: 90%;
max-width: 400px;
max-height: 90vh;
overflow: auto;
position: relative;
}

.modalBox input, .modalBox select {
width: 100%;
margin: 6px 0;
padding: 10px;
border-radius: 8px;
border: none;
}

.closeX {
position: absolute;
top: 10px;
right: 15px;
cursor: pointer;
font-size: 20px;
}
</style>
</head>

<body>

<header><h1>KuryeAI</h1></header>

<div class="hero">

<div class="logo-container">
<img src="logo.png" onerror="this.src='https://via.placeholder.com/180x180/00d4ff/000000?text=KuryeAI+Logo'">
</div>

<h2>Yapay Zeka Destekli Yeni Nesil Lojistik</h2>

<a href="#" class="cta-button">Hemen Kurye Çağır</a>

<button onclick="openCourier()" class="cta-button">Kurye Ol</button>

<div class="login-container">
<a href="login.html?type=restaurant" class="btn-login">Restoran Girişi</a>
<a href="login.html?type=courier" class="btn-login">Kurye Girişi</a>
<a href="login.html?type=admin" class="btn-login">Admin Girişi</a>
</div>

</div>

<div class="services">
<div class="service-card"><h4>Restoran Havuz Kurye</h4></div>
<div class="service-card"><h4>VIP Express Moto Kurye</h4></div>
<div class="service-card"><h4>Lojistik Yazılım</h4></div>
</div>

<!-- KURYE MODAL -->
<div id="courierModal" onclick="closeCourier()">
<div class="modalBox" onclick="event.stopPropagation()">

<div class="closeX" onclick="closeCourier()">✕</div>

<h3>Kurye Başvuru</h3>

<input id="name" placeholder="Ad Soyad">
<input id="birthDate" type="date">
<input id="birthPlace" placeholder="Doğum Yeri">
<input id="blood" placeholder="Kan Grubu">
<input id="education" placeholder="Eğitim Durumu">
<input id="license" placeholder="Ehliyet">

<select id="p1">
<option value="">P1 Belgesi</option>
<option value="var">Var</option>
<option value="yok">Yok</option>
</select>

<select id="src">
<option value="">SRC Kurye</option>
<option value="var">Var</option>
<option value="yok">Yok</option>
</select>

<select id="criminal">
<option value="">Adli Sicil</option>
<option value="yok">Yok</option>
<option value="var">Var</option>
</select>

<input id="phone" placeholder="Telefon">
<input id="email" placeholder="Mail">

<button onclick="sendCourier()">Başvur</button>
<button onclick="closeCourier()">Kapat</button>

</div>
</div>

<div class="footer">
<p><strong>AI Teknoloji ve Lojistik A.Ş</strong></p>
<p>© 2026 KuryeAI</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MODAL */
window.openCourier = () => {
document.getElementById("courierModal").style.display = "flex";
}

window.closeCourier = () => {
document.getElementById("courierModal").style.display = "none";
}

/* BAŞVURU (FIXED) */
window.sendCourier = async () => {

try{

const data = {
name: document.getElementById("name").value,
birthDate: document.getElementById("birthDate").value,
birthPlace: document.getElementById("birthPlace").value,
blood: document.getElementById("blood").value,
education: document.getElementById("education").value,
license: document.getElementById("license").value,
p1: document.getElementById("p1").value,
src: document.getElementById("src").value,
criminal: document.getElementById("criminal").value,
phone: document.getElementById("phone").value,
email: document.getElementById("email").value
};

if(!data.name || !data.email){
alert("Ad ve email zorunlu!");
return;
}

await addDoc(collection(db,"applications"),{
...data,
type:"courier",
status:"pending",
createdAt:new Date()
});

alert("✅ Başvuru gönderildi!");
closeCourier();

}catch(e){
alert("HATA: "+e.message);
}

};

</script>

</body>
</html>
