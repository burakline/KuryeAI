<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MODALS */
window.openCourier = () => {
document.getElementById("courierModal").style.display = "flex";
}
window.closeCourier = () => {
document.getElementById("courierModal").style.display = "none";
}

window.openRestaurant = () => {
document.getElementById("restaurantModal").style.display = "flex";
}
window.closeRestaurant = () => {
document.getElementById("restaurantModal").style.display = "none";
}

/* KURYE */
window.sendCourier = async () => {
try{

const data = {
name: document.getElementById("name")?.value.trim(),
birthDate: document.getElementById("birthDate")?.value,
birthPlace: document.getElementById("birthPlace")?.value.trim(),
blood: document.getElementById("blood")?.value.trim(),
education: document.getElementById("education")?.value.trim(),
license: document.getElementById("license")?.value.trim(),
p1: document.getElementById("p1")?.value,
src: document.getElementById("src")?.value,
criminal: document.getElementById("criminal")?.value,
phone: document.getElementById("phone")?.value.trim(),
email: document.getElementById("email")?.value.trim()
};

/* VALIDATION */
if(!data.name || !data.email){
alert("Ad ve email zorunlu!");
return;
}

await addDoc(collection(db,"applications"),{
...data,
type:"courier",
status:"pending",
createdAt:new Date()
});

alert("✅ Başvuru gönderildi!");
closeCourier();

}catch(e){
alert("HATA: "+e.message);
console.error(e);
}
};

/* RESTORAN */
window.sendRestaurant = async () => {
try{

const data = {
name: document.getElementById("r_name")?.value.trim(),
phone: document.getElementById("r_phone")?.value.trim(),
email: document.getElementById("r_email")?.value.trim(),
address: document.getElementById("r_address")?.value.trim()
};

if(!data.name || !data.email){
alert("Ad ve email zorunlu!");
return;
}

await addDoc(collection(db,"applications"),{
...data,
type:"restaurant",
status:"pending",
createdAt:new Date()
});

alert("✅ Başvuru gönderildi!");
closeRestaurant();

}catch(e){
alert("HATA: "+e.message);
console.error(e);
}
};

</script>
