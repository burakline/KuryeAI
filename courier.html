<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#0b0e14;color:white;font-family:Arial;}
#map{height:60vh;}
.btn{width:100%;padding:15px;margin-top:10px;border:none;border-radius:10px;}
.start{background:#00d4ff;}
.stop{background:#ff4d4d;color:white;}
</style>
</head>

<body>

<div id="map"></div>

<button class="btn start" onclick="start()">Online Ol</button>
<button class="btn stop" onclick="stop()">Offline Ol</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user;

onAuthStateChanged(auth, async(u)=>{
if(!u){ location.href="login.html"; return; }

const snap = await getDoc(doc(db,"users",u.uid));
if(!snap.exists() || snap.data().role !== "courier"){
location.href="index.html";
}

user = u;
});

let map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;
let watchId;

window.start = ()=>{
watchId = navigator.geolocation.watchPosition(async(pos)=>{
const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

if(marker){ marker.setLatLng([lat,lng]); }
else{ marker = L.marker([lat,lng]).addTo(map); }

await updateDoc(doc(db,"couriers",user.uid),{
lat,lng,online:true
});

});
};

window.stop = async()=>{
navigator.geolocation.clearWatch(watchId);
await updateDoc(doc(db,"couriers",user.uid),{online:false});
};

</script>
</body>
</html>
