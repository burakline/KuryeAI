<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}
.nav{display:flex;gap:10px;padding:15px;background:white;}
.nav button{padding:10px;border:none;border-radius:10px;background:#eee;cursor:pointer;}
.active{background:#00d4ff;color:white;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:10px;}
#map{height:65vh;border-radius:12px;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('settings')" class="active">⚙️ Ayarlar</button>
<button onclick="show('apps')">📩 Başvurular</button>
<button onclick="show('couriers')">🚴 Kuryeler</button>
<button onclick="show('analytics')">📊 Analiz</button>
<button onclick="show('mapPage')">🗺️ Harita</button>
</div>

<div class="container">

<!-- ⚙️ SETTINGS -->
<div id="settings">

<div class="card">
<h3>Sistem Ayarları</h3>
<input id="km" placeholder="Max KM">
<input id="timeout" placeholder="Timeout (sn)">
<input id="hourly" placeholder="Saatlik ücret">
<input id="perkm" placeholder="KM ücret">
</div>

<div class="card">
<h3>🔥 Surge Pricing</h3>

<select id="surgeEnabled">
<option value="true">Aktif</option>
<option value="false">Kapalı</option>
</select>

<input id="surgeMax" placeholder="Max Çarpan (örn: 2)">
<input id="surgeThreshold" placeholder="Yoğunluk eşiği (örn: 5)">
</div>

<button onclick="saveSettings()">Kaydet</button>

</div>

<!-- 📩 APPLICATIONS -->
<div id="apps" style="display:none"></div>

<!-- 🚴 COURIERS -->
<div id="couriers" style="display:none"></div>

<!-- 📊 ANALYTICS -->
<div id="analytics" style="display:none">

<div class="card">
<h3>💰 Gelir Grafiği</h3>
<canvas id="incomeChart"></canvas>
</div>

<div class="card">
<h3>🧠 Sistem Durumu</h3>
<p>Aktif Kurye: <b id="activeCourier">0</b></p>
<p>Toplam Sipariş: <b id="totalOrders">0</b></p>
<p>Toplam Kazanç: <b id="totalIncome">0₺</b></p>
<p>🔥 Ortalama Surge: <b id="avgSurge">1x</b></p>
</div>

</div>

<!-- 🗺️ MAP -->
<div id="mapPage" style="display:none">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
getDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const secondaryApp = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
},"Secondary");

const db = getFirestore(app);
const auth = getAuth(app);
const secondaryAuth = getAuth(secondaryApp);

/* 🔐 AUTH */
onAuthStateChanged(auth, async(user)=>{
if(!user){location.href="login.html";return;}

const snap = await getDoc(doc(db,"users",user.uid));

if(!snap.exists() || snap.data().role !== "admin"){
alert("Yetkisiz!");
location.href="login.html";
}
});

/* NAV */
window.show = (id)=>{
["settings","apps","couriers","analytics","mapPage"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
};

/* ⚙️ SETTINGS SAVE */
window.saveSettings = async ()=>{
await setDoc(doc(db,"settings","config"),{
maxDistance:Number(km.value),
timeout:Number(timeout.value),
hourly:Number(hourly.value),
perKm:Number(perkm.value),

surgeEnabled: surgeEnabled.value==="true",
surgeMax:Number(surgeMax.value),
surgeThreshold:Number(surgeThreshold.value)
});
alert("Kaydedildi");
};

/* 📩 APPLICATIONS */
async function loadApps(){

const div = document.getElementById("apps");
const snap = await getDocs(collection(db,"applications"));

div.innerHTML="";

snap.forEach(d=>{
const a=d.data(); a.id=d.id;

div.innerHTML+=`
<div class="card">
<b>${a.name}</b><br>
${a.email}<br>

<button onclick='approve(${JSON.stringify(a)})'>Onayla</button>
<button onclick='reject("${a.id}")'>Reddet</button>
</div>`;
});

}

window.approve = async(a)=>{

const user = await createUserWithEmailAndPassword(
secondaryAuth,
a.email,
"123456"
);

const uid = user.user.uid;

await setDoc(doc(db,"users",uid),{
email:a.email,
name:a.name,
role:"courier"
});

await setDoc(doc(db,"couriers",uid),{
name:a.name,
email:a.email,
lat:0,
lng:0,
online:false
});

await deleteDoc(doc(db,"applications",a.id));

alert("Kurye oluşturuldu");
loadApps();
};

window.reject = async(id)=>{
await deleteDoc(doc(db,"applications",id));
loadApps();
};

/* 🚴 COURIERS */
onSnapshot(collection(db,"couriers"),snap=>{
const div = document.getElementById("couriers");
div.innerHTML="";

snap.forEach(d=>{
const c=d.data();

div.innerHTML+=`
<div class="card">
<b>${c.name}</b><br>
Durum: ${c.online ? "🟢 Online" : "🔴 Offline"}
</div>`;
});
});

/* 📊 ANALYTICS */
onSnapshot(collection(db,"earnings"),snap=>{

let total=0;
let data=[];

snap.forEach(d=>{
total+=d.data().amount;
data.push(d.data().amount);
});

document.getElementById("totalIncome").innerText=total+"₺";

new Chart(document.getElementById("incomeChart"),{
type:"line",
data:{labels:data.map((_,i)=>i+1),datasets:[{data}]}
});

});

onSnapshot(collection(db,"orders"),snap=>{
document.getElementById("totalOrders").innerText=snap.size;

let totalSurge=0,count=0;

snap.forEach(d=>{
totalSurge+=(d.data().surge||1);
count++;
});

document.getElementById("avgSurge").innerText=
(count ? (totalSurge/count).toFixed(2) : 1)+"x";
});

onSnapshot(collection(db,"couriers"),snap=>{
let active=0;
snap.forEach(d=>{
if(d.data().online) active++;
});
document.getElementById("activeCourier").innerText=active;
});

/* 🗺️ MAP */
const map = L.map('map').setView([39.92,32.85],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers={};

onSnapshot(collection(db,"couriers"),snap=>{
snap.forEach(d=>{
const c=d.data();
if(!c.lat) return;

if(markers[d.id]){
markers[d.id].setLatLng([c.lat,c.lng]);
}else{
markers[d.id]=L.marker([c.lat,c.lng])
.addTo(map)
.bindPopup(c.name);
}
});
});

/* INIT */
loadApps();

</script>
</body>
</html>
