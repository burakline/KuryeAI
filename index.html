<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Sistem Girişi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; color: white; margin: 0; overflow: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(6, 182, 212, 0.15) 0%, transparent 70%); }
        .input-field { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(6, 182, 212, 0.2); transition: all 0.3s; color: white; }
        .input-field:focus { border-color: #06b6d4; box-shadow: 0 0 10px rgba(6, 182, 212, 0.3); outline: none; }
        .hidden { display: none; }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(6, 182, 212, 0.6)); }
        /* Footer Stili */
        .footer-signature { position: absolute; bottom: 2rem; left: 0; right: 0; text-align: center; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative px-4">

    <div class="fixed inset-0 hero-gradient pointer-events-none"></div>

    <div id="roleSelection" class="z-10 text-center space-y-8 max-w-4xl w-full pb-20">
        <div class="animate-pulse">
            <div class="logo-glow flex justify-center mb-4">
                <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="48" stroke="#06b6d4" stroke-width="2" stroke-dasharray="10 5"/>
                    <path d="M35 30L55 50L35 70" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M55 30L75 50L55 70" stroke="#06b6d4" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="text-3xl font-['Orbitron'] font-bold tracking-widest text-white uppercase">Kurye<span class="text-cyan-400">AI</span></h1>
            <p class="text-slate-400 text-[10px] tracking-[0.4em] uppercase mt-2">Lojistik Sistemleri</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-3xl mx-auto">
            <button onclick="showLogin('Admin')" class="glass p-8 rounded-3xl hover:bg-red-500/10 border-red-500/20 transition-all group">
                <i class="fa-solid fa-user-shield text-3xl text-red-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <span class="block font-bold font-['Orbitron'] text-sm tracking-widest uppercase">Admin</span>
            </button>
            <button onclick="showLogin('Restoran')" class="glass p-8 rounded-3xl hover:bg-orange-500/10 border-orange-500/20 transition-all group">
                <i class="fa-solid fa-store text-3xl text-orange-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <span class="block font-bold font-['Orbitron'] text-sm tracking-widest uppercase">Restoran</span>
            </button>
            <button onclick="showLogin('Kurye')" class="glass p-8 rounded-3xl hover:bg-cyan-500/10 border-cyan-500/20 transition-all group">
                <i class="fa-solid fa-motorcycle text-3xl text-cyan-500 mb-4 group-hover:scale-110 transition-transform"></i>
                <span class="block font-bold font-['Orbitron'] text-sm tracking-widest uppercase">Kurye</span>
            </button>
        </div>
    </div>

    <div id="loginPanel" class="hidden z-20 w-full max-w-sm glass p-8 rounded-[2.5rem] relative">
        <button onclick="hideLogin()" class="text-slate-500 hover:text-white mb-6 text-sm">
            <i class="fa-solid fa-arrow-left mr-2"></i> Geri
        </button>
        <h2 id="loginTitle" class="text-xl font-['Orbitron'] font-bold text-center mb-8 text-cyan-400 tracking-wider">GİRİŞ</h2>
        <form onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <input type="text" id="username" placeholder="Kullanıcı Adı" required class="w-full p-4 rounded-2xl input-field">
            </div>
            <div>
                <input type="password" id="password" placeholder="Şifre" required class="w-full p-4 rounded-2xl input-field">
            </div>
            <div id="errorMessage" class="text-red-500 text-xs text-center hidden font-bold">Hatalı bilgiler!</div>
            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-2xl transition-all font-['Orbitron'] tracking-widest">
                GİRİŞ YAP
            </button>
        </form>
    </div>

    <div class="footer-signature z-10">
        <p class="text-[9px] font-['Orbitron'] tracking-[0.3em] text-slate-500 uppercase">
            Founder & Developer
        </p>
        <p class="text-xs font-['Orbitron'] tracking-[0.5em] text-cyan-500 font-bold mt-1">
            BURAKLINE
        </p>
        <p class="text-[8px] font-['Inter'] text-slate-600 mt-2">
            © 2026 KuryeAI. Tüm hakları saklıdır.
        </p>
    </div>

    <script>
        let selectedRole = "";
        const users = {
            "Admin": { user: "burakline", pass: "burakline123", url: "admin.html" },
            "Restoran": { user: "tava", pass: "tava123", url: "restaurant.html" },
            "Kurye": { user: "harunkaya", pass: "harun123", url: "courier.html" }
        };

        function showLogin(role) {
            selectedRole = role;
            document.getElementById('roleSelection').classList.add('hidden');
            document.getElementById('loginPanel').classList.remove('hidden');
            document.getElementById('loginTitle').innerText = role.toUpperCase() + " GİRİŞİ";
            document.getElementById('errorMessage').classList.add('hidden');
        }

        function hideLogin() {
            document.getElementById('loginPanel').classList.add('hidden');
            document.getElementById('roleSelection').classList.remove('hidden');
        }

        function handleLogin(event) {
            event.preventDefault();
            const uInput = document.getElementById('username').value;
            const pInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMessage');
            const target = users[selectedRole];

            if (uInput === target.user && pInput === target.pass) {
                window.location.href = target.url;
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('password').value = "";
            }
        }
    </script>
</body>
</html>
