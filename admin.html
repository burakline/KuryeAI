<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:10px 15px;
background:#0f172a;
border-radius:10px;
cursor:pointer;
}

.active{
background:#00d4ff;
color:black;
}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.ok{background:#00d4ff;}
.no{background:#ef4444;}

#map{
height:400px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" onclick="show('apps')">Başvurular</div>
<div class="tab" onclick="show('couriers')">Kuryeler</div>
<div class="tab" onclick="show('mapTab')">Harita</div>
</div>

<div id="apps"></div>
<div id="couriers" style="display:none"></div>
<div id="mapTab" style="display:none">
<div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const config = {
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

const app = initializeApp(config);
const secondaryApp = initializeApp(config, "Secondary");

const db = getFirestore(app);
const auth = getAuth(app);
const secondaryAuth = getAuth(secondaryApp);

/* 🔐 AUTH KORUMA */
onAuthStateChanged(auth, async(user)=>{
if(!user){
location.href="login.html";
return;
}

const snap = await getDocs(collection(db,"users"));
let isAdmin = false;

snap.forEach(d=>{
if(d.id === user.uid && d.data().role==="admin"){
isAdmin = true;
}
});

if(!isAdmin){
alert("Yetkisiz!");
location.href="login.html";
}
});

/* TAB SWITCH */
window.show = (id)=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");

["apps","couriers","mapTab"].forEach(x=>{
document.getElementById(x).style.display="none";
});

document.getElementById(id).style.display="block";
};

/* BAŞVURULAR */
async function loadApps(){
const list = document.getElementById("apps");
list.innerHTML="Yükleniyor...";

const snap = await getDocs(collection(db,"applications"));
list.innerHTML="";

snap.forEach(d=>{
const a = d.data();
a.id = d.id;

list.innerHTML += `
<div class="card">
<b>${a.name}</b><br>
${a.email}<br>

<button class="ok" onclick='approve(${JSON.stringify(a)})'>Onayla</button>
<button class="no" onclick='reject("${a.id}")'>Reddet</button>
</div>`;
});
}

window.approve = async (a)=>{
const cred = await createUserWithEmailAndPassword(secondaryAuth,a.email,"123456");
const uid = cred.user.uid;

await setDoc(doc(db,"users",uid),{
email:a.email,
name:a.name,
role:"courier"
});

await setDoc(doc(db,"couriers",uid),{
name:a.name,
lat:0,
lng:0,
online:false
});

await deleteDoc(doc(db,"applications",a.id));

alert("Kurye oluşturuldu");
loadApps();
};

window.reject = async(id)=>{
await deleteDoc(doc(db,"applications",id));
loadApps();
};

/* KURYELER */
function loadCouriers(){
const list = document.getElementById("couriers");

onSnapshot(collection(db,"couriers"),snap=>{
list.innerHTML="";

snap.forEach(d=>{
const c = d.data();

list.innerHTML += `
<div class="card">
<b>${c.name}</b><br>
Durum: ${c.online ? "🟢 Online":"🔴 Offline"}
</div>`;
});
});
}

/* HARİTA */
let map = L.map('map').setView([39.92,32.85],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function loadMap(){
onSnapshot(collection(db,"couriers"),snap=>{
snap.forEach(d=>{
const c = d.data();

if(c.lat && c.lng){
L.circleMarker([c.lat,c.lng],{
radius:12,
color:c.online ? "green":"red"
}).addTo(map)
.bindPopup(c.name);
}
});
});
}

/* INIT */
loadApps();
loadCouriers();
loadMap();

</script>

</body>
</html>
