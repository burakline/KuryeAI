<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Login</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#0f172a;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
position:relative;
animation:fade 0.5s;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
background:#00d4ff;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.password-box{position:relative;}
.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
color:black;
}

.remember{
display:flex;
align-items:center;
gap:5px;
font-size:14px;
margin:10px 0;
}

.link{
font-size:13px;
color:#00d4ff;
cursor:pointer;
display:block;
}

.loading{
position:absolute;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
border-radius:15px;
}

.shake{
animation:shake 0.3s;
}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.lang{
position:absolute;
top:10px;
right:10px;
cursor:pointer;
font-size:12px;
}
</style>
</head>

<body>

<div class="box" id="box">

<div class="lang" onclick="toggleLang()">TR / EN</div>

<h2 id="title">Giriş Yap</h2>

<input id="email" placeholder="Email">

<div class="password-box">
<input id="password" type="password" placeholder="Şifre">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<div class="remember">
<input type="checkbox" id="remember">
<label id="rememberText">Beni hatırla</label>
</div>

<span class="link" onclick="resetPass()" id="forgot">Şifremi unuttum</span>

<button onclick="login()">Giriş Yap</button>

<button onclick="biometricLogin()">🔐 Face / Fingerprint</button>

<div class="loading" id="loading">⏳</div>

</div>

import {
getAuth,
signInWithEmailAndPassword,
setPersistence,
browserLocalPersistence,
browserSessionPersistence,
onAuthStateChanged,
sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const auth = getAuth(app);
const db = getFirestore(app);

/* 👁 */
window.togglePass = ()=>{
password.type = password.type==="password"?"text":"password";
}

/* 🌐 LANG */
let lang="tr";

window.toggleLang=()=>{
lang = lang==="tr"?"en":"tr";

title.innerText = lang==="tr"?"Giriş Yap":"Login";
rememberText.innerText = lang==="tr"?"Beni hatırla":"Remember me";
forgot.innerText = lang==="tr"?"Şifremi unuttum":"Forgot password";
}
