<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:white;
}

.header{
padding:16px;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
padding-bottom:90px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.map-card{
overflow:hidden;
border-radius:16px;
}

#map{
width:100%;
height:250px;
border-radius:16px;
}

.btn{
background:#00d4ff;
border:none;
padding:10px 14px;
border-radius:10px;
margin-right:5px;
margin-top:10px;
cursor:pointer;
font-weight:bold;
}

.title{
font-size:22px;
margin-bottom:10px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #1e293b;
}

.nav button{
background:none;
border:none;
color:#94a3b8;
font-size:14px;
}

.nav button.active{
color:#00d4ff;
}
</style>
</head>

<body>

<div class="header">KuryeAI 🚀</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="title">Canlı Sistem</div>

<div class="card map-card">
<div id="map"></div>
</div>

</div>

<!-- APPLICATIONS -->
<div id="apps" style="display:none">

<div class="title">Başvurular</div>

<div id="appList"></div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button id="navDash" class="active" onclick="showPage('dashboard')">Dashboard</button>
<button id="navApps" onclick="showPage('apps')">Başvurular</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
doc,
getDoc,
addDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* NAV */
window.showPage = (id)=>{
document.getElementById("dashboard").style.display="none";
document.getElementById("apps").style.display="none";

navDash.classList.remove("active");
navApps.classList.remove("active");

if(id==="dashboard"){
navDash.classList.add("active");
}else{
navApps.classList.add("active");
}

document.getElementById(id).style.display="block";
};

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

/* CANLI KURYELER */
let courierMarkers = [];

onSnapshot(collection(db,"couriers"),snap=>{

// eski markerları temizle
courierMarkers.forEach(m=>map.removeLayer(m));
courierMarkers=[];

snap.forEach(docSnap=>{
const c = docSnap.data();

if(c.lat && c.lng){
const marker = L.marker([c.lat, c.lng])
.addTo(map)
.bindPopup("🚴 "+(c.name || "Kurye"));

courierMarkers.push(marker);
}
});
});

/* BAŞVURULAR */
onSnapshot(collection(db,"applications"),snap=>{
appList.innerHTML="";

snap.forEach(d=>{
const a=d.data();

appList.innerHTML+=`
<div class="card">
<b>${a.name || "İsimsiz"}</b><br>
${a.email || "Mail yok"}<br>

<button class="btn" onclick="approve('${d.id}')">Onayla</button>
<button class="btn" onclick="reject('${d.id}')">Reddet</button>
</div>
`;
});
});

/* ONAYLA → KURYEYE ÇEVİR */
window.approve = async (id)=>{

const ref = doc(db,"applications",id);
const snap = await getDoc(ref);
const data = snap.data();

/* couriers koleksiyonuna ekle */
await addDoc(collection(db,"couriers"),{
name: data.name || "Kurye",
lat: 39.92,
lng: 32.85
});

/* başvuruyu sil */
await deleteDoc(ref);

};

/* REDDET */
window.reject = async (id)=>{
await deleteDoc(doc(db,"applications",id));
};

</script>

</body>
</html>
