<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KuryeAI - Akıllı Kurye Sistemi</title>

<style>
body{margin:0;font-family:'Segoe UI';background:#f5f7fb;}
.nav{display:flex;justify-content:space-between;padding:15px;background:white;}
.hero{text-align:center;padding:60px;}
button{padding:12px 20px;margin:5px;border:none;border-radius:10px;}
.primary{background:#00d4ff;color:white;}
.dark{background:#111;color:white;}
</style>
</head>

<body>

<div class="nav">
<div>🚀 KuryeAI</div>
<a href="login.html">Giriş</a>
</div>

<div class="hero">
<h1>Akıllı Kurye Sistemi</h1>

<button class="primary" onclick="goCourier()">Kurye</button>
<button class="dark" onclick="goAdmin()">Admin</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;

onAuthStateChanged(auth,(user)=>{
currentUser=user;
});

window.goCourier = async ()=>{
if(!currentUser){location.href="login.html";return;}

const snap = await getDoc(doc(db,"users",currentUser.uid));
if(snap.data().role==="courier"){
location.href="courier.html";
}
};

window.goAdmin = async ()=>{
if(!currentUser){location.href="login.html";return;}

const snap = await getDoc(doc(db,"users",currentUser.uid));
if(snap.data().role==="admin"){
location.href="admin.html";
}
};

</script>

<!-- 🤖 AI AUTO ASSIGN -->
<script type="module" src="autoAssign.js"></script>

</body>
</html>
