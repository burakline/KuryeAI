<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
  authDomain: "kuryeai.firebaseapp.com",
  databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kuryeai"
};

firebase.initializeApp(firebaseConfig);

function login(){

  const email = emailInput.value;
  const password = passwordInput.value;

  firebase.auth().signInWithEmailAndPassword(email,password)
  .then(async(res)=>{

    const uid = res.user.uid;

    const snap = await firebase.database().ref("roles/"+uid).once("value");

    if(!snap.exists()){
      alert("Role yok");
      return;
    }

    const role = snap.val().role;

    if(role==="admin") location.href="admin.html";
    else if(role==="restaurant") location.href="restaurant.html";
    else location.href="courier.html";

  })
  .catch(e=>alert(e.message));
}

</script>

</body>
</html>
