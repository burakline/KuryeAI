<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AcilKuryeAI — Talep Girişi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black:#000; --card:#111; --border:rgba(255,255,255,0.08); --text:#fff; --sub:#888; --orange:#ff9500; --red:#ff5f57; }
    html,body { height:100%; background:var(--black); color:var(--text); font-family:Arial,Helvetica,sans-serif; -webkit-font-smoothing:antialiased; }
    body { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100svh; padding:2rem 1.2rem; position:relative; overflow:hidden; }
    .bg-grid { position:fixed; inset:0; pointer-events:none; background-image:linear-gradient(rgba(255,149,0,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,149,0,.04) 1px,transparent 1px); background-size:52px 52px; mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 20%,transparent 100%); }
    .back-link { position:fixed; top:1.4rem; left:1.8rem; font-size:.8rem; color:var(--sub); text-decoration:none; transition:color .2s; z-index:10; }
    .back-link:hover { color:var(--text); }
    .card { width:100%; max-width:420px; background:var(--card); border:.5px solid var(--border); border-radius:20px; padding:2.8rem 2.5rem; position:relative; overflow:hidden; animation:up .65s cubic-bezier(.16,1,.3,1) forwards; }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--orange),transparent); }
    @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .logo-name { font-size:1.25rem; font-weight:800; text-align:center; margin-bottom:.3rem; }
    .logo-name em { font-style:normal; color:var(--orange); }
    .logo-sub { font-size:.75rem; color:var(--sub); text-align:center; margin-bottom:2rem; }
    .tabs { display:flex; gap:.5rem; margin-bottom:1.8rem; background:rgba(255,255,255,.05); border-radius:12px; padding:.3rem; }
    .tab { flex:1; text-align:center; padding:.55rem; border-radius:9px; font-size:.82rem; font-weight:700; cursor:pointer; transition:background .2s,color .2s; color:var(--sub); }
    .tab.active { background:var(--orange); color:#000; }
    .form-title { font-size:1rem; font-weight:700; margin-bottom:.25rem; }
    .form-sub { font-size:.8rem; color:var(--sub); margin-bottom:1.4rem; }
    .form-group { margin-bottom:.9rem; }
    .form-label { display:block; font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--sub); margin-bottom:.4rem; }
    .form-input { width:100%; background:rgba(255,255,255,.05); border:.5px solid rgba(255,255,255,.1); border-radius:10px; padding:.78rem 1rem; color:var(--text); font-family:Arial,Helvetica,sans-serif; font-size:.9rem; outline:none; transition:border-color .2s,box-shadow .2s; }
    .form-input::placeholder { color:#444; }
    .form-input:focus { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,149,0,.1); }
    .pw-wrap { position:relative; }
    .pw-toggle { position:absolute; right:.9rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--sub); font-size:.78rem; font-family:Arial,Helvetica,sans-serif; padding:0; }
    .pw-toggle:hover { color:var(--orange); }
    .err-msg { display:none; background:rgba(255,95,87,.08); border:.5px solid rgba(255,95,87,.25); border-radius:8px; padding:.7rem 1rem; font-size:.82rem; color:var(--red); margin-bottom:1rem; }
    .err-msg.show { display:block; }
    .success-msg { display:none; background:rgba(255,149,0,.07); border:.5px solid rgba(255,149,0,.25); border-radius:8px; padding:.7rem 1rem; font-size:.82rem; color:var(--orange); margin-bottom:1rem; }
    .success-msg.show { display:block; }
    .btn-submit { width:100%; margin-top:.3rem; background:var(--orange); color:#000; font-size:.92rem; font-weight:700; padding:.88rem; border-radius:999px; border:none; cursor:pointer; font-family:Arial,Helvetica,sans-serif; transition:background .2s,transform .15s; display:flex; align-items:center; justify-content:center; gap:.5rem; box-shadow:0 4px 20px rgba(255,149,0,.25); }
    .btn-submit:hover:not(:disabled) { background:#ffaa33; transform:scale(1.02); }
    .btn-submit:disabled { opacity:.55; cursor:not-allowed; }
    .spinner { width:16px; height:16px; border:2px solid rgba(0,0,0,.2); border-top-color:#000; border-radius:50%; animation:spin .7s linear infinite; display:none; }
    .btn-submit.loading .spinner { display:block; }
    .btn-submit.loading .btn-text { display:none; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .page-loader { position:fixed; inset:0; z-index:999; background:var(--black); display:flex; align-items:center; justify-content:center; transition:opacity .4s; }
    .page-loader.hide { opacity:0; pointer-events:none; }
    .loader-ring { width:34px; height:34px; border:2px solid rgba(255,149,0,.15); border-top-color:var(--orange); border-radius:50%; animation:spin .8s linear infinite; }
    .info-note { margin-top:1rem; font-size:.76rem; color:var(--sub); text-align:center; line-height:1.6; }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="page-loader" id="page-loader"><div class="loader-ring"></div></div>
<a href="/acilkurye" class="back-link">← Geri Dön</a>

<div class="card">
  <div class="logo-name">Acil<em>Kurye</em>AI</div>
  <div class="logo-sub">Talep Paneli</div>

  <div class="tabs">
    <div class="tab active" id="tab-login" onclick="showTab('login')">Giriş Yap</div>
    <div class="tab" id="tab-register" onclick="showTab('register')">Kayıt Ol</div>
  </div>

  <div id="err-msg" class="err-msg"></div>
  <div id="success-msg" class="success-msg"></div>

  <div id="form-login">
    <p class="form-title">Hoş Geldiniz 📦</p>
    <p class="form-sub">Acil kurye talep etmek için giriş yapın.</p>
    <div class="form-group">
      <label class="form-label">E-posta / Telefon</label>
      <input class="form-input" type="text" id="l-email" placeholder="siz@email.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Şifre</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="l-pw" placeholder="••••••••"/>
        <button class="pw-toggle" onclick="togglePw('l-pw',this)">Göster</button>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.8rem;color:var(--sub)">
        <input type="checkbox" id="l-remember" style="width:15px;height:15px;accent-color:var(--orange)"/> Beni hatırla
      </label>
      <a href="#" style="font-size:.78rem;color:var(--sub);text-decoration:none" onclick="doForgot(event)">Şifremi unuttum</a>
    </div>
    <button class="btn-submit" id="btn-login" onclick="doLogin()">
      <div class="spinner"></div><span class="btn-text">Giriş Yap →</span>
    </button>
  </div>

  <div id="form-register" style="display:none">
    <p class="form-title">Talep Hesabı Oluştur 📦</p>
    <p class="form-sub">Kayıt ol, e-posta doğrula, acil kurye talep et.</p>
    <div class="form-group">
      <label class="form-label">Ad Soyad</label>
      <input class="form-input" type="text" id="r-name" placeholder="Adınız Soyadınız"/>
    </div>
    <div class="form-group">
      <label class="form-label">Telefon</label>
      <input class="form-input" type="tel" id="r-phone" placeholder="05XX XXX XX XX"/>
    </div>
    <div class="form-group">
      <label class="form-label">E-posta</label>
      <input class="form-input" type="email" id="r-email" placeholder="siz@email.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Şifre</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="r-pw" placeholder="En az 6 karakter"/>
        <button class="pw-toggle" onclick="togglePw('r-pw',this)">Göster</button>
      </div>
    </div>
    <button class="btn-submit" id="btn-register" onclick="doRegister()">
      <div class="spinner"></div><span class="btn-text">Kayıt Ol →</span>
    </button>
    <p class="info-note">E-posta doğrulaması yapıldıktan sonra giriş yapabilirsiniz.</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           sendEmailVerification, onAuthStateChanged, sendPasswordResetEmail,
           browserLocalPersistence, browserSessionPersistence, setPersistence }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, query, collection, where, getDocs }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y", authDomain:"kuryeai-99bf9.firebaseapp.com",
    projectId:"kuryeai-99bf9", storageBucket:"kuryeai-99bf9.firebasestorage.app",
    messagingSenderId:"1012295004135", appId:"1:1012295004135:web:0cceac0476175e19395742"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const loader = document.getElementById('page-loader');

  const backUrl = new URLSearchParams(window.location.search).get('back') || '/acilkurye-talep-panel';

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const snap = await getDoc(doc(db,'users',user.uid));
        if (snap.exists() && snap.data().role === 'acil_talep' && user.emailVerified) {
          window.location.href = backUrl; return;
        }
      } catch(e) {}
    }
    loader.classList.add('hide');
    setTimeout(() => loader.style.display = 'none', 400);
  });

  function showErr(msg){ const e=document.getElementById('err-msg'); e.textContent=msg; e.classList.add('show'); document.getElementById('success-msg').classList.remove('show'); }
  function showOk(msg){ const e=document.getElementById('success-msg'); e.textContent=msg; e.classList.add('show'); document.getElementById('err-msg').classList.remove('show'); }

  window.togglePw = (id,btn) => { const i=document.getElementById(id); i.type=i.type==='password'?'text':'password'; btn.textContent=i.type==='password'?'Göster':'Gizle'; };
  window.showTab = (t) => {
    document.getElementById('form-login').style.display = t==='login'?'block':'none';
    document.getElementById('form-register').style.display = t==='register'?'block':'none';
    document.getElementById('tab-login').className='tab'+(t==='login'?' active':'');
    document.getElementById('tab-register').className='tab'+(t==='register'?' active':'');
    document.getElementById('err-msg').classList.remove('show');
    document.getElementById('success-msg').classList.remove('show');
  };

  async function resolveEmail(input) {
    if (input.includes('@')) return input;
    if (/^[0-9+\s\-()]{7,}$/.test(input)) {
      const q = query(collection(db,'users'), where('phone','==',input.replace(/\s/g,'')));
      const s = await getDocs(q);
      if (!s.empty) return s.docs[0].data().email;
      throw new Error('Bu telefon numarasıyla kayıtlı hesap bulunamadı.');
    }
    return input;
  }

  window.doLogin = async () => {
    const inp = document.getElementById('l-email').value.trim();
    const pw  = document.getElementById('l-pw').value;
    const rem = document.getElementById('l-remember').checked;
    const btn = document.getElementById('btn-login');
    if (!inp||!pw) { showErr('Tüm alanları doldurun.'); return; }
    btn.classList.add('loading'); btn.disabled = true;
    try {
      await setPersistence(auth, rem ? browserLocalPersistence : browserSessionPersistence);
      const email = await resolveEmail(inp);
      const cred  = await signInWithEmailAndPassword(auth, email, pw);
      if (!cred.user.emailVerified) {
        await auth.signOut();
        showErr('E-posta adresinizi doğrulamanız gerekiyor.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }
      const snap = await getDoc(doc(db,'users',cred.user.uid));
      if (!snap.exists() || snap.data().role !== 'acil_talep') {
        await auth.signOut(); showErr('Bu hesap talep paneli için tanımlı değil.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }
      window.location.href = backUrl;
    } catch(err) {
      btn.classList.remove('loading'); btn.disabled = false;
      const c = err.code;
      if (err.message && !c) { showErr(err.message); return; }
      if (c==='auth/invalid-credential'||c==='auth/wrong-password') showErr('E-posta veya şifre hatalı.');
      else showErr('Giriş yapılamadı.');
    }
  };

  window.doRegister = async () => {
    const name  = document.getElementById('r-name').value.trim();
    const phone = document.getElementById('r-phone').value.trim();
    const email = document.getElementById('r-email').value.trim();
    const pw    = document.getElementById('r-pw').value;
    const btn   = document.getElementById('btn-register');
    if (!name||!phone||!email||!pw) { showErr('Tüm alanları doldurun.'); return; }
    if (pw.length < 6) { showErr('Şifre en az 6 karakter olmalıdır.'); return; }
    btn.classList.add('loading'); btn.disabled = true;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await sendEmailVerification(cred.user);
      await setDoc(doc(db,'users',cred.user.uid), {
        displayName:name, phone, email, role:'acil_talep', status:'active',
        createdAt:new Date().toISOString()
      });
      await auth.signOut();
      showOk('Kayıt başarılı! E-posta doğrulama linki gönderildi. Doğruladıktan sonra giriş yapabilirsiniz.');
      btn.classList.remove('loading'); btn.disabled = false;
      setTimeout(()=>window.showTab('login'), 4000);
    } catch(err) {
      btn.classList.remove('loading'); btn.disabled = false;
      if (err.code==='auth/email-already-in-use') showErr('Bu e-posta zaten kayıtlı.');
      else showErr('Kayıt yapılamadı: ' + err.message);
    }
  };

  window.doForgot = async (e) => {
    e.preventDefault();
    const email = document.getElementById('l-email').value.trim();
    if (!email) { showErr('Önce e-posta adresinizi girin.'); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      showOk('Şifre sıfırlama bağlantısı gönderildi.');
    } catch(err) { showErr('E-posta gönderilemedi.'); }
  };
</script>
</body>
</html>
