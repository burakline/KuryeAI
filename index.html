<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 text-white">

    <div class="w-full max-w-md p-8 space-y-6 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        <div class="text-center">
            <h1 class="text-4xl font-extrabold text-cyan-400 tracking-tight">KuryeAI</h1>
            <p class="text-slate-400 mt-2 text-sm">Lojistik yönetim paneli</p>
        </div>

        <div class="space-y-4">
            <div>
                <input id="user" type="text" placeholder="Kullanıcı Adı" 
                    class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-cyan-500 outline-none transition-all placeholder-slate-500">
            </div>
            <div>
                <input id="pass" type="password" placeholder="Şifre" 
                    class="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-cyan-500 outline-none transition-all placeholder-slate-500">
            </div>
            
            <button onclick="login()" 
                class="w-full py-3 bg-cyan-600 hover:bg-cyan-500 text-white font-semibold rounded-lg shadow-lg transition-all transform active:scale-95">
                Giriş Yap
            </button>
        </div>

        <div class="text-center text-xs text-slate-500 pt-4 border-t border-slate-700">
            Developed by BURAKLINE 2026
        </div>
    </div>

       <script>
        function login() {
            const user = document.getElementById("user").value.trim();
            const pass = document.getElementById("pass").value.trim();

            if (user === "burakline" && pass === "burakline123") {
                // BAŞINDAKİ pages/ KISMINI SİLDİK
                window.location.href = "admin.html"; 
            } else if (user === "kurye" && pass === "123") {
                // BAŞINDAKİ pages/ KISMINI SİLDİK
                window.location.href = "courier.html"; 
            } else {
                alert("Hatalı kullanıcı adı veya şifre!");
            }
        }
    </script>
</body>
</html>
