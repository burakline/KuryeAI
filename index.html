<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI | Yapay Zeka Destekli Lojistik</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family:'Segoe UI', sans-serif; line-height:1.6; color:#fff; margin:0; background:#0b0e14; }
header { background:#000; padding:1.5rem 0; text-align:center; border-bottom:1px solid #333; }
.hero { background:#1a1a1a; padding:3rem 2rem; text-align:center; }

.cta-button { display:inline-block; background:#00d4ff; color:#000; padding:15px 30px; border-radius:8px; font-weight:bold; margin:10px; border:none; }
.cta-button:hover { background:#fff; transform:scale(1.05); }

.login-container { display:flex; justify-content:center; gap:15px; flex-wrap:wrap; margin-top:20px; }
.btn-login { border:1px solid #00d4ff; color:#00d4ff; padding:12px 24px; border-radius:8px; background:transparent; }

.services { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:2rem; max-width:1000px; margin:auto; }
.service-card { background:#111; border:1px solid #333; padding:1.5rem; border-radius:12px; }

.footer { margin-top:60px; text-align:center; color:#888; border-top:1px solid #333; padding:2rem 0; }

/* FORM */
#formBox,#courierOverlay {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000aa;
z-index:999;
align-items:center;
justify-content:center;
}

.formContent {
background:#1e293b;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
max-height:90vh;
overflow:auto;
position:relative;
}

.formContent input,
.formContent select{
width:100%;
margin:6px 0;
padding:10px;
border-radius:8px;
border:none;
}

.closeBtn{
position:absolute;
top:10px;
right:15px;
font-size:22px;
cursor:pointer;
}
</style>
</head>

<body>

<header><h1>KuryeAI</h1></header>

<div class="hero">
<h2>Yapay Zeka Destekli Yeni Nesil Lojistik</h2>

<a href="#" class="cta-button">Hemen Kurye Çağır</a>

<button onclick="openForm()" class="cta-button">Restoran Başvurusu</button>

<!-- ✅ EKLENDİ -->
<button onclick="openCourierForm()" class="cta-button">Kurye Ol</button>

<div class="login-container">
<a href="login.html?type=restaurant" class="btn-login">Restoran</a>
<a href="login.html?type=courier" class="btn-login">Kurye</a>
<a href="login.html?type=admin" class="btn-login">Admin</a>
</div>
</div>

<div class="services">
<div class="service-card"><h4>Restoran Havuz Kurye</h4></div>
<div class="service-card"><h4>VIP Express Moto Kurye</h4></div>
<div class="service-card"><h4>Lojistik Yazılım</h4></div>
</div>

<!-- RESTORAN -->
<div id="formBox" onclick="closeForm()">
<div class="formContent" onclick="event.stopPropagation()">
<div class="closeBtn" onclick="closeForm()">✕</div>

<h3>Restoran Başvuru</h3>

<input id="name" placeholder="Ad">
<input id="email" placeholder="Email">
<input id="address" placeholder="Adres">

<button onclick="submitForm()">Gönder</button>
</div>
</div>

<!-- 🚀 KURYE -->
<div id="courierOverlay" onclick="closeCourierForm()">
<div class="formContent" onclick="event.stopPropagation()">

<div class="closeBtn" onclick="closeCourierForm()">✕</div>

<h3>Kurye Başvuru</h3>

<div style="text-align:center">
<label for="photo">
<div style="width:80px;height:80px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;margin:auto;cursor:pointer">
📷
</div>
</label>
<input type="file" id="photo" accept="image/*" capture="environment" style="display:none">
</div>

<input id="cName" placeholder="Ad Soyad">
<input id="cBirthDate" type="date">
<input id="cBirthPlace" placeholder="Doğum Yeri">
<input id="cBlood" placeholder="Kan Grubu">
<input id="cEducation" placeholder="Eğitim Durumu">
<input id="cLicense" placeholder="Ehliyet">

<select id="cP1">
<option value="">P1 Belgesi</option>
<option value="var">Var</option>
<option value="yok">Yok</option>
</select>

<select id="cSRC">
<option value="">SRC Kurye</option>
<option value="var">Var</option>
<option value="yok">Yok</option>
</select>

<select id="cCriminal">
<option value="">Adli Sicil</option>
<option value="yok">Yok</option>
<option value="var">Var</option>
</select>

<input id="cPhone" placeholder="Telefon">
<input id="cEmail" placeholder="Mail">

<button id="sendCourierBtn">Başvur</button>

</div>
</div>

<div class="footer">
<p>© 2026 KuryeAI</p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const storage = getStorage(app);

/* RESTORAN */
window.openForm=()=>document.getElementById("formBox").style.display="flex";
window.closeForm=()=>document.getElementById("formBox").style.display="none";

window.submitForm=async()=>{
await addDoc(collection(db,"applications"),{
name:name.value,
email:email.value,
address:address.value,
type:"restaurant",
status:"pending"
});
alert("Başvuru alındı");
closeForm();
}

/* KURYE */
window.openCourierForm=()=>document.getElementById("courierOverlay").style.display="flex";
window.closeCourierForm=()=>document.getElementById("courierOverlay").style.display="none";

/* 🔥 BUTTON FIX */
document.getElementById("sendCourierBtn").addEventListener("click", async ()=>{

let photoURL="";
const file=document.getElementById("photo").files[0];

if(file){
const storageRef=ref(storage,"couriers/"+Date.now());
await uploadBytes(storageRef,file);
photoURL=await getDownloadURL(storageRef);
}

await addDoc(collection(db,"applications"),{

type:"courier",
status:"pending",

photo:photoURL,
name:cName.value,
birthDate:cBirthDate.value,
birthPlace:cBirthPlace.value,
blood:cBlood.value,
education:cEducation.value,
license:cLicense.value,
p1:cP1.value,
src:cSRC.value,
criminal:cCriminal.value,
phone:cPhone.value,
email:cEmail.value

});

alert("Kurye başvurusu gönderildi 🚀");
closeCourierForm();

});

</script>

</body>
</html>
