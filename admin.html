<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AdminAI ULTIMATE AUTO DISPATCH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:100vh}
.panel{position:fixed;bottom:0;width:100%;height:45vh;background:#020617;border-radius:20px 20px 0 0;overflow:auto;z-index:9999}
.tabs{display:flex}
.tabs button{flex:1;background:#0f172a;color:white;padding:10px}
.card{margin:8px;padding:12px;border-radius:12px;background:#0f172a}
input,select,button{width:100%;margin-top:5px;padding:10px;border-radius:10px;border:none}
.blue{background:#00d4ff;color:black}
.orange{background:#f59e0b}
.green{background:#22c55e}
.red{background:#ef4444}
.gray{background:#64748b}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<div class="tabs">
<button onclick="tab('orders')">📦</button>
<button onclick="tab('finance')">💰</button>
</div>

<div id="ordersTab">
<div class="card">
<input id="customer" placeholder="Müşteri">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<button class="blue" onclick="createOrder()">Sipariş</button>
</div>

<div class="card" id="orderList"></div>
</div>

<div id="financeTab" style="display:none">
<div class="card" id="finance"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const db=getDatabase();
const map=L.map('map').setView([39.92,32.85],11);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* CACHE */
let couriers={},orders={};
let courierMarkers={},orderMarkers={},routes={},routeCache={},anim={};

/* TAB */
window.tab=function(t){
ordersTab.style.display="none";
financeTab.style.display="none";
document.getElementById(t+"Tab").style.display="block";
};

/* DIST */
function dist(a,b,c,d){
return Math.hypot(a-c,b-d);
}

/* DISPATCH AI */
function getBest(order,excluded){
let best=null,min=999999;

for(let id in couriers){

if(excluded.indexOf(id)!==-1) continue;

let c=couriers[id];
if(!c.lat || !c.online) continue;

let d=dist(order.lat,order.lng,c.lat,c.lng);

let active=0;
for(let o in orders){
if(orders[o].courierId===id && orders[o].status!=="delivered"){
active++;
}
}

let score=(d*0.5)+(active*2);

if(score<min){
min=score;
best=id;
}
}

return best;
}

/* AUTO DISPATCH */
function autoDispatch(orderId,tried){

if(!orders[orderId]) return;

let courier=getBest(orders[orderId],tried);

if(!courier) return;

update(ref(db,"orders/"+orderId),{
courierId:courier,
status:"assigned"
});

setTimeout(function(){

let current=orders[orderId];
if(!current) return;

if(current.status==="assigned"){

tried.push(courier);
autoDispatch(orderId,tried);

}

},10000);

}

/* ROUTE */
async function getRoute(c,o){

let key=c.lat+","+c.lng+"_"+o.lat+","+o.lng;

if(routeCache[key]) return routeCache[key];

let url="https://router.project-osrm.org/route/v1/driving/"
+c.lng+","+c.lat+";"+o.lng+","+o.lat+
"?overview=full&geometries=geojson";

let res=await fetch(url);
let data=await res.json();

routeCache[key]=data.routes[0];
return data.routes[0];
}

/* ANIMATION */
function animateMarker(id,lat,lng){

let m=courierMarkers[id];
if(!m) return;

let s=m.getLatLng();
let i=0;

function step(){
i++;
m.setLatLng([
s.lat+(lat-s.lat)*(i/15),
s.lng+(lng-s.lng)*(i/15)
]);
if(i<15) requestAnimationFrame(step);
}

step();
}

/* CREATE */
window.createOrder=function(){

let id="ORD-"+Date.now();

let order={
id:id,
customer:customer.value,
lat:parseFloat(lat.value),
lng:parseFloat(lng.value),
status:"waiting"
};

set(ref(db,"orders/"+id),order);

setTimeout(function(){
autoDispatch(id,[]);
},500);

};

/* STATUS */
window.setStatus=function(id,s){
update(ref(db,"orders/"+id),{status:s});
};

/* COURIERS */
onValue(ref(db,"couriers"),function(snap){

couriers={};

snap.forEach(function(c){

let id=c.key;
let d=c.val();

couriers[id]=d;

if(d.lat){
if(!courierMarkers[id]){
courierMarkers[id]=L.marker([d.lat,d.lng]).addTo(map);
}else{
animateMarker(id,d.lat,d.lng);
}
}

});

});

/* ORDERS */
onValue(ref(db,"orders"),async function(snap){

orderList.innerHTML="";
orders={};

let list=[];
snap.forEach(function(o){list.push(o.val());});

for(let d of list){

orders[d.id]=d;

let text=d.customer+" | "+d.status;

if(d.courierId && couriers[d.courierId]){

let route=await getRoute(couriers[d.courierId],d);

let km=(route.distance/1000).toFixed(2);
let eta=Math.round(route.duration/60);

text+=" | "+km+"km | "+eta+"dk";

if(routes[d.id]) map.removeLayer(routes[d.id]);

routes[d.id]=L.geoJSON(route.geometry,{style:{color:"#00d4ff"}}).addTo(map);

}

text+="<br>";
text+="<button class='green' onclick=\"setStatus('"+d.id+"','accepted')\">Kabul</button>";
text+="<button class='blue' onclick=\"setStatus('"+d.id+"','onway')\">Yolda</button>";
text+="<button class='gray' onclick=\"setStatus('"+d.id+"','delivered')\">Teslim</button>";
text+="<button class='red' onclick=\"setStatus('"+d.id+"','cancelled')\">İptal</button>";

orderList.innerHTML+=text+"<hr>";

}

/* FINANCE */
let total=0,del=0;

for(let i in orders){
total++;
if(orders[i].status==="delivered") del++;
}

finance.innerHTML="Toplam:"+total+"<br>Teslim:"+del;

});

</script>

</body>
</html>
