<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI Pro - Saha Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a' } } } }
    </script>

    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; }
        #map { height: 55vh; width: 100%; z-index: 10; }
        .glass-card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .moto-container { width: 34px; height: 34px; background: #000; border: 3px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #22d3ee; }
        .moto-container::after { content: "AI"; color: #22d3ee; font-size: 11px; font-weight: 900; }
        .target-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); position: absolute; bottom: 20px; right: 20px; z-index: 1000; }
        #km-input-modal { z-index: 4000; }
    </style>
</head>
<body class="dark bg-darkBg text-white flex flex-col">

    <div id="km-input-modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6">
        <div class="bg-slate-800 p-6 rounded-3xl w-full max-w-sm space-y-4 border border-slate-700 shadow-2xl">
            <h3 id="km-modal-title" class="text-xl font-black text-cyan-400 uppercase">Vardiya Girişi</h3>
            <p class="text-xs text-slate-400 italic">Lütfen aracınızın KM gösterge fotoğrafını sisteme yükleyiniz!</p>
            <input type="file" accept="image/*" capture="camera" id="km-photo" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-cyan-600 file:text-white hover:file:bg-cyan-500">
            <input type="number" id="km-value" placeholder="Mevcut KM Verisini Giriniz" class="w-full p-4 bg-slate-900 rounded-xl border border-slate-700 text-white font-bold outline-none focus:border-cyan-500">
            <button id="km-submit-btn" class="w-full py-4 bg-emerald-600 rounded-2xl font-black uppercase tracking-widest transition-all active:scale-95">ONAYLA VE DEVAM ET</button>
        </div>
    </div>

    <header class="h-16 px-5 flex justify-between items-center glass-card z-[1001]">
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('sidebar').style.transform='translateX(0)'" class="p-2.5 bg-slate-800/60 rounded-xl text-xl">☰</button>
            <h1 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h1>
        </div>
        <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-black bg-rose-500/10 text-rose-500 border border-rose-500/30 uppercase">KAPALI</div>
    </header>

    <main class="flex-grow flex flex-col relative overflow-hidden">
        <div class="relative flex-grow">
            <div id="map"></div>
            <button onclick="reCenter()" class="target-btn active:scale-90 transition-transform">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><circle cx="12" cy="12" r="8"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
            </button>
        </div>

        <div class="p-4 bg-darkBg grid grid-cols-3 gap-2 border-t border-slate-800/50">
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-bold uppercase">Hız</p><p id="speed-display" class="text-xl font-black text-cyan-400">0</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-bold uppercase">Toplam KM</p><p id="km-display" class="text-xl font-black text-yellow-400">0.0</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-bold uppercase">Süre</p><p id="timer-display" class="text-xl font-black">00:00</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-bold uppercase">Ort. Hız</p><p id="avg-speed-display" class="text-xl font-black text-blue-400">0</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-bold uppercase">S. Kazanç</p><p class="text-xl font-black text-emerald-400">₺215</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-bold uppercase">Kazanç</p><p id="earning-display" class="text-xl font-black text-emerald-500">₺0</p></div>
        </div>

        <div class="px-4 pb-8 pt-2 grid grid-cols-2 gap-4">
            <button id="start-shift" class="bg-emerald-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Vardiya Başlat</button>
            <button id="end-shift" class="bg-rose-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl">Vardiya Bitir</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
            authDomain: "kuryeai.firebaseapp.com",
            databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kuryeai",
            storageBucket: "kuryeai.firebasestorage.app",
            messagingSenderId: "655930514402",
            appId: "1:655930514402:web:379321cbb83f48daf077bb",
            measurementId: "G-JYQP30LJG3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, kuryeMarker, watchId, startTime, totalDist = 0, lastPos = null, speedLogs = [], shiftType = '';

        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function track() {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                if(kmh > 0) speedLogs.push(kmh);
                document.getElementById('speed-display').innerText = kmh;
                
                const currentPos = [latitude, longitude];
                map.panTo(currentPos);
                
                // Marker Çizimi - Force Update
                const icon = L.divIcon({ className: '', html: `<div class="moto-container"></div>`, iconSize: [34, 34] });
                if (kuryeMarker) { kuryeMarker.setLatLng(currentPos); } 
                else { kuryeMarker = L.marker(currentPos, {icon: icon}).addTo(map); }
                
                if (lastPos && kmh > 2) {
                    totalDist += L.latLng(lastPos).distanceTo(L.latLng(currentPos)) / 1000;
                    document.getElementById('km-display').innerText = totalDist.toFixed(1);
                }
                lastPos = currentPos;
            }, (err) => console.error(err), { enableHighAccuracy: true, maximumAge: 0 });
        }

        // Vardiya Başlat ve Bitir Akışı
        document.getElementById('start-shift').onclick = () => { shiftType = 'start'; openKMModal(); };
        document.getElementById('end-shift').onclick = () => { shiftType = 'end'; openKMModal(); };

        function openKMModal() {
            document.getElementById('km-modal-title').innerText = shiftType === 'start' ? "Vardiya Girişi" : "Vardiya Çıkışı";
            document.getElementById('km-input-modal').classList.remove('hidden');
        }

        document.getElementById('km-submit-btn').onclick = async function() {
            const kmValue = document.getElementById('km-value').value;
            const photo = document.getElementById('km-photo').files[0];

            if(!kmValue || !photo) { alert("Lütfen hem fotoğraf seçin hem de KM değerini girin!"); return; }

            if(shiftType === 'start') {
                startTime = Date.now();
                if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
                track();
                setInterval(() => {
                    const diff = Date.now() - startTime;
                    document.getElementById('timer-display').innerText = new Date(diff).toISOString().substr(11, 8);
                    document.getElementById('earning-display').innerText = `₺${((diff/3600000)*215 + totalDist*8).toFixed(1)}`;
                }, 1000);
                document.getElementById('status-badge').innerText = "AÇIK";
                document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-black bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 uppercase";
                document.getElementById('start-shift').disabled = true;
                document.getElementById('start-shift').style.opacity = "0.5";
            } else {
                await db.ref('arsiv/harun_kaya').push({
                    tarih: new Date().toLocaleString('tr-TR'),
                    bitis_km: kmValue,
                    toplam_km: totalDist.toFixed(1),
                    kazanc: document.getElementById('earning-display').innerText,
                    sure: document.getElementById('timer-display').innerText
                });
                location.reload();
            }
            document.getElementById('km-input-modal').classList.add('hidden');
        };

        function reCenter() { if(lastPos) map.setView(lastPos, 17); }
    </script>
</body>
</html>
