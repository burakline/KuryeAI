<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#020617;color:white;display:flex}

/* SIDEBAR */
.sidebar{width:240px;background:#020617;padding:20px;height:100vh}
.sidebar h2{color:#00d4ff}
.sidebar button{width:100%;padding:12px;margin:6px 0;background:none;border:none;color:#94a3b8;text-align:left;cursor:pointer;border-radius:8px}
.sidebar button:hover,.active{background:#0ea5e9;color:white}

/* CONTENT */
.content{flex:1;padding:20px}

/* CARD */
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px;border:1px solid #1e293b}

/* INPUT */
input,select{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;background:#020617;color:white}

/* BUTTON */
.btn{padding:8px 12px;border:none;border-radius:8px;cursor:pointer}
.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#0ea5e9}

/* 🔔 TOAST */
#toast{
position:fixed;
top:20px;
right:20px;
background:#0ea5e9;
padding:12px 20px;
border-radius:10px;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>KuryeAI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('orders')">Siparişler</button>
<button onclick="show('couriers')">Kuryeler</button>
</div>

<div class="content">

<div id="dashboard">
<h2>Dashboard</h2>
<div class="card">
<h3>📦 Sipariş Havuzu (CANLI)</h3>
<div id="orderList"></div>
</div>
</div>

<div id="orders" style="display:none">
<h2>Siparişler</h2>

<div class="card">
<input id="orderProduct" placeholder="Ürün">
<input id="orderAddress" placeholder="Adres">
<button onclick="addOrder()" class="green">Ekle</button>
</div>

<div id="allOrders"></div>
</div>

<div id="couriers" style="display:none">
<h2>Kuryeler</h2>

<div class="card">
<input id="courierName" placeholder="Ad">
<input id="courierEmail" placeholder="Email">
<button onclick="addCourier()" class="green">Ekle</button>
</div>

<div id="courierList"></div>
</div>

</div>

<div id="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, deleteDoc, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* NAV */
window.show=id=>{
["dashboard","orders","couriers"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
}

/* 🔔 TOAST */
function showToast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",3000);
}

/* ================= REALTIME ORDERS ================= */

onSnapshot(collection(db,"orders"), snap=>{

const list=document.getElementById("orderList");
const all=document.getElementById("allOrders");

list.innerHTML="";
all.innerHTML="";

snap.forEach(d=>{
const o=d.data();

const html=`
<div class="card">
<b>${o.product}</b><br>
${o.address}<br>

<select onchange="updateOrder('${d.id}',this.value)">
<option ${o.status=="hazırlanıyor"?"selected":""}>hazırlanıyor</option>
<option ${o.status=="yolda"?"selected":""}>yolda</option>
<option ${o.status=="teslim edildi"?"selected":""}>teslim edildi</option>
</select>

<input placeholder="Kurye email" value="${o.courier||""}" 
onchange="assignCourier('${d.id}',this.value)">

<button onclick="deleteOrder('${d.id}')" class="red">Sil</button>
</div>
`;

list.innerHTML+=html;
all.innerHTML+=html;
});

showToast("Yeni veri güncellendi");

});

/* ADD */
window.addOrder=async()=>{
await addDoc(collection(db,"orders"),{
product:orderProduct.value,
address:orderAddress.value,
status:"hazırlanıyor",
courier:""
});
showToast("Sipariş eklendi");
}

/* UPDATE */
window.updateOrder=async(id,status)=>{
await updateDoc(doc(db,"orders",id),{status});
showToast("Durum güncellendi");
}

/* ASSIGN */
window.assignCourier=async(id,email)=>{
await updateDoc(doc(db,"orders",id),{courier:email});
showToast("Kurye atandı");
}

/* DELETE */
window.deleteOrder=async(id)=>{
await deleteDoc(doc(db,"orders",id));
showToast("Sipariş silindi");
}

/* ================= COURIERS ================= */

onSnapshot(collection(db,"couriers"), snap=>{

const list=document.getElementById("courierList");
list.innerHTML="";

snap.forEach(d=>{
const c=d.data();

list.innerHTML+=`
<div class="card">
${c.name} - ${c.email}
<button onclick="deleteCourier('${d.id}')" class="red">Sil</button>
</div>
`;
});

});

/* ADD */
window.addCourier=async()=>{
await addDoc(collection(db,"couriers"),{
name:courierName.value,
email:courierEmail.value
});
showToast("Kurye eklendi");
}

/* DELETE */
window.deleteCourier=async(id)=>{
await deleteDoc(doc(db,"couriers",id));
showToast("Kurye silindi");
}

</script>

</body>
</html>
