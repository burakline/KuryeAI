<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Akıllı Teslimat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1000413588.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; margin: 0; color: white; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(6, 182, 212, 0.1) 0%, transparent 70%); }
        @keyframes slow-bounce { 0%, 100% { transform: translateY(-3%); } 50% { transform: translateY(0); } }
        .animate-bounce-slow { animation: slow-bounce 3s infinite ease-in-out; }
        #loader { transition: opacity 0.5s ease; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative px-6">

    <div id="loader" class="fixed inset-0 z-[9999] bg-[#0f172a] flex flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
    </div>

    <div class="fixed inset-0 hero-gradient pointer-events-none"></div>

    <div class="z-10 text-center space-y-12 max-w-2xl w-full">
        <div class="animate-bounce-slow flex flex-col items-center">
            <img src="1000413588.png" 
                 alt="KuryeAI" 
                 class="mx-auto w-64 md:w-80 drop-shadow-[0_0_30px_rgba(6,182,212,0.6)]"
                 onerror="this.src='https://raw.githubusercontent.com/Burak-AI/kuryeai/main/1000413588.png'">
            
            <p class="mt-8 text-sm tracking-[0.4em] text-cyan-400 font-bold font-['Orbitron'] animate-pulse">
                AKILLI TESLİMAT
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-lg mx-auto w-full">
            <button onclick="window.location.href='restaurant.html'" class="glass hover:bg-orange-500/20 transition-all p-8 rounded-[2rem] border border-orange-500/30 group">
                <i class="fa-solid fa-store text-4xl text-orange-500 mb-3 group-hover:scale-110 transition-transform"></i>
                <span class="block font-bold text-xl font-['Orbitron'] tracking-wider">RESTORAN</span>
                <span class="text-[10px] text-slate-400 block mt-1 tracking-widest uppercase">Sipariş Oluştur</span>
            </button>

            <button onclick="window.location.href='courier.html'" class="glass hover:bg-cyan-500/20 transition-all p-8 rounded-[2rem] border border-cyan-500/30 group">
                <i class="fa-solid fa-motorcycle text-4xl text-cyan-500 mb-3 group-hover:scale-110 transition-transform"></i>
                <span class="block font-bold text-xl font-['Orbitron'] tracking-wider">KURYE</span>
                <span class="text-[10px] text-slate-400 block mt-1 tracking-widest uppercase">Operasyon Yönet</span>
            </button>
        </div>

        <div class="flex justify-center gap-10 text-[10px] font-['Orbitron'] text-slate-500 tracking-widest">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bolt text-orange-500"></i>
                <span>ANLIK TAKİP</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-brain text-cyan-400"></i>
                <span>YAPAY ZEKA</span>
            </div>
        </div>
    </div>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }
        window.addEventListener('load', hideLoader);
        // Sayfa yüklenmese bile 2.5 saniye sonra loader'ı kaldır
        setTimeout(hideLoader, 2500);
    </script>
</body>
</html>
