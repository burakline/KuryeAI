<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KuryeAI - Kurye Paneli</title>

  <!-- MAP -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f2027;
      color: white;
    }

    #map {
      height: 60vh;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: rgba(0,0,0,0.8);
    }

    .status {
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: bold;
    }

    .online {
      background: #00c851;
    }

    .offline {
      background: #ff4444;
    }

    .panel {
      padding: 15px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-online {
      background: #00c6ff;
      color: black;
    }

    .btn-offline {
      background: #ff4444;
      color: white;
    }

    .orders {
      margin-top: 15px;
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <!-- TOP -->
  <div class="topbar">
    <div>🚀 KuryeAI</div>
    <div id="statusBox" class="status offline">Offline</div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- PANEL -->
  <div class="panel">

    <button class="btn-online" onclick="goOnline()">Online Ol</button>
    <button class="btn-offline" onclick="goOffline()">Offline Ol</button>

    <div class="orders">
      📦 Siparişler
      <div id="orderList">Aktif sipariş yok</div>
    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module">
    import "./firebase.js";

    let map;
    let marker;

    // HARİTA
    function initMap(lat, lng) {
      map = L.map("map").setView([lat, lng], 15);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap"
      }).addTo(map);

      marker = L.marker([lat, lng]).addTo(map)
        .bindPopup("Sen buradasın")
        .openPopup();
    }

    // KONUM AL
    function getLocation() {
      navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        initMap(lat, lng);

      }, () => {
        alert("Konum alınamadı ❌");
      });
    }

    // ONLINE
    window.goOnline = async function () {
      document.getElementById("statusBox").innerText = "Online";
      document.getElementById("statusBox").className = "status online";

      await window.requestNotificationPermission();

      alert("Artık online'sın 🚀");
    };

    // OFFLINE
    window.goOffline = function () {
      document.getElementById("statusBox").innerText = "Offline";
      document.getElementById("statusBox").className = "status offline";

      alert("Offline oldun ❌");
    };

    // SAYFA AÇILINCA
    window.onload = () => {
      getLocation();
    };

  </script>

</body>
</html>
