<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" href="/1000417933.png" type="image/png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RestoranAI — Giriş Yap</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f2f2f7;
      --white:    #ffffff;
      --card:     #ffffff;
      --border:   rgba(0,0,0,0.09);
      --text:     #1c1c1e;
      --sub:      #636366;
      --placeholder: #aeaeb2;
      --input-bg: #f2f2f7;
      --teal:     #00c8d7;
      --teal-dk:  #009aaa;
      --teal-lt:  #33d6e3;
      --red:      #ff3b30;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 2rem 1.2rem;
      position: relative;
    }

    /* subtle dot pattern */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(rgba(0,200,215,.12) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* top color bar */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--teal-lt));
    }

    .back-link {
      position: fixed; top: 1.4rem; left: 1.8rem;
      display: flex; align-items: center; gap: .4rem;
      font-size: .8rem; color: var(--sub);
      text-decoration: none; transition: color .2s; z-index: 10;
    }
    .back-link:hover { color: var(--text); }

    /* ── CARD ── */
    .card {
      width: 100%; max-width: 400px;
      background: var(--card);
      border: .5px solid var(--border);
      border-radius: 20px;
      padding: 2.8rem 2.5rem;
      box-shadow: 0 4px 40px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
      animation: up .65s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 2rem;
    }
    .logo-wrap img {
      height: 76px; width: 76px; border-radius: 50%; object-fit: cover;
      box-shadow: 0 4px 20px rgba(0,200,215,.2);
      margin-bottom: 1rem;
    }
    .logo-name { font-size: 1.25rem; font-weight: 700; letter-spacing: -.03em; color: var(--text); }
    .logo-name em { font-style: normal; color: var(--teal); }
    .logo-sub { font-size: .75rem; color: var(--sub); margin-top: .2rem; }

    /* ── FORM ── */
    .form-title { font-size: 1rem; font-weight: 700; letter-spacing: -.02em; margin-bottom: .25rem; }
    .form-sub { font-size: .8rem; color: var(--sub); margin-bottom: 1.6rem; }

    .form-group { margin-bottom: .95rem; }
    .form-label {
      display: block; font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--sub); margin-bottom: .4rem;
    }
    .form-input {
      width: 100%;
      background: var(--input-bg);
      border: .5px solid var(--border);
      border-radius: 10px; padding: .78rem 1rem;
      color: var(--text); font-family: Arial, Helvetica, sans-serif;
      font-size: .9rem; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: var(--placeholder); }
    .form-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(0,200,215,.12);
      background: var(--white);
    }
    .form-input.error { border-color: var(--red); box-shadow: 0 0 0 3px rgba(255,59,48,.1); }

    .pw-wrap { position: relative; }
    .pw-toggle {
      position: absolute; right: .9rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--sub); font-size: .78rem;
      font-family: Arial, Helvetica, sans-serif; padding: 0; transition: color .2s;
    }
    .pw-toggle:hover { color: var(--teal); }

    .err-msg {
      display: none;
      background: rgba(255,59,48,.06);
      border: .5px solid rgba(255,59,48,.2);
      border-radius: 8px; padding: .7rem 1rem;
      font-size: .82rem; color: var(--red);
      margin-bottom: 1rem; line-height: 1.5;
    }
    .err-msg.show { display: block; }

    .success-msg {
      display: none;
      background: rgba(0,200,215,.07);
      border: .5px solid rgba(0,200,215,.25);
      border-radius: 8px; padding: .7rem 1rem;
      font-size: .82rem; color: var(--teal-dk);
      margin-bottom: 1rem; line-height: 1.5;
    }
    .success-msg.show { display: block; }

    .btn-submit {
      width: 100%; margin-top: .3rem;
      background: var(--teal); color: var(--white);
      font-size: .92rem; font-weight: 700;
      padding: .88rem; border-radius: 999px;
      border: none; cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      transition: background .2s, transform .15s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
      box-shadow: 0 4px 16px rgba(0,200,215,.3);
    }
    .btn-submit:hover:not(:disabled) {
      background: var(--teal-dk);
      transform: scale(1.02);
      box-shadow: 0 6px 24px rgba(0,200,215,.35);
    }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .forgot {
      display: block; text-align: center; margin-top: 1.1rem;
      font-size: .78rem; color: var(--sub);
      text-decoration: none; transition: color .2s;
    }
    .forgot:hover { color: var(--teal); }

    .tabs { display:flex; background:#f2f2f7; border-radius:12px; padding:4px; margin-bottom:1.5rem; }
    .tab-btn { flex:1; text-align:center; padding:.55rem; border-radius:9px; font-size:.82rem; font-weight:700; cursor:pointer; color:var(--sub); transition:all .2s; border:none; background:none; font-family:Arial,Helvetica,sans-serif; }
    .tab-btn.active { background:#fff; color:var(--text); box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .ok-msg { display:none; background:rgba(52,199,89,.07); border:.5px solid rgba(52,199,89,.25); border-radius:8px; padding:.7rem 1rem; font-size:.82rem; color:#1a7f3c; margin-bottom:1rem; line-height:1.5; }
    .ok-msg.show { display:block; }

    .card-footer {
      margin-top: 1.8rem; padding-top: 1.5rem;
      border-top: .5px solid var(--border);
      text-align: center;
    }
    .card-footer p { font-size: .72rem; color: var(--sub); line-height: 1.6; }
    .card-footer a { color: var(--teal); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* page loader */
    .page-loader {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      transition: opacity .4s;
    }
    .page-loader.hide { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 34px; height: 34px;
      border: 2px solid rgba(0,200,215,.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; border-radius: 16px; }
    }
  </style>
</head>
<body>

<div class="top-bar"></div>
<div class="page-loader" id="page-loader"><div class="loader-ring"></div></div>

<a href="/restoranai" class="back-link">← Geri Dön</a>

<div class="card">

  <div class="logo-wrap">
    <img src="1000417932.png" alt="RestoranAI" onerror="this.style.display='none'"/>
    <div class="logo-name">Restoran<em>AI</em></div>
    <div class="logo-sub">Akıllı İşletme Paneli</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-giris" onclick="switchTab('giris')">Giriş Yap</button>
    <button class="tab-btn" id="tab-kayit" onclick="switchTab('kayit')">Kayıt Ol</button>
  </div>

  <!-- GİRİŞ -->
  <div class="tab-pane active" id="pane-giris">
    <p class="form-title">Hoş Geldiniz 👋</p>
    <p class="form-sub">E-posta, telefon veya işletme ID ile giriş yapın.</p>

    <div class="err-msg" id="err-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <div class="form-group">
      <label class="form-label">E-posta / Telefon / ID</label>
      <input class="form-input" type="text" id="input-email"
             placeholder="restoran@email.com veya RAI-XXXXXX" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label class="form-label">Şifre</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="input-password"
               placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-toggle" id="pw-btn" type="button" onclick="togglePw()">Göster</button>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.8rem;color:var(--sub)">
        <input type="checkbox" id="remember-me" style="width:15px;height:15px;accent-color:var(--teal)"/>
        Beni hatırla
      </label>
      <a href="#" style="font-size:.78rem;color:var(--sub);text-decoration:none;transition:color .2s"
         onmouseover="this.style.color='var(--teal)'" onmouseout="this.style.color='var(--sub)'"
         onclick="doForgot(event)">Şifremi unuttum</a>
    </div>

    <button class="btn-submit" id="btn-login" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">Giriş Yap →</span>
    </button>
  </div>

  <!-- KAYIT -->
  <div class="tab-pane" id="pane-kayit">
    <p class="form-title">Restoran Kaydı 🍔</p>
    <p class="form-sub">Kayıt sonrası e-postanızı doğrulayın. Admin onayı ile hesabınız aktif olur.</p>

    <div class="err-msg" id="kayit-err"></div>
    <div class="ok-msg" id="kayit-ok"></div>

    <div class="form-group">
      <label class="form-label">İşletme Adı</label>
      <input class="form-input" type="text" id="k-name" placeholder="Restoran / İşletme Adı"/>
    </div>
    <div class="form-group">
      <label class="form-label">Yetkili Kişi</label>
      <input class="form-input" type="text" id="k-owner" placeholder="Ad Soyad"/>
    </div>
    <div class="form-group">
      <label class="form-label">Telefon</label>
      <input class="form-input" type="tel" id="k-phone" placeholder="05XX XXX XX XX"/>
    </div>
    <div class="form-group">
      <label class="form-label">E-posta</label>
      <input class="form-input" type="email" id="k-email" placeholder="restoran@email.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Şifre</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="k-pw" placeholder="En az 6 karakter" autocomplete="new-password"/>
        <button class="pw-toggle" type="button" onclick="toggleKayitPw('k-pw',this)">Göster</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Şifre Tekrar</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="k-pw2" placeholder="Şifreyi tekrar girin" autocomplete="new-password"/>
        <button class="pw-toggle" type="button" onclick="toggleKayitPw('k-pw2',this)">Göster</button>
      </div>
    </div>

    <button class="btn-submit" id="btn-kayit" onclick="doKayit()">
      <div class="spinner"></div>
      <span class="btn-text">Kayıt Ol →</span>
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
           sendEmailVerification, onAuthStateChanged, sendPasswordResetEmail, signOut,
           browserLocalPersistence, browserSessionPersistence, setPersistence }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc, query, collection, where, getDocs }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y",
    authDomain: "kuryeai-99bf9.firebaseapp.com",
    databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kuryeai-99bf9",
    storageBucket: "kuryeai-99bf9.firebasestorage.app",
    messagingSenderId: "1012295004135",
    appId: "1:1012295004135:web:0cceac0476175e19395742",
    measurementId: "G-1M5VL9Z27Z"
  };

  const app    = initializeApp(firebaseConfig);
  const auth   = getAuth(app);
  const db     = getFirestore(app);
  const loader = document.getElementById('page-loader');

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists() && ['restoran','admin'].includes(snap.data().role) && snap.data().status === 'active') {
          window.location.href = snap.data().role === 'admin' ? '/adminai' : '/restoranai-panel';
          return;
        }
      } catch(e) {}
    }
    loader.classList.add('hide');
    setTimeout(() => loader.style.display = 'none', 400);
  });

  function showError(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.classList.add('show');
    document.getElementById('err-msg').classList.remove('show');
  }
  function hideMessages() {
    document.getElementById('err-msg').classList.remove('show');
    document.getElementById('success-msg').classList.remove('show');
  }

  function generateID(prefix) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let id = prefix + '-';
    for (let i = 0; i < 6; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id;
  }

  window.switchTab = (t) => {
    document.querySelectorAll('.tab-pane').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
    document.getElementById('pane-'+t).classList.add('active');
    document.getElementById('tab-'+t).classList.add('active');
  };

  // URL'de ?tab=kayit varsa otomatik aç
  const _urlTab = new URLSearchParams(location.search).get('tab');
  if (_urlTab === 'kayit') switchTab('kayit');

  window.togglePw = function() {
    const inp = document.getElementById('input-password');
    const btn = document.getElementById('pw-btn');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    btn.textContent = inp.type === 'password' ? 'Göster' : 'Gizle';
  };

  window.toggleKayitPw = (id, btn) => {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? 'Göster' : 'Gizle';
  };

  window.doKayit = async function() {
    const name  = document.getElementById('k-name').value.trim();
    const owner = document.getElementById('k-owner').value.trim();
    const phone = document.getElementById('k-phone').value.trim();
    const email = document.getElementById('k-email').value.trim();
    const pw    = document.getElementById('k-pw').value;
    const pw2   = document.getElementById('k-pw2').value;
    const btn   = document.getElementById('btn-kayit');
    const err   = document.getElementById('kayit-err');
    const ok    = document.getElementById('kayit-ok');
    err.classList.remove('show'); ok.classList.remove('show');

    if (!name||!owner||!phone||!email||!pw||!pw2) { err.textContent='Tüm alanları doldurun.'; err.classList.add('show'); return; }
    if (pw !== pw2) { err.textContent='Şifreler eşleşmiyor.'; err.classList.add('show'); return; }
    if (pw.length < 6) { err.textContent='Şifre en az 6 karakter olmalı.'; err.classList.add('show'); return; }

    btn.classList.add('loading'); btn.disabled = true;
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      const restoranId = generateID('RAI');
      await setDoc(doc(db,'users',cred.user.uid), {
        uid: cred.user.uid, restoranId, name, owner, phone, email,
        role: 'restoran', status: 'pending', createdAt: new Date().toISOString()
      });
      await sendEmailVerification(cred.user);
      await signOut(auth);
      ok.textContent = `✅ Kayıt başarılı! İşletme ID'niz: ${restoranId}. E-posta doğrulama linki gönderildi. Doğrulama sonrası admin onayı beklemeniz gerekiyor.`;
      ok.classList.add('show');
      ['k-name','k-owner','k-phone','k-email','k-pw','k-pw2'].forEach(id => document.getElementById(id).value='');
      setTimeout(() => window.switchTab('giris'), 6000);
    } catch(e) {
      const msgs = { 'auth/email-already-in-use':'Bu e-posta zaten kayıtlı.', 'auth/invalid-email':'Geçersiz e-posta.', 'auth/weak-password':'Şifre çok zayıf.' };
      err.textContent = msgs[e.code] || e.message;
      err.classList.add('show');
    }
    btn.classList.remove('loading'); btn.disabled = false;
  };

  async function resolveEmail(input) {
    if (input.includes('@')) return input;
    if (/^RAI-/i.test(input)) {
      const q = query(collection(db,'users'), where('restoranId','==',input.toUpperCase()));
      const snap = await getDocs(q);
      if (!snap.empty) return snap.docs[0].data().email;
      throw new Error('Bu ID ile kayıtlı restoran bulunamadı.');
    }
    if (/^[0-9+\s\-()]{7,}$/.test(input)) {
      const q = query(collection(db,'users'), where('phone','==',input.replace(/\s/g,'')));
      const snap = await getDocs(q);
      if (!snap.empty) return snap.docs[0].data().email;
      throw new Error('Bu telefon numarasıyla kayıtlı hesap bulunamadı.');
    }
    return input;
  }

  // ── DEMO GİRİŞ (sadece signIn — asla createUser çağrılmaz) ───────────────
  async function doDemoLogin(btn) {
    const DEMO_EMAIL = 'demo@kuryeai.com';
    const DEMO_PW    = '123456';
    console.log('DEMO LOGIN START');
    showSuccess('Demo yükleniyor, lütfen bekleyin…');
    btn.classList.add('loading'); btn.disabled = true;

    try {
      const cred = await signInWithEmailAndPassword(auth, DEMO_EMAIL, DEMO_PW);
      console.log('DEMO LOGIN SUCCESS');

      // Firestore doc yoksa seed yaz (ilk girişte)
      const userRef = doc(db, 'users', cred.user.uid);
      const snap    = await getDoc(userRef);
      if (!snap.exists()) {
        console.log('DEMO SEED CREATED');
        await setDoc(userRef, {
          email:       DEMO_EMAIL,
          name:        'Demo Restoran',
          company:     'Demo Restoran',
          role:        'restoran',
          status:      'active',
          demo:        true,
          plan:        'pro',
          planActive:  true,
          planEndDate: 9999999999999,
          createdAt:   new Date().toISOString(),
        });
      }

      window.location.href = '/restoranai-panel';
    } catch (e) {
      btn.classList.remove('loading'); btn.disabled = false;
      console.error('DEMO LOGIN FAIL', e);
      if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
        showError('Demo hesabı henüz oluşturulmamış. Lütfen admin ile iletişime geçin.');
      } else {
        showError('Demo girişi başarısız: ' + (e.message || 'Bilinmeyen hata'));
      }
    }
  }

  window.doLogin = async function() {
    const inputVal  = document.getElementById('input-email').value.trim();
    const password  = document.getElementById('input-password').value;
    const remember  = document.getElementById('remember-me').checked;
    const btn       = document.getElementById('btn-login');
    hideMessages();

    if (!inputVal)  { showError('Lütfen e-posta, telefon veya ID girin.'); return; }
    if (!password)  { showError('Lütfen şifrenizi girin.'); return; }

    // Demo kullanıcı özel akış
    if (inputVal.toLowerCase() === 'demo@kuryeai.com') {
      await doDemoLogin(btn);
      return;
    }

    btn.classList.add('loading'); btn.disabled = true;

    try {
      await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
      const email = await resolveEmail(inputVal);
      const cred  = await signInWithEmailAndPassword(auth, email, password);
      const snap  = await getDoc(doc(db, 'users', cred.user.uid));

      if (!snap.exists()) {
        await auth.signOut();
        showError('Hesabınız henüz aktif edilmemiş. Başvurunuz inceleniyor.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }

      const data = snap.data();

      if (data.role !== 'restoran' && data.role !== 'admin') {
        await auth.signOut();
        showError('Bu hesap RestoranAI paneli için tanımlı değil.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }
      if (!cred.user.emailVerified) {
        await auth.signOut();
        showError('E-posta adresinizi doğrulamanız gerekiyor. Lütfen gelen kutunuzu kontrol edin.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }
      if (data.status === 'pending') {
        await auth.signOut();
        showError('Hesabınız henüz onaylanmamış. En kısa sürede incelenecektir.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }
      if (data.status === 'suspended') {
        await auth.signOut();
        showError('Hesabınız askıya alınmıştır. destek@kuryeai.com ile iletişime geçin.');
        btn.classList.remove('loading'); btn.disabled = false; return;
      }

      window.location.href = data.role === 'admin' ? '/adminai' : '/restoranai-panel';

    } catch (err) {
      btn.classList.remove('loading'); btn.disabled = false;
      const c = err.code;
      if (c === 'auth/invalid-credential' || c === 'auth/wrong-password' || c === 'auth/user-not-found') {
        showError('E-posta veya şifre hatalı.');
      } else if (c === 'auth/too-many-requests') {
        showError('Çok fazla deneme yapıldı. Lütfen birkaç dakika bekleyin.');
      } else if (c === 'auth/invalid-email') {
        showError('Geçersiz e-posta adresi.');
      } else if (c === 'auth/network-request-failed') {
        showError('İnternet bağlantınızı kontrol edin.');
      } else {
        showError('Giriş yapılamadı. Lütfen tekrar deneyin.');
      }
    }
  };

  window.doForgot = async function(e) {
    e.preventDefault();
    const inputVal = document.getElementById('input-email').value.trim();
    if (!inputVal) { showError('Şifre sıfırlamak için önce e-posta adresinizi girin.'); return; }
    try {
      const email = inputVal.includes('@') ? inputVal : await resolveEmail(inputVal);
      await sendPasswordResetEmail(auth, email);
      showSuccess('Şifre sıfırlama bağlantısı e-posta adresinize gönderildi.');
    } catch(err) {
      showError(err.message || 'E-posta gönderilemedi. Adresinizi kontrol edin.');
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') window.doLogin();
  });

  // Demo otomatik giriş
  if (new URLSearchParams(window.location.search).get('demo') === '1') {
    document.getElementById('input-email').value    = 'demo@kuryeai.com';
    document.getElementById('input-password').value = '123456';
    setTimeout(() => window.doLogin(), 600);
  }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
