<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro - v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #F8FAFC; --card: rgba(255, 255, 255, 0.98); --text: #1E293B; }
        .dark-mode { --bg: #0B1120; --card: rgba(30, 41, 59, 0.98); --text: #F1F5F9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); overflow: hidden; margin: 0; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 0; }
        
        /* Sidebar Menü */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #0F172A; z-index: 300; transition: 0.4s; padding: 25px; color: white; }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 150; background: #1E293B; color: white; padding: 10px; border-radius: 12px; border: none; cursor: pointer; }

        /* Hız Göstergesi - İstediğin Gibi Aşağıda */
        #speed-overlay { position: fixed; bottom: 230px; left: 20px; z-index: 200; width: 60px; height: 60px; background: #1E293B; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid white; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Konum Bul Butonu */
        .locate-btn { position: fixed; bottom: 170px; right: 20px; z-index: 200; background: white; color: #1E293B; padding: 10px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; cursor: pointer; }

        /* Alt Kart */
        .bottom-card { position: fixed; bottom: 15px; left: 12px; right: 12px; background: var(--card); border-radius: 20px; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; color: var(--text); }
        #main-btn { width: 100%; height: 48px; border-radius: 14px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; transition: 0.3s; }
        
        .photo-box { width: 85px; height: 85px; background: #1E293B; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid #06B6D4; overflow: hidden; position: relative; }
        #p-loader { position: absolute; display: none; border: 3px solid #f3f3f3; border-top: 3px solid #06B6D4; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #stats-modal { position: fixed; inset: 0; background: #0F172A; z-index: 400; display: none; padding: 20px; overflow-y: auto; color: white; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
    <button class="locate-btn" onclick="locateUser()"><i data-lucide="locate-fixed"></i></button>

    <div id="speed-overlay">
        <span id="live-speed" class="text-xl font-black">0</span>
        <span class="text-[8px] font-bold uppercase">km/s</span>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black italic">KURYE<span class="text-cyan-500">AI</span></h2>
            <button onclick="toggleMenu()" class="text-white bg-transparent border-none"><i data-lucide="x"></i></button>
        </div>

        <div class="flex flex-col items-center mb-6">
            <div class="photo-box">
                <img id="p-preview" class="w-full h-full object-cover hidden">
                <i id="p-icon" data-lucide="user" class="text-slate-500 w-8 h-8"></i>
                <div id="p-loader"></div>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <button onclick="document.getElementById('file-input').click()" class="text-[10px] font-bold text-cyan-400 uppercase mt-2 bg-transparent border-none cursor-pointer">Fotoğraf Değiştir</button>
            <p class="text-[10px] text-slate-500 mt-2 font-mono">ID: <span id="kurye-id-display">Yükleniyor...</span></p>
        </div>

        <div class="space-y-4">
            <button onclick="openStats()" class="w-full flex items-center gap-3 font-bold text-slate-300 py-3 border-b border-slate-800 text-sm bg-transparent border-none text-left cursor-pointer">
                <i data-lucide="bar-chart-3"></i> Geçmiş Kazançlarım
            </button>
            
            <div class="space-y-2 pt-2">
                <input type="text" id="p-ad" class="w-full bg-slate-800 border-none p-3 rounded-xl text-sm text-white" placeholder="Ad Soyad">
                <input type="text" id="p-plaka" class="w-full bg-slate-800 border-none p-3 rounded-xl text-sm text-white" placeholder="Plaka">
                <button onclick="saveProfile()" class="w-full bg-cyan-500 py-3 rounded-xl font-bold text-xs uppercase text-white border-none mt-2 cursor-pointer">Profili Kaydet</button>
            </div>
        </div>

        <div class="mt-auto flex justify-between items-center pt-10">
            <button onclick="toggleTheme()" class="flex items-center gap-2 text-xs font-bold text-white bg-transparent border-none cursor-pointer"><i data-lucide="moon"></i> Tema</button>
            <button onclick="logout()" class="text-rose-500 font-bold flex items-center gap-2 text-xs bg-transparent border-none cursor-pointer"><i data-lucide="log-out"></i> Çıkış</button>
        </div>
    </div>

    <div id="stats-modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic uppercase">Vardiya Geçmişi</h2>
            <button onclick="closeStats()" class="bg-transparent border-none text-white"><i data-lucide="arrow-left"></i></button>
        </div>
        <div id="history-list" class="space-y-3">
            <p class="text-slate-500 text-center py-10">Henüz kayıtlı vardiya yok.</p>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-card">
        <div class="flex justify-between items-end mb-2 px-1">
            <div>
                <h4 class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Toplam Kazanç</h4>
                <p id="earnings" class="text-xl font-black text-slate-900 italic">₺0,00</p>
            </div>
            <div class="text-right">
                <h4 class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Vardiya Süresi</h4>
                <p id="timer" class="text-md font-bold text-slate-800">00:00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-1 mb-3 border-y border-slate-100 py-2 text-center">
            <div><h4 class="text-[8px] text-cyan-600 font-bold uppercase">Mesafe</h4><p id="distance" class="text-xs font-black">0.0 km</p></div>
            <div><h4 class="text-[8px] text-cyan-600 font-bold uppercase">Ort. Hız</h4><p id="avg-speed" class="text-xs font-black">0</p></div>
            <div><h4 class="text-[8px] text-rose-500 font-bold uppercase">Saat/₺</h4><p id="hourly-rate" class="text-xs font-black">₺0</p></div>
        </div>

        <button id="main-btn" onclick="handleShiftToggle()" class="bg-cyan-500 text-white shadow-lg">
            <i data-lucide="play" class="w-4 h-4 fill-current"></i> Vardiyayı Başlat
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();

        // Firebase Başlatma
        const firebaseConfig = { 
            apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", 
            authDomain: "kuryeai.firebaseapp.com", 
            databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", 
            projectId: "kuryeai", 
            storageBucket: "kuryeai.firebasestorage.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        // ID Sistemi (KAI-0000001)
        let kuryeID = localStorage.getItem('kuryeAI_ID');
        if(!kuryeID) {
            db.ref('sistem/kuryeSayaci').transaction(current => {
                const next = (current || 0) + 1;
                kuryeID = 'KAI-' + next.toString().padStart(7, '0');
                localStorage.setItem('kuryeAI_ID', kuryeID);
                return next;
            }, () => {
                document.getElementById('kurye-id-display').innerText = kuryeID;
            });
        } else {
            document.getElementById('kurye-id-display').innerText = kuryeID;
        }

        // Harita Kurulumu
        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let isActive = false, startTime, timerInterval, marker, currentPos = null;
        let totalDistance = 0, lastCoord = null, pathCoords = [];

        // Menü & İstatistik Fonksiyonları
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function openStats() { document.getElementById('stats-modal').style.display = 'block'; toggleMenu(); }
        function closeStats() { document.getElementById('stats-modal').style.display = 'none'; }
        function locateUser() { if(currentPos) map.flyTo(currentPos, 17); }

        // Fotoğraf Yükleme (Kesin Çözüm)
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            document.getElementById('p-loader').style.display = 'block';
            const ref = storage.ref(`kuryeler/${kuryeID}/profil.jpg`);
            
            ref.put(file).then(() => ref.getDownloadURL()).then(url => {
                db.ref(`kuryeler/${kuryeID}/profil`).update({ photo: url });
                const img = document.getElementById('p-preview');
                img.src = url;
                img.classList.remove('hidden');
                document.getElementById('p-icon').classList.add('hidden');
                alert("Fotoğraf yüklendi!");
            }).finally(() => {
                document.getElementById('p-loader').style.display = 'none';
            });
        });

        // Profil Verilerini Buluttan Getir
        db.ref(`kuryeler/${kuryeID}/profil`).on('value', snap => {
            const d = snap.val();
            if(d) {
                if(d.adSoyad) document.getElementById('p-ad').value = d.adSoyad;
                if(d.plaka) document.getElementById('p-plaka').value = d.plaka;
                if(d.photo) {
                    const img = document.getElementById('p-preview');
                    img.src = d.photo; img.classList.remove('hidden');
                    document.getElementById('p-icon').classList.add('hidden');
                }
            }
        });

        function saveProfile() {
            const data = { adSoyad: document.getElementById('p-ad').value, plaka: document.getElementById('p-plaka').value };
            db.ref(`kuryeler/${kuryeID}/profil`).update(data).then(() => alert("Kaydedildi!"));
        }

        // Vardiya & Takip
        function handleShiftToggle() {
            const btn = document.getElementById('main-btn');
            if (!isActive) {
                isActive = true;
                startTime = Date.now();
                btn.innerHTML = '<i data-lucide="square" class="w-4 h-4 fill-current"></i> Vardiyayı Bitir';
                btn.classList.replace('bg-cyan-500', 'bg-slate-900');
                lucide.createIcons();
                timerInterval = setInterval(updateStats, 1000);
                startTracking();
            } else {
                if(confirm("Vardiyayı bitirip verileri kaydetmek istiyor musun?")) {
                    // Buraya Firebase arşivleme kodu eklenebilir
                    location.reload();
                }
            }
        }

        function updateStats() {
            const diff = Date.now() - startTime;
            const h = Math.floor(diff/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            
            let kazanc = (totalDistance * 12) + ((diff/3600000) * 180); // Örn: KM başı 12TL + Saatlik 180TL
            document.getElementById('earnings').innerText = "₺" + kazanc.toFixed(2);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                currentPos = [latitude, longitude];
                const s = speed ? speed * 3.6 : 0;
                document.getElementById('live-speed').innerText = Math.round(s);

                if(!marker) {
                    marker = L.marker(currentPos).addTo(map);
                    map.setView(currentPos, 17);
                } else {
                    marker.setLatLng(currentPos);
                }
                
                if(isActive && lastCoord && s > 2) {
                    const d = map.distance(lastCoord, currentPos) / 1000;
                    totalDistance += d;
                    document.getElementById('distance').innerText = totalDistance.toFixed(1) + " km";
                }
                lastCoord = currentPos;
                if(isActive) map.panTo(currentPos);
            }, null, {enableHighAccuracy: true});
        }

        function logout() { window.location.href = "login.html"; }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    </script>
</body>
</html>
