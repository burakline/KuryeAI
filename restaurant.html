<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI Restoran - Kontrol Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #map { height: 100%; border-radius: 0 24px 24px 0; }
        .glass-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(15px); border-right: 1px solid #1e293b; }
        .emergency-alert { animation: blink 1s infinite; background: rgba(225, 29, 72, 0.2); border: 2px solid #f43f5e; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .kurye-card { transition: all 0.3s ease; border: 1px solid #1e293b; }
        .kurye-card:hover { border-color: #22d3ee; transform: translateX(5px); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="w-[420px] glass-panel h-screen flex flex-col p-6 z-50 shadow-2xl">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center font-black shadow-lg shadow-cyan-500/20">AI</div>
                <h1 class="text-xl font-black italic text-cyan-400">Restoran Kontrol</h1>
            </div>
            <div class="relative">
                <span class="text-xl">🔔</span>
                <span id="notif-count" class="absolute -top-1 -right-1 bg-rose-600 text-[10px] px-1.5 rounded-full font-bold">0</span>
            </div>
        </div>

        <div id="alert-zone" class="space-y-3 mb-6"></div>

        <div class="flex-grow overflow-y-auto pr-2">
            <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-4">Aktif Kuryeler & Ödemeler</h2>
            <div id="kurye-list" class="space-y-4">
                <div class="text-slate-500 text-sm animate-pulse">Saha verileri senkronize ediliyor...</div>
            </div>
        </div>

        <div id="detail-box" class="hidden mt-6 pt-6 border-t border-slate-800 bg-slate-900/50 p-4 rounded-2xl">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-cyan-400 font-black text-xs uppercase">Kurye Kimlik & Araç</h3>
                <button onclick="document.getElementById('detail-box').classList.add('hidden')" class="text-slate-500">✕</button>
            </div>
            <div class="grid grid-cols-2 gap-y-2 text-[11px]">
                <span class="text-slate-500">Ad Soyad:</span> <span id="d-ad" class="font-bold text-right">-</span>
                <span class="text-slate-500">Kan Grubu:</span> <span id="d-kan" class="font-bold text-rose-500 text-right">-</span>
                <span class="text-slate-500">Plaka:</span> <span id="d-plaka" class="font-bold text-right">-</span>
                <span class="text-slate-500">Ehliyet Sınıfı:</span> <span id="d-ehliyet" class="font-bold text-right">-</span>
            </div>
        </div>
    </aside>

    <main class="flex-grow relative">
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // FIREBASE KURULUMU
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, markers = {};

        // HARİTA BAŞLAT
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // KURYE VERİLERİNİ CANLI DİNLE
        db.ref('kuryeler').on('value', (snapshot) => {
            const container = document.getElementById('kurye-list');
            container.innerHTML = "";
            const data = snapshot.val();

            for (let id in data) {
                const k = data[id];
                const p = k.profil || {};
                
                const card = document.createElement('div');
                card.className = "kurye-card p-4 bg-slate-800/40 rounded-2xl cursor-pointer";
                card.onclick = () => showDetails(p);
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div>
                            <p class="font-black text-sm">${p.ad || id}</p>
                            <p class="text-[9px] text-slate-500 font-mono">${p.plaka || 'PLAKA YOK'}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black text-emerald-500">₺${k.günlükKazanc || 0}</span>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="makePayment('${id}', '${p.ad}', '${k.günlükKazanc || 0}')" class="flex-grow py-2 bg-cyan-600/20 text-cyan-400 border border-cyan-500/30 rounded-xl text-[9px] font-black uppercase hover:bg-cyan-600 hover:text-white transition">Ödeme Yapıldı</button>
                    </div>
                `;
                container.appendChild(card);

                // Marker Güncelleme
                if(k.konum) {
                    if(markers[id]) markers[id].setLatLng([k.konum.lat, k.konum.lng]);
                    else markers[id] = L.marker([k.konum.lat, k.konum.lng]).addTo(map).bindPopup(p.ad || id);
                }
            }
        });

        // ÖDEME ONAYI VE BİLDİRİM GÖNDERME
        async function makePayment(id, ad, tutar) {
            event.stopPropagation();
            if(confirm(`${ad} adlı kuryeye ₺${tutar} ödeme yapıldığını onaylıyor musunuz?`)) {
                const tarih = new Date().toLocaleDateString('tr-TR');
                const mesaj = `Sevgili ${ad}, ${tarih} tarihine ait ${tutar} TL tutarındaki kazancınızın ödemesi sistemde kayıtlı banka IBAN numaranıza yapılmıştır. Emeğiniz için teşekkür ederiz.`;
                
                await db.ref(`bildirimler/${id}`).push({
                    baslik: "Ödeme Onayı 💰",
                    mesaj: mesaj,
                    zaman: new Date().toISOString()
                });
                alert("Ödeme onaylandı ve kuryeye anlık bildirim gönderildi!");
            }
        }

        // ŞÜPHELİ KM VE SOS UYARILARI
        db.ref('sistem_uyarilari').on('value', (snap) => {
            const alertZone = document.getElementById('alert-zone');
            alertZone.innerHTML = "";
            const uyarilar = snap.val();
            if(uyarilar) {
                const div = document.createElement('div');
                div.className = "emergency-alert p-4 rounded-2xl flex items-center gap-4";
                div.innerHTML = `
                    <span class="text-2xl">⚠️</span>
                    <div>
                        <p class="text-[10px] font-black text-rose-500 uppercase">KRİTİK UYARI</p>
                        <p class="text-xs font-bold text-white">${uyarilar.kurye}: ${uyarilar.mesaj}</p>
                    </div>
                    <button onclick="db.ref('sistem_uyarilari').remove()" class="ml-auto text-xs opacity-50">✕</button>
                `;
                alertZone.appendChild(div);
            }
        });

        // SOS (ACİL DURUM) DİNLEYİCİ
        db.ref('acil_durumlar').on('value', (snap) => {
            const sos = snap.val();
            if(sos) {
                alert(`🚨 ACİL DURUM: ${sos.kurye} - ${sos.tur}!`);
            }
        });

        function showDetails(p) {
            document.getElementById('detail-box').classList.remove('hidden');
            document.getElementById('d-ad').innerText = p.ad || "-";
            document.getElementById('d-kan').innerText = p.kan || "-";
            document.getElementById('d-plaka').innerText = p.plaka || "-";
            document.getElementById('d-ehliyet').innerText = p.ehliyet || "-";
        }
    </script>
</body>
</html>
