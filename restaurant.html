<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>RestoranAI ULTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:40vh}
.card{background:#0f172a;margin:10px;padding:12px;border-radius:12px}
input,button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:10px}
.blue{background:#00d4ff;color:black}
.green{background:#22c55e}
.status{padding:4px 8px;border-radius:8px;font-size:12px}
</style>
</head>

<body>

<div id="map"></div>

<div class="card">
<input id="customer" placeholder="Müşteri">
<input id="phone" placeholder="Telefon">
<input id="address" placeholder="Adres">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<input id="note" placeholder="Not">
<input id="price" placeholder="Fiyat">
<button class="blue" onclick="createOrder()">Sipariş</button>
</div>

<div id="stats" class="card"></div>
<div id="orderList"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const db=getDatabase();
const auth=getAuth();

let user;
let map=L.map('map').setView([39.92,32.85],12);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let orders={},couriers={},markers={},routes={},routeCache={};

onAuthStateChanged(auth,u=>{
if(!u) location.href="login.html";
user=u;
});

map.on("click",e=>{
lat.value=e.latlng.lat;
lng.value=e.latlng.lng;
});

window.createOrder=()=>{
let id="ORD-"+Date.now();

set(ref(db,"orders/"+id),{
id,
customer:customer.value,
phone:phone.value,
address:address.value,
lat:+lat.value,
lng:+lng.value,
note:note.value,
price:+price.value||50,
status:"waiting",
restaurantId:user.uid
});
};

/* ROUTE */
async function getRoute(c,o){
let key=c.lat+","+c.lng+"_"+o.lat+","+o.lng;
if(routeCache[key]) return routeCache[key];

let url=`https://router.project-osrm.org/route/v1/driving/${c.lng},${c.lat};${o.lng},${o.lat}?overview=full&geometries=geojson`;

let res=await fetch(url);
let data=await res.json();
routeCache[key]=data.routes[0];
return data.routes[0];
}

/* COURIERS */
onValue(ref(db,"couriers"),snap=>{
couriers={};

snap.forEach(c=>{
let d=c.val();
couriers[c.key]=d;

if(d.lat){
if(!markers[c.key]){
markers[c.key]=L.marker([d.lat,d.lng]).addTo(map);
}else{
markers[c.key].setLatLng([d.lat,d.lng]);
}
}
});
});

/* ORDERS */
onValue(ref(db,"orders"),async snap=>{

orderList.innerHTML="";
let total=0,del=0,rev=0;

snap.forEach(o=>{
let d=o.val();
if(d.restaurantId!==user.uid) return;

orders[d.id]=d;
total++;

if(d.status==="delivered"){
del++;
rev+=d.price||50;
}
});

for(let id in orders){

let d=orders[id];

let routeInfo="";
if(d.courierId && couriers[d.courierId]){
let r=await getRoute(couriers[d.courierId],d);

if(routes[id]) map.removeLayer(routes[id]);

routes[id]=L.geoJSON(r.geometry,{style:{color:"#00d4ff"}}).addTo(map);

let km=(r.distance/1000).toFixed(2);
let eta=Math.round(r.duration/60);
routeInfo=`${km}km | ${eta}dk`;
}

let link="https://kuryeai.com/tracking.html?id="+id;
let wa="https://wa.me/90"+(d.phone||"")+"?text="+encodeURIComponent("Canlı takip: "+link);

orderList.innerHTML+=`
<div class="card">
<b>${d.customer}</b><br>
${d.address}<br>
Durum: ${d.status}<br>
${routeInfo}<br>
${d.courierId?"Kurye: "+d.courierId:""}
${d.status==="onway"?`<a href="${wa}" target="_blank"><button class="green">WhatsApp Gönder</button></a>`:""}
</div>`;
}

stats.innerHTML=`📦 ${total} | ✔ ${del} | 💰 ${rev}₺`;

});

</script>
</body>
</html>
