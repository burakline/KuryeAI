<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Enterprise Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .card-glow:hover { box-shadow: 0 0 20px rgba(14, 165, 233, 0.15); border-color: rgba(14, 165, 233, 0.4); }
        .status-dot { position: relative; }
        .status-dot::after { content: ''; position: absolute; width: 8px; height: 8px; border-radius: 50%; right: -2px; bottom: -2px; border: 2px solid white; }
        .active-tab { border-left: 4px solid #0ea5e9; background: rgba(14, 165, 233, 0.1); color: #38bdf8; }
        #map { height: 100%; width: 100%; border-radius: 2rem; }
        .drawer { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200">

    <div class="flex h-screen overflow-hidden">
        
        <aside id="main-sidebar" class="w-72 sidebar-gradient border-r border-slate-800 flex flex-col hidden lg:flex">
            <div class="p-8">
                <div class="flex items-center gap-3 group cursor-pointer">
                    <div class="w-12 h-12 bg-sky-500 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(14,165,233,0.4)] group-hover:scale-110 transition">
                        <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold tracking-tighter text-white uppercase italic">KuryeAI</h1>
                        <p class="text-[10px] text-sky-400 font-bold tracking-[0.2em]">CONTROL CENTER</p>
                    </div>
                </div>
            </div>

            <nav class="flex-grow px-4 space-y-1">
                <a href="#" onclick="switchTab('dashboard')" class="active-tab flex items-center gap-4 px-6 py-4 rounded-xl font-semibold transition group">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="#" onclick="switchTab('live')" class="flex items-center gap-4 px-6 py-4 rounded-xl font-semibold text-slate-400 hover:bg-slate-800 transition">
                    <i data-lucide="map-pin" class="w-5 h-5"></i> Canlı Takip
                </a>
                <a href="#" onclick="switchTab('drivers')" class="flex items-center gap-4 px-6 py-4 rounded-xl font-semibold text-slate-400 hover:bg-slate-800 transition">
                    <i data-lucide="users" class="w-5 h-5"></i> Kurye Listesi
                </a>
                <a href="#" onclick="switchTab('reports')" class="flex items-center gap-4 px-6 py-4 rounded-xl font-semibold text-slate-400 hover:bg-slate-800 transition">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Finansal Rapor
                </a>
            </nav>

            <div class="p-6">
                <div class="bg-slate-800/50 rounded-2xl p-4 border border-slate-700">
                    <div class="flex items-center gap-3">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=0ea5e9&color=fff" class="w-10 h-10 rounded-xl">
                        <div>
                            <p class="text-sm font-bold text-white">Yönetici Paneli</p>
                            <span class="text-[10px] text-emerald-400 font-bold uppercase">Çevrimiçi</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-grow flex flex-col min-w-0 bg-[#020617] overflow-y-auto">
            
            <header class="h-24 px-8 flex items-center justify-between border-b border-slate-800 bg-[#020617]/80 backdrop-blur-xl sticky top-0 z-40">
                <div>
                    <h2 id="view-title" class="text-2xl font-bold text-white">Dashboard</h2>
                    <p class="text-xs text-slate-500 font-medium">Sistem durumu ve kurye performans verileri.</p>
                </div>

                <div class="flex items-center gap-4">
                    <div class="hidden md:flex items-center bg-slate-900 border border-slate-800 px-4 py-2.5 rounded-2xl focus-within:border-sky-500 transition">
                        <i data-lucide="search" class="w-4 h-4 text-slate-500"></i>
                        <input type="text" placeholder="Hızlı ara..." class="bg-transparent border-none outline-none text-sm ml-3 text-white w-64">
                    </div>
                    <button class="w-12 h-12 flex items-center justify-center bg-slate-900 border border-slate-800 rounded-2xl text-slate-400 hover:text-white transition">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleMobileMenu()" class="lg:hidden w-12 h-12 flex items-center justify-center bg-sky-500 rounded-2xl text-white">
                        <i data-lucide="menu"></i>
                    </button>
                </div>
            </header>

            <div class="p-8 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 text-white">
                    <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-slate-800 card-glow transition">
                        <div class="w-12 h-12 bg-sky-500/10 text-sky-500 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="navigation"></i></div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Aktif Kurye</p>
                        <h3 id="stat-active" class="text-3xl font-black mt-1">0</h3>
                    </div>
                    <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-slate-800 card-glow transition">
                        <div class="w-12 h-12 bg-rose-500/10 text-rose-500 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="alert-octagon"></i></div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Kritik Sapma</p>
                        <h3 id="stat-alerts" class="text-3xl font-black mt-1 text-rose-500">0</h3>
                    </div>
                    <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-slate-800 card-glow transition">
                        <div class="w-12 h-12 bg-emerald-500/10 text-emerald-500 rounded-2xl flex items-center justify-center mb-4"><i data-lucide="wallet"></i></div>
                        <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Bugünkü Ciro</p>
                        <h3 id="stat-money" class="text-3xl font-black mt-1">₺0</h3>
                    </div>
                </div>

                <div id="section-main" class="bg-slate-900/20 rounded-[2.5rem] border border-slate-800 overflow-hidden backdrop-blur-md">
                    <div class="p-8 border-b border-slate-800 flex justify-between items-center bg-slate-900/40">
                        <h4 class="text-lg font-bold text-white flex items-center gap-3">
                            <i data-lucide="history" class="w-5 h-5 text-sky-500"></i> Son Hareketler
                        </h4>
                        <div class="flex gap-2">
                            <button class="bg-sky-600 hover:bg-sky-500 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition shadow-lg shadow-sky-600/20">Dışa Aktar</button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto overflow-y-auto max-h-[600px]">
                        <table class="w-full text-left">
                            <thead class="bg-slate-950/50 sticky top-0 z-10">
                                <tr>
                                    <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.15em]">Kurye Profili</th>
                                    <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.15em] text-center">KM Verisi</th>
                                    <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.15em] text-center">Analiz</th>
                                    <th class="px-8 py-5 text-[11px] font-black text-slate-500 uppercase tracking-[0.15em] text-right">Eylem</th>
                                </tr>
                            </thead>
                            <tbody id="driver-logs" class="divide-y divide-slate-800/50">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div id="section-map" class="h-[500px] bg-slate-900/40 rounded-[2.5rem] border border-slate-800 p-2 shadow-2xl">
                    <div id="map"></div>
                </div>

            </div>
        </main>
    </div>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Icons
        lucide.createIcons();

        // Firebase Setup (Same credentials)
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // UI Logic
        function switchTab(tab) {
            document.querySelectorAll('nav a').forEach(el => el.classList.remove('active-tab'));
            event.currentTarget.classList.add('active-tab');
            document.getElementById('view-title').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
        }

        // Live Data Feed
        db.ref('arsiv').on('value', snap => {
            const container = document.getElementById('driver-logs');
            container.innerHTML = "";
            let alertCount = 0;
            let totalMoney = 0;

            snap.forEach(driver => {
                driver.forEach(log => {
                    const data = log.val();
                    const diff = Math.abs(data.manuelKM - data.gpsKM);
                    const isDangerous = diff > 3;
                    if(isDangerous) alertCount++;
                    totalMoney += parseFloat(data.kazanc || 0);

                    container.innerHTML += `
                        <tr class="hover:bg-sky-500/5 transition group">
                            <td class="px-8 py-6">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-2xl bg-slate-800 flex items-center justify-center font-bold text-sky-400 border border-slate-700 group-hover:border-sky-500/50 transition">
                                        ${driver.key.charAt(0).toUpperCase()}
                                    </div>
                                    <div>
                                        <p class="text-sm font-bold text-white uppercase tracking-tight">${driver.key.replace('_',' ')}</p>
                                        <p class="text-[10px] text-slate-500 font-medium">${data.tarih}</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <div class="inline-block text-left">
                                    <p class="text-xs font-bold text-slate-200">M: ${data.manuelKM} km</p>
                                    <p class="text-[10px] text-slate-500 italic font-medium">G: ${data.gpsKM} km</p>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-center">
                                <span class="px-4 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest ${isDangerous ? 'bg-rose-500/10 text-rose-500 border border-rose-500/20' : 'bg-emerald-500/10 text-emerald-500 border border-emerald-500/20'}">
                                    ${isDangerous ? 'KRİTİK SAPMA' : 'GÜVENLİ'}
                                </span>
                            </td>
                            <td class="px-8 py-6 text-right">
                                <button class="w-10 h-10 bg-slate-800 rounded-xl hover:bg-sky-500 hover:text-white transition flex items-center justify-center ml-auto">
                                    <i data-lucide="more-horizontal" class="w-4 h-4 text-slate-400 hover:text-inherit"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            });
            document.getElementById('stat-alerts').innerText = alertCount;
            document.getElementById('stat-money').innerText = '₺' + totalMoney.toLocaleString();
            lucide.createIcons();
        });

        // Initialize Map
        var map = L.map('map', {zoomControl: false, attributionControl: false}).setView([39.9334, 32.8597], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
    </script>
</body>
</html>
