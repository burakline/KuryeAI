<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Takip</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial;}

#map{height:100vh;}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

const map = L.map('map').setView([39.92,32.85],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};

// 🔥 CANLI DİNLE
onSnapshot(collection(db,"couriers"), (snap)=>{

snap.forEach(docSnap=>{

const data = docSnap.data();
const id = docSnap.id;

if(!data.lat || !data.lng) return;

const color = data.online ? "green" : "red";

const icon = L.divIcon({
html:`<div style="
width:15px;
height:15px;
border-radius:50%;
background:${color};
border:2px solid white;
"></div>`
});

if(markers[id]){
markers[id].setLatLng([data.lat,data.lng]);
markers[id].setIcon(icon);
}else{
markers[id] = L.marker([data.lat,data.lng],{icon})
.addTo(map)
.bindPopup(data.name || "Kurye");
}

});

});

</script>

</body>
</html>
