<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';display:flex;background:#020617;color:white}
.sidebar{width:240px;background:#020617;padding:20px;height:100vh}
.sidebar h2{color:#00d4ff}
.sidebar button{display:block;width:100%;padding:10px;margin:5px 0;background:none;border:none;color:#94a3b8;cursor:pointer}
.sidebar button:hover{color:white}
.content{flex:1;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px}
input{padding:10px;margin:5px;border-radius:8px;border:none;width:100%}
#map{width:100%;height:60vh;border-radius:12px}
</style>
</head>

<body>

<div class="sidebar">
<h2>KuryeAI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('orders')">Siparişler</button>
<button onclick="show('couriers')">Kuryeler</button>
<button onclick="show('restaurants')">Restoranlar</button>
<button onclick="show('applications')">Başvurular</button>
</div>

<div class="content">

<div id="dashboard">
<h2>🚀 Canlı Sistem</h2>
<div id="map"></div>
</div>

<div id="orders" style="display:none">
<h2>📦 Siparişler</h2>

<input id="oProduct" placeholder="Ürün adı">
<input id="oLat" placeholder="Enlem">
<input id="oLng" placeholder="Boylam">

<button onclick="createOrder()">Sipariş Oluştur</button>

<div id="orderList"></div>
</div>

<div id="couriers" style="display:none">
<h2>🚴 Kuryeler</h2>
<input id="cName" placeholder="Ad">
<input id="cMail" placeholder="Email">
<button onclick="addCourier()">Ekle</button>
<div id="courierList"></div>
</div>

<div id="restaurants" style="display:none">
<h2>🍔 Restoranlar</h2>
<input id="rName" placeholder="Ad">
<input id="rMail" placeholder="Email">
<button onclick="addRestaurant()">Ekle</button>
<div id="restaurantList"></div>
</div>

<div id="applications" style="display:none">
<h2>📩 Başvurular</h2>
<div id="appList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
deleteDoc, doc, updateDoc, setDoc, getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* 🔥 FIX (BOŞ SAYFA SORUNU) */
const orderList = document.getElementById("orderList");
const courierList = document.getElementById("courierList");
const restaurantList = document.getElementById("restaurantList");
const appList = document.getElementById("appList");

/* NAV */
window.show=id=>{
["dashboard","orders","couriers","restaurants","applications"]
.forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(id).style.display="block";
}

/* MAP */
const map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
setTimeout(()=>map.invalidateSize(),500);

/* 🚴 KURYELER */
let courierMarkers={};
let couriersData={};

onSnapshot(collection(db,"couriers"),snap=>{
snap.forEach(d=>{
const c=d.data();
couriersData[c.email]=c;

if(!c.lat) return;

if(courierMarkers[d.id]){
courierMarkers[d.id].setLatLng([c.lat,c.lng]);
}else{
courierMarkers[d.id]=L.marker([c.lat,c.lng])
.addTo(map)
.bindPopup("🚴 "+(c.name||"Kurye"));
}
});
});

/* 📦 SİPARİŞLER + TRACKING */
let orderMarkers={};
let routeLine=null;

onSnapshot(collection(db,"orders"),snap=>{
orderList.innerHTML="";

snap.forEach(d=>{
const o=d.data();

orderList.innerHTML+=`
<div class="card">
${o.product} - ${o.status}<br>
Kurye: ${o.courierEmail || "Yok"}
<button onclick="focusOrder(${o.lat},${o.lng},'${o.courierEmail}')">Haritada Göster</button>
</div>`;

if(o.lat){
if(!orderMarkers[d.id]){
orderMarkers[d.id]=L.marker([o.lat,o.lng])
.addTo(map)
.bindPopup("📦 "+o.product);
}
}
});
});

/* 📍 TRACKING + ROTA */
window.focusOrder=async(lat,lng,email)=>{
map.setView([lat,lng],15);

const courier=couriersData[email];
if(!courier || !courier.lat) return;

const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${courier.lng},${courier.lat};${lng},${lat}?overview=full&geometries=geojson`);
const data=await res.json();

const coords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

if(routeLine) map.removeLayer(routeLine);

routeLine=L.polyline(coords,{color:"lime"}).addTo(map);
}

/* 📩 APPLICATIONS */
onSnapshot(collection(db,"applications"),snap=>{
appList.innerHTML="";

snap.forEach(d=>{
const a=d.data();

appList.innerHTML+=`
<div class="card">
<b>${a.name}</b><br>
${a.email}<br><br>

<button onclick="approve('${d.id}','${a.email}','${a.name}')">✅ Onayla</button>
<button onclick="reject('${d.id}')">❌ Reddet</button>
</div>`;
});
});

/* APPROVE */
window.approve=async(id,email,name)=>{
try{
const snap = await getDocs(collection(db,"couriers"));
let exists=false;

snap.forEach(d=>{
if(d.data().email===email){exists=true;}
});

if(exists){
alert("⚠️ Bu kurye zaten kayıtlı!");
return;
}

let userId=null;

try{
const user=await createUserWithEmailAndPassword(auth,email,"123456");
userId=user.user.uid;
}catch(e){
if(e.code==="auth/email-already-in-use"){userId=email;}
else{throw e;}
}

await setDoc(doc(db,"users",userId),{
email,
role:"courier"
});

await addDoc(collection(db,"couriers"),{
name:name || email,
email,
activeOrders:0,
createdAt:new Date()
});

await updateDoc(doc(db,"applications",id),{
status:"approved"
});

alert("✅ Kurye eklendi!");

}catch(e){
alert("Hata: "+e.message);
}
}

/* REJECT */
window.reject=async(id)=>{
await updateDoc(doc(db,"applications",id),{
status:"rejected"
});
alert("Reddedildi");
}

</script>

</body>
</html>
