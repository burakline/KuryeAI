<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KuryeAI — Demo Seed</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#0c0c0c;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
  .box{background:#111;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:2rem;max-width:480px;width:100%}
  h2{font-size:1.2rem;margin-bottom:.3rem}
  p{font-size:.85rem;color:#888;margin-bottom:1.5rem}
  .log{background:#0a0a0a;border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:1rem;font-size:.78rem;font-family:monospace;min-height:120px;max-height:260px;overflow-y:auto;margin-bottom:1.2rem;white-space:pre-wrap}
  .log .ok{color:#30d158} .log .err{color:#ff5f57} .log .info{color:#00c8d7}
  button{width:100%;padding:.75rem;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;transition:opacity .2s}
  button:disabled{opacity:.5;cursor:not-allowed}
  .warn{background:rgba(255,214,10,.08);border:1px solid rgba(255,214,10,.2);border-radius:8px;padding:.75rem;font-size:.8rem;color:#ffd60a;margin-bottom:1.2rem}
</style>
</head>
<body>
<div class="box">
  <h2>🎮 Demo Hesabı Seed</h2>
  <p>Bu sayfa demo@kuryeai.com hesabını Firebase'de oluşturur ve örnek verileri yükler.<br>Sadece admin tarafından kullanılmalıdır.</p>
  <div class="warn">⚠ Bu işlem idempotent'tir — varsa üzerine yazar, yoksa oluşturur.</div>
  <div class="log" id="log">Hazır. Başlatmak için butona bas.</div>
  <button id="btn" onclick="runSeed()">🚀 Demo Seed Başlat</button>
</div>

<script type="module">
import { initializeApp }             from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc, collection, addDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getDatabase, ref, set }
  from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y",
  authDomain:"kuryeai-99bf9.firebaseapp.com",
  databaseURL:"https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"kuryeai-99bf9",
  storageBucket:"kuryeai-99bf9.firebasestorage.app",
  messagingSenderId:"1012295004135",
  appId:"1:1012295004135:web:0cceac0476175e19395742",
};

const app  = initializeApp(cfg, 'seed-' + Date.now());
const auth = getAuth(app);
const db   = getFirestore(app);
const rtdb = getDatabase(app);

const log = (msg, cls='info') => {
  const el = document.getElementById('log');
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
};

const DEMO_EMAIL = 'demo@kuryeai.com';
const DEMO_PASS  = '123456';

const DEMO_ORDERS = {
  ord_d01:{customer:"Ahmet Yılmaz",  items:["Adana Kebap x2","Ayran x2"],     total:180, status:"preparing",  address:"Bağcılar Cad. 14/A",  courier:"cour_d01",createdAt:Date.now()-800000},
  ord_d02:{customer:"Zeynep Arslan", items:["Pizza Margarita","Kola"],         total:95,  status:"on_the_way", address:"Atatürk Blv. 88",     courier:"cour_d02",createdAt:Date.now()-400000},
  ord_d03:{customer:"Murat Demir",   items:["Hamburger","Patates Kızartması"], total:120, status:"pending",    address:"Cumhuriyet Sk. 3",    courier:null,      createdAt:Date.now()-120000},
  ord_d04:{customer:"Selin Kaya",    items:["Tavuk Döner","Cacık"],            total:75,  status:"delivered",  address:"İnönü Cd. 22",        courier:"cour_d03",createdAt:Date.now()-3600000},
  ord_d05:{customer:"Can Öztürk",    items:["Lahmacun x3","Şalgam Suyu"],      total:90,  status:"delivered",  address:"Kızılay Meyd. 5",     courier:"cour_d01",createdAt:Date.now()-7200000},
};

const DEMO_COURIERS = {
  cour_d01:{name:"Mehmet Kaya", phone:"0532 111 22 33",vehicle:"moto",status:"busy",     zone:"Merkez",  rating:4.8,deliveries:142,earnings:18400},
  cour_d02:{name:"Ali Rıza",   phone:"0541 222 33 44",vehicle:"moto",status:"busy",     zone:"Kadıköy", rating:4.9,deliveries:208,earnings:26300},
  cour_d03:{name:"Emre Tunç",  phone:"0555 333 44 55",vehicle:"bike",status:"available",zone:"Merkez",  rating:4.7,deliveries:89, earnings:11200},
  cour_d04:{name:"Volkan Sarı",phone:"0501 444 55 66",vehicle:"moto",status:"available",zone:"Çankaya", rating:4.6,deliveries:176,earnings:21800},
};

const DEMO_MENU = {
  item_d01:{name:"Adana Kebap",        category:"Ana Yemek",  price:75,  available:true},
  item_d02:{name:"Pizza Margarita",    category:"Pizza",      price:85,  available:true},
  item_d03:{name:"Hamburger",          category:"Burger",     price:70,  available:true},
  item_d04:{name:"Tavuk Döner",        category:"Döner",      price:55,  available:true},
  item_d05:{name:"Lahmacun",           category:"Hamur İşi",  price:25,  available:true},
  item_d06:{name:"Ayran",              category:"İçecek",     price:15,  available:true},
};

const DEMO_SETTINGS = {
  assign_mode:"auto",pricing_mode:"per_package",
  notif_order:true,notif_delay:true,notif_deliver:false,notif_email:true,
  rest_name:"Demo Restoran",rest_address:"Demo Cad. No:1, Ankara",rest_phone:"0312 000 00 00",rest_hours:"09:00 — 23:00",
  rest_lat:39.9334,rest_lng:32.8597,
  custom_base:0,custom_km:0,commission_rate:5,
};

window.runSeed = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('log').textContent = '';

  try {
    // 1. Demo Firebase Auth kullanıcısı oluştur (varsa giriş yap)
    log('🔐 Demo kullanıcı kontrol ediliyor...');
    let uid;
    try {
      const cred = await createUserWithEmailAndPassword(auth, DEMO_EMAIL, DEMO_PASS);
      uid = cred.user.uid;
      log(`✓ Yeni kullanıcı oluşturuldu — UID: ${uid}`, 'ok');
    } catch(e) {
      if (e.code === 'auth/email-already-in-use') {
        const cred = await signInWithEmailAndPassword(auth, DEMO_EMAIL, DEMO_PASS);
        uid = cred.user.uid;
        log(`✓ Mevcut kullanıcı bulundu — UID: ${uid}`, 'ok');
      } else throw e;
    }

    // 2. Firestore users dokümanı
    log('📄 Firestore users dokümanı yazılıyor...');
    const now7 = Date.now();
    await setDoc(doc(db, 'users', uid), {
      name:          'Demo Restoran',
      email:         DEMO_EMAIL,
      role:          'restoran',
      company:       'Demo Restoran',
      phone:         '0312 000 00 00',
      status:        'active',
      demo:          true,
      firstLogin:    false,
      plan:          'pro',
      planStartDate: now7,
      planEndDate:   now7 + 365 * 86400000,
      planActive:    true,
      createdAt:     serverTimestamp(),
    });
    log('✓ Firestore kullanıcı dokümanı yazıldı', 'ok');

    const RID = uid; // restaurantID = uid

    // 3. RTDB: siparişler
    log('📦 RTDB siparişler yazılıyor...');
    await set(ref(rtdb, `restaurants/${RID}/orders`), DEMO_ORDERS);
    log('✓ Siparişler yazıldı (5 örnek sipariş)', 'ok');

    // 4. RTDB: kuryeler
    log('🛵 RTDB kuryeler yazılıyor...');
    await set(ref(rtdb, `restaurants/${RID}/couriers`), DEMO_COURIERS);
    log('✓ Kuryeler yazıldı (4 demo kurye)', 'ok');

    // 5. RTDB: menü
    log('🍽️ RTDB menü yazılıyor...');
    await set(ref(rtdb, `restaurants/${RID}/menu`), DEMO_MENU);
    log('✓ Menü yazıldı (6 ürün)', 'ok');

    // 6. RTDB: ayarlar
    log('⚙️ RTDB ayarlar yazılıyor...');
    await set(ref(rtdb, `restaurants/${RID}/settings`), DEMO_SETTINGS);
    log('✓ Ayarlar yazıldı', 'ok');

    // 7. Firestore: örnek siparişler (admin panel için)
    log('🗃️ Firestore siparişler yazılıyor...');
    for (const [id, o] of Object.entries(DEMO_ORDERS)) {
      await setDoc(doc(collection(db,'orders'), id), {
        ...o, orderId:id, restoranId:RID, restoranName:'Demo Restoran',
        createdAt: new Date(o.createdAt).toISOString(),
      });
    }
    log('✓ Firestore siparişler yazıldı', 'ok');

    await signOut(auth);
    log('\n🎉 Demo seed tamamlandı!', 'ok');
    log('📧 E-posta: demo@kuryeai.com', 'ok');
    log('🔑 Şifre: 123456', 'ok');
    log('🔗 Giriş: /restoranai-login?demo=1', 'ok');
    btn.textContent = '✓ Tamamlandı';
    btn.style.background = '#30d158';

  } catch(e) {
    log('❌ Hata: ' + e.message, 'err');
    btn.disabled = false;
  }
};
</script>
</body>
</html>
