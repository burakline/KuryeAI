<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AdminAI ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#020617;color:white}

/* GRID */
.container{
display:grid;
grid-template-columns:1fr 360px;
}

/* MAP */
#map{
height:100vh;
}

/* PANEL */
.panel{
overflow:auto;
height:100vh;
}

/* CARD */
.card{
background:rgba(15,23,42,.6);
backdrop-filter:blur(10px);
padding:12px;
margin:8px;
border-radius:12px;
}

/* INPUT */
input,select{
width:100%;
padding:8px;
margin-top:6px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.blue{background:#00d4ff;color:black}
.green{background:#22c55e}
.red{background:#ef4444}
.orange{background:#f59e0b;color:black}

/* 🔥 MOBİL FIX */
@media (max-width:768px){

.container{
display:flex !important;
flex-direction:column !important;
}

#map{
height:50vh !important;
}

.panel{
height:50vh !important;
overflow-y:auto;
}

.card{
margin:6px !important;
padding:10px !important;
}

button{
padding:12px !important;
font-size:14px;
}

input,select{
padding:10px !important;
}

}
</style>
</head>

<body>

<div class="container">

<div id="map"></div>

<div class="panel">

<div class="card">
<b>📦 Sipariş</b>
<input id="customer" placeholder="Müşteri">
<input id="address" placeholder="Adres">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<button class="blue" onclick="createOrder()">Oluştur</button>
</div>

<div class="card">
<b>🎯 Manuel Atama</b>
<select id="orderSelect"></select>
<select id="courierSelect"></select>
<button class="orange" onclick="manualAssign()">Ata</button>
</div>

<div class="card">
<b>💰 Ücret</b>
<select id="pricingType">
<option value="courier">Kurye</option>
<option value="restaurant">Restoran</option>
<option value="zone">Zone</option>
</select>
<input id="targetId" placeholder="ID">
<select id="model">
<option value="hourly">Saatlik</option>
<option value="perOrder">Paket</option>
</select>
<input id="basePrice" placeholder="Ücret">
<input id="perKm" placeholder="KM">
<button class="green" onclick="savePricing()">Kaydet</button>
</div>

<div class="card"><b>📝 Kurye Başvuruları</b><div id="courierRequests"></div></div>
<div class="card"><b>🏪 Restoran Başvuruları</b><div id="restaurantRequests"></div></div>

<div class="card"><b>🚴 Kuryeler</b><div id="courierList"></div></div>
<div class="card"><b>🏪 Restoranlar</b><div id="restaurantList"></div></div>

<div class="card"><b>⛔ Kara Liste</b><div id="blacklist"></div></div>

<div class="card">
<b>🗺️ Zone</b>
<input id="zoneName" placeholder="Zone adı">
<button onclick="startZone()">Çizmeye Başla</button>
<button onclick="saveZone()">Kaydet</button>
</div>

<div class="card"><b>📋 Siparişler</b><div id="orderList"></div></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import { getDatabase, ref, onValue, set, get } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const db=getDatabase();
const map=L.map('map').setView([39.92,32.85],11);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let couriers={},orders={};

map.on("click",e=>{
lat.value=e.latlng.lat;
lng.value=e.latlng.lng;
});

/* KURYELER */
onValue(ref(db,"couriers"),snap=>{
courierSelect.innerHTML="";
snap.forEach(c=>{
let id=c.key,d=c.val();
couriers[id]=d;

if(d.lat){
L.circleMarker([d.lat,d.lng],{
radius:6,color:d.online?"#22c55e":"#ef4444"
}).addTo(map);
}

courierSelect.innerHTML+=`<option value="${id}">${id}</option>`;
});
});

/* SİPARİŞ */
onValue(ref(db,"orders"),snap=>{
orderList.innerHTML="";
orderSelect.innerHTML="";

snap.forEach(o=>{
let d=o.val();
orders[d.id]=d;

orderSelect.innerHTML+=`<option value="${d.id}">${d.customer}</option>`;

orderList.innerHTML+=`
<div>
${d.customer} | ${d.status} | 💰${d.price||"-"}
</div>`;
});
});

/* CREATE */
window.createOrder=()=>{
let id="ORD-"+Date.now();
set(ref(db,"orders/"+id),{
id,
customer:customer.value,
address:address.value,
lat:+lat.value,
lng:+lng.value,
status:"waiting"
});
};

/* MANUEL */
window.manualAssign=()=>{
set(ref(db,"orders/"+orderSelect.value+"/courierId"),courierSelect.value);
set(ref(db,"orders/"+orderSelect.value+"/status"),"assigned");
};

/* PRICING */
window.savePricing=()=>{
set(ref(db,"pricing/"+pricingType.value+"/"+targetId.value),{
model:model.value,
base:+basePrice.value,
perKm:+perKm.value
});
};

</script>

</body>
</html>
