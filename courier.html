<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfd; overflow: hidden; }
        #map { height: 40vh; width: 100%; border-bottom: 1px solid #eaecf0; }
        .action-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .action-btn:active { transform: scale(0.95); }
        .modal { display: none; background: rgba(16, 24, 40, 0.7); backdrop-filter: blur(8px); z-index: 10000; }
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 9000; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="km-modal" class="fixed inset-0 modal flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[32px] w-full max-w-sm shadow-2xl border border-gray-100">
            <h3 id="modal-title" class="text-xl font-bold text-gray-900 mb-6 text-center">Vardiya Girişi</h3>
            <div class="space-y-4">
                <div class="p-4 bg-gray-50 rounded-2xl border border-dashed border-gray-300 text-center">
                    <input type="file" accept="image/*" capture="camera" id="km-photo" class="hidden">
                    <label for="km-photo" class="cursor-pointer text-sm font-semibold text-purple-600 flex flex-col items-center">
                        <i data-lucide="camera" class="mb-2"></i> Fotoğraf Çek
                    </label>
                </div>
                <input type="number" id="km-input" placeholder="Kilometre Değeri" class="w-full p-5 bg-gray-50 rounded-2xl border border-gray-200 text-2xl text-center font-bold focus:ring-2 focus:ring-purple-500 outline-none">
            </div>
            <button onclick="processShiftStep()" class="w-full py-5 bg-purple-600 text-white rounded-2xl font-bold mt-6 shadow-lg shadow-purple-200">KAYDET VE DEVAM ET</button>
            <button onclick="closeModal('km-modal')" class="w-full py-2 text-gray-400 mt-2 text-xs font-medium">Kapat</button>
        </div>
    </div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-white border-r border-gray-200 p-6 -translate-x-full">
        <div class="flex justify-between items-center mb-10">
            <span class="text-xl font-bold text-purple-600">KuryeAI</span>
            <button onclick="toggleSidebar()"><i data-lucide="x"></i></button>
        </div>
        <button onclick="logout()" class="w-full flex items-center gap-3 p-4 bg-red-50 text-red-600 rounded-xl font-bold">
            <i data-lucide="log-out"></i> Oturumu Kapat
        </button>
    </aside>

    <header class="h-16 px-6 flex justify-between items-center bg-white border-b border-gray-100">
        <button onclick="toggleSidebar()"><i data-lucide="menu" class="w-6 h-6 text-gray-600"></i></button>
        <span class="font-bold text-gray-900 tracking-tight italic">Kurye<span class="text-purple-600">AI</span></span>
        <div id="status-dot" class="w-3 h-3 bg-red-500 rounded-full border-2 border-white shadow-sm"></div>
    </header>

    <main class="flex-grow flex flex-col overflow-hidden">
        <div id="map"></div>
        
        <div class="p-6 grid grid-cols-2 gap-4">
            <button id="btn-start" onclick="openKMModal('start')" class="action-btn bg-emerald-500 text-white p-5 rounded-[24px] font-bold shadow-lg shadow-emerald-100 flex flex-col items-center gap-2">
                <i data-lucide="play-circle"></i> <span class="text-xs uppercase">Vardiya Başlat</span>
            </button>
            <button id="btn-end" onclick="openKMModal('end')" class="action-btn bg-gray-100 text-gray-400 p-5 rounded-[24px] font-bold flex flex-col items-center gap-2" disabled>
                <i data-lucide="stop-circle"></i> <span class="text-xs uppercase">Vardiya Bitir</span>
            </button>
        </div>

        <div class="px-6 pb-6 grid grid-cols-3 gap-3">
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Süre</p>
                <p id="timer" class="text-lg font-bold text-gray-900">00:00:00</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Mesafe</p>
                <p id="gps-km" class="text-lg font-bold text-gray-900">0.0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">Kazanç</p>
                <p id="earnings" class="text-lg font-bold text-purple-600">₺0</p>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const kuryeID = "harun_kaya";

        let map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let startTime, timerInterval, startKM = 0;

        function toggleSidebar() {
            const s = document.getElementById('sidebar');
            s.classList.toggle('-translate-x-full');
        }

        function openKMModal(mode) {
            window.shiftMode = mode;
            document.getElementById('km-input').value = "";
            document.getElementById('modal-title').innerText = mode === 'start' ? 'Vardiya Başlat' : 'Vardiya Bitir';
            document.getElementById('km-modal').style.display = 'flex';
        }

        function processShiftStep() {
            const km = parseFloat(document.getElementById('km-input').value);
            if(!km) return alert("KM Gerekli!");

            if(window.shiftMode === 'start') {
                startKM = km; startTime = Date.now();
                document.getElementById('btn-start').className = "action-btn bg-gray-100 text-gray-400 p-5 rounded-[24px] font-bold flex flex-col items-center gap-2";
                document.getElementById('btn-end').className = "action-btn bg-red-500 text-white p-5 rounded-[24px] font-bold shadow-lg shadow-red-100 flex flex-col items-center gap-2";
                document.getElementById('btn-end').disabled = false;
                document.getElementById('status-dot').className = "w-3 h-3 bg-emerald-500 rounded-full border-2 border-white animate-pulse";
                startTimer();
            } else {
                db.ref('arsiv/'+kuryeID).push({ tarih: new Date().toLocaleString(), manuelKM: km - startKM, gpsKM: 0, kazanc: (km - startKM) * 8 });
                location.reload();
            }
            closeModal('km-modal');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function logout() { localStorage.clear(); location.href="index.html"; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
