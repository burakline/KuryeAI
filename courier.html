<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro - Final Stabil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #F8FAFC; --text: #1E293B; --card: white; }
        .dark-mode { --bg: #0B1120; --text: #F1F5F9; --card: #1E293B; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text); overflow: hidden; margin: 0; transition: 0.3s; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 0; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: #0F172A; z-index: 1000; transition: 0.4s; padding: 20px; overflow-y: auto; color: white; }
        .sidebar.active { left: 0; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 12px; cursor: pointer; color: #94A3B8; font-size: 14px; }
        .menu-item:hover { background: rgba(6, 182, 212, 0.1); color: white; }
        
        /* Çakışma Önleyici Konumlandırma */
        #speed-overlay { position: fixed; bottom: 240px; left: 20px; z-index: 200; width: 65px; height: 65px; background: #1E293B; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid #06B6D4; color: white; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .locate-btn { position: fixed; bottom: 240px; right: 20px; z-index: 200; background: white; color: #1E293B; padding: 12px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: none; cursor: pointer; }

        /* Veri Kartı */
        .bottom-card { position: fixed; bottom: 15px; left: 12px; right: 12px; background: var(--card); border-radius: 24px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 100; }
        
        /* Profil Formu (Sidebar İçinde) */
        #profile-section { display: none; }
        .photo-upload { width: 80px; height: 80px; background: #1E293B; border-radius: 20px; border: 2px dashed #06B6D4; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        
        /* Marker */
        .marker-ai { background: #000; border: 2px solid #06B6D4; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: #06B6D4; font-weight: 900; font-style: italic; }
    </style>
</head>
<body class="dark-mode"> <button onclick="toggleMenu()" class="fixed top-4 left-4 z-[500] bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-xl">
        <i data-lucide="menu" class="text-white"></i>
    </button>

    <button onclick="toggleTheme()" class="fixed top-4 right-4 z-[500] bg-slate-800 p-3 rounded-xl border border-slate-700 shadow-xl">
        <i data-lucide="sun" id="theme-icon" class="text-yellow-400"></i>
    </button>

    <div id="speed-overlay">
        <span id="live-speed" class="text-xl font-black">0</span>
        <span class="text-[9px] font-bold uppercase">km/s</span>
    </div>

    <button class="locate-btn" onclick="locateUser()"><i data-lucide="target"></i></button>

    <div id="sidebar" class="sidebar">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-black italic">KURYE<span class="text-cyan-500 text-xs">AI</span></h2>
            <button onclick="toggleMenu()"><i data-lucide="x"></i></button>
        </div>

        <div id="menu-list">
            <div class="menu-item" onclick="showProfile()"><i data-lucide="user-circle"></i> Profilim & Bilgiler</div>
            <div class="menu-item" onclick="showSoon('Online Platformlar')"><i data-lucide="globe"></i> Online Platformlar</div>
            <div class="menu-item" onclick="showSoon('Kazanç Defteri')"><i data-lucide="book"></i> Kurye Kazanç Defteri</div>
            <div class="menu-item" onclick="showSoon('Arıza Tespit')"><i data-lucide="wrench"></i> AI Arıza Tespit</div>
            <div class="menu-item" onclick="showSoon('Rapor')"><i data-lucide="file-text"></i> PDF Rapor Al</div>
            <div class="menu-item" onclick="location.reload()" class="mt-10 text-rose-400"><i data-lucide="log-out"></i> Çıkış Yap</div>
        </div>

        <div id="profile-section" class="mt-4 space-y-4">
            <button onclick="hideProfile()" class="text-xs text-cyan-400 mb-2 flex items-center gap-1"><i data-lucide="arrow-left" class="w-3"></i> Menüye Dön</button>
            <div class="flex flex-col items-center">
                <div class="photo-upload" onclick="document.getElementById('file-input').click()">
                    <img id="p-img" class="w-full h-full object-cover hidden">
                    <i id="p-plus" data-lucide="plus" class="text-cyan-500"></i>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <p class="text-[10px] mt-2 text-slate-400 uppercase font-bold">Fotoğrafı Güncelle</p>
            </div>
            <input type="text" id="p-ad" class="w-full bg-slate-800 p-4 rounded-xl text-white text-sm border-none" placeholder="Ad Soyad">
            <input type="text" id="p-plaka" class="w-full bg-slate-800 p-4 rounded-xl text-white text-sm border-none" placeholder="Plaka">
            <button onclick="saveProfile()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold text-xs uppercase">Bilgileri Güncelle</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-card">
        <div class="flex justify-between items-center mb-6">
            <div>
                <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Anlık Kazanç</p>
                <p id="earnings" class="text-3xl font-black italic text-slate-900">₺0,00</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Vardiya Süresi</p>
                <p id="timer" class="text-xl font-bold text-slate-800">00:00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6 border-t border-slate-100 pt-4 text-center">
            <div><p class="text-[9px] font-bold text-cyan-600 uppercase">Mesafe</p><p id="distance" class="font-bold text-slate-800">0.0 km</p></div>
            <div><p class="text-[9px] font-bold text-cyan-600 uppercase">Ort. Hız</p><p id="avg-speed" class="font-bold text-slate-800">0</p></div>
            <div><p class="text-[9px] font-bold text-rose-500 uppercase">Saat/₺</p><p id="hourly-rate" class="font-bold text-slate-800">₺0</p></div>
        </div>

        <button id="main-btn" onclick="handleShift()" class="w-full h-16 bg-[#0F172A] text-white rounded-2xl font-black uppercase flex items-center justify-center gap-3">
            <i data-lucide="zap" class="text-cyan-400 fill-cyan-400"></i> Vardiyayı Başlat
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let kuryeID = "KAI-BURAK", isActive = false, startTime, timerInterval;
        let totalDistance = 0, lastPos = null, speedSum = 0, speedCount = 0;
        let map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleTheme() { 
            document.body.classList.toggle('dark-mode'); 
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }

        function showProfile() { document.getElementById('menu-list').style.display='none'; document.getElementById('profile-section').style.display='block'; }
        function hideProfile() { document.getElementById('menu-list').style.display='block'; document.getElementById('profile-section').style.display='none'; }

        function handleShift() {
            if(!isActive) {
                isActive = true;
                startTime = Date.now();
                document.getElementById('main-btn').innerHTML = 'Vardiyayı Bitir';
                document.getElementById('main-btn').classList.add('bg-rose-600');
                timerInterval = setInterval(updateStats, 1000);
                startTracking();
            } else { location.reload(); }
        }

        function updateStats() {
            const diff = (Date.now() - startTime) / 1000;
            const h = Math.floor(diff/3600).toString().padStart(2,'0');
            const m = Math.floor((diff%3600)/60).toString().padStart(2,'0');
            const s = Math.floor(diff%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            
            // Saatlik Kazanç Hesaplama Aktif
            let totalHours = diff / 3600;
            let currentEarnings = (totalDistance * 18) + (totalHours * 150);
            document.getElementById('earnings').innerText = "₺" + currentEarnings.toFixed(2);
            document.getElementById('hourly-rate').innerText = "₺" + (totalHours > 0 ? (currentEarnings / totalHours).toFixed(0) : 0);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                const speed = p.coords.speed ? p.coords.speed * 3.6 : 0;
                document.getElementById('live-speed').innerText = Math.round(speed);
                
                if(isActive && speed > 2) {
                    speedSum += speed; speedCount++;
                    document.getElementById('avg-speed').innerText = Math.round(speedSum/speedCount);
                    if(lastPos) totalDistance += map.distance(lastPos, pos) / 1000;
                    document.getElementById('distance').innerText = totalDistance.toFixed(1) + " km";
                }
                lastPos = pos;
                map.panTo(pos);
            }, null, {enableHighAccuracy: true});
        }

        function locateUser() { if(lastPos) map.flyTo(lastPos, 17); }

        function saveProfile() {
            const data = { ad: document.getElementById('p-ad').value, plaka: document.getElementById('p-plaka').value };
            db.ref(`kuryeler/${kuryeID}/profil`).update(data).then(() => alert("Profil Güncellendi!"));
        }

        document.getElementById('file-input').addEventListener('change', e => {
            const file = e.target.files[0];
            const ref = storage.ref(`kuryeler/${kuryeID}/p.jpg`);
            ref.put(file).then(() => ref.getDownloadURL()).then(url => {
                document.getElementById('p-img').src = url;
                document.getElementById('p-img').classList.remove('hidden');
                document.getElementById('p-plus').classList.add('hidden');
                db.ref(`kuryeler/${kuryeID}/profil`).update({photo: url});
            });
        });
    </script>
</body>
</html>
