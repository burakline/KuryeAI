<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfd; color: #101828; }
        .sidebar-link:hover { background-color: #f9fafb; color: #7f56d9; }
        .active-link { background-color: #f9f5ff; color: #7f56d9; border-right: 3px solid #7f56d9; }
        .card-shadow { box-shadow: 0px 1px 3px rgba(16, 24, 40, 0.1), 0px 1px 2px rgba(16, 24, 40, 0.06); }
        #map { height: 100%; width: 100%; border-radius: 12px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #eaecf0; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden lg:flex">
        <div class="p-6">
            <div class="flex items-center gap-2 mb-8">
                <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">KuryeAI</span>
            </div>
            
            <nav class="space-y-1">
                <a href="#" class="active-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition">
                    <i data-lucide="home" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="#" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 transition">
                    <i data-lucide="navigation" class="w-5 h-5"></i> Canlı Takip
                </a>
                <a href="#" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 transition">
                    <i data-lucide="users" class="w-5 h-5"></i> Kuryeler
                </a>
                <a href="#" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium text-gray-600 transition">
                    <i data-lucide="credit-card" class="w-5 h-5"></i> Ödemeler
                </a>
            </nav>
        </div>

        <div class="mt-auto p-6 border-t border-gray-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center font-bold text-gray-700">A</div>
                <div class="overflow-hidden">
                    <p class="text-sm font-semibold truncate">Admin Panel</p>
                    <p class="text-xs text-gray-500">Yönetici</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col min-w-0 bg-[#fcfcfd]">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 sticky top-0 z-10">
            <h2 class="text-lg font-semibold text-gray-900">Genel Bakış</h2>
            <div class="flex items-center gap-3">
                <button class="p-2 text-gray-500 hover:bg-gray-50 rounded-lg relative">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
                <button onclick="toggleMobileMenu()" class="lg:hidden p-2 text-gray-500">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <div class="p-6 lg:p-10 space-y-8 overflow-y-auto custom-scrollbar">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-gray-200 card-shadow">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-blue-50 text-blue-600 rounded-xl"><i data-lucide="activity"></i></div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Aktif Kurye</p>
                            <h3 id="stat-active" class="text-2xl font-bold">0</h3>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-200 card-shadow">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-orange-50 text-orange-600 rounded-xl"><i data-lucide="alert-circle"></i></div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Şüpheli KM</p>
                            <h3 id="stat-alerts" class="text-2xl font-bold text-orange-600">0</h3>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-gray-200 card-shadow">
                    <div class="flex items-center gap-4">
                        <div class="p-3 bg-green-50 text-green-600 rounded-xl"><i data-lucide="banknote"></i></div>
                        <div>
                            <p class="text-sm font-medium text-gray-500">Toplam Kazanç</p>
                            <h3 id="stat-money" class="text-2xl font-bold">₺0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl border border-gray-200 card-shadow overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                    <h4 class="font-semibold text-gray-900 text-base">Son Vardiya Kayıtları</h4>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50/50">
                                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Kurye</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">KM (Manuel/GPS)</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider text-center">Durum</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider text-right">Detay</th>
                            </tr>
                        </thead>
                        <tbody id="driver-logs" class="divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="h-96 bg-white rounded-2xl border border-gray-200 card-shadow p-2">
                <div id="map"></div>
            </div>

        </div>
    </main>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        
        // Firebase Konfigürasyonu (Aynı Bilgiler)
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Veri Akışı
        db.ref('arsiv').on('value', snap => {
            const table = document.getElementById('driver-logs');
            table.innerHTML = "";
            let alertCount = 0;
            let totalMoney = 0;

            snap.forEach(driver => {
                driver.forEach(log => {
                    const d = log.val();
                    const isSupheli = Math.abs(d.manuelKM - d.gpsKM) > 3;
                    if(isSupheli) alertCount++;
                    totalMoney += parseFloat(d.kazanc || 0);

                    table.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4">
                                <p class="text-sm font-semibold text-gray-900 uppercase">${driver.key.replace('_',' ')}</p>
                                <p class="text-xs text-gray-500">${d.tarih}</p>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <p class="text-sm font-medium">M: ${d.manuelKM} / G: ${d.gpsKM}</p>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase tracking-tight ${isSupheli ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'}">
                                    ${isSupheli ? 'Sapma Var' : 'Onaylı'}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <button class="text-gray-400 hover:text-purple-600 transition"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
            document.getElementById('stat-alerts').innerText = alertCount;
            document.getElementById('stat-money').innerText = '₺' + totalMoney.toLocaleString();
            lucide.createIcons();
        });

        // Harita (Sade Tasarım)
        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);
    </script>
</body>
</html>
