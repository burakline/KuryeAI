<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI Pro - Saha Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; }
        #map { height: 50vh; width: 100%; z-index: 1; }
        .glass-card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        .moto-container { width: 34px; height: 34px; background: #000; border: 3px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #22d3ee; }
        .moto-container::after { content: "AI"; color: #22d3ee; font-size: 11px; font-weight: 900; }
        #sidebar { transition: transform 0.3s ease-in-out; z-index: 5000 !important; }
        .target-btn { width: 45px; height: 45px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; bottom: 15px; right: 15px; z-index: 1000; }
    </style>
</head>
<body class="bg-[#0f172a] text-white flex flex-col h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 transform -translate-x-full p-6 border-r border-slate-800">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
            <h2 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-3xl">✕</button>
        </div>
        <nav class="space-y-4">
            <button onclick="showSection('profile')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 transition">👤 Profilim</button>
            <button onclick="showSection('reports')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 transition">📊 Geçmiş Raporlar</button>
            <button onclick="showSection('earnings')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 transition">💰 Geçmiş Kazançlar</button>
        </nav>
    </div>

    <div id="km-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-6 z-[6000]">
        <div class="bg-slate-800 p-8 rounded-[40px] w-full max-w-sm border border-slate-700 space-y-5">
            <h3 id="km-title" class="text-xl font-black text-cyan-400">KM KAYDI</h3>
            <div class="space-y-2">
                <label id="file-label" class="block text-xs font-bold text-slate-400 uppercase tracking-widest"></label>
                <input type="file" capture="camera" id="km-photo" class="w-full text-sm text-slate-400 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:bg-cyan-600 file:text-white file:font-black">
            </div>
            <input type="number" id="km-input" placeholder="Kilometre Saati" class="w-full p-5 bg-slate-900 rounded-2xl border border-slate-700 font-bold text-xl outline-none focus:border-cyan-500 text-cyan-400">
            <button id="save-btn" class="w-full py-5 bg-emerald-600 rounded-2xl font-black uppercase tracking-widest text-lg shadow-2xl active:scale-95 transition">KAYDET</button>
        </div>
    </div>

    <header class="h-16 px-5 flex justify-between items-center glass-card relative z-[2000]">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="p-2 bg-slate-800/80 rounded-xl text-xl">☰</button>
            <h1 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h1>
        </div>
        <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-black bg-rose-500/10 text-rose-500 border border-rose-500/30">KAPALI</div>
    </header>

    <main class="flex-grow flex flex-col relative">
        <div class="relative flex-grow">
            <div id="map"></div>
            <button onclick="reCenter()" class="target-btn shadow-2xl">📍</button>
        </div>

        <div class="p-4 bg-slate-900 grid grid-cols-3 gap-2 border-t border-slate-800">
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-black">HIZ</p><p id="speed" class="text-xl font-black text-cyan-400">0</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-black">TOPLAM KM</p><p id="km-display" class="text-xl font-black text-yellow-400">0.0</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-black">SÜRE</p><p id="timer" class="text-xl font-black">00:00</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-black">ORT. HIZ</p><p id="avg-speed" class="text-xl font-black text-blue-400">0</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-black">S. KAZANÇ</p><p class="text-xl font-black text-emerald-400">₺215</p></div>
            <div class="glass-card p-3 rounded-2xl text-center"><p class="text-[9px] opacity-50 font-black">KAZANÇ</p><p id="earnings" class="text-xl font-black text-emerald-500">₺0</p></div>
        </div>

        <div class="p-4 grid grid-cols-2 gap-4 pb-10">
            <button id="btn-start" class="bg-emerald-600 py-5 rounded-2xl font-black uppercase text-sm tracking-tighter">Vardiya Başlat</button>
            <button id="btn-end" class="bg-rose-600 py-5 rounded-2xl font-black uppercase text-sm tracking-tighter">Vardiya Bitir</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, marker, pathLine, watchId, startTime, lastPos, startKM = 0, route = [];

        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#22d3ee', weight: 4, opacity: 0.7}).addTo(map);

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        }

        function track() {
            watchId = navigator.geolocation.watchPosition((pos) => {
                const current = [pos.coords.latitude, pos.coords.longitude];
                route.push(current);
                pathLine.setLatLngs(route); // Yol çizimi

                if (!marker) {
                    marker = L.marker(current, {icon: L.divIcon({className: '', html: '<div class="moto-container"></div>', iconSize: [34,34]})}).addTo(map);
                } else { marker.setLatLng(current); }
                
                map.panTo(current);
                document.getElementById('speed').innerText = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                lastPos = current;
            }, null, { enableHighAccuracy: true });
        }

        // KM İşlemleri
        let currentMode = '';
        document.getElementById('btn-start').onclick = () => { currentMode = 'start'; showKMModal(); };
        document.getElementById('btn-end').onclick = () => { currentMode = 'end'; showKMModal(); };

        function showKMModal() {
            document.getElementById('km-modal').style.display = 'flex';
            document.getElementById('file-label').innerText = currentMode === 'start' ? 'Vardiya Başlangıç KM' : 'Vardiya Bitiş KM';
        }

        document.getElementById('save-btn').onclick = () => {
            const val = parseFloat(document.getElementById('km-input').value);
            if(!val || !document.getElementById('km-photo').files[0]) { alert("Fotoğraf ve KM şart!"); return; }

            if(currentMode === 'start') {
                startKM = val;
                startTime = Date.now();
                track();
                document.getElementById('status-badge').innerText = "AÇIK";
                document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-black bg-emerald-500/10 text-emerald-400 border border-emerald-500/30";
                document.getElementById('btn-start').disabled = true;
                document.getElementById('btn-start').style.opacity = "0.5";
            } else {
                const totalDriven = val - startKM;
                const earned = (totalDriven * 8) + 150; // KM Başı 8TL + 150TL Bonus/Vardiya
                db.ref('arsiv/harun_kaya').push({
                    tarih: new Date().toLocaleString('tr-TR'),
                    alinan_km: totalDriven.toFixed(1),
                    kazanc: `₺${earned.toFixed(1)}`,
                    sure: document.getElementById('timer').innerText
                }).then(() => location.reload());
            }
            document.getElementById('km-modal').style.display = 'none';
        };

        setInterval(() => {
            if(startTime) {
                const diff = Date.now() - startTime;
                document.getElementById('timer').innerText = new Date(diff).toISOString().substr(11, 8);
            }
        }, 1000);

        function reCenter() { if(lastPos) map.setView(lastPos, 17); }
    </script>
</body>
</html>
