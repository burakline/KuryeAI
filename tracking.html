<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Takip</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';overflow:hidden}

/* HARİTA */
#map{width:100%;height:100vh}

/* ÜST PANEL */
.top{
position:absolute;
top:15px;left:50%;
transform:translateX(-50%);
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
z-index:2;
}

/* ETA */
.eta{
font-size:26px;
font-weight:bold;
color:#00c2ff;
}

/* PROGRESS */
.bar{
width:200px;
height:8px;
background:#eee;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.fill{
height:100%;
background:#00c2ff;
width:0%;
transition:1s;
}

/* STATUS */
.status{
font-size:13px;
color:#666;
margin-top:5px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="top">
<div class="eta" id="eta">-- dk</div>
<div class="bar"><div class="fill" id="bar"></div></div>
<div class="status">Kurye size geliyor 🚀</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const params = new URLSearchParams(window.location.search);
const orderId = params.get("id");

let courierMarker;
let startDistance = null;

/* 📦 ORDER */
onSnapshot(doc(db,"orders",orderId), orderSnap=>{
const o = orderSnap.data();
if(!o || !o.courierEmail) return;

/* 🚴 COURIER */
onSnapshot(doc(db,"couriers",o.courierEmail), courierSnap=>{
const c = courierSnap.data();
if(!c) return;

/* MARKER */
if(courierMarker){
courierMarker.setLatLng([c.lat,c.lng]);
}else{
courierMarker = L.marker([c.lat,c.lng]).addTo(map);
}

/* 📍 HARİTA MERKEZ */
map.setView([c.lat,c.lng],15);

/* 📏 MESAFE */
const dist = Math.sqrt(
Math.pow(c.lat - o.lat,2)+
Math.pow(c.lng - o.lng,2)
);

/* 📊 başlangıç mesafesi */
if(!startDistance) startDistance = dist;

/* ⏱ ETA */
const eta = Math.max(1, Math.round((dist/40)*60));
document.getElementById("eta").innerText = eta+" dk";

/* 📈 PROGRESS */
const progress = 100 - ((dist/startDistance)*100);
document.getElementById("bar").style.width = progress+"%";

});

});

</script>

</body>
</html>
