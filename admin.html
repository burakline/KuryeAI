<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{margin-bottom:20px;}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.ok{background:#00d4ff;}
.no{background:#ef4444;}

</style>
</head>

<body>

<h1>Başvurular</h1>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// 🔥 Firebase config
const config = {
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

// ANA APP
const app = initializeApp(config);

// 🔥 SECOND APP (KRİTİK!)
const secondaryApp = initializeApp(config, "Secondary");

const db = getFirestore(app);

// 🔥 AUTHLAR
const secondaryAuth = getAuth(secondaryApp);

const list = document.getElementById("list");

// 🚀 BAŞVURULARI YÜKLE
async function load(){
list.innerHTML="Yükleniyor...";

const snap = await getDocs(collection(db,"applications"));

list.innerHTML="";

snap.forEach(d=>{
const appData = d.data();
appData.id = d.id;

list.innerHTML += `
<div class="card">
<b>${appData.name}</b><br>
${appData.email}<br>

<button class="ok" onclick='approve(${JSON.stringify(appData)})'>Onayla</button>
<button class="no" onclick='reject("${appData.id}")'>Reddet</button>
</div>
`;
});
}

// 🚀 ONAYLA (FULL OTOMATİK)
window.approve = async (appData)=>{
try{

// 1️⃣ AUTH USER OLUŞTUR
const userCred = await createUserWithEmailAndPassword(
secondaryAuth,
appData.email,
"123456"
);

const uid = userCred.user.uid;

// 2️⃣ USERS EKLE
await setDoc(doc(db,"users",uid),{
email:appData.email,
name:appData.name,
role:"courier"
});

// 3️⃣ COURIERS EKLE
await setDoc(doc(db,"couriers",uid),{
name:appData.name,
phone: appData.phone || "",
lat:0,
lng:0,
online:false,
createdAt:new Date()
});

// 4️⃣ APPLICATION SİL
await deleteDoc(doc(db,"applications",appData.id));

alert("✅ Kurye otomatik oluşturuldu!");

load();

}catch(e){
alert("❌ Hata: "+e.message);
}
};

// ❌ REDDET
window.reject = async (id)=>{
await deleteDoc(doc(db,"applications",id));
load();
};

load();

</script>

</body>
</html>
