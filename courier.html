<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI - Saha Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #0f172a; color: white; overflow-x: hidden; font-family: sans-serif; }
        #map { height: 420px; border-radius: 2.5rem; z-index: 1; border: 2px solid rgba(34, 211, 238, 0.1); margin-top: 10px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        
        /* 80 KM Hız Tabelası */
        .speed-limit-sign { 
            width: 50px; height: 50px; border: 5px solid red; background: white; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: black; font-weight: 900; font-size: 18px; animation: blink 0.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        /* 3D Turkuaz/Siyah Moto İkon */
        .moto-container {
            width: 45px; height: 45px; background: #000; border: 3px solid #22d3ee;
            border-radius: 12px; position: relative; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(34, 211, 238, 0.4);
        }
        .moto-container::after { content: "AI"; color: #22d3ee; font-size: 12px; font-weight: 900; }
    </style>
</head>
<body class="pb-32">

    <header class="p-4 flex justify-between items-center border-b border-slate-800 glass-card sticky top-0 z-50">
        <h1 class="text-2xl font-black text-cyan-400 italic tracking-tighter">KuryeAI</h1>
        <div class="flex items-center gap-4">
            <div id="speed-alert" class="hidden"><div class="speed-limit-sign">80</div></div>
            <span id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-black bg-red-500/20 text-red-400 border border-red-500/50 uppercase">Kapalı</span>
        </div>
    </header>

    <main class="p-4 space-y-4">
        <div class="relative">
            <div id="map" class="shadow-2xl shadow-cyan-900/40"></div>
            <button onclick="reCenter()" class="absolute bottom-6 left-6 z-[40] bg-white p-3 rounded-full shadow-xl active:scale-90 transition-all">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="3"><path d="M21 10h-5.58l3.29-3.29a1 1 0 0 0-1.42-1.42L14 8.58V3a1 1 0 0 0-2 0v5.58l-3.29-3.29a1 1 0 0 0-1.42 1.42L10.58 12H5a1 1 0 0 0 0 2h5.58l-3.29 3.29a1 1 0 0 0 1.42 1.42L12 15.42V21a1 1 0 0 0 2 0v-5.58l3.29 3.29a1 1 0 0 0 1.42-1.42L15.42 14H21a1 1 0 0 0 0-2z"/></svg>
            </button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="glass-card p-4 rounded-3xl text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Hız</p>
                <p id="speed-display" class="text-2xl font-black text-cyan-400">0</p>
            </div>
            <div class="glass-card p-4 rounded-3xl text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Kazanç</p>
                <p id="earning-display" class="text-2xl font-black text-emerald-400">₺0</p>
            </div>
            <div class="glass-card p-4 rounded-3xl text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Süre</p>
                <p id="timer-display" class="text-2xl font-black">00:00</p>
            </div>
            <div class="glass-card p-4 rounded-3xl text-center">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Mesafe</p>
                <p id="km-display" class="text-2xl font-black">0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button id="start-shift" class="bg-emerald-600 py-5 rounded-3xl font-black uppercase shadow-lg active:scale-95 transition-all">Vardiya Başlat</button>
            <button id="end-shift" class="bg-rose-600 py-5 rounded-3xl font-black uppercase shadow-lg active:scale-95 transition-all">Vardiya Bitir</button>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Senin Firebase Config Bilgilerin (Entegre Edildi)
        const firebaseConfig = {
            apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
            authDomain: "kuryeai.firebaseapp.com",
            databaseURL: "https://kuryeai-default-rtdb.firebaseio.com",
            projectId: "kuryeai",
            storageBucket: "kuryeai.firebasestorage.app",
            messagingSenderId: "655930514402",
            appId: "1:655930514402:web:379321cbb83f48daf077bb",
            measurementId: "G-JYQP30LJG3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, kuryeMarker, pathLine, watchId, timerInterval;
        let startTime, totalDist = 0, lastPos = null, route = [];
        let autoFollow = true;

        // Harita Kurulumu
        map = L.map('map', { zoomControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#22d3ee', weight: 5, opacity: 0.8}).addTo(map);

        // Manuel kontrol algılama
        map.on('dragstart', () => autoFollow = false);
        function reCenter() { autoFollow = true; if(lastPos) map.setView(lastPos, 17); }

        function track() {
            watchId = navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                const currentPos = [latitude, longitude];

                document.getElementById('speed-display').innerText = kmh;
                // Hız Sınırı Uyarısı (80 KM)
                document.getElementById('speed-alert').classList.toggle('hidden', kmh <= 80);

                if (autoFollow) map.setView(currentPos, 17);

                // Özel Moto İkonu
                const icon = L.divIcon({ className: '', html: `<div class="moto-container"></div>`, iconSize: [45, 45] });
                if (kuryeMarker) map.removeLayer(kuryeMarker);
                kuryeMarker = L.marker(currentPos, {icon: icon}).addTo(map)
                    .bindPopup(`<b style="color:black">Harun Kaya</b><br><span style="color:gray">Tava Makarna</span>`).openPopup();

                // Firebase Canlı Takip Verisi
                db.ref('canli_takip/harun_kaya').set({ 
                    lat: latitude, 
                    lng: longitude, 
                    hiz: kmh, 
                    zaman: Date.now() 
                });

                // Mesafe Hesabı (Sadece hareketliyken)
                if (lastPos && kmh > 3) {
                    const d = L.latLng(lastPos).distanceTo(L.latLng(currentPos)) / 1000;
                    totalDist += d;
                    document.getElementById('km-display').innerText = totalDist.toFixed(2);
                    route.push(currentPos);
                    pathLine.setLatLngs(route);
                }
                lastPos = currentPos;
            }, (err) => console.error(err), { enableHighAccuracy: true });
        }

        document.getElementById('start-shift').onclick = function() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const hours = diff / 3600000;
                // Saatlik 215 TL + KM Başı 8 TL Hesabı
                document.getElementById('timer-display').innerText = new Date(diff).toISOString().substr(11, 8);
                document.getElementById('earning-display').innerText = `₺${((hours * 215) + (totalDist * 8)).toFixed(1)}`;
            }, 1000);
            
            track();
            this.disabled = true; 
            this.style.opacity = "0.5";
            document.getElementById('status-badge').innerText = "AÇIK";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-black bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 uppercase";
        };

        document.getElementById('end-shift').onclick = function() {
            const paket = prompt("Bugün toplam kaç paket attınız?");
            const ciro = prompt("Taşınan toplam sipariş cirosu nedir?");
            
            if(paket && ciro) {
                const data = {
                    tarih: new Date().toLocaleString('tr-TR'),
                    sure: document.getElementById('timer-display').innerText,
                    km: totalDist.toFixed(2),
                    kazanc: document.getElementById('earning-display').innerText,
                    paket_sayisi: paket,
                    toplam_ciro: ciro,
                    ort_km_basina_paket: (totalDist / paket).toFixed(2)
                };

                // Firebase Arşiv Kaydı
                db.ref('arsiv/harun_kaya').push(data).then(() => {
                    alert("Veriler Firebase bulutuna güvenle kaydedildi! İyi istirahatler Harun.");
                    location.reload();
                });
            }
        };
    </script>
</body>
</html>
