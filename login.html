<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Login</title>

<style>
body{margin:0;background:#0f2027;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#020617;padding:30px;border-radius:20px;width:90%;max-width:400px}
input{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px}
button{width:100%;padding:12px;margin-top:15px;border:none;border-radius:10px;background:#00ff9c;font-weight:bold}
.switch{margin-top:10px;text-align:center;cursor:pointer}
</style>
</head>

<body>

<div class="box">
<h2>🚀 KuryeAI</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<div class="switch" onclick="toggleMode()" id="modeText">
Hesabın yok mu? Kayıt ol
</div>

</div>

<script type="module">
import "./firebase.js";

let isLogin = true;

window.login = function(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(isLogin){
    window.loginUser(email, password);
  }else{
    window.registerUser(email, password);
  }

};

window.toggleMode = function(){
  isLogin = !isLogin;

  document.getElementById("modeText").innerText =
    isLogin ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap";
};

</script>

</body>
</html>
