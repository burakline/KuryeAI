<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI</title>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0A0A0A;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* CARD */
.container{
width:90%;
max-width:350px;
padding:25px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);

box-shadow:0 0 40px rgba(0,194,168,0.15);
}

/* TITLE */
h1{
text-align:center;
margin-bottom:20px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00C2A8;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
box-shadow:0 0 20px #00C2A8;
}

/* SWITCH */
.switch{
text-align:center;
margin-top:10px;
font-size:14px;
cursor:pointer;
color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 KuryeAI</h1>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<div class="switch" onclick="toggleMode()" id="modeText">
Hesabın yok mu? Kayıt ol
</div>

</div>

<script type="module">

import "./firebase.js";

let isLogin = true;

/* LOGIN */
window.login = function(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(isLogin){
window.loginUser(email,password,true);
}else{
window.registerUser(email,password);
}

};

/* TOGGLE */
window.toggleMode = function(){

isLogin = !isLogin;

document.querySelector("button").innerText =
isLogin ? "Giriş Yap" : "Kayıt Ol";

document.getElementById("modeText").innerText =
isLogin ? "Hesabın yok mu? Kayıt ol" : "Zaten hesabın var mı? Giriş yap";

};

</script>

</body>
</html>
