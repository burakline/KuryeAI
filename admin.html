<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:white;
}

/* HEADER */
.header{
padding:15px;
font-size:20px;
font-weight:bold;
}

/* CONTENT */
.container{
padding:15px;
padding-bottom:80px;
}

/* CARD */
.card{
background:#0f172a;
padding:15px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* MAP */
.map-card{
overflow:hidden;
border-radius:16px;
}

#map{
width:100%;
height:250px;
}

/* BUTTON */
.btn{
background:#00d4ff;
border:none;
padding:10px 14px;
border-radius:8px;
margin-right:5px;
margin-top:10px;
cursor:pointer;
}

/* TITLE */
.title{
font-size:22px;
margin-bottom:10px;
}

/* BOTTOM NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#020617;
display:flex;
justify-content:space-around;
padding:10px 0;
border-top:1px solid #1e293b;
}

.nav button{
background:none;
border:none;
color:#94a3b8;
font-size:14px;
}

.nav button.active{
color:#00d4ff;
}
</style>
</head>

<body>

<div class="header">KuryeAI 🚀</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="title">Canlı Sistem</div>

<div class="card map-card">
<div id="map"></div>
</div>

</div>

<!-- APPLICATIONS -->
<div id="apps" style="display:none">

<div class="title">Başvurular</div>

<div id="appList"></div>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button id="navDash" class="active" onclick="show('dashboard')">Dashboard</button>
<button id="navApps" onclick="show('apps')">Başvurular</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* NAV */
window.show=id=>{
dashboard.style.display="none";
apps.style.display="none";

navDash.classList.remove("active");
navApps.classList.remove("active");

if(id==="dashboard"){
navDash.classList.add("active");
}else{
navApps.classList.add("active");
}

document.getElementById(id).style.display="block";
}

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* APPLICATIONS */
onSnapshot(collection(db,"applications"),snap=>{
appList.innerHTML="";

snap.forEach(d=>{
const a=d.data();

appList.innerHTML+=`
<div class="card">
<b>${a.name || "İsimsiz"}</b><br>
${a.email || "Mail yok"}<br>

<button class="btn">Onayla</button>
<button class="btn">Reddet</button>
</div>`;
});

});

</script>

</body>
</html>
