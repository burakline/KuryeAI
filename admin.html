<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';display:flex;background:#020617;color:white;transition:.3s}
.light{background:#f1f5f9;color:#000}

.sidebar{width:240px;background:#020617;padding:20px;height:100vh}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:none;border:none;color:#94a3b8;cursor:pointer;border-radius:8px}
.sidebar button:hover{background:#0ea5e9;color:white}

.content{flex:1;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px}
.light .card{background:#fff}

#map{height:400px;border-radius:12px}

.toast{
position:fixed;
top:20px;
right:20px;
background:#0ea5e9;
padding:12px;
border-radius:10px;
display:none;
}
</style>
</head>

<body>

<div class="sidebar">
<h2 style="color:#00d4ff">KuryeAI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('performance')">Performans</button>
<button onclick="toggleTheme()">🌗 Tema</button>
</div>

<div class="content">

<div id="dashboard">
<h2>🚀 Canlı Sistem</h2>
<div id="map"></div>
<div id="orders"></div>
</div>

<div id="performance" style="display:none">
<h2>📊 Performans</h2>
<div id="stats"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* NAV */
window.show=id=>{
document.getElementById("dashboard").style.display="none";
document.getElementById("performance").style.display="none";
document.getElementById(id).style.display="block";
}

/* THEME */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
}

/* TOAST */
function toast(msg){
const t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

/* MAP */
const map = L.map('map').setView([39.92,32.85], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let couriers={};
let lastMove={};

/* 🚗 COURIER TRACK */
onSnapshot(collection(db,"couriers"), snap=>{
snap.forEach(d=>{
const c=d.data();
if(!c.lat) return;

if(couriers[d.id]){
couriers[d.id].setLatLng([c.lat,c.lng]);
}else{
couriers[d.id]=L.circleMarker([c.lat,c.lng],{color:"cyan"})
.addTo(map)
.bindPopup(c.name);
}

const now=Date.now();
if(lastMove[d.id] && now-lastMove[d.id]>15000){
couriers[d.id].setStyle({color:"red"});
toast(c.name+" hareketsiz!");
}
lastMove[d.id]=now;
});
});

/* 🍔 RESTAURANTS */
onSnapshot(collection(db,"restaurants"), snap=>{
snap.forEach(d=>{
const r=d.data();
if(!r.lat) return;

L.marker([r.lat,r.lng]).addTo(map).bindPopup(r.name);
});
});

/* 📦 ORDERS */
onSnapshot(collection(db,"orders"), snap=>{
const div=document.getElementById("orders");
div.innerHTML="";

let count=0;

snap.forEach(d=>{
const o=d.data();
count++;

div.innerHTML+=`
<div class="card">
${o.product}<br>
<button onclick="ai(${o.lat},${o.lng},'${d.id}')">AI Atama</button>
</div>
`;
});

document.getElementById("stats").innerHTML=`
Toplam sipariş: ${count}
`;
});

/* 🤖 AI */
window.ai=(lat,lng,id)=>{
let best=null,min=999;

for(const c in couriers){
const p=couriers[c]._latlng;
const dist=Math.hypot(p.lat-lat,p.lng-lng);
if(dist<min){min=dist;best=c;}
}

if(best){
updateDoc(doc(db,"orders",id),{courier:best});
toast("AI kurye atadı");
}
}

</script>

</body>
</html>
