<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{margin-bottom:20px;}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.ok{background:#00d4ff;}
.no{background:#ef4444;}

</style>
</head>

<body>

<h1>Başvurular</h1>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

const list = document.getElementById("list");

async function load(){
list.innerHTML="Yükleniyor...";

const snap = await getDocs(collection(db,"applications"));

list.innerHTML="";

snap.forEach(d=>{
const app = d.data();
app.id = d.id;

list.innerHTML += `
<div class="card">
<b>${app.name}</b><br>
${app.email}<br>

<button class="ok" onclick='approve(${JSON.stringify(app)})'>Onayla</button>
<button class="no" onclick='reject("${app.id}")'>Reddet</button>
</div>
`;
});
}

window.approve = async (app)=>{
try{

// 1️⃣ couriers
await setDoc(doc(db,"couriers",app.id),{
...app,
status:"active",
lat:0,
lng:0
});

// 2️⃣ users
await setDoc(doc(db,"users",app.id),{
email:app.email,
name:app.name,
role:"courier"
});

// 3️⃣ applications sil
await deleteDoc(doc(db,"applications",app.id));

// 4️⃣ ADMIN'E BİLGİ
alert(`✅ Kurye hazır!

🔥 Şimdi son adım:

Firebase → Authentication → Users → Add user

Email: ${app.email}
Şifre: 123456`);

load();

}catch(e){
alert("HATA: "+e.message);
}
};

window.reject = async (id)=>{
await deleteDoc(doc(db,"applications",id));
load();
};

load();

</script>

</body>
</html>
