<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI Pro - Saha Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { darkBg: '#0f172a', lightBg: '#f8fafc' } } }
        }
    </script>

    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; font-family: sans-serif; }
        #map { height: 48vh; width: 100%; z-index: 1; }
        .glass-card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.4); }
        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; }
        .moto-container { width: 32px; height: 32px; background: #000; border: 2.5px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #22d3ee; }
        .moto-container::after { content: "AI"; color: #22d3ee; font-size: 11px; font-weight: 900; }
        .target-btn { width: 44px; height: 44px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body class="dark bg-darkBg text-white transition-colors duration-300 flex flex-col">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 shadow-2xl transform -translate-x-full p-6 space-y-6 border-r border-slate-800">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h2 class="text-2xl font-black text-cyan-400">KuryeAI</h2>
            <button onclick="toggleSidebar()" class="text-slate-400 p-2 text-2xl">✕</button>
        </div>
        <div class="space-y-3">
            <button onclick="showSection('profile')" class="w-full text-left p-4 rounded-2xl hover:bg-slate-800 flex items-center gap-3 transition-colors">👤 Profilim</button>
            <button onclick="showSection('reports')" class="w-full text-left p-4 rounded-2xl hover:bg-slate-800 flex items-center gap-3 transition-colors">📊 Geçmiş Raporlar</button>
            <button onclick="showSection('earnings')" class="w-full text-left p-4 rounded-2xl hover:bg-slate-800 flex items-center gap-3 transition-colors">💰 Geçmiş Kazançlar</button>
        </div>
        <div class="pt-10 space-y-4 border-t border-slate-800">
            <button onclick="toggleTheme()" id="theme-btn" class="w-full py-4 rounded-2xl border border-slate-700 font-bold">🌙 Karanlık Mod</button>
            <button onclick="location.reload()" class="w-full py-4 bg-rose-600/10 text-rose-500 rounded-2xl font-black border border-rose-600/30">🚪 Oturumu Kapat</button>
        </div>
    </div>

    <header class="h-16 px-5 flex justify-between items-center glass-card z-[1001]">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="p-2.5 bg-slate-800/60 rounded-xl">
                <svg width="24" height="24" fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <h1 class="text-2xl font-black text-cyan-400 italic tracking-tighter">KuryeAI</h1>
        </div>
        <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-black bg-rose-500/10 text-rose-500 border border-rose-500/30 uppercase tracking-widest">KAPALI</div>
    </header>

    <main class="flex-grow flex flex-col relative overflow-hidden">
        <div id="map"></div>
        <button onclick="reCenter()" class="target-btn absolute bottom-4 right-4 z-[40] active:scale-90 transition-transform">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="3"><circle cx="12" cy="12" r="8"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        </button>

        <div class="p-4 bg-darkBg grid grid-cols-3 gap-2 border-t border-slate-800/50 shadow-2xl">
            <div class="glass-card p-3 rounded-2xl text-center">
                <p class="text-[9px] opacity-50 font-bold uppercase">Anlık Hız</p>
                <p id="speed-display" class="text-xl font-black text-cyan-400 tracking-tight">0</p>
            </div>
            <div class="glass-card p-3 rounded-2xl text-center">
                <p class="text-[9px] opacity-50 font-bold uppercase">Toplam KM</p>
                <p id="km-display" class="text-xl font-black text-yellow-400">0.0</p>
            </div>
            <div class="glass-card p-3 rounded-2xl text-center">
                <p class="text-[9px] opacity-50 font-bold uppercase">Süre</p>
                <p id="timer-display" class="text-xl font-black">00:00</p>
            </div>
            <div class="glass-card p-3 rounded-2xl text-center">
                <p class="text-[9px] opacity-50 font-bold uppercase">Ort. Hız</p>
                <p id="avg-speed-display" class="text-xl font-black text-blue-400">0</p>
            </div>
            <div class="glass-card p-3 rounded-2xl text-center">
                <p class="text-[9px] opacity-50 font-bold uppercase">S. Kazanç</p>
                <p class="text-xl font-black text-emerald-400">₺215</p>
            </div>
            <div class="glass-card p-3 rounded-2xl text-center">
                <p class="text-[9px] opacity-50 font-bold uppercase">Kazanç</p>
                <p id="earning-display" class="text-xl font-black text-emerald-500">₺0</p>
            </div>
        </div>

        <div class="px-4 pb-10 pt-2 grid grid-cols-2 gap-4">
            <button id="start-shift" class="bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl transition-all">Vardiya Başlat</button>
            <button id="end-shift" class="bg-rose-600 hover:bg-rose-500 py-4 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl transition-all">Vardiya Bitir</button>
        </div>
    </main>

    <div id="history-modal" class="fixed inset-0 bg-black/95 z-[3000] hidden p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <h2 id="modal-title" class="text-2xl font-black text-cyan-400 uppercase"></h2>
            <button onclick="closeModal()" class="text-3xl text-slate-400">✕</button>
        </div>
        <div id="modal-list" class="space-y-4"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
            authDomain: "kuryeai.firebaseapp.com",
            databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "kuryeai",
            storageBucket: "kuryeai.firebasestorage.app",
            messagingSenderId: "655930514402",
            appId: "1:655930514402:web:379321cbb83f48daf077bb",
            measurementId: "G-JYQP30LJG3"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let wakeLock = null, map, kuryeMarker, watchId, startTime, totalDist = 0, lastPos = null, speedLogs = [];

        function toggleSidebar() { 
            const s = document.getElementById('sidebar');
            s.style.transform = (s.style.transform === 'translateX(0px)') ? 'translateX(-100%)' : 'translateX(0px)';
        }
        function closeModal() { document.getElementById('history-modal').classList.add('hidden'); }
        function toggleTheme() { document.body.classList.toggle('dark'); }

        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function track() {
            watchId = navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, speed } = pos.coords;
                const kmh = speed ? Math.round(speed * 3.6) : 0;
                if(kmh > 0) speedLogs.push(kmh);
                document.getElementById('speed-display').innerText = kmh;
                
                const currentPos = [latitude, longitude];
                map.setView(currentPos, 17);
                
                const icon = L.divIcon({ className: '', html: `<div class="moto-container"></div>`, iconSize: [32, 32] });
                if (kuryeMarker) map.removeLayer(kuryeMarker);
                kuryeMarker = L.marker(currentPos, {icon: icon}).addTo(map);
                
                if (lastPos && kmh > 2) {
                    totalDist += L.latLng(lastPos).distanceTo(L.latLng(currentPos)) / 1000;
                    document.getElementById('km-display').innerText = totalDist.toFixed(1);
                }
                lastPos = currentPos;
                const avgSpeed = speedLogs.length > 0 ? Math.round(speedLogs.reduce((a, b) => a + b) / speedLogs.length) : 0;
                document.getElementById('avg-speed-display').innerText = avgSpeed;
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('start-shift').onclick = function() {
            startTime = Date.now();
            if ('wakeLock' in navigator) navigator.wakeLock.request('screen');
            track();
            setInterval(() => {
                const diff = Date.now() - startTime;
                document.getElementById('timer-display').innerText = new Date(diff).toISOString().substr(11, 8);
                document.getElementById('earning-display').innerText = `₺${((diff/3600000)*215 + totalDist*8).toFixed(1)}`;
            }, 1000);
            document.getElementById('status-badge').innerText = "AÇIK";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-black bg-emerald-500/10 text-emerald-500 border border-emerald-500/30 uppercase tracking-widest";
            this.disabled = true; this.style.opacity = "0.5";
        };

        async function showSection(type) {
            toggleSidebar();
            const modal = document.getElementById('history-modal');
            const title = document.getElementById('modal-title');
            const list = document.getElementById('modal-list');
            modal.classList.remove('hidden');
            list.innerHTML = `<p class="text-center opacity-50 py-10">Veriler getiriliyor...</p>`;

            if(type === 'profile') {
                title.innerText = "PROFİLİM";
                list.innerHTML = `<div class="glass-card p-6 rounded-3xl space-y-4 border-cyan-500/30">
                    <div class="flex items-center gap-4 border-b border-slate-700 pb-4">
                        <div class="w-16 h-16 bg-cyan-500 rounded-full flex items-center justify-center text-3xl">👤</div>
                        <div><h3 class="text-xl font-bold">Harun Kaya</h3><p class="text-xs text-cyan-400">KuryeID: #06-42</p></div>
                    </div>
                    <div class="space-y-3 text-sm">
                        <p class="flex justify-between"><span>Bölge:</span> <span class="text-slate-300">Ankara</span></p>
                        <p class="flex justify-between"><span>Puan:</span> <span class="text-yellow-400">⭐ 4.9</span></p>
                        <p class="flex justify-between"><span>Durum:</span> <span class="text-emerald-400 font-bold">Aktif</span></p>
                    </div>
                </div>`;
                return;
            }

            const snapshot = await db.ref('arsiv/harun_kaya').limitToLast(10).once('value');
            const data = snapshot.val();
            list.innerHTML = "";
            if (!data) { list.innerHTML = "Kayıt bulunamadı."; return; }

            Object.values(data).reverse().forEach(item => {
                const card = document.createElement('div');
                card.className = "glass-card p-4 rounded-2xl border-l-4 " + (type === 'earnings' ? 'border-emerald-500' : 'border-cyan-500');
                if(type === 'earnings') {
                    title.innerText = "GEÇMİŞ KAZANÇLAR";
                    card.innerHTML = `<div class="flex justify-between items-center"><div><p class="text-[10px] opacity-50">${item.tarih}</p><p class="font-bold">${item.paket} Paket</p></div><b class="text-xl text-emerald-400">${item.kazanc}</b></div>`;
                } else {
                    title.innerText = "GEÇMİŞ RAPORLAR";
                    card.innerHTML = `<div class="text-[10px] opacity-50">${item.tarih}</div><div class="flex justify-between mt-2 font-bold text-sm"><span>${item.km} KM</span><span>${item.sure}</span><span class="text-cyan-400">${item.paket} Paket</span></div>`;
                }
                list.appendChild(card);
            });
        }

        document.getElementById('end-shift').onclick = function() {
            const p = prompt("Vardiya bitti! Toplam kaç paket attın?");
            if(p) {
                db.ref('arsiv/harun_kaya').push({
                    tarih: new Date().toLocaleString('tr-TR'),
                    kazanc: document.getElementById('earning-display').innerText,
                    km: totalDist.toFixed(1),
                    sure: document.getElementById('timer-display').innerText,
                    paket: p
                }).then(() => location.reload());
            }
        };

        function reCenter() { if(lastPos) map.setView(lastPos, 17); }
    </script>
</body>
</html>
