<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI v12 - Full Sistem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background: #0f172a; font-family: sans-serif; }
        #map { height: 40vh; width: 100%; z-index: 1; }
        .stat-card { background: rgba(30, 41, 59, 0.7); border-radius: 1.2rem; padding: 1rem 0.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        #sidebar { transition: transform 0.3s ease; z-index: 9999; }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 0.75rem; width: 100%; color: white; font-size: 0.875rem; }
        .section-view { display: none; height: calc(100vh - 64px); overflow-y: auto; background: #0f172a; padding: 20px; }
        .active-view { display: block !important; }
    </style>
</head>
<body class="text-white flex flex-col h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 transform -translate-x-full p-6 border-r border-slate-800 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-3xl">✕</button>
        </div>
        <nav class="space-y-2 flex-grow overflow-y-auto">
            <button onclick="showPage('profile')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3">👤 Profilim</button>
            <button onclick="showPage('reports')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3">📊 Geçmiş Raporlar</button>
            <button onclick="showPage('earnings')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3">💰 Geçmiş Kazançlar</button>
            <hr class="border-slate-800 my-2">
            <button onclick="showPage('platforms')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3">📱 Platformlar</button>
            <button onclick="showPage('tools')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3">🔧 Araçlar</button>
            <button onclick="showPage('pdf')" class="w-full text-left p-3 rounded-xl hover:bg-slate-800 flex items-center gap-3">📄 PDF Rapor</button>
            <button onclick="showPage('main')" class="w-full text-center p-3 rounded-xl bg-cyan-600 font-bold mt-4">ANA EKRAN</button>
        </nav>
        <button onclick="logout()" class="w-full p-4 bg-rose-900/40 text-rose-400 border border-rose-800 rounded-2xl font-bold mt-4">🚪 Oturumu Kapat</button>
    </div>

    <header class="h-16 px-5 flex justify-between items-center bg-slate-900/90 z-[2000]">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h1 class="text-xl font-black text-cyan-400 italic">KuryeAI</h1>
        <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-bold bg-rose-500/20 text-rose-500 border border-rose-500/50">KAPALI</div>
    </header>

    <main id="main-view" class="section-view active-view p-0">
        <div id="map"></div>
        <div class="px-4 py-4 space-y-3 bg-slate-900/60">
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-start" onclick="startShift()" class="bg-emerald-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Vardiya Başlat</button>
                <button id="btn-end" onclick="endShift()" class="bg-rose-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest opacity-30" disabled>Vardiya Bitir</button>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="sendEmergency('Kaza Yaptım')" class="bg-rose-800/80 py-3 rounded-xl font-bold text-[9px] uppercase">⚠️ Kaza Yaptım</button>
                <button onclick="sendEmergency('Aracım Arıza Yaptı')" class="bg-orange-800/80 py-3 rounded-xl font-bold text-[9px] uppercase">🛠 Aracım Arıza Yaptı</button>
            </div>
        </div>
        <div class="p-4 grid grid-cols-3 gap-2">
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold">HIZ</p><p id="speed" class="text-xl font-black text-cyan-400">0</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold">TOPLAM KM</p><p id="km-display" class="text-xl font-black text-yellow-400">0.00</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold">SÜRE</p><p id="timer" class="text-xl font-black">00:00:00</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold">ORT. HIZ</p><p id="avg-speed" class="text-xl font-black text-blue-400">0</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold">SAATLİK KAZANÇ</p><p id="hourly-rate" class="text-lg font-black text-emerald-400">₺0</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold">KAZANÇ</p><p id="earnings" class="text-xl font-black text-emerald-500">₺0.0</p></div>
        </div>
    </main>

    <div id="profile-view" class="section-view">
        <h2 class="text-xl font-bold mb-4 border-b border-slate-800 pb-2">Kişisel Bilgiler</h2>
        <div class="space-y-4 pb-20">
            <div><label class="text-[10px] text-slate-400 uppercase">Ad Soyad</label><input type="text" id="p-ad" class="input-field"></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="text-[10px] text-slate-400 uppercase">Doğum Tarihi</label><input type="date" id="p-dt" class="input-field"></div>
                <div><label class="text-[10px] text-slate-400 uppercase">Doğum Yeri</label><input type="text" id="p-dy" class="input-field"></div>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="text-[10px] text-slate-400 uppercase">Medeni Durum</label><select id="p-medeni" class="input-field"><option>Bekar</option><option>Evli</option></select></div>
                <div><label class="text-[10px] text-slate-400 uppercase">Kan Grubu</label><input type="text" id="p-kan" class="input-field" placeholder="0 Rh+"></div>
            </div>
            <hr class="border-slate-800">
            <div><label class="text-[10px] text-slate-400 uppercase">Motor Marka Model</label><input type="text" id="p-motor" class="input-field"></div>
            <div><label class="text-[10px] text-slate-400 uppercase">Motor Plaka</label><input type="text" id="p-plaka" class="input-field"></div>
            <div class="grid grid-cols-2 gap-3">
                <div><label class="text-[10px] text-slate-400 uppercase">Ehliyet Sınıfı</label><input type="text" id="p-ehliyet" class="input-field"></div>
                <div><label class="text-[10px] text-slate-400 uppercase">Sigorta Bitiş</label><input type="date" id="p-sigorta" class="input-field"></div>
            </div>
            <button onclick="saveProfile()" class="w-full py-4 bg-emerald-600 rounded-2xl font-black mt-4 shadow-lg">BİLGİLERİ GÜNCELLE</button>
        </div>
    </div>

    <div id="reports-view" class="section-view"> <h2 class="text-xl font-bold">📊 Geçmiş Raporlar</h2> </div>
    <div id="earnings-view" class="section-view"> <h2 class="text-xl font-bold">💰 Geçmiş Kazançlar</h2> </div>
    <div id="platforms-view" class="section-view"> <h2 class="text-xl font-bold">📱 Entegre Platformlar</h2> </div>
    <div id="tools-view" class="section-view"> <h2 class="text-xl font-bold">🔧 Ekipmanlarım</h2> </div>
    <div id="pdf-view" class="section-view"> <h2 class="text-xl font-bold">📄 PDF Rapor Oluştur</h2> </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const kuryeID = "harun_kaya"; 

        let map, marker, startTime, lastPos, watchId, isShiftActive = false;

        // HARİTA KURULUMU
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        }

        function showPage(pageId) {
            document.querySelectorAll('.section-view').forEach(v => v.classList.remove('active-view'));
            document.getElementById(pageId + '-view').classList.add('active-view');
            toggleMenu();
        }

        // VARDİYA SİSTEMİ
        function startShift() {
            isShiftActive = true;
            startTime = Date.now();
            document.getElementById('status-badge').innerText = "AÇIK";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-bold bg-emerald-500/20 text-emerald-400 border border-emerald-500/50";
            document.getElementById('btn-start').disabled = true; document.getElementById('btn-start').style.opacity = "0.2";
            document.getElementById('btn-end').disabled = false; document.getElementById('btn-end').style.opacity = "1";
            trackLocation();
        }

        function endShift() {
            if(confirm("Vardiyayı bitirmek istiyor musunuz?")) {
                db.ref('arsiv/' + kuryeID).push({
                    tarih: new Date().toLocaleString(),
                    kazanc: document.getElementById('earnings').innerText,
                    yol: document.getElementById('km-display').innerText
                });
                location.reload();
            }
        }

        function trackLocation() {
            watchId = navigator.geolocation.watchPosition((pos) => {
                lastPos = [pos.coords.latitude, pos.coords.longitude];
                if (!marker) {
                    marker = L.marker(lastPos).addTo(map);
                } else { marker.setLatLng(lastPos); }
                map.panTo(lastPos);
                // Mesafe ve kazanç hesaplama mantığı buraya v11'den eklenecek
            }, null, { enableHighAccuracy: true });
        }

        // PROFİL SİSTEMİ
        function saveProfile() {
            const data = {
                ad: document.getElementById('p-ad').value,
                dtarihi: document.getElementById('p-dt').value,
                dyeri: document.getElementById('p-dy').value,
                medeni: document.getElementById('p-medeni').value,
                kan: document.getElementById('p-kan').value,
                motor: document.getElementById('p-motor').value,
                plaka: document.getElementById('p-plaka').value,
                ehliyet: document.getElementById('p-ehliyet').value,
                sigorta: document.getElementById('p-sigorta').value
            };
            db.ref('kuryeler/' + kuryeID + '/profil').set(data).then(() => {
                alert("Bilgiler başarıyla güncellendi ve restorana iletildi!");
            });
        }

        function logout() { if(confirm("Oturumu kapatmak istiyor musunuz?")) location.reload(); }

        function sendEmergency(mesaj) {
            db.ref('acil_durumlar').set({ kurye: kuryeID, tur: mesaj, zaman: new Date().toLocaleTimeString() });
            alert("Bildirim gönderildi!");
        }

        setInterval(() => {
            if(isShiftActive) {
                const diff = Date.now() - startTime;
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }
        }, 1000);
    </script>
</body>
</html>
