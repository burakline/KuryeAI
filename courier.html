<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
font-family: 'Inter', sans-serif;
background:#0A0A0A;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.status{
padding:6px 14px;
border-radius:20px;
font-size:12px;
}

.online{background:#00C2A8;color:black}
.offline{background:#ff4d4d}

/* MAP */
#map{height:40vh}

/* PANEL */
.panel{padding:15px}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid rgba(255,255,255,0.1);
}

/* BUTTON */
.btn{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

.accept{background:#00C2A8;color:black}
.done{background:#22c55e}
.reject{background:#ff4d4d}

/* TITLE */
h3{margin:10px 0}
</style>
</head>

<body>

<div class="header">
<h3>🛵 KuryeAI</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">

<h3>📦 Siparişler</h3>
<div id="orders"></div>

<h3>🚀 Aktif Sipariş</h3>
<div id="activeOrder"></div>

<button onclick="startShift()" class="btn accept">Online Ol</button>
<button onclick="endShift()" class="btn reject">Offline Ol</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { db, auth } from "./firebase.js";
import {
collection,
onSnapshot,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;

/* ELEMENTS */
const ordersDiv = document.getElementById("orders");
const activeDiv = document.getElementById("activeOrder");
const statusDiv = document.getElementById("status");

let user;
let watchId=null;

/* AUTH */
onAuthStateChanged(auth,(u)=>{

if(!u){
location.href="index.html";
return;
}

user=u;

/* ORDERS LIST */
onSnapshot(collection(db,"orders"),(snap)=>{

ordersDiv.innerHTML="";
activeDiv.innerHTML="";

snap.forEach(d=>{

const o=d.data();

/* ACTIVE */
if(o.courierId === user.uid && o.status==="accepted"){

activeDiv.innerHTML=`
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>

<button class="btn done" onclick="completeOrder('${d.id}')">
Teslim Edildi
</button>
</div>`;

}

/* NEW ORDERS */
if(o.status==="pending"){

ordersDiv.innerHTML+=`
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>

💰 ${o.price}₺

<button class="btn accept" onclick="acceptOrder('${d.id}')">
Kabul Et
</button>
</div>`;

}

});

});

});

/* SHIFT */
window.startShift = function(){

statusDiv.className="status online";
statusDiv.innerText="Online";

watchId = navigator.geolocation.watchPosition(pos=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker = L.marker([lat,lng]).addTo(map);
map.setView([lat,lng],15);
}

});

};

/* OFFLINE */
window.endShift = function(){

statusDiv.className="status offline";
statusDiv.innerText="Offline";

if(watchId){
navigator.geolocation.clearWatch(watchId);
}

};

/* ACCEPT */
window.acceptOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"accepted",
courierId:user.uid
});

};

/* COMPLETE */
window.completeOrder = async function(id){

await updateDoc(doc(db,"orders",id),{
status:"delivered"
});

};

</script>

</body>
</html>
