<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Restaurant Panel</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px;}
input,button{width:100%;padding:12px;margin-top:10px;}
.card{background:white;padding:15px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>Sipariş Oluştur</h2>

<input id="customer" placeholder="Müşteri">
<input id="address" placeholder="Adres">

<button onclick="createOrder()">Sipariş Gönder</button>

<h3>📊 Kurye Performans</h3>
<div id="stats"></div>

<h3>📦 Siparişler</h3>
<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MESAFE */
function calcDistance(lat1,lng1,lat2,lng2){
return Math.sqrt(
Math.pow(lat1-lat2,2)+
Math.pow(lng1-lng2,2)
)*111;
}

/* FİYAT */
function calcPrice(km){
return Math.round(km*8);
}

window.createOrder=async()=>{

const lat=39.92+Math.random()*0.01;
const lng=32.85+Math.random()*0.01;

const km=calcDistance(39.92,32.85,lat,lng);
const price=calcPrice(km);

await addDoc(collection(db,"orders"),{
customer:customer.value,
address:address.value,
lat,lng,
price,
status:"bekliyor"
});

alert(price+"₺ sipariş");
};

/* ORDERS */
onSnapshot(collection(db,"orders"),snap=>{
orders.innerHTML="";
snap.forEach(d=>{
const o=d.data();
orders.innerHTML+=`<div class="card">${o.customer} - ${o.price}₺</div>`;
});
});

/* STATS */
onSnapshot(collection(db,"earnings"),snap=>{
let total=0;
snap.forEach(d=>total+=d.data().amount);
stats.innerText="Toplam Kazanç: "+total+"₺";
});

</script>
</body>
</html>
