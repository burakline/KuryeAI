<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Takip</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';overflow:hidden;background:#000}

/* MAP */
#map{width:100%;height:100vh}

/* TOP PANEL */
.panel{
position:absolute;
top:15px;
left:50%;
transform:translateX(-50%);
background:white;
padding:18px;
border-radius:20px;
width:85%;
max-width:350px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
z-index:5;
text-align:center;
}

.eta{
font-size:30px;
font-weight:bold;
color:#00c2ff;
}

.status{
font-size:14px;
color:#666;
margin-top:5px;
}

.bar{
height:10px;
background:#eee;
border-radius:10px;
margin-top:12px;
overflow:hidden;
}

.fill{
height:100%;
background:#00c2ff;
width:0%;
transition:1s;
}

/* BOTTOM */
.bottom{
position:absolute;
bottom:0;
width:100%;
background:white;
border-radius:25px 25px 0 0;
padding:20px;
z-index:5;
}

.courier{
display:flex;
align-items:center;
gap:10px;
}

.avatar{
width:45px;
height:45px;
background:#00c2ff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
}

.btn{
margin-top:10px;
background:#00c2ff;
color:white;
padding:12px;
border-radius:12px;
text-align:center;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<div class="eta" id="eta">-- dk</div>
<div class="status" id="status">Kurye hazırlanıyor...</div>
<div class="bar"><div class="fill" id="bar"></div></div>
</div>

<div class="bottom">
<div class="courier">
<div class="avatar">K</div>
<div>
<div id="courierName">Kurye atanıyor...</div>
<small>Canlı takip aktif</small>
</div>
</div>

<div class="btn" onclick="callCourier()">Kuryeyi Ara</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const params = new URLSearchParams(window.location.search);
const orderId = params.get("id");

let courierMarker;
let routeLine;
let startDistance = null;
let unsubscribeCourier = null;

/* ROUTE */
async function drawRoute(cLat,cLng,oLat,oLng){
const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${cLng},${cLat};${oLng},${oLat}?overview=full&geometries=geojson`);
const data = await res.json();

if(!data.routes || !data.routes.length) return;

const coords = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

if(routeLine) map.removeLayer(routeLine);

routeLine = L.polyline(coords,{
color:"#00c2ff",
weight:5
}).addTo(map);
}

/* ORDER LISTENER */
onSnapshot(doc(db,"orders",orderId), orderSnap=>{
const o = orderSnap.data();
if(!o) return;

/* DELIVERED */
if(o.status==="delivered"){
document.getElementById("status").innerText="Teslim edildi 🎉";
document.getElementById("eta").innerText="✔";
return;
}

/* COURIER ID CHECK */
if(!o.courierId) return;

/* CLEAN OLD LISTENER */
if(unsubscribeCourier) unsubscribeCourier();

/* COURIER LISTENER */
unsubscribeCourier = onSnapshot(doc(db,"couriers",o.courierId), courierSnap=>{

const c = courierSnap.data();
if(!c) return;

/* NULL CHECK */
if(!c.lat || !c.lng || !o.lat || !o.lng) return;

/* ICON */
const icon = L.divIcon({
html:`<div style="
width:20px;
height:20px;
background:#00c2ff;
border-radius:50%;
border:3px solid white;
box-shadow:0 0 10px rgba(0,194,255,0.7);
"></div>`
});

/* MARKER */
if(courierMarker){
courierMarker.setLatLng([c.lat,c.lng]);
courierMarker.setIcon(icon);
}else{
courierMarker = L.marker([c.lat,c.lng],{icon}).addTo(map);
}

/* ROUTE */
drawRoute(c.lat,c.lng,o.lat,o.lng);

/* MAP CENTER */
map.setView([c.lat,c.lng],15);

/* NAME */
document.getElementById("courierName").innerText = c.name || "Kurye";

/* DISTANCE */
const dist = Math.sqrt(
Math.pow(c.lat-o.lat,2)+
Math.pow(c.lng-o.lng,2)
);

if(!startDistance) startDistance = dist;

/* ETA */
const eta = Math.max(1,Math.round((dist/40)*60));
document.getElementById("eta").innerText = eta+" dk";

/* STATUS */
if(eta<3){
document.getElementById("status").innerText="Kapıya çok yakın 🚀";
}else if(eta<10){
document.getElementById("status").innerText="Kurye yolda 🛵";
}else{
document.getElementById("status").innerText="Hazırlanıyor";
}

/* PROGRESS */
const progress = 100 - ((dist/startDistance)*100);
document.getElementById("bar").style.width = progress+"%";

});
});

/* CALL */
window.callCourier=()=>{
alert("Kurye arama yakında 📞");
}

</script>

</body>
</html>
