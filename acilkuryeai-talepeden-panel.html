<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AcilKuryeAI — Talep Paneli</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f6f8; --card:#fff; --border:#e5e5ea; --tx:#1c1c1e; --tx2:#636366;
      --teal:#00c8d7; --teal-dk:#009aaa; --teal-lt:#33d6e3;
      --teal-bg:rgba(0,200,215,0.08); --teal-bg2:rgba(0,200,215,0.15);
      --red:#ff3b30; --acil:#ff3b30; --green:#34c759;
      --sh:0 2px 12px rgba(0,0,0,0.07); --r:14px; --f:Arial,Helvetica,sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-font-smoothing:antialiased}
    /* Loader */
    .page-loader{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center}
    .page-loader.hide{display:none}
    .spin{width:32px;height:32px;border:3px solid var(--teal-bg2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Header */
    header{
      background:linear-gradient(135deg,#0f1117 0%,#1a1a2e 100%);
      border-bottom:1px solid rgba(0,200,215,0.15);
      padding:.9rem 1.2rem;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:100;
    }
    .hlogo{font-size:1.1rem;font-weight:800;letter-spacing:-.3px}
    .hlogo .acil{color:var(--acil)}
    .hlogo .kurye{color:#fff}
    .hlogo .ai{color:var(--teal)}
    .hout{
      font-size:.78rem;color:rgba(255,255,255,.6);cursor:pointer;
      border:1px solid rgba(255,255,255,.15);background:transparent;
      padding:.35rem .85rem;border-radius:8px;font-family:var(--f);transition:all .2s;
    }
    .hout:hover{color:#fff;border-color:rgba(255,255,255,.4)}
    /* Main */
    main{max-width:600px;margin:0 auto;padding:1.4rem 1rem 6rem}
    .sec-title{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:.75rem}
    /* Card */
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:1.3rem}
    .card+.card{margin-top:1rem}
    /* Form */
    .form-group{margin-bottom:.85rem}
    .form-label{display:block;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx2);margin-bottom:.35rem}
    .form-input,.form-textarea{
      width:100%;background:#f5f6f8;border:1.5px solid var(--border);
      border-radius:10px;padding:.7rem 1rem;font-size:.88rem;
      font-family:var(--f);outline:none;transition:border-color .2s,box-shadow .2s;color:var(--tx);
    }
    .form-input::placeholder,.form-textarea::placeholder{color:#aaa}
    .form-input:focus,.form-textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-bg)}
    .form-textarea{resize:vertical;min-height:76px}
    .fee-box{
      background:var(--teal-bg);border:1.5px solid rgba(0,200,215,.2);
      border-radius:10px;padding:.7rem 1rem;font-size:.85rem;color:var(--teal-dk);font-weight:600;
    }
    .fee-box.empty{background:#f5f6f8;border-color:var(--border);color:var(--tx2);font-weight:400}
    /* Button */
    .btn-primary{
      width:100%;background:var(--teal);color:#fff;border:none;border-radius:999px;
      padding:.85rem;font-size:.9rem;font-weight:700;cursor:pointer;
      font-family:var(--f);margin-top:.4rem;
      transition:background .2s,transform .15s;
      box-shadow:0 4px 14px rgba(0,200,215,.3);display:flex;align-items:center;justify-content:center;gap:.5rem;
    }
    .btn-primary:hover:not(:disabled){background:var(--teal-lt);transform:scale(1.01)}
    .btn-primary:disabled{opacity:.55;cursor:not-allowed}
    .btn-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
    .btn-primary.loading .btn-spinner{display:block}
    .btn-primary.loading .btn-txt{display:none}
    /* Error */
    .err-box{display:none;background:rgba(255,59,48,.07);border:.5px solid rgba(255,59,48,.25);border-radius:10px;padding:.7rem 1rem;font-size:.82rem;color:var(--red);margin-bottom:1rem}
    .err-box.show{display:block}
    /* Talep items */
    .talep-item{
      background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);
      padding:1.1rem;margin-bottom:.75rem;transition:border-color .2s;
    }
    .talep-item:hover{border-color:rgba(0,200,215,.3)}
    .talep-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.65rem}
    .talep-id{font-size:.72rem;font-weight:700;color:var(--teal-dk);background:var(--teal-bg);padding:.2rem .6rem;border-radius:6px}
    .st-badge{font-size:.7rem;font-weight:700;padding:.22rem .65rem;border-radius:999px}
    .st-open{background:rgba(0,200,215,.1);color:var(--teal-dk)}
    .st-accepted{background:rgba(52,199,89,.1);color:var(--green)}
    .st-picked{background:rgba(52,199,89,.1);color:var(--green)}
    .st-delivered{background:rgba(0,122,255,.1);color:#007aff}
    .st-cancelled{background:rgba(255,59,48,.08);color:var(--red)}
    .talep-info{font-size:.83rem;color:var(--tx2);line-height:1.7}
    .talep-info strong{color:var(--tx)}
    .kurye-card{
      margin-top:.7rem;padding:.7rem .9rem;
      background:var(--teal-bg);border:1px solid rgba(0,200,215,.2);
      border-radius:10px;font-size:.82rem;color:var(--teal-dk);
    }
    .btn-cancel{
      margin-top:.65rem;width:100%;background:none;border:1.5px solid rgba(255,59,48,.3);
      color:var(--red);border-radius:8px;padding:.48rem;font-size:.78rem;font-weight:700;
      cursor:pointer;font-family:var(--f);transition:all .2s;
    }
    .btn-cancel:hover{background:rgba(255,59,48,.07);border-color:var(--red)}
    /* Empty */
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--tx2);font-size:.88rem}
    .empty-state .ico{font-size:2.8rem;margin-bottom:.8rem}
    /* Toast */
    .toast{
      position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(80px);
      background:#1c1c1e;color:#fff;padding:.72rem 1.4rem;border-radius:999px;
      font-size:.84rem;font-weight:600;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap;
    }
    .toast.show{transform:translateX(-50%) translateY(0)}
    /* Nav */
    .nav-tabs{
      display:flex;background:var(--card);border-top:1px solid var(--border);
      position:fixed;bottom:0;left:0;right:0;z-index:100;
    }
    .nav-tab{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:.25rem;
      padding:.75rem .5rem;cursor:pointer;font-size:.64rem;font-weight:700;
      color:var(--tx2);transition:color .2s;border:none;background:none;font-family:var(--f);
    }
    .nav-tab.active{color:var(--teal)}
    .nav-tab .ico{font-size:1.35rem}
    .tab-content{display:none}
    .tab-content.active{display:block}
    /* Divider */
    .divider{height:1px;background:var(--border);margin:.75rem 0}
  </style>
</head>
<body>
<div class="page-loader" id="page-loader"><div class="spin"></div></div>

<header>
  <div class="hlogo"><span class="acil">Acil</span><span class="kurye">Kurye</span><span class="ai">AI</span></div>
  <button class="hout" onclick="doLogout()">Çıkış</button>
</header>

<main>
  <!-- YENİ TALEP -->
  <div class="tab-content active" id="tab-yeni">
    <div class="sec-title" style="margin-top:.4rem">Yeni Talep Oluştur</div>
    <div class="card">
      <div class="err-box" id="talep-err"></div>
      <div class="form-group">
        <label class="form-label">Alınacak Adres</label>
        <input class="form-input" type="text" id="t-from" placeholder="Paketin alınacağı adres"/>
      </div>
      <div class="form-group">
        <label class="form-label">Teslim Adresi</label>
        <input class="form-input" type="text" id="t-to" placeholder="Teslim edilecek adres"/>
      </div>
      <div class="form-group">
        <label class="form-label">Paket Açıklaması</label>
        <textarea class="form-textarea" id="t-desc" placeholder="Paket içeriği, boyutu, özel notlar..."></textarea>
      </div>
      <div class="divider"></div>
      <div class="form-group">
        <label class="form-label">İletişim Adı</label>
        <input class="form-input" type="text" id="t-cust" placeholder="Ad Soyad"/>
      </div>
      <div class="form-group">
        <label class="form-label">İletişim Telefonu</label>
        <input class="form-input" type="tel" id="t-phone" placeholder="05XX XXX XX XX"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tahmini Ücret</label>
        <div class="fee-box empty" id="fee-estimate">Adres girdikten sonra hesaplanır</div>
      </div>
      <button class="btn-primary" id="btn-talep" onclick="createTalep()">
        <div class="btn-spinner"></div><span class="btn-txt">Talep Gönder →</span>
      </button>
    </div>
  </div>

  <!-- TALEPLERİM -->
  <div class="tab-content" id="tab-taleplerim">
    <div class="sec-title" style="margin-top:.4rem">Taleplerim</div>
    <div id="talepler-list">
      <div class="empty-state"><div class="ico">📭</div><div>Henüz talep oluşturmadınız</div></div>
    </div>
  </div>
</main>

<nav class="nav-tabs">
  <button class="nav-tab active" id="nav-yeni" onclick="switchTab('yeni')">
    <span class="ico">➕</span>Yeni Talep
  </button>
  <button class="nav-tab" id="nav-taleplerim" onclick="switchTab('taleplerim')">
    <span class="ico">📋</span>Taleplerim
  </button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, addDoc, updateDoc, collection, query, where, onSnapshot }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y", authDomain:"kuryeai-99bf9.firebaseapp.com",
    projectId:"kuryeai-99bf9", storageBucket:"kuryeai-99bf9.firebasestorage.app",
    messagingSenderId:"1012295004135", appId:"1:1012295004135:web:0cceac0476175e19395742"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  let currentUser = null;
  let _dataLoaded = false;
  let _unsubTaleplerim = null;

  function generateID(prefix) {
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let id=prefix+'-';
    for(let i=0;i<6;i++) id+=chars[Math.floor(Math.random()*chars.length)];
    return id;
  }

  onAuthStateChanged(auth, async (user) => {
    if (_dataLoaded) return;
    if (!user || !user.emailVerified) { window.location.href = '/acilkuryeai-talepeden-login'; return; }
    _dataLoaded = true;
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      if (snap.exists() && snap.data().role !== 'acil_talep') {
        await signOut(auth); window.location.href = '/acilkuryeai-talepeden-login'; return;
      }
      // If doc missing (interrupted registration), build minimal profile from auth
      const profile = snap.exists() ? snap.data() : { displayName: user.email.split('@')[0], email: user.email, role: 'acil_talep', phone: '' };
      currentUser = { uid:user.uid, ...profile };
      document.getElementById('page-loader').classList.add('hide');
      listenTaleplerim();
      // Process pending talep from landing page form
      const pending = sessionStorage.getItem('pendingAcilForm');
      if (pending) {
        sessionStorage.removeItem('pendingAcilForm');
        try {
          const f = JSON.parse(pending);
          await addDoc(collection(db,'acilTalepler'), {
            talepId: generateID('SAI'), userId: currentUser.uid,
            fromAddr: f.adres1||'', toAddr: f.adres2||'',
            description: f.detay||'', customerName: f.ad+' '+(f.soyad||''),
            customerPhone: f.tel||'', tur: f.tur||'', odeme: f.odeme||'',
            feeEstimate: (f.ucret&&f.ucret!=='—') ? parseInt(f.ucret) : null,
            distanceKm: (f.mesafe&&f.mesafe!=='—') ? parseFloat(f.mesafe) : null,
            status: 'open', createdAt: new Date().toISOString()
          });
          switchTab('taleplerim');
        } catch(e) { console.error('Pending talep kaydedilemedi:', e); }
      }
    } catch(e) { window.location.href = '/acilkuryeai-talepeden-login'; }
  });

  // Query only with 'where' — no orderBy to avoid composite index requirement
  // Sort by createdAt in JS instead
  function listenTaleplerim() {
    if (_unsubTaleplerim) _unsubTaleplerim();
    const q = query(collection(db,'acilTalepler'), where('userId','==',currentUser.uid));
    _unsubTaleplerim = onSnapshot(q, snap => {
      const list = snap.docs
        .map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
      renderTaleplerim(list);
    }, (err)=>{ console.error('Talepler dinleme hatası:', err); });
  }

  function renderTaleplerim(list) {
    const el = document.getElementById('talepler-list');
    if (!list.length) {
      el.innerHTML = '<div class="empty-state"><div class="ico">📭</div><div>Henüz talep oluşturmadınız</div></div>';
      return;
    }
    const stMap   = { open:'⏳ Kurye Bekleniyor', accepted:'✅ Kurye Kabul Etti', picked:'🛵 Yolda', delivered:'📦 Teslim Edildi', cancelled:'❌ İptal Edildi' };
    const stClass = { open:'st-open', accepted:'st-accepted', picked:'st-picked', delivered:'st-delivered', cancelled:'st-cancelled' };
    el.innerHTML = list.map(t => {
      const st = t.status||'open';
      const fee = t.feeEstimate ? `<br/>💰 Tahmini: <strong>₺${t.feeEstimate} – ₺${t.feeEstimate+15}</strong>` : '';
      const cancelBtn = st==='open'
        ? `<button class="btn-cancel" onclick="cancelTalep('${esc(t.id)}')">✕ Talebi İptal Et</button>`
        : '';
      const kuryeCard = t.kuryeName
        ? `<div class="kurye-card">🛵 Kurye: <strong>${esc(t.kuryeName)}</strong>${t.kuryePhone ? ' · '+esc(t.kuryePhone) : ''}</div>`
        : '';
      return `<div class="talep-item">
        <div class="talep-head">
          <span class="talep-id">${esc(t.talepId||t.id)}</span>
          <span class="st-badge ${stClass[st]||'st-open'}">${stMap[st]||st}</span>
        </div>
        <div class="talep-info">
          📍 ${esc(t.fromAddr||'—')} → ${esc(t.toAddr||'—')}<br/>
          📦 ${esc(t.description||'—')}${fee}<br/>
          🕐 ${t.createdAt ? new Date(t.createdAt).toLocaleString('tr-TR') : ''}
        </div>
        ${kuryeCard}
        ${cancelBtn}
      </div>`;
    }).join('');
  }

  function estimateFee(from, to) {
    if (!from||!to) return null;
    const base=25, extra=Math.min(Math.floor((from.length+to.length)/8),30);
    return base+extra;
  }

  ['t-from','t-to'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const f=document.getElementById('t-from').value.trim();
      const t=document.getElementById('t-to').value.trim();
      const fee=estimateFee(f,t);
      const el=document.getElementById('fee-estimate');
      if (fee) {
        el.textContent=`Tahmini: ₺${fee} – ₺${fee+15}`;
        el.className='fee-box';
      } else {
        el.textContent='Adres girdikten sonra hesaplanır';
        el.className='fee-box empty';
      }
    });
  });

  window.cancelTalep = async (talepDocId) => {
    if (!confirm('Bu talebi iptal etmek istiyor musunuz?')) return;
    try {
      await updateDoc(doc(db,'acilTalepler',talepDocId), {status:'cancelled'});
      toast('Talep iptal edildi.','info');
    } catch(e) { toast('İptal işlemi başarısız','error'); }
  };

  window.createTalep = async () => {
    const fromAddr      = document.getElementById('t-from').value.trim();
    const toAddr        = document.getElementById('t-to').value.trim();
    const description   = document.getElementById('t-desc').value.trim();
    const customerName  = document.getElementById('t-cust').value.trim();
    const customerPhone = document.getElementById('t-phone').value.trim();
    const btn = document.getElementById('btn-talep');
    const err = document.getElementById('talep-err');
    err.classList.remove('show');
    if (!fromAddr||!toAddr||!customerName||!customerPhone) {
      err.textContent='Lütfen tüm alanları doldurun.'; err.classList.add('show'); return;
    }
    const feeEstimate = estimateFee(fromAddr,toAddr);
    btn.classList.add('loading'); btn.disabled=true;
    try {
      const talepId=generateID('SAI');
      await addDoc(collection(db,'acilTalepler'), {
        talepId, userId:currentUser.uid, fromAddr, toAddr, description,
        customerName, customerPhone, status:'open', feeEstimate,
        createdAt:new Date().toISOString()
      });
      document.getElementById('t-from').value='';
      document.getElementById('t-to').value='';
      document.getElementById('t-desc').value='';
      document.getElementById('t-cust').value='';
      document.getElementById('t-phone').value='';
      document.getElementById('fee-estimate').textContent='Adres girdikten sonra hesaplanır';
      document.getElementById('fee-estimate').className='fee-box empty';
      toast('Talebiniz oluşturuldu! 📦','success');
      setTimeout(()=>window.switchTab('taleplerim'),1500);
    } catch(e) {
      console.error(e);
      err.textContent='Talep oluşturulamadı: '+e.message; err.classList.add('show');
    }
    btn.classList.remove('loading'); btn.disabled=false;
  };

  window.doLogout = async () => {
    if (_unsubTaleplerim) { try{_unsubTaleplerim();}catch{} _unsubTaleplerim=null; }
    await signOut(auth);
    window.location.href='/acilkuryeai-talepeden-login';
  };

  window.switchTab = (t) => {
    document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('nav-'+t).classList.add('active');
  };

  function toast(msg,type='info') {
    const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show';
    if(type==='success') t.style.background='#34c759';
    else if(type==='error') t.style.background='var(--red)';
    else t.style.background='#1c1c1e';
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
