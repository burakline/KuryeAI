<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AcilKuryeAI — Talep Paneli</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f5f5f7; --card:#fff; --border:#e5e5ea; --tx:#1c1c1e; --tx2:#636366; --orange:#ff9500; --orange2:#e68a00; --red:#ff3b30; --green:#34c759; --sh:0 2px 12px rgba(0,0,0,0.07); --r:16px; --f:Arial,Helvetica,sans-serif; }
    html,body { height:100%; background:var(--bg); color:var(--tx); font-family:var(--f); -webkit-font-smoothing:antialiased; }
    .page-loader { position:fixed; inset:0; z-index:999; background:#fff; display:flex; align-items:center; justify-content:center; }
    .page-loader.hide { display:none; }
    .spinner-r { width:32px; height:32px; border:3px solid rgba(255,149,0,.2); border-top-color:var(--orange); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    header { background:var(--card); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .hlogo { font-size:1.05rem; font-weight:800; }
    .hlogo em { font-style:normal; color:var(--orange); }
    .hout { font-size:.8rem; color:var(--tx2); cursor:pointer; border:1px solid var(--border); background:var(--card); padding:.4rem .9rem; border-radius:8px; }
    .hout:hover { color:var(--red); border-color:var(--red); }
    main { max-width:640px; margin:0 auto; padding:1.5rem 1.5rem 6rem; }
    .sec-title { font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--tx2); margin-bottom:.8rem; }
    .card { background:var(--card); border-radius:var(--r); box-shadow:var(--sh); padding:1.4rem; }
    .card + .card { margin-top:1rem; }
    .form-group { margin-bottom:.9rem; }
    .form-label { display:block; font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--tx2); margin-bottom:.35rem; }
    .form-input, .form-select, .form-textarea { width:100%; background:#f5f5f7; border:1px solid var(--border); border-radius:10px; padding:.7rem 1rem; font-size:.9rem; font-family:var(--f); outline:none; transition:border-color .2s; color:var(--tx); }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color:var(--orange); }
    .form-textarea { resize:vertical; min-height:80px; }
    .btn-primary { width:100%; background:var(--orange); color:#fff; border:none; border-radius:12px; padding:.85rem; font-size:.9rem; font-weight:700; cursor:pointer; font-family:var(--f); margin-top:.5rem; transition:background .2s; }
    .btn-primary:hover { background:var(--orange2); }
    .btn-primary:disabled { opacity:.55; cursor:not-allowed; }
    .talep-item { border:1px solid var(--border); border-radius:var(--r); padding:1.2rem; margin-bottom:.8rem; }
    .talep-item-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
    .talep-id-badge { font-size:.72rem; font-weight:700; color:var(--orange); }
    .st-badge { font-size:.7rem; font-weight:700; padding:.2rem .6rem; border-radius:999px; }
    .st-open { background:rgba(255,149,0,.1); color:var(--orange); }
    .st-accepted { background:rgba(52,199,89,.1); color:var(--green); }
    .st-delivered { background:rgba(0,122,255,.1); color:#007aff; }
    .talep-info { font-size:.85rem; color:var(--tx2); line-height:1.6; }
    .kurye-info { margin-top:.8rem; padding:.8rem; background:rgba(255,149,0,.05); border-radius:10px; border:1px solid rgba(255,149,0,.2); font-size:.82rem; }
    .empty-state { text-align:center; padding:2.5rem; color:var(--tx2); font-size:.88rem; }
    .empty-state .ico { font-size:2.5rem; margin-bottom:.8rem; }
    .toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(80px); background:#1c1c1e; color:#fff; padding:.75rem 1.5rem; border-radius:999px; font-size:.85rem; font-weight:600; z-index:9999; transition:transform .3s; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }
    .nav-tabs { display:flex; background:var(--card); border-top:1px solid var(--border); position:fixed; bottom:0; left:0; right:0; z-index:100; }
    .nav-tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:.3rem; padding:.8rem .5rem; cursor:pointer; font-size:.65rem; font-weight:600; color:var(--tx2); transition:color .2s; border:none; background:none; font-family:var(--f); }
    .nav-tab.active { color:var(--orange); }
    .nav-tab .ico { font-size:1.4rem; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }
  </style>
</head>
<body>
<div class="page-loader" id="page-loader"><div class="spinner-r"></div></div>

<header>
  <div class="hlogo">Acil<em>Kurye</em>AI</div>
  <button class="hout" onclick="doLogout()">Çıkış</button>
</header>

<main>
  <!-- YENİ TALEP -->
  <div class="tab-content active" id="tab-yeni">
    <div class="sec-title" style="margin-top:.5rem">Yeni Talep Oluştur</div>
    <div class="card">
      <div id="talep-err" style="display:none;background:rgba(255,59,48,.08);border:.5px solid rgba(255,59,48,.25);border-radius:8px;padding:.7rem 1rem;font-size:.82rem;color:var(--red);margin-bottom:1rem"></div>
      <div class="form-group">
        <label class="form-label">Alınacak Adres</label>
        <input class="form-input" type="text" id="t-from" placeholder="Pakenin alınacağı adres"/>
      </div>
      <div class="form-group">
        <label class="form-label">Teslim Adresi</label>
        <input class="form-input" type="text" id="t-to" placeholder="Teslim edilecek adres"/>
      </div>
      <div class="form-group">
        <label class="form-label">Paket Açıklaması</label>
        <textarea class="form-textarea" id="t-desc" placeholder="Paket içeriği, boyutu, özel notlar..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">İletişim Adı</label>
        <input class="form-input" type="text" id="t-cust" placeholder="Ad Soyad"/>
      </div>
      <div class="form-group">
        <label class="form-label">İletişim Telefonu</label>
        <input class="form-input" type="tel" id="t-phone" placeholder="05XX XXX XX XX"/>
      </div>
      <div class="form-group">
        <label class="form-label">Tahmini Ücret</label>
        <div id="fee-estimate" style="background:#f5f5f7;border:1px solid var(--border);border-radius:10px;padding:.7rem 1rem;font-size:.88rem;color:var(--tx2)">Adres girdikten sonra hesaplanır</div>
      </div>
      <button class="btn-primary" id="btn-talep" onclick="createTalep()">Talep Gönder →</button>
    </div>
  </div>

  <!-- TALEPLERIM -->
  <div class="tab-content" id="tab-taleplerim">
    <div class="sec-title" style="margin-top:.5rem">Taleplerim</div>
    <div id="talepler-list">
      <div class="empty-state"><div class="ico">📭</div><div>Henüz talep oluşturmadınız</div></div>
    </div>
  </div>
</main>

<nav class="nav-tabs">
  <button class="nav-tab active" id="nav-yeni" onclick="switchTab('yeni')"><span class="ico">➕</span>Yeni Talep</button>
  <button class="nav-tab" id="nav-taleplerim" onclick="switchTab('taleplerim')"><span class="ico">📋</span>Taleplerim</button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, addDoc, updateDoc, collection, query, where, orderBy, onSnapshot }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y", authDomain:"kuryeai-99bf9.firebaseapp.com",
    projectId:"kuryeai-99bf9", storageBucket:"kuryeai-99bf9.firebasestorage.app",
    messagingSenderId:"1012295004135", appId:"1:1012295004135:web:0cceac0476175e19395742"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  let currentUser = null;
  let _dataLoaded = false;
  let _unsubTaleplerim = null;

  function generateID(prefix) {
    const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let id=prefix+'-';
    for(let i=0;i<6;i++) id+=chars[Math.floor(Math.random()*chars.length)];
    return id;
  }

  onAuthStateChanged(auth, async (user) => {
    if (_dataLoaded) return;
    if (!user || !user.emailVerified) { window.location.href = '/acilkuryeai-talepeden-login'; return; }
    _dataLoaded = true;
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      if (snap.exists() && snap.data().role !== 'acil_talep') {
        await signOut(auth); window.location.href = '/acilkuryeai-talepeden-login'; return;
      }
      // If doc missing (interrupted registration), build minimal profile from auth
      const profile = snap.exists() ? snap.data() : { displayName: user.email.split('@')[0], email: user.email, role: 'acil_talep', phone: '' };
      currentUser = { uid:user.uid, ...profile };
      document.getElementById('page-loader').classList.add('hide');
      listenTaleplerim();
    } catch(e) { window.location.href = '/acilkuryeai-talepeden-login'; }
  });

  function listenTaleplerim() {
    if (_unsubTaleplerim) _unsubTaleplerim();
    const q = query(collection(db,'acilTalepler'), where('userId','==',currentUser.uid), orderBy('createdAt','desc'));
    _unsubTaleplerim = onSnapshot(q, snap => {
      const list = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderTaleplerim(list);
    }, ()=>{});
  }

  function renderTaleplerim(list) {
    const el = document.getElementById('talepler-list');
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="ico">📭</div><div>Henüz talep oluşturmadınız</div></div>'; return; }
    el.innerHTML = list.map(t => {
      const stMap = { open:'⏳ Kurye Bekleniyor', accepted:'✅ Kurye Kabul Etti', picked:'🛵 Yolda', delivered:'📦 Teslim Edildi', cancelled:'❌ İptal Edildi' };
      const stClass = { open:'st-open', accepted:'st-accepted', picked:'st-accepted', delivered:'st-delivered', cancelled:'st-open' };
      const st = t.status||'open';
      const fee = t.feeEstimate ? `<br/>💰 Tahmini Ücret: <strong>₺${t.feeEstimate}</strong>` : '';
      const cancelBtn = st === 'open'
        ? `<button onclick="cancelTalep('${esc(t.id)}')" style="margin-top:.6rem;width:100%;background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:.5rem;font-size:.8rem;font-weight:700;cursor:pointer">✕ Talebi İptal Et</button>`
        : '';
      return `<div class="talep-item">
        <div class="talep-item-head">
          <span class="talep-id-badge">${esc(t.talepId||t.id)}</span>
          <span class="st-badge ${stClass[st]||'st-open'}">${stMap[st]||st}</span>
        </div>
        <div class="talep-info">
          📍 ${esc(t.fromAddr||'—')} → ${esc(t.toAddr||'—')}<br/>
          📦 ${esc(t.description||'—')}${fee}<br/>
          🕐 ${t.createdAt ? new Date(t.createdAt).toLocaleString('tr-TR') : ''}
        </div>
        ${t.kuryeName ? `<div class="kurye-info">🛵 Kurye: <strong>${esc(t.kuryeName)}</strong></div>` : ''}
        ${cancelBtn}
      </div>`;
    }).join('');
  }

  // Tahmini ücret hesaplama (basit formül: baz ücret + harf sayısı bazlı mesafe tahmini)
  function estimateFee(from, to) {
    if (!from || !to) return null;
    const base = 25;
    const extra = Math.min(Math.floor((from.length + to.length) / 8), 30);
    return base + extra;
  }

  // Adres alanları değişince tahmini ücreti güncelle
  ['t-from','t-to'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const f = document.getElementById('t-from').value.trim();
      const t = document.getElementById('t-to').value.trim();
      const fee = estimateFee(f, t);
      const el = document.getElementById('fee-estimate');
      el.textContent = fee ? `Tahmini: ₺${fee} – ₺${fee + 15}` : 'Adres girdikten sonra hesaplanır';
      el.style.color = fee ? 'var(--green)' : 'var(--tx2)';
    });
  });

  window.cancelTalep = async (talepDocId) => {
    if (!confirm('Bu talebi iptal etmek istiyor musunuz?')) return;
    try {
      await updateDoc(doc(db,'acilTalepler',talepDocId), { status:'cancelled' });
      toast('Talep iptal edildi.','info');
    } catch(e) {
      toast('İptal işlemi başarısız','error');
    }
  };

  window.createTalep = async () => {
    const fromAddr    = document.getElementById('t-from').value.trim();
    const toAddr      = document.getElementById('t-to').value.trim();
    const description = document.getElementById('t-desc').value.trim();
    const customerName  = document.getElementById('t-cust').value.trim();
    const customerPhone = document.getElementById('t-phone').value.trim();
    const btn = document.getElementById('btn-talep');
    const err = document.getElementById('talep-err');
    err.style.display = 'none';

    if (!fromAddr||!toAddr||!customerName||!customerPhone) {
      err.textContent = 'Lütfen tüm alanları doldurun.';
      err.style.display = 'block'; return;
    }
    const feeEstimate = estimateFee(fromAddr, toAddr);
    btn.disabled = true; btn.textContent = 'Gönderiliyor...';
    try {
      const talepId = generateID('SAI');
      await addDoc(collection(db,'acilTalepler'), {
        talepId, userId:currentUser.uid, fromAddr, toAddr, description,
        customerName, customerPhone, status:'open', feeEstimate,
        createdAt:new Date().toISOString()
      });
      document.getElementById('t-from').value='';
      document.getElementById('t-to').value='';
      document.getElementById('t-desc').value='';
      document.getElementById('t-cust').value='';
      document.getElementById('t-phone').value='';
      document.getElementById('fee-estimate').textContent='Adres girdikten sonra hesaplanır';
      document.getElementById('fee-estimate').style.color='var(--tx2)';
      toast('Talebiniz oluşturuldu! 📦','success');
      setTimeout(()=>window.switchTab('taleplerim'),1500);
    } catch(e) {
      err.textContent = 'Talep oluşturulamadı. Lütfen tekrar deneyin.';
      err.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = 'Talep Gönder →';
  };

  window.doLogout = async () => {
    if (_unsubTaleplerim) { try{_unsubTaleplerim();}catch{} _unsubTaleplerim=null; }
    await signOut(auth);
    window.location.href='/acilkuryeai-talepeden-login';
  };
  window.switchTab = (t) => {
    document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('nav-'+t).classList.add('active');
  };

  function toast(msg,type='info') {
    const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show';
    if(type==='success') t.style.background='#34c759'; else if(type==='error') t.style.background='#ff3b30'; else t.style.background='#1c1c1e';
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js").catch(()=>{})}</script>
</body>
</html>
