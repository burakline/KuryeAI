<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro - Saha Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background: #0f172a; font-family: 'Inter', sans-serif; }
        #map { height: 42vh; width: 100%; z-index: 1; border-bottom: 2px solid #1e293b; }
        .glass-card { background: rgba(30, 41, 59, 0.96); backdrop-filter: blur(15px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .moto-container { width: 34px; height: 34px; background: #000; border: 3px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #22d3ee; }
        .moto-container::after { content: "AI"; color: #22d3ee; font-size: 11px; font-weight: 900; }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 9999; }
        .target-btn { width: 44px; height: 44px; background: white; border-radius: 14px; display: flex; align-items: center; justify-content: center; position: absolute; bottom: 15px; right: 15px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.6); }
    </style>
</head>
<body class="text-white flex flex-col h-screen">

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 transform -translate-x-full p-6 border-r border-slate-800 shadow-2xl">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
            <h2 class="text-2xl font-black text-cyan-400 italic uppercase">KuryeAI</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-3xl">✕</button>
        </div>
        <nav class="space-y-3">
            <button onclick="showPage('profile')" class="w-full text-left p-4 rounded-2xl bg-slate-800/40 hover:bg-cyan-500/20 transition-all flex items-center gap-4">👤 <span class="font-bold">Profilim</span></button>
            <button onclick="showPage('reports')" class="w-full text-left p-4 rounded-2xl bg-slate-800/40 hover:bg-cyan-500/20 transition-all flex items-center gap-4">📊 <span class="font-bold">Geçmiş Raporlar</span></button>
            <button onclick="showPage('earnings')" class="w-full text-left p-4 rounded-2xl bg-slate-800/40 hover:bg-cyan-500/20 transition-all flex items-center gap-4">💰 <span class="font-bold">Geçmiş Kazançlar</span></button>
            <button onclick="showPage('main')" class="w-full text-center p-4 rounded-2xl bg-cyan-600 font-black mt-10 shadow-lg shadow-cyan-900/40 uppercase text-xs">ANA EKRANA DÖN</button>
        </nav>
    </div>

    <div id="km-modal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-6 z-[10000]">
        <div class="bg-slate-800 p-8 rounded-[40px] w-full max-w-sm border border-slate-700 space-y-6 shadow-2xl text-center">
            <div id="modal-icon" class="text-4xl">📸</div>
            <h3 id="km-title" class="text-xl font-black text-cyan-400 uppercase">KM KAYDI</h3>
            <div class="space-y-3 text-left">
                <label id="file-label" class="block text-[10px] font-black text-slate-400 uppercase tracking-[2px] ml-1"></label>
                <input type="file" capture="camera" id="km-photo" class="w-full text-xs text-slate-400 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:bg-cyan-600 file:text-white file:font-black file:border-0 shadow-inner">
            </div>
            <input type="number" id="km-input" placeholder="00000.0" class="w-full p-6 bg-slate-900 rounded-3xl border-2 border-slate-700 font-black text-3xl outline-none focus:border-cyan-500 text-cyan-400 text-center">
            <button id="save-btn" class="w-full py-5 bg-emerald-600 rounded-3xl font-black uppercase tracking-widest text-lg shadow-xl hover:bg-emerald-500 transition active:scale-95">KAYDET VE BAŞLAT</button>
        </div>
    </div>

    <header class="h-16 px-5 flex justify-between items-center glass-card z-[2000]">
        <div class="flex items-center gap-4">
            <button onclick="toggleMenu()" class="p-2.5 bg-slate-800 rounded-xl text-xl shadow-inner">☰</button>
            <h1 class="text-2xl font-black text-cyan-400 italic tracking-tighter">KuryeAI</h1>
        </div>
        <div id="status-badge" class="px-4 py-1.5 rounded-full text-[9px] font-black bg-rose-500/10 text-rose-500 border border-rose-500/30 tracking-widest">VARDİYA KAPALI</div>
    </header>

    <main id="main-view" class="flex-grow flex flex-col overflow-hidden">
        <div class="relative">
            <div id="map"></div>
            <button onclick="reCenter()" class="target-btn">📍</button>
        </div>

        <div class="px-5 py-4 grid grid-cols-2 gap-4 bg-slate-900/80 border-b border-slate-800">
            <button id="btn-start" class="bg-emerald-600 py-4.5 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-lg active:scale-95 transition-all">Vardiya Başlat</button>
            <button id="btn-end" class="bg-rose-600 py-4.5 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-lg opacity-30 active:scale-95 transition-all" disabled>Vardiya Bitir</button>
        </div>

        <div class="flex-grow p-4 bg-slate-900 grid grid-cols-3 gap-2.5">
            <div class="glass-card p-3.5 rounded-2xl text-center"><p class="text-[9px] opacity-40 font-black uppercase">Hız</p><p id="speed" class="text-2xl font-black text-cyan-400">0</p></div>
            <div class="glass-card p-3.5 rounded-2xl text-center"><p class="text-[9px] opacity-40 font-black uppercase">Toplam KM</p><p id="km-display" class="text-2xl font-black text-yellow-400">0.0</p></div>
            <div class="glass-card p-3.5 rounded-2xl text-center"><p class="text-[9px] opacity-40 font-black uppercase">Süre</p><p id="timer" class="text-2xl font-black">00:00</p></div>
            <div class="glass-card p-3.5 rounded-2xl text-center"><p class="text-[9px] opacity-40 font-black uppercase">Ort. Hız</p><p id="avg-speed" class="text-2xl font-black text-blue-400">0</p></div>
            <div class="glass-card p-3.5 rounded-2xl text-center"><p class="text-[9px] opacity-40 font-black uppercase">Birim KM</p><p class="text-2xl font-black text-emerald-400">₺8.0</p></div>
            <div class="glass-card p-3.5 rounded-2xl text-center"><p class="text-[9px] opacity-40 font-black uppercase">Kazanç</p><p id="earnings" class="text-2xl font-black text-emerald-500">₺0</p></div>
        </div>
    </main>

    <div id="profile-view" class="section-view hidden flex-grow p-8 bg-slate-900 overflow-y-auto">
        <h2 class="text-3xl font-black text-cyan-400 italic">👤 PROFİLİM</h2>
        <div class="mt-8 space-y-4">
            <div class="p-6 bg-slate-800 rounded-3xl border border-slate-700">
                <p class="text-xs text-slate-500 font-bold uppercase">Kurye Ad Soyad</p>
                <p class="text-xl font-black mt-1">Harun Kaya</p>
            </div>
            <div class="p-6 bg-slate-800 rounded-3xl border border-slate-700">
                <p class="text-xs text-slate-500 font-bold uppercase">Saha Bölgesi</p>
                <p class="text-xl font-black mt-1">Ankara / Çankaya</p>
            </div>
        </div>
    </div>
    
    <div id="reports-view" class="section-view hidden flex-grow p-8 bg-slate-900 overflow-y-auto">
        <h2 class="text-3xl font-black text-yellow-500 italic">📊 RAPORLAR</h2>
        <p class="mt-10 text-slate-500 text-center font-bold">Henüz haftalık rapor oluşturulmadı.</p>
    </div>

    <div id="earnings-view" class="section-view hidden flex-grow p-8 bg-slate-900 overflow-y-auto">
        <h2 class="text-3xl font-black text-emerald-500 italic">💰 KAZANÇLAR</h2>
        <div id="earnings-list" class="mt-8 space-y-4"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, marker, pathLine, watchId, startTime, lastPos, startKM = 0, route = [], speeds = [], wakeLock = null;

        // HARİTA KURULUMU
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        pathLine = L.polyline([], {color: '#22d3ee', weight: 6, opacity: 0.8}).addTo(map);

        // EKRANI UYANIK TUTMA (WAKE LOCK)
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Ekran kilidi aktif.');
                }
            } catch (err) { console.error('WakeLock hatası:', err); }
        }

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        }

        function showPage(page) {
            document.querySelectorAll('main, .section-view').forEach(el => el.classList.add('hidden'));
            document.getElementById(page + '-view').classList.remove('hidden');
            if(page === 'main') document.getElementById('main-view').classList.remove('hidden');
            toggleMenu();
        }

        function startTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition((pos) => {
                const current = [pos.coords.latitude, pos.coords.longitude];
                const speedKmh = pos.coords.speed ? Math.round(pos.coords.speed * 3.6) : 0;
                
                if(speedKmh > 0.5) {
                    speeds.push(speedKmh);
                    route.push(current);
                    pathLine.setLatLngs(route);
                    
                    if(lastPos) {
                        const dist = L.latLng(lastPos).distanceTo(L.latLng(current)) / 1000;
                        const currentTotal = parseFloat(document.getElementById('km-display').innerText);
                        document.getElementById('km-display').innerText = (currentTotal + dist).toFixed(2);
                        
                        const durationHrs = (Date.now() - startTime) / 3600000;
                        const totalEarning = ((currentTotal + dist) * 8) + (durationHrs * 215);
                        document.getElementById('earnings').innerText = '₺' + totalEarning.toFixed(1);
                    }
                }

                if (!marker) {
                    marker = L.marker(current, {icon: L.divIcon({className: '', html: '<div class="moto-container"></div>', iconSize: [34,34]})}).addTo(map);
                } else { marker.setLatLng(current); }
                
                document.getElementById('speed').innerText = speedKmh;
                const avg = speeds.length > 0 ? (speeds.reduce((a,b)=>a+b)/speeds.length).toFixed(0) : 0;
                document.getElementById('avg-speed').innerText = avg;

                map.panTo(current);
                lastPos = current;
            }, (err) => { console.error('GPS Hatası:', err); }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        let currentMode = '';
        document.getElementById('btn-start').onclick = () => { currentMode = 'start'; openKM(); };
        document.getElementById('btn-end').onclick = () => { currentMode = 'end'; openKM(); };

        function openKM() {
            document.getElementById('km-modal').style.display = 'flex';
            document.getElementById('file-label').innerText = currentMode === 'start' ? 'Vardiya Başlangıç KM Foto' : 'Vardiya Bitiş KM Foto';
            document.getElementById('km-title').innerText = currentMode === 'start' ? 'GİRİŞ KAYDI' : 'ÇIKIŞ KAYDI';
        }

        document.getElementById('save-btn').onclick = async () => {
            const kmVal = parseFloat(document.getElementById('km-input').value);
            if(!kmVal || !document.getElementById('km-photo').files[0]) { alert("Lütfen fotoğraf yükleyin ve KM değerini girin!"); return; }

            if(currentMode === 'start') {
                startKM = kmVal;
                startTime = Date.now();
                startTracking();
                requestWakeLock(); // Vardiya başlarken ekranı sabitle
                document.getElementById('status-badge').innerText = "VARDİYA AKTİF";
                document.getElementById('status-badge').className = "px-4 py-1.5 rounded-full text-[9px] font-black bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 tracking-widest";
                document.getElementById('btn-start').disabled = true; document.getElementById('btn-start').classList.add('opacity-30');
                document.getElementById('btn-end').disabled = false; document.getElementById('btn-end').classList.remove('opacity-30');
            } else {
                // Bitir ve Veritabanına Yaz
                await db.ref('arsiv/harun_kaya').push({
                    tarih: new Date().toLocaleString('tr-TR'),
                    giris_km: startKM,
                    cikis_km: kmVal,
                    alinan_yol: document.getElementById('km-display').innerText,
                    toplam_kazanc: document.getElementById('earnings').innerText,
                    calisma_suresi: document.getElementById('timer').innerText
                });
                if(wakeLock) wakeLock.release();
                location.reload();
            }
            document.getElementById('km-modal').style.display = 'none';
        };

        // Arka Plan Süre Sayacı
        setInterval(() => {
            if(startTime) {
                const diff = Date.now() - startTime;
                const hrs = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                const secs = Math.floor((diff % 60000) / 1000);
                document.getElementById('timer').innerText = 
                    `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);

        function reCenter() { if(lastPos) map.setView(lastPos, 17); }
    </script>
</body>
</html>
