<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro - GPS & Tracking v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0B1120; --cyan: #06B6D4; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); overflow: hidden; margin: 0; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 0; }
        
        /* Marker Stilleri */
        .custom-kurye-marker { display: flex; flex-direction: column; align-items: center; }
        .kurye-name-label { background: rgba(15, 23, 42, 0.95); color: white; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; white-space: nowrap; margin-bottom: 5px; border: 1px solid var(--cyan); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .kurye-ai-circle { width: 36px; height: 36px; background: #000; border: 2px solid var(--cyan); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--cyan); font-weight: 900; font-style: italic; font-size: 14px; box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); }

        /* Sidebar & UI */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #0F172A; z-index: 300; transition: 0.4s; padding: 25px; color: white; }
        .sidebar.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 150; background: #1E293B; color: white; padding: 10px; border-radius: 12px; border: none; }
        .locate-btn { position: fixed; bottom: 245px; right: 20px; z-index: 200; background: white; color: #1E293B; padding: 12px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: none; }

        /* Veri Kartı */
        .bottom-card { position: fixed; bottom: 15px; left: 12px; right: 12px; background: white; border-radius: 24px; padding: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); z-index: 100; }
        
        #speed-overlay { position: fixed; bottom: 245px; left: 20px; z-index: 200; width: 65px; height: 65px; background: #1E293B; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid white; color: white; }
        .speed-limit-warn { border-color: #EF4444 !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.5; background: #EF4444; } }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
    <button class="locate-btn" onclick="locateUser()"><i data-lucide="target"></i></button>

    <div id="speed-overlay">
        <span id="live-speed" class="text-xl font-black">0</span>
        <span class="text-[9px] font-bold uppercase">km/s</span>
    </div>

    <div id="sidebar" class="sidebar">
        <h2 class="text-xl font-black italic mb-8 text-center">KURYE<span class="text-cyan-500">AI</span></h2>
        
        <div class="flex flex-col items-center mb-8">
            <div class="w-24 h-24 bg-slate-800 rounded-3xl border-2 border-cyan-500 overflow-hidden relative" id="photo-container">
                <img id="p-preview" class="w-full h-full object-cover hidden">
                <i id="p-icon" data-lucide="user" class="text-slate-600 w-12 h-12 mt-6 ml-6"></i>
                <div id="p-loader" class="absolute inset-0 bg-black/50 hidden items-center justify-center">
                    <div class="w-6 h-6 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <button onclick="document.getElementById('file-input').click()" class="mt-3 text-xs font-bold text-cyan-400 uppercase">Fotoğrafı Güncelle</button>
        </div>

        <div class="space-y-4">
            <input type="text" id="p-ad" class="w-full bg-slate-800 border-none p-4 rounded-xl text-white" placeholder="Ad Soyad">
            <input type="text" id="p-plaka" class="w-full bg-slate-800 border-none p-4 rounded-xl text-white" placeholder="Plaka">
            <button onclick="saveProfile()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold uppercase text-white">Verileri Kaydet</button>
        </div>

        <div class="absolute bottom-10 left-0 w-full px-6">
            <button onclick="logout()" class="w-full text-rose-500 font-bold flex items-center justify-center gap-2 py-4 bg-slate-900 rounded-xl">
                <i data-lucide="power"></i> Güvenli Çıkış
            </button>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-card">
        <div class="flex justify-between items-center mb-4">
            <div><p class="text-[10px] font-bold text-slate-400 uppercase">Anlık Kazanç</p><p id="earnings" class="text-2xl font-black italic text-slate-900">₺0,00</p></div>
            <div class="text-right"><p class="text-[10px] font-bold text-slate-400 uppercase">Vardiya</p><p id="timer" class="text-lg font-bold">00:00:00</p></div>
        </div>
        <div class="grid grid-cols-3 gap-2 border-t border-slate-100 pt-4 mb-4 text-center">
            <div><p class="text-[9px] text-cyan-600 font-bold uppercase">Mesafe</p><p id="distance" class="font-black">0.0 km</p></div>
            <div><p class="text-[9px] text-cyan-600 font-bold uppercase">Ort. Hız</p><p id="avg-speed" class="font-black">0</p></div>
            <div><p class="text-[9px] text-rose-500 font-bold uppercase">Saat/₺</p><p id="hourly-rate" class="font-black">₺0</p></div>
        </div>
        <button id="main-btn" onclick="handleShiftToggle()" class="w-full h-14 bg-cyan-500 text-white rounded-2xl font-black uppercase flex items-center justify-center gap-2">
            <i data-lucide="zap"></i> Vardiyayı Başlat
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        
        // Firebase Başlatma
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let kuryeID = localStorage.getItem('kuryeAI_ID') || 'KAI-BURAK';
        let kuryeName = "Yükleniyor...";
        let routeColor = '#' + Math.floor(Math.random()*16777215).toString(16); // Her kuryeye özel rastgele renk

        // Harita Kurulumu
        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let isActive = false, startTime, timerInterval, marker, currentPos = null;
        let totalDistance = 0, lastCoord = null, speedSum = 0, speedCount = 0;
        let routeLine = L.polyline([], {color: routeColor, weight: 5, opacity: 0.7}).addTo(map);

        // Profil Verilerini Firebase'den Getir (Kalıcı Çözüm)
        db.ref(`kuryeler/${kuryeID}/profil`).on('value', snap => {
            const d = snap.val();
            if(d) {
                document.getElementById('p-ad').value = d.adSoyad || "";
                document.getElementById('p-plaka').value = d.plaka || "";
                kuryeName = d.adSoyad || "İsimsiz Kurye";
                if(d.photo) {
                    const img = document.getElementById('p-preview');
                    img.src = d.photo; img.classList.remove('hidden');
                    document.getElementById('p-icon').classList.add('hidden');
                }
            }
        });

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function locateUser() { if(currentPos) map.flyTo(currentPos, 17); }

        function saveProfile() {
            const ad = document.getElementById('p-ad').value;
            const plaka = document.getElementById('p-plaka').value;
            db.ref(`kuryeler/${kuryeID}/profil`).update({ adSoyad: ad, plaka: plaka })
            .then(() => alert("Profil verileri güncellendi!"));
        }

        // Fotoğraf Yükleme Fix
        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('p-loader').style.display = 'flex';
            const ref = storage.ref(`avatars/${kuryeID}.jpg`);
            ref.put(file).then(() => ref.getDownloadURL()).then(url => {
                db.ref(`kuryeler/${kuryeID}/profil`).update({ photo: url });
                document.getElementById('p-loader').style.display = 'none';
            }).catch(() => document.getElementById('p-loader').style.display = 'none');
        });

        function handleShiftToggle() {
            if (!isActive) {
                isActive = true;
                startTime = Date.now();
                document.getElementById('main-btn').innerHTML = '<i data-lucide="stop-circle"></i> Vardiyayı Bitir';
                document.getElementById('main-btn').classList.replace('bg-cyan-500', 'bg-slate-900');
                timerInterval = setInterval(updateStats, 1000);
                startTracking();
            } else {
                location.reload(); // Vardiya bitince sistemi temizle
            }
        }

        function updateStats() {
            const diff = Date.now() - startTime;
            const h = Math.floor(diff/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            
            // Kazanç Hesaplama (Örnek: KM başı 15TL + Saatlik 100TL)
            let kazanc = (totalDistance * 15) + ((diff/3600000) * 100);
            document.getElementById('earnings').innerText = "₺" + kazanc.toFixed(2);
            document.getElementById('hourly-rate').innerText = "₺" + (kazanc / (diff/3600000 || 1)).toFixed(0);
        }

        function startTracking() {
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                currentPos = [latitude, longitude];
                const s = speed ? speed * 3.6 : 0;
                
                // Hız Göstergesi & Limit
                document.getElementById('live-speed').innerText = Math.round(s);
                if(s > 50) document.getElementById('speed-overlay').classList.add('speed-limit-warn');
                else document.getElementById('speed-overlay').classList.remove('speed-limit-warn');

                if(isActive) {
                    // Ortalama Hız Hesapla
                    if(s > 2) { speedSum += s; speedCount++; }
                    document.getElementById('avg-speed').innerText = speedCount > 0 ? Math.round(speedSum/speedCount) : 0;
                    
                    // Mesafe ve GPS Çizgisi
                    if(lastCoord) {
                        const d = map.distance(lastCoord, currentPos) / 1000;
                        if(d > 0.005) { // Sıçramaları önlemek için 5 metreden küçük hareketleri sayma
                            totalDistance += d;
                            document.getElementById('distance').innerText = totalDistance.toFixed(1) + " km";
                            routeLine.addLatLng(currentPos);
                        }
                    } else {
                        routeLine.addLatLng(currentPos);
                    }
                    map.panTo(currentPos); // Kuryeyi takip et
                }
                lastCoord = currentPos;

                // Özel Marker (İsim + AI İkonu)
                const iconHTML = `
                    <div class="custom-kurye-marker">
                        <div class="kurye-name-label">${kuryeName}</div>
                        <div class="kurye-ai-circle">AI</div>
                    </div>`;
                
                if(!marker) {
                    marker = L.marker(currentPos, {icon: L.divIcon({className:'', html:iconHTML, iconSize:[100,60], iconAnchor:[50,55]})}).addTo(map);
                    map.setView(currentPos, 17);
                } else {
                    marker.setLatLng(currentPos);
                    marker.setIcon(L.divIcon({className:'', html:iconHTML, iconSize:[100,60], iconAnchor:[50,55]}));
                }
            }, err => console.error(err), {enableHighAccuracy: true, maximumAge: 0});
        }

        function logout() { window.location.href = "index.html"; }
    </script>
</body>
</html>
