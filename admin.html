<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}
.nav{display:flex;gap:10px;padding:15px;background:white;}
.nav button{padding:10px;border:none;border-radius:10px;background:#eee;}
.active{background:#00d4ff;color:white;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:10px;}
#map{height:70vh;border-radius:12px;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('settings')" class="active">⚙️ Ayarlar</button>
<button onclick="show('apps')">📩 Başvurular</button>
<button onclick="show('analytics')">📊 Analiz</button>
<button onclick="show('mapPage')">🗺️ Harita</button>
</div>

<div class="container">

<div id="settings">
<div class="card">
<h3>Sistem Ayarları</h3>
<input id="km" placeholder="Max KM">
<input id="timeout" placeholder="Timeout">
<input id="hourly" placeholder="Saatlik">
<input id="perkm" placeholder="KM ücret">
<button onclick="saveSettings()">Kaydet</button>
</div>
</div>

<div id="apps" style="display:none"></div>

<!-- 📊 ANALYTICS -->
<div id="analytics" style="display:none">

<div class="card">
<h3>💰 Gelir Grafiği</h3>
<canvas id="incomeChart"></canvas>
</div>

<div class="card">
<h3>🧠 AI Performans</h3>
<p>Aktif Kurye: <b id="activeCourier">0</b></p>
<p>Toplam Sipariş: <b id="totalOrders">0</b></p>
<p>Toplam Kazanç: <b id="totalIncome">0₺</b></p>
<p>Verimlilik: <b id="efficiency">0%</b></p>
</div>

</div>

<div id="mapPage" style="display:none">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
getDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* NAV */
window.show = (id)=>{
["settings","apps","analytics","mapPage"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
};

/* ⚙️ SETTINGS */
window.saveSettings = async ()=>{
await setDoc(doc(db,"settings","config"),{
maxDistance:Number(km.value),
timeout:Number(timeout.value),
hourly:Number(hourly.value),
perKm:Number(perkm.value)
});
alert("Kaydedildi");
};

/* 📊 GELİR */
onSnapshot(collection(db,"earnings"), snap=>{

let total=0;
let data=[];

snap.forEach(d=>{
const val=d.data().amount;
total+=val;
data.push(val);
});

document.getElementById("totalIncome").innerText=total+"₺";

/* CHART */
new Chart(document.getElementById("incomeChart"),{
type:"line",
data:{
labels:data.map((_,i)=>i+1),
datasets:[{data}]
}
});

});

/* 🚴 AKTİF */
onSnapshot(collection(db,"couriers"), snap=>{
let active=0;
snap.forEach(d=>{
if(d.data().online) active++;
});
document.getElementById("activeCourier").innerText=active;
});

/* 📦 SİPARİŞ */
onSnapshot(collection(db,"orders"), snap=>{
document.getElementById("totalOrders").innerText=snap.size;

/* basit verimlilik */
const eff = Math.min(100, snap.size*10);
document.getElementById("efficiency").innerText=eff+"%";
});

/* 🗺️ MAP */
const map = L.map('map').setView([39.92,32.85],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

/* 🔥 HEATMAP */
let heatPoints=[];

onSnapshot(collection(db,"orders"), snap=>{
heatPoints=[];

snap.forEach(d=>{
const o=d.data();
if(o.lat){
heatPoints.push([o.lat,o.lng]);
}
});

/* basit heat simülasyon */
heatPoints.forEach(p=>{
L.circle(p,{radius:200,color:"red"}).addTo(map);
});

});

</script>
</body>
</html>
