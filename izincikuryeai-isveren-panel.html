<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>İzinciKuryeAI — İşveren Paneli</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#f5f5f7; --card:#fff; --border:#e5e5ea; --tx:#1c1c1e; --tx2:#636366; --teal:#00c8d7; --teal2:#0099a8; --red:#ff3b30; --green:#34c759; --orange:#ff9500; --sh:0 2px 12px rgba(0,0,0,0.07); --r:16px; --f:Arial,Helvetica,sans-serif; }
    html,body { height:100%; background:var(--bg); color:var(--tx); font-family:var(--f); -webkit-font-smoothing:antialiased; }
    .page-loader { position:fixed; inset:0; z-index:999; background:#fff; display:flex; align-items:center; justify-content:center; }
    .page-loader.hide { display:none; }
    .spinner-r { width:32px; height:32px; border:3px solid rgba(0,200,215,.2); border-top-color:var(--teal); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    header { background:var(--card); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .hlogo { font-size:1.05rem; font-weight:800; }
    .hlogo .izinci { color:#30d158; }
    .hlogo .ai { color:var(--teal); }
    .hout { font-size:.8rem; color:var(--tx2); cursor:pointer; border:1px solid var(--border); background:var(--card); padding:.4rem .9rem; border-radius:8px; }
    .hout:hover { color:var(--red); border-color:var(--red); }

    main { max-width:640px; margin:0 auto; padding:1.5rem 1.5rem 6rem; }
    .sec-title { font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--tx2); margin-bottom:.8rem; }
    .card { background:var(--card); border-radius:var(--r); box-shadow:var(--sh); padding:1.4rem; }
    .card + .card { margin-top:1rem; }

    .form-group { margin-bottom:.9rem; }
    .form-label { display:block; font-size:.68rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--tx2); margin-bottom:.35rem; }
    .form-input { width:100%; background:#f5f5f7; border:1px solid var(--border); border-radius:10px; padding:.7rem 1rem; font-size:.9rem; font-family:var(--f); outline:none; transition:border-color .2s; color:var(--tx); }
    .form-input:focus { border-color:var(--teal); }
    textarea.form-input { resize:vertical; min-height:80px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:.7rem; }
    .btn-primary { background:var(--teal); color:#000; border:none; border-radius:12px; padding:.75rem 2rem; font-size:.88rem; font-weight:700; cursor:pointer; font-family:var(--f); transition:background .2s; }
    .btn-primary:hover { background:#33d6e3; }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
    .btn-sm { font-size:.78rem; font-weight:700; padding:.4rem 1rem; border-radius:8px; border:none; cursor:pointer; font-family:var(--f); transition:background .2s; }
    .btn-approve { background:var(--green); color:#fff; }
    .btn-approve:hover { background:#2ca048; }
    .btn-reject { background:#f5f5f7; color:var(--tx2); border:1px solid var(--border); }
    .btn-reject:hover { background:var(--red); color:#fff; border-color:var(--red); }

    .talep-item { border:1px solid var(--border); border-radius:var(--r); padding:1rem; margin-bottom:.8rem; }
    .talep-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
    .talep-id { font-size:.72rem; font-weight:700; color:var(--teal); }
    .st-badge { font-size:.7rem; font-weight:700; padding:.2rem .6rem; border-radius:999px; }
    .st-open { background:rgba(0,200,215,.12); color:var(--teal); }
    .st-matched { background:rgba(52,199,89,.12); color:var(--green); }
    .st-closed { background:rgba(100,100,100,.1); color:var(--tx2); }
    .talep-info { font-size:.82rem; color:var(--tx2); line-height:1.7; }
    .talep-info strong { color:var(--tx); }
    .teklifler-section { margin-top:.8rem; border-top:1px solid var(--border); padding-top:.8rem; }
    .teklif-item { background:#f5f5f7; border-radius:12px; padding:.9rem; margin-bottom:.6rem; }
    .teklif-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
    .teklif-name { font-size:.88rem; font-weight:700; }
    .teklif-info { font-size:.78rem; color:var(--tx2); line-height:1.6; margin-bottom:.6rem; }
    .teklif-actions { display:flex; gap:.5rem; }
    .kurye-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; margin-right:.6rem; border:2px solid var(--teal); }
    .teklif-head-left { display:flex; align-items:center; }

    .empty-state { text-align:center; padding:2rem; color:var(--tx2); font-size:.88rem; }
    .empty-state .ico { font-size:2rem; margin-bottom:.6rem; }

    .id-badge { display:inline-block; background:rgba(0,200,215,.1); border:1px solid rgba(0,200,215,.2); border-radius:8px; padding:.3rem .8rem; font-size:.8rem; font-weight:700; color:var(--teal); margin-bottom:1rem; }

    .nav-tabs { display:flex; background:var(--card); border-top:1px solid var(--border); position:fixed; bottom:0; left:0; right:0; z-index:100; }
    .nav-tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:.3rem; padding:.8rem .5rem; cursor:pointer; font-size:.65rem; font-weight:600; color:var(--tx2); transition:color .2s; border:none; background:none; font-family:var(--f); }
    .nav-tab.active { color:var(--teal); }
    .nav-tab .ico { font-size:1.4rem; }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    .toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(80px); background:#1c1c1e; color:#fff; padding:.75rem 1.5rem; border-radius:999px; font-size:.85rem; font-weight:600; z-index:9999; transition:transform .3s; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); }

    .ok-box { display:none; background:rgba(52,199,89,.08); border:.5px solid rgba(52,199,89,.25); border-radius:8px; padding:.7rem 1rem; font-size:.82rem; color:var(--green); margin-bottom:1rem; }
    .err-box { display:none; background:rgba(255,59,48,.08); border:.5px solid rgba(255,59,48,.25); border-radius:8px; padding:.7rem 1rem; font-size:.82rem; color:var(--red); margin-bottom:1rem; }
  </style>
</head>
<body>
<div class="page-loader" id="page-loader"><div class="spinner-r"></div></div>

<header>
  <div class="hlogo"><span class="izinci">İzinci</span>Kurye<span class="ai">AI</span></div>
  <button class="hout" onclick="doLogout()">Çıkış</button>
</header>

<main>
  <!-- YENİ TALEP -->
  <div class="tab-content active" id="tab-talep">
    <div class="sec-title" style="margin-top:.5rem">Yeni Kurye Talebi Oluştur</div>
    <div class="card">
      <div class="ok-box" id="talep-ok"></div>
      <div class="err-box" id="talep-err"></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tarih</label>
          <input class="form-input" type="date" id="t-tarih"/>
        </div>
        <div class="form-group">
          <label class="form-label">Saat</label>
          <input class="form-input" type="time" id="t-saat"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Adres / Bölge</label>
        <input class="form-input" type="text" id="t-adres" placeholder="örn. Kadıköy, Bağdat Caddesi"/>
      </div>
      <div class="form-group">
        <label class="form-label">Açıklama</label>
        <textarea class="form-input" id="t-aciklama" placeholder="Kurye ihtiyacınız hakkında detay verin (ör. motor kurye, haftalık çalışma, bölge bilgisi...)"></textarea>
      </div>
      <button class="btn-primary" id="btn-talep" onclick="submitTalep()">Talep Oluştur →</button>
    </div>
  </div>

  <!-- TALEPLERİM -->
  <div class="tab-content" id="tab-taleplerim">
    <div class="sec-title" style="margin-top:.5rem">Taleplerim</div>
    <div id="talepler-list">
      <div class="empty-state"><div class="ico">📋</div><div>Yükleniyor...</div></div>
    </div>
  </div>

  <!-- PROFİL -->
  <div class="tab-content" id="tab-profil">
    <div class="sec-title" style="margin-top:.5rem">Profilim</div>
    <div class="card">
      <div id="isverenIdBadge" class="id-badge" style="display:none"></div>
      <div class="form-group">
        <label class="form-label">Ad Soyad / İşletme Adı</label>
        <input class="form-input" type="text" id="p-name" placeholder="Ad Soyad veya İşletme Adı"/>
      </div>
      <div class="form-group">
        <label class="form-label">Telefon</label>
        <input class="form-input" type="tel" id="p-phone" placeholder="05XX XXX XX XX"/>
      </div>
      <button class="btn-primary" onclick="saveProfile()">Kaydet</button>
    </div>
  </div>
</main>

<nav class="nav-tabs">
  <button class="nav-tab active" id="nav-talep" onclick="switchTab('talep')"><span class="ico">➕</span>Yeni Talep</button>
  <button class="nav-tab" id="nav-taleplerim" onclick="switchTab('taleplerim')"><span class="ico">📋</span>Taleplerim</button>
  <button class="nav-tab" id="nav-profil" onclick="switchTab('profil')"><span class="ico">👤</span>Profil</button>
</nav>

<div class="toast" id="toast"></div>

<script type="module">
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, query, where, orderBy, onSnapshot, getDocs, writeBatch }
    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:"AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y", authDomain:"kuryeai-99bf9.firebaseapp.com",
    projectId:"kuryeai-99bf9", storageBucket:"kuryeai-99bf9.firebasestorage.app",
    messagingSenderId:"1012295004135", appId:"1:1012295004135:web:0cceac0476175e19395742"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  let currentUser = null;

  function generateID(prefix) {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let id = prefix + '-';
    for (let i = 0; i < 8; i++) id += chars[Math.floor(Math.random() * chars.length)];
    return id;
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user || !user.emailVerified) { window.location.href = '/izincikuryeai-isveren-login'; return; }
    try {
      const snap = await getDoc(doc(db,'users',user.uid));
      if (!snap.exists() || (snap.data().role !== 'izinci_isveren' && snap.data().role !== 'admin')) {
        await signOut(auth); window.location.href = '/izincikuryeai-isveren-login'; return;
      }
      currentUser = { uid:user.uid, ...snap.data() };
      initPanel();
      document.getElementById('page-loader').classList.add('hide');
    } catch(e) { window.location.href = '/izincikuryeai-isveren-login'; }
  });

  function initPanel() {
    const u = currentUser;
    const badge = document.getElementById('isverenIdBadge');
    if (u.isverenId) { badge.textContent = '🏢 ' + u.isverenId; badge.style.display='inline-block'; }
    document.getElementById('p-name').value  = u.name  || '';
    document.getElementById('p-phone').value = u.phone || '';

    // Set default date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('t-tarih').value = today;

    loadTalepler();
  }

  let _unsubTalepler = null;
  function loadTalepler() {
    if (_unsubTalepler) _unsubTalepler();
    const q = query(
      collection(db,'izinciTalepler'),
      where('isverenId','==',currentUser.uid),
      orderBy('createdAt','desc')
    );
    _unsubTalepler = onSnapshot(q, snap => {
      const talepler = snap.docs.map(d=>({id:d.id,...d.data()}));
      renderTalepler(talepler);
    }, ()=>{});
  }

  async function renderTalepler(talepler) {
    const el = document.getElementById('talepler-list');
    if (!talepler.length) {
      el.innerHTML = '<div class="empty-state"><div class="ico">📋</div><div>Henüz talep oluşturmadınız</div></div>';
      return;
    }

    // For each talep, load its teklifler
    const html = await Promise.all(talepler.map(async t => {
      const stClass = t.status === 'matched' ? 'st-matched' : (t.status === 'closed' ? 'st-closed' : 'st-open');
      const stText  = t.status === 'matched' ? 'Eşleşti' : (t.status === 'closed' ? 'Kapatıldı' : 'Bekliyor');

      // load teklifler for this talep
      let tekliflerHtml = '';
      if (t.status !== 'matched') {
        try {
          const tq = query(collection(db,'izinciTeklifler'), where('talepId','==',t.id), orderBy('createdAt','asc'));
          const tsnap = await getDocs(tq);
          const teklifler = tsnap.docs.map(d=>({id:d.id,...d.data()})).filter(tk=>tk.status !== 'reddedildi');
          if (teklifler.length) {
            tekliflerHtml = `<div class="teklifler-section">
              <div style="font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tx2);margin-bottom:.5rem">Gelen Teklifler (${teklifler.length})</div>
              ${teklifler.map(tk => `
                <div class="teklif-item">
                  <div class="teklif-head">
                    <div class="teklif-head-left">
                      ${tk.kuryeFoto ? `<img src="${tk.kuryeFoto}" class="kurye-avatar" alt="">` : '<div style="width:36px;height:36px;border-radius:50%;background:rgba(0,200,215,.15);display:flex;align-items:center;justify-content:center;margin-right:.6rem;font-size:1.2rem">🛵</div>'}
                      <div class="teklif-name">${tk.kuryeAdi || 'İsim yok'}</div>
                    </div>
                    <span style="font-size:.7rem;font-weight:700;color:var(--tx2)">${tk.createdAt ? new Date(tk.createdAt).toLocaleDateString('tr-TR') : ''}</span>
                  </div>
                  <div class="teklif-info">
                    ${tk.kuryePlakasi ? `🏍️ Plaka: <strong>${esc(tk.kuryePlakasi)}</strong><br>` : ''}
                    ${tk.kuryeArac ? `🔧 Araç: <strong>${esc(tk.kuryeArac)}</strong><br>` : ''}
                    ${tk.kuryeId ? `🪪 ID: <strong>${esc(tk.kuryeId)}</strong>` : ''}
                  </div>
                  <div class="teklif-actions">
                    <button class="btn-sm btn-approve" onclick="approveTeklif('${t.id}','${tk.id}','${tk.kuryeUid}')">✓ Onayla</button>
                    <button class="btn-sm btn-reject" onclick="rejectTeklif('${tk.id}')">✗ Reddet</button>
                  </div>
                </div>`).join('')}
            </div>`;
          } else {
            tekliflerHtml = `<div class="teklifler-section"><div style="font-size:.8rem;color:var(--tx2)">Henüz teklif gelmedi. Kuryeler talebi görebilir.</div></div>`;
          }
        } catch(e) {}
      } else if (t.matchedKuryeAdi) {
        tekliflerHtml = `<div class="teklifler-section" style="background:rgba(52,199,89,.06);border-radius:8px;padding:.8rem;margin-top:.8rem">
          <div style="font-size:.8rem;font-weight:700;color:var(--green)">✅ Eşleşme Tamamlandı</div>
          <div style="font-size:.8rem;color:var(--tx2);margin-top:.3rem">Kurye: <strong>${esc(t.matchedKuryeAdi)}</strong></div>
        </div>`;
      }

      return `<div class="talep-item">
        <div class="talep-head">
          <span class="talep-id">${t.talepId || t.id}</span>
          <span class="st-badge ${stClass}">${stText}</span>
        </div>
        <div class="talep-info">
          📅 ${t.tarih || '—'} ${t.saat ? '· ' + t.saat : ''}<br>
          📍 ${t.adres || '—'}<br>
          ${t.aciklama ? `💬 ${esc(t.aciklama)}` : ''}
        </div>
        ${tekliflerHtml}
      </div>`;
    }));

    el.innerHTML = html.join('');
  }

  window.submitTalep = async () => {
    const tarih    = document.getElementById('t-tarih').value;
    const saat     = document.getElementById('t-saat').value;
    const adres    = document.getElementById('t-adres').value.trim();
    const aciklama = document.getElementById('t-aciklama').value.trim();
    const btn  = document.getElementById('btn-talep');
    const ok   = document.getElementById('talep-ok');
    const err  = document.getElementById('talep-err');
    ok.style.display = 'none'; err.style.display = 'none';

    if (!tarih || !saat || !adres) { err.textContent='Tarih, saat ve adres zorunludur.'; err.style.display='block'; return; }
    btn.disabled = true; btn.textContent = 'Gönderiliyor...';
    try {
      const talepId = generateID('TAL');
      await addDoc(collection(db,'izinciTalepler'), {
        talepId, isverenId: currentUser.uid, isverenAdi: currentUser.name || '',
        tarih, saat, adres, aciklama,
        status: 'open', createdAt: new Date().toISOString()
      });
      ok.textContent = `✅ Talep oluşturuldu! ID: ${talepId}. Kuryeler tekliflerini gönderebilir.`;
      ok.style.display = 'block';
      document.getElementById('t-adres').value = '';
      document.getElementById('t-aciklama').value = '';
      document.getElementById('t-saat').value = '';
      // Switch to taleplerim tab
      setTimeout(() => window.switchTab('taleplerim'), 1500);
    } catch(e) {
      err.textContent = 'Hata: ' + e.message;
      err.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = 'Talep Oluştur →';
  };

  window.approveTeklif = async (talepId, teklifId, kuryeUid) => {
    if (!confirm('Bu kurye teklifini onaylamak istediğinizden emin misiniz?')) return;
    try {
      // Get kurye info
      const kuryeSnap = await getDoc(doc(db,'users',kuryeUid));
      const kuryeData = kuryeSnap.exists() ? kuryeSnap.data() : {};

      const batch = writeBatch(db);
      // Update talep
      batch.update(doc(db,'izinciTalepler',talepId), {
        status: 'matched',
        kuryeId: kuryeUid,
        matchedKuryeAdi: kuryeData.name || '',
        matchedAt: new Date().toISOString()
      });
      // Update teklif
      batch.update(doc(db,'izinciTeklifler',teklifId), { status: 'onaylandi' });
      await batch.commit();
      toast('Kurye onaylandı! Eşleşme tamamlandı ✅','success');
    } catch(e) { toast('Hata: ' + e.message,'error'); }
  };

  window.rejectTeklif = async (teklifId) => {
    try {
      await updateDoc(doc(db,'izinciTeklifler',teklifId), { status: 'reddedildi' });
      toast('Teklif reddedildi','info');
    } catch(e) { toast('Hata: ' + e.message,'error'); }
  };

  window.saveProfile = async () => {
    const data = {
      name:  document.getElementById('p-name').value.trim(),
      phone: document.getElementById('p-phone').value.trim()
    };
    try {
      await updateDoc(doc(db,'users',currentUser.uid), data);
      Object.assign(currentUser, data);
      toast('Profil kaydedildi ✅','success');
    } catch(e) { toast('Kayıt başarısız','error'); }
  };

  window.doLogout = async () => {
    await signOut(auth);
    window.location.href = '/izincikuryeai-isveren-login';
  };

  window.switchTab = (t) => {
    document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
    document.querySelectorAll('.nav-tab').forEach(e=>e.classList.remove('active'));
    document.getElementById('tab-'+t).classList.add('active');
    document.getElementById('nav-'+t).classList.add('active');
  };

  function toast(msg,type='info') {
    const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show';
    if(type==='success') t.style.background='#34c759';
    else if(type==='error') t.style.background='#ff3b30';
    else t.style.background='#1c1c1e';
    setTimeout(()=>t.classList.remove('show'),3000);
  }
</script>
</body>
</html>
