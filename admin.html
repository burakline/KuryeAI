<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>AdminAI SYSTEM SYNC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:100vh}

.panel{
position:fixed;bottom:0;width:100%;height:45vh;
background:#020617;border-radius:20px 20px 0 0;
overflow:auto;z-index:9999;transition:.3s;
}
.panel.full{height:85vh}

.tabs{display:flex;justify-content:space-around;padding:6px;background:#020617}
.tabs button{background:#0f172a;color:white;border-radius:10px;padding:10px;width:20%}

.card{margin:8px;padding:12px;border-radius:14px;background:rgba(15,23,42,.7)}

input,select{width:100%;padding:12px;margin-top:6px;border:none;border-radius:10px;background:#0f172a;color:white}
button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:10px;font-weight:bold}

.blue{background:#00d4ff;color:black}
.green{background:#22c55e}
.orange{background:#f59e0b;color:black}
.red{background:#ef4444}
.gray{background:#64748b}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel" id="panel">

<div class="tabs">
<button onclick="tab('orders')">📦</button>
<button onclick="tab('couriers')">🚴</button>
<button onclick="tab('finance')">💰</button>
<button onclick="tab('settings')">⚙️</button>
</div>

<!-- ORDERS -->
<div id="ordersTab">

<div class="card">
<input id="customer" placeholder="Müşteri">
<input id="address" placeholder="Adres">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<button class="blue" onclick="createOrder()">Sipariş Oluştur</button>
</div>

<div class="card">
<select id="orderSelect"></select>
<select id="courierSelect"></select>
<button class="orange" onclick="manualAssign()">Manuel Ata</button>
</div>

<div class="card" id="orderList"></div>

</div>

<!-- COURIERS -->
<div id="couriersTab" style="display:none">
<div class="card" id="courierList"></div>
</div>

<!-- FINANCE -->
<div id="financeTab" style="display:none">
<div class="card"><div id="financeSummary"></div></div>
<div class="card"><div id="courierFinance"></div></div>
</div>

<!-- SETTINGS -->
<div id="settingsTab" style="display:none">
<div class="card">
<input id="speed" placeholder="Ortalama hız km/h (örn 40)">
</div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const db=getDatabase();
const map=L.map('map').setView([39.92,32.85],11);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* CACHE */
let couriers={},orders={};
let courierMarkers={},orderMarkers={},routes={},routeCache={};

/* TAB */
window.tab=function(t){
ordersTab.style.display="none";
couriersTab.style.display="none";
financeTab.style.display="none";
settingsTab.style.display="none";
document.getElementById(t+"Tab").style.display="block";
};

/* MAP CLICK */
map.on("click",function(e){
lat.value=e.latlng.lat;
lng.value=e.latlng.lng;
});

/* DIST */
function dist(a,b,c,d){
return Math.hypot(a-c,b-d);
}

/* DISPATCH AI */
function findBestCourier(order){

let best=null;
let min=999999;

for(let id in couriers){

let c=couriers[id];
if(!c.lat) continue;

let d=dist(order.lat,order.lng,c.lat,c.lng);

let active=0;
for(let o in orders){
if(orders[o].courierId===id && orders[o].status!=="delivered"){
active++;
}
}

let score=(d*0.5)+(active*2)+(c.online?0:999);

if(score<min){
min=score;
best=id;
}
}

return best;
}

/* ROUTE */
async function getRoute(c,o){

let key=c.lat+","+c.lng+"_"+o.lat+","+o.lng;
if(routeCache[key]) return routeCache[key];

let url="https://router.project-osrm.org/route/v1/driving/"
+c.lng+","+c.lat+";"+o.lng+","+o.lat+
"?overview=full&geometries=geojson";

let res=await fetch(url);
let data=await res.json();

routeCache[key]=data.routes[0];
return data.routes[0];
}

/* ETA */
function calcETA(route){
return Math.round(route.duration/60);
}

/* CREATE ORDER */
window.createOrder=function(){

let id="ORD-"+Date.now();

let order={
id:id,
customer:customer.value,
address:address.value,
lat:parseFloat(lat.value),
lng:parseFloat(lng.value),
status:"waiting"
};

set(ref(db,"orders/"+id),order);

let best=findBestCourier(order);

if(best){
update(ref(db,"orders/"+id),{
courierId:best,
status:"assigned"
});
}

};

/* MANUAL */
window.manualAssign=function(){
update(ref(db,"orders/"+orderSelect.value),{
courierId:courierSelect.value,
status:"assigned"
});
};

/* STATUS FLOW (ADMIN müdahale) */
window.setStatus=function(id,status){
update(ref(db,"orders/"+id),{status:status});
};

/* FINANCE */
function calculateFinance(){

let total=0,delivered=0,revenue=0;
let stats={};

for(let id in orders){

let o=orders[id];
total++;

if(o.status==="delivered"){

delivered++;

let price=o.price||50;
revenue+=price;

let cid=o.courierId;

if(!stats[cid]) stats[cid]=0;

stats[cid]+=price*0.6;
}
}

financeSummary.innerHTML=
"Toplam: "+total+"<br>"+
"Teslim: "+delivered+"<br>"+
"Ciro: "+revenue.toFixed(2)+"₺";

let html="";
for(let c in stats){
html+=c+" → "+stats[c].toFixed(2)+"₺<br>";
}

courierFinance.innerHTML=html;
}

/* COURIERS */
onValue(ref(db,"couriers"),function(snap){

courierList.innerHTML="";
courierSelect.innerHTML="";
couriers={};

snap.forEach(function(c){

let id=c.key;
let d=c.val();

couriers[id]=d;

if(d.lat){
if(!courierMarkers[id]){
courierMarkers[id]=L.marker([d.lat,d.lng]).addTo(map);
}else{
courierMarkers[id].setLatLng([d.lat,d.lng]);
}
}

courierList.innerHTML+=id+"<br>";
courierSelect.innerHTML+='<option value="'+id+'">'+id+'</option>';

});
});

/* ORDERS */
onValue(ref(db,"orders"),async function(snap){

orderList.innerHTML="";
orderSelect.innerHTML="";
orders={};

let list=[];
snap.forEach(function(o){ list.push(o.val()); });

for(let d of list){

orders[d.id]=d;

let info=d.customer+" | "+d.status;

if(d.courierId && couriers[d.courierId]){

let route=await getRoute(couriers[d.courierId],d);

let km=(route.distance/1000).toFixed(2);
let eta=calcETA(route);

info+=" | "+km+"km | "+eta+"dk";

if(routes[d.id]) map.removeLayer(routes[d.id]);

routes[d.id]=L.geoJSON(route.geometry,{
style:{color:"#00d4ff"}
}).addTo(map);
}

/* STATUS BUTTONS */
info+="<br>";
info+='<button class="green" onclick="setStatus(\''+d.id+'\',\'accepted\')">Kabul</button>';
info+='<button class="blue" onclick="setStatus(\''+d.id+'\',\'onway\')">Yolda</button>';
info+='<button class="gray" onclick="setStatus(\''+d.id+'\',\'delivered\')">Teslim</button>';
info+='<button class="red" onclick="setStatus(\''+d.id+'\',\'cancelled\')">İptal</button>';

orderList.innerHTML+=info+"<hr>";

orderSelect.innerHTML+='<option value="'+d.id+'">'+d.customer+'</option>';

if(d.lat && !orderMarkers[d.id]){
orderMarkers[d.id]=L.circleMarker([d.lat,d.lng],{
radius:5,color:"#00d4ff"
}).addTo(map);
}

}

calculateFinance();

});

</script>

</body>
</html>
