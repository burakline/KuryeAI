<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kurye Takip</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0}
#map{width:100%;height:100vh}
.info{
position:absolute;
top:10px;left:10px;
background:white;padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="map"></div>
<div class="info">
📦 Siparişiniz yolda...
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, doc, onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const url = new URLSearchParams(window.location.search);
const orderId = url.get("id");

let courierMarker = null;

/* 📡 CANLI TAKİP */
onSnapshot(doc(db,"orders",orderId), async d=>{
const o = d.data();

if(!o.courierEmail) return;

/* courier bul */
onSnapshot(doc(db,"couriers",o.courierEmail), cSnap=>{
const c = cSnap.data();

if(!c) return;

if(courierMarker){
courierMarker.setLatLng([c.lat,c.lng]);
}else{
courierMarker = L.marker([c.lat,c.lng]).addTo(map);
}

});

});

</script>

</body>
</html>
