<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Paneli</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:#000}
#map{height:100vh}
.panel{position:fixed;bottom:0;width:100%;background:white;padding:15px}
.btn{background:black;color:white;padding:12px;border-radius:10px;margin-top:10px;text-align:center}
.popup{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#00d4ff;padding:15px;border-radius:12px;display:none}
</style>
</head>

<body>

<div id="map"></div>

<div class="popup" id="popup">
Yeni sipariş!
<br><br>
<button onclick="acceptOrder()">Kabul Et</button>
</div>

<div class="panel">
<div id="info">Hazır</div>
<div class="btn" onclick="stopShift()">Vardiya Bitir</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, collection, onSnapshot, updateDoc, doc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getAuth } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* MAP */
const map = L.map('map').setView([39.92,32.85],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker = L.marker([39.92,32.85]).addTo(map);
let last=null;

/* GPS */
navigator.geolocation.watchPosition(async pos=>{
let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

marker.setLatLng([lat,lng]);
map.setView([lat,lng]);

if(auth.currentUser){
await updateDoc(doc(db,"couriers",auth.currentUser.uid),{
lat,lng
});
}

last={lat,lng};
});

/* ORDER LISTEN */
let currentOrder=null;

onSnapshot(collection(db,"orders"),snap=>{
snap.forEach(d=>{
let o=d.data();

if(!o.courierId && last){

let distance=Math.abs(o.lat-last.lat);

if(distance<0.01){
currentOrder={id:d.id,...o};
popup.style.display="block";
}
}
});
});

/* ACCEPT */
window.acceptOrder=async()=>{
popup.style.display="none";

await updateDoc(doc(db,"orders",currentOrder.id),{
status:"accepted",
courierId:auth.currentUser.uid
});

alert("Sipariş alındı 🚀");
}

/* STOP */
window.stopShift=()=>{
alert("Vardiya kapandı");
}

</script>

</body>
</html>
