<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kurye Panel</title>
</head>

<body>

<h2>Kurye Panel</h2>

<button onclick="startShift()">🟢 Vardiya Başlat</button>
<button onclick="endShift()">🔴 Vardiya Bitir</button>

<h3>📊 Kazanç</h3>
<div id="stats"></div>

<h3>📦 Siparişler</h3>
<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
query,
where,
doc,
updateDoc,
getDoc,
runTransaction
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* CONFIG */
const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user;
let userZone=null;
let courierData=null;

let startTime=null;
let totalKm=0;
let earnings=0;

let lastPos=null;
let watchId=null;
let unsubscribeOrders=null;

/* 📏 DISTANCE */
function getDistance(lat1,lng1,lat2,lng2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* AUTH */
onAuthStateChanged(auth, async(u)=>{

if(!u) return location.href="login.html";

const roleSnap = await getDoc(doc(db,"users",u.uid));

if(roleSnap.data().role!=="courier"){
alert("Yetkisiz");
location.href="login.html";
return;
}

user=u;

/* 🔄 REALTIME COURIER DATA */
onSnapshot(doc(db,"couriers",u.uid),(snap)=>{
courierData = snap.data();
userZone = courierData?.zoneId;
});

/* SETTINGS */
let maxDistance = 10;
try{
const s = await getDoc(doc(db,"settings","main"));
if(s.exists()) maxDistance = s.data().maxDistance || 10;
}catch{}

/* ORDERS */
const q = query(collection(db,"orders"), where("status","==","bekliyor"));

unsubscribeOrders = onSnapshot(q,(snap)=>{
orders.innerHTML="";

snap.forEach(d=>{
const o=d.data();

if(userZone && o.zoneId!==userZone) return;
if(!courierData?.online) return;

/* DISTANCE */
if(o.lat && courierData?.lat){
const dist = getDistance(
courierData.lat,
courierData.lng,
o.lat,
o.lng
);
if(dist > maxDistance) return;
}

orders.innerHTML+=`
<div style="border:1px solid #ccc;margin:10px;padding:10px;">
<b>${o.customer}</b><br>
${o.address}<br>

💰 ${o.price}₺  
🔥 x${o.surge || 1}

<br><br>

<button onclick="acceptOrder('${d.id}',${o.price},${o.surge || 1})">
Kabul Et
</button>

<button onclick="rejectOrder('${d.id}')">
Reddet
</button>

</div>`;
});

});

});

/* SHIFT START */
window.startShift=()=>{

if(watchId) return;

startTime=Date.now();

watchId = navigator.geolocation.watchPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

/* KM */
if(lastPos){
totalKm+=getDistance(lastPos.lat,lastPos.lng,lat,lng);
}
lastPos={lat,lng};

/* 🔥 THROTTLE (her 5 sn yaz) */
if(Date.now()%5000 < 1000){
await updateDoc(doc(db,"couriers",user.uid),{
lat,lng,
online:true,
status:"available"
});
}

/* 💰 */
const hours = (Date.now()-startTime)/3600000;
earnings = (totalKm*8)+(hours*215);

stats.innerHTML=`
⏱ ${hours.toFixed(2)} saat<br>
📍 ${totalKm.toFixed(2)} km<br>
💰 ${earnings.toFixed(0)}₺
`;

});

};

/* SHIFT END */
window.endShift=async()=>{

if(watchId){
navigator.geolocation.clearWatch(watchId);
watchId=null;
}

await updateDoc(doc(db,"couriers",user.uid),{
online:false,
status:"offline"
});

if(unsubscribeOrders) unsubscribeOrders();

location.reload();
};

/* 🔒 SAFE ACCEPT (TRANSACTION) */
window.acceptOrder = async(id,price,surge)=>{

const ref = doc(db,"orders",id);

try{
await runTransaction(db, async(transaction)=>{

const snap = await transaction.get(ref);

if(snap.data().status!=="bekliyor"){
throw "Alındı";
}

transaction.update(ref,{
status:"yolda",
courierId:user.uid
});

});

await updateDoc(doc(db,"couriers",user.uid),{
status:"busy"
});

/* 💰 */
earnings += price * surge;

alert("Sipariş alındı 🚀");

}catch(e){
alert("Başka kurye aldı!");
}

};

/* REJECT */
window.rejectOrder = async(id)=>{
// future: AI reassign
alert("Reddedildi → AI yeniden atayacak");
};

</script>

</body>
</html>
