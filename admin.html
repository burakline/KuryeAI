<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';display:flex;background:#020617;color:white}
.sidebar{width:240px;background:#020617;padding:20px;height:100vh}
.sidebar h2{color:#00d4ff}
.sidebar button{display:block;width:100%;padding:10px;margin:5px 0;background:none;border:none;color:#94a3b8;cursor:pointer}
.sidebar button:hover{color:white}
.content{flex:1;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px}
input{padding:10px;margin:5px;border-radius:8px;border:none;width:100%}
#map{width:100%;height:60vh;border-radius:12px}
.section-title{color:#00d4ff;margin-top:20px}
</style>
</head>

<body>

<div class="sidebar">
<h2>KuryeAI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('orders')">Siparişler</button>
<button onclick="show('couriers')">Kuryeler</button>
<button onclick="show('restaurants')">Restoranlar</button>
<button onclick="show('applications')">Başvurular</button>
</div>

<div class="content">

<div id="dashboard">
<h2>🚀 Canlı Sistem</h2>
<div id="map"></div>
</div>

<div id="orders" style="display:none">
<h2>📦 Siparişler</h2>

<input id="oProduct" placeholder="Ürün adı">
<input id="oLat" placeholder="Enlem">
<input id="oLng" placeholder="Boylam">

<button onclick="createOrder()">Sipariş Oluştur</button>

<div id="orderList"></div>
</div>

<div id="couriers" style="display:none">
<h2>🚴 Kuryeler</h2>
<input id="cName" placeholder="Ad">
<input id="cMail" placeholder="Email">
<button onclick="addCourier()">Ekle</button>
<div id="courierList"></div>
</div>

<div id="restaurants" style="display:none">
<h2>🍔 Restoranlar</h2>
<input id="rName" placeholder="Ad">
<input id="rMail" placeholder="Email">
<button onclick="addRestaurant()">Ekle</button>
<div id="restaurantList"></div>
</div>

<!-- 🔥 AYRILMIŞ BAŞVURULAR -->
<div id="applications" style="display:none">
<h2>📩 Başvurular</h2>

<h3 class="section-title">🚴 Kurye Başvuruları</h3>
<div id="courierApps"></div>

<h3 class="section-title">🍔 Restoran Başvuruları</h3>
<div id="restaurantApps"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
deleteDoc, doc, updateDoc, setDoc, getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* DOM FIX */
const orderList = document.getElementById("orderList");
const courierList = document.getElementById("courierList");
const restaurantList = document.getElementById("restaurantList");
const courierApps = document.getElementById("courierApps");
const restaurantApps = document.getElementById("restaurantApps");

/* NAV */
window.show=id=>{
["dashboard","orders","couriers","restaurants","applications"]
.forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(id).style.display="block";
}

/* MAP */
const map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
setTimeout(()=>map.invalidateSize(),500);

/* 📩 APPLICATIONS AYIRMA */
onSnapshot(collection(db,"applications"),snap=>{
courierApps.innerHTML="";
restaurantApps.innerHTML="";

snap.forEach(d=>{
const a=d.data();

const card=`
<div class="card">
<b>${a.name}</b><br>
${a.email}<br><br>

<button onclick="approve('${d.id}','${a.email}','${a.name}','${a.type || "courier"}')">✅ Onayla</button>
<button onclick="reject('${d.id}')">❌ Reddet</button>
</div>
`;

if(a.type==="restaurant"){
restaurantApps.innerHTML+=card;
}else{
courierApps.innerHTML+=card;
}

});
});

/* APPROVE (ROLE AKILLI) */
window.approve=async(id,email,name,type)=>{
try{

const role = type==="restaurant" ? "restaurant" : "courier";

/* AUTH */
let userId=null;

try{
const user=await createUserWithEmailAndPassword(auth,email,"123456");
userId=user.user.uid;
}catch(e){
if(e.code==="auth/email-already-in-use"){
userId=email;
}else{throw e;}
}

/* USERS */
await setDoc(doc(db,"users",userId),{
email,
role
});

/* COLLECTION */
if(role==="courier"){

/* duplicate kontrol */
const snap=await getDocs(collection(db,"couriers"));
let exists=false;

snap.forEach(d=>{
if(d.data().email===email){exists=true;}
});

if(!exists){
await addDoc(collection(db,"couriers"),{
name:name || email,
email,
activeOrders:0,
createdAt:new Date()
});
}

}else{

await addDoc(collection(db,"restaurants"),{
name:name || email,
email,
createdAt:new Date()
});

}

/* STATUS */
await updateDoc(doc(db,"applications",id),{
status:"approved"
});

alert("✅ "+role+" eklendi!");

}catch(e){
alert("Hata: "+e.message);
}
}

/* REJECT */
window.reject=async(id)=>{
await updateDoc(doc(db,"applications",id),{
status:"rejected"
});
alert("Reddedildi");
}

</script>

</body>
</html>
