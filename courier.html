<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>KuryeAI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    #map {
      height: 70vh;
      width: 100%;
    }

    .btn {
      width: 90%;
      margin: 10px auto;
      display: block;
      padding: 15px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
    }

    .online { background: #22c55e; }
    .offline { background: #ef4444; }
  </style>
</head>

<body>

<h2 style="padding:10px;">🚀 KuryeAI</h2>

<div id="map"></div>

<button class="btn online" onclick="setOnline()">Online Ol</button>
<button class="btn offline" onclick="setOffline()">Offline Ol</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";

import {
  getDatabase,
  ref,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
  getAuth
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* ================= INIT ================= */

const db = getDatabase();
const auth = getAuth();

let map = L.map('map').setView([39.92, 32.85], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

let marker;

/* ================= SES ================= */

const audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

/* ================= TİTREŞİM ================= */

function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate([300,150,300,150,500]);
  }
}

/* ================= POPUP ================= */

function showPopup(order) {

  let div = document.createElement("div");

  div.style.position = "fixed";
  div.style.bottom = "20px";
  div.style.left = "20px";
  div.style.right = "20px";
  div.style.background = "#0f172a";
  div.style.padding = "20px";
  div.style.borderRadius = "15px";
  div.style.zIndex = "9999";

  div.innerHTML = `
    <h3>🚀 Yeni Sipariş</h3>
    <p>${order.customer}</p>
    <p>${order.address}</p>

    <button onclick="acceptOrder('${order.id}')"
      style="background:#22c55e;padding:10px;border:none;border-radius:8px;">
      Kabul Et
    </button>

    <button onclick="rejectOrder('${order.id}')"
      style="background:#ef4444;padding:10px;border:none;border-radius:8px;">
      Reddet
    </button>
  `;

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),15000);
}

/* ================= ORDER ACTION ================= */

window.acceptOrder = async (id) => {
  await set(ref(db, "orders/" + id + "/status"), "accepted");
};

window.rejectOrder = async (id) => {
  await set(ref(db, "orders/" + id + "/status"), "rejected");
};

/* ================= GPS ================= */

function startGPS() {

  navigator.geolocation.watchPosition((pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    if (!marker) {
      marker = L.marker([lat,lng]).addTo(map);
    } else {
      marker.setLatLng([lat,lng]);
    }

    map.setView([lat,lng],15);

    const user = auth.currentUser;
    if (!user) return;

    set(ref(db, "couriers/" + user.uid), {
      lat,
      lng,
      online: true,
      updatedAt: Date.now()
    });

  }, (err) => {
    alert("GPS hata: " + err.message);
  }, {
    enableHighAccuracy: true
  });

}

/* ================= ONLINE / OFFLINE ================= */

window.setOnline = () => {
  startGPS();
  alert("Online oldun");
};

window.setOffline = () => {

  const user = auth.currentUser;
  if (!user) return;

  set(ref(db, "couriers/" + user.uid + "/online"), false);

  alert("Offline oldun");
};

/* ================= SİPARİŞ DİNLE ================= */

let seen = {};

auth.onAuthStateChanged(user => {

  if (!user) return;

  startGPS();

  onValue(ref(db, "orders"), (snap) => {

    snap.forEach(orderSnap => {

      const order = orderSnap.val();
      order.id = orderSnap.key;

      if (
        order.courierId === user.uid &&
        order.status === "assigned" &&
        !seen[order.id]
      ) {

        audio.play();
        vibrate();
        showPopup(order);

        seen[order.id] = true;
      }

    });

  });

});

</script>

</body>
</html>
