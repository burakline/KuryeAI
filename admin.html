<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI - Yönetim Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0f172a; color: white; }
        #admin-map { height: 400px; border-radius: 1.5rem; border: 1px solid rgba(34, 211, 238, 0.2); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .stat-card { border-left: 4px solid #22d3ee; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-bold text-cyan-400">Yönetim Paneli</h1>
            <p class="text-slate-400 text-sm">Sistem Genel Durumu ve Takip</p>
        </div>
        <button onclick="window.location.href='index.html'" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-sm transition-all">Güvenli Çıkış</button>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <div class="glass-card p-6 rounded-2xl stat-card">
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Aktif Kuryeler</p>
            <p class="text-3xl font-black mt-1">12</p>
        </div>
        <div class="glass-card p-6 rounded-2xl stat-card" style="border-left-color: #f59e0b;">
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Bekleyen Sipariş</p>
            <p class="text-3xl font-black mt-1">5</p>
        </div>
        <div class="glass-card p-6 rounded-2xl stat-card" style="border-left-color: #10b981;">
            <p class="text-slate-400 text-xs uppercase font-bold tracking-widest">Günlük Ciro</p>
            <p class="text-3xl font-black mt-1 text-emerald-400">₺4,250</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-4">
            <h2 class="text-lg font-semibold flex items-center gap-2">🌐 Canlı Kurye Takibi <span class="flex h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span></h2>
            <div id="admin-map" class="shadow-2xl shadow-cyan-900/10"></div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-semibold">👤 Vardiyadaki Kuryeler</h2>
            <div class="glass-card rounded-2xl divide-y divide-slate-700 overflow-hidden">
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">Ahmet Yılmaz</p>
                        <p class="text-xs text-slate-400 text-emerald-400">Teslimatta</p>
                    </div>
                    <span class="text-xs bg-slate-800 px-2 py-1 rounded">Ankara</span>
                </div>
                <div class="p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold text-sm">Mehmet Demir</p>
                        <p class="text-xs text-slate-400 text-cyan-400">Boşta</p>
                    </div>
                    <span class="text-xs bg-slate-800 px-2 py-1 rounded">Ankara</span>
                </div>
                <div class="p-4 flex justify-between items-center opacity-50">
                    <div>
                        <p class="font-bold text-sm">Caner Şahin</p>
                        <p class="text-xs text-slate-400">Çevrimdışı</p>
                    </div>
                    <span class="text-xs bg-slate-800 px-2 py-1 rounded">İstanbul</span>
                </div>
            </div>
            
            <button onclick="alert('Sistem raporu oluşturuluyor...')" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all shadow-lg shadow-cyan-900/20">
                📊 Günlük Rapor Al
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Harita Kurulumu (Ankara Merkezli)
        var adminMap = L.map('admin-map').setView([39.9334, 32.8597], 12);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(adminMap);

        // Örnek Kurye İşaretçileri
        var kuryePositions = [
            {lat: 39.9400, lng: 32.8600, name: "Ahmet Yılmaz (Teslimatta)"},
            {lat: 39.9200, lng: 32.8400, name: "Mehmet Demir (Boşta)"},
            {lat: 39.9500, lng: 32.8200, name: "Sistem Aracı 03"}
        ];

        kuryePositions.forEach(function(pos) {
            L.circleMarker([pos.lat, pos.lng], {
                radius: 8,
                fillColor: "#22d3ee",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.8
            }).addTo(adminMap).bindPopup(pos.name);
        });
    </script>
</body>
</html>
