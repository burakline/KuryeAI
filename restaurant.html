<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Restaurant Panel</title>

<style>
body{font-family:Arial;background:#f5f7fb;margin:0;padding:20px;}
input,button{width:100%;padding:12px;margin-top:10px;}
.card{background:white;padding:15px;margin-top:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>Sipariş Oluştur</h2>

<input id="customer" placeholder="Müşteri Adı">
<input id="address" placeholder="Adres">

<button onclick="createOrder()">Sipariş Gönder</button>

<h3>Aktif Siparişler</h3>
<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async(u)=>{
if(!u){ location.href="login.html"; return; }

const snap = await getDoc(doc(db,"users",u.uid));
if(!snap.exists() || snap.data().role !== "restaurant"){
location.href="index.html";
}
});

window.createOrder = async()=>{
const customer = document.getElementById("customer").value;
const address = document.getElementById("address").value;

await addDoc(collection(db,"orders"),{
customer,
address,
status:"bekliyor",
createdAt:new Date()
});

alert("Sipariş gönderildi");
};

/* SİPARİŞ LİSTESİ */
onSnapshot(collection(db,"orders"), snap=>{
const div = document.getElementById("orders");
div.innerHTML="";

snap.forEach(d=>{
const o = d.data();

div.innerHTML += `
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>
Durum: ${o.status}
</div>`;
});
});

</script>
</body>
</html>
