<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş | KuryeAI</title>
</head>

<body style="background:#0b1118; color:white; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">

<div style="background:#161b22; padding:30px; border-radius:10px; width:300px; text-align:center;">
    <h2 id="title">Giriş Yap</h2>

    <input id="email" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">
    <input id="password" type="password" placeholder="Şifre" style="width:100%; padding:10px; margin:5px 0;">

    <button onclick="login()" style="width:100%; padding:10px; margin-top:10px;">Giriş Yap</button>

    <hr>

    <h3>Kayıt Ol</h3>

    <input id="regEmail" placeholder="Email" style="width:100%; padding:10px; margin:5px 0;">
    <input id="regPass" type="password" placeholder="Şifre" style="width:100%; padding:10px; margin:5px 0;">

    <select id="role" style="width:100%; padding:10px;">
        <option value="restaurant">Restoran</option>
        <option value="courier">Kurye</option>
    </select>

    <button onclick="register()" style="width:100%; padding:10px; margin-top:10px;">Kayıt Ol</button>
</div>

<script type="module" src="firebase.js"></script>

<script>
function login(){
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;
    window.loginUser(email, pass);
}

function register(){
    const email = document.getElementById("regEmail").value;
    const pass = document.getElementById("regPass").value;
    const role = document.getElementById("role").value;

    window.registerUser(email, pass, role);
}
</script>

</body>
</html>
