<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white flex h-screen overflow-hidden">

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-6">
        <h1 class="text-2xl font-black italic text-cyan-400 mb-10">ADMIN</h1>
        <nav class="space-y-4 flex-grow">
            <button class="w-full text-left p-4 rounded-xl bg-cyan-600 font-bold">🏠 Dashboard</button>
            <button class="w-full text-left p-4 rounded-xl hover:bg-slate-800">🛵 Kurye Yönetimi</button>
        </nav>
    </aside>

    <main class="flex-grow p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">Genel Durum</h2>
            <div class="flex items-center gap-4">
                <button class="relative bg-slate-800 p-3 rounded-xl">🔔<span class="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full"></span></button>
            </div>
        </header>

        <div class="grid grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-900 p-6 rounded-[32px] border border-slate-800">
                <p class="text-slate-500 text-xs font-bold">ŞÜPHELİ KM</p>
                <h3 id="alert-count" class="text-4xl font-black mt-2 text-orange-500">0</h3>
            </div>
        </div>

        <div class="bg-slate-900 rounded-[32px] border border-slate-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800/50">
                    <tr>
                        <th class="p-4 uppercase text-[10px]">Kurye</th>
                        <th class="p-4 uppercase text-[10px]">Mesafe (Manuel/GPS)</th>
                        <th class="p-4 uppercase text-[10px]">Kanıt</th>
                    </tr>
                </thead>
                <tbody id="admin-table"></tbody>
            </table>
        </div>
    </main>

    <div id="photo-modal" class="fixed inset-0 bg-black/95 z-[50000] hidden flex-col items-center justify-center p-10">
        <img id="modal-img" src="" class="max-w-full max-h-[80vh] rounded-2xl mb-6 shadow-2xl">
        <button onclick="document.getElementById('photo-modal').classList.add('hidden')" class="bg-cyan-600 px-10 py-4 rounded-2xl font-black">KAPAT</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function openPhoto(url) {
            document.getElementById('modal-img').src = "https://via.placeholder.com/800x600?text=KM+Gosterge+Fotografi"; // Gerçek URL geldiğinde buraya atanacak
            document.getElementById('photo-modal').classList.remove('hidden');
        }

        db.ref('arsiv').on('value', (snap) => {
            const table = document.getElementById('admin-table');
            table.innerHTML = "";
            snap.forEach((child) => {
                child.forEach((log) => {
                    const data = log.val();
                    table.innerHTML += `<tr class="border-t border-slate-800">
                        <td class="p-4 font-bold uppercase">${child.key}</td>
                        <td class="p-4">${data.manuelKM} / ${data.gpsKM} km</td>
                        <td class="p-4">
                            <button onclick="openPhoto()" class="bg-slate-800 px-4 py-2 rounded-lg text-xs">📸 Görüntüle</button>
                        </td>
                    </tr>`;
                });
            });
        });
    </script>
</body>
</html>
