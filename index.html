<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Akıllı Teslimat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="1000413588.png">
    <link rel="apple-touch-icon" href="1000413588.png">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; overflow-x: hidden; color: white; }
        .slogan-text { letter-spacing: 0.2em; text-transform: uppercase; color: #94a3b8; font-weight: 300; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .hero-gradient { background: radial-gradient(circle at center, rgba(249, 115, 22, 0.15) 0%, transparent 70%); }
        
        /* Animasyonlar */
        @keyframes slow-bounce { 0%, 100% { transform: translateY(-5%); } 50% { transform: translateY(0); } }
        .animate-bounce-slow { animation: slow-bounce 3s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center relative px-6">

    <div id="loader" class="fixed inset-0 z-[9999] bg-[#0f172a] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative">
            <div class="w-32 h-32 border-4 border-cyan-500/20 border-t-cyan-500 rounded-full animate-spin"></div>
            <img src="1000413588.png" class="w-20 h-20 object-contain absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 scale-110">
        </div>
        <p class="mt-6 text-cyan-400 font-['Orbitron'] tracking-[0.3em] text-xs animate-pulse">SİSTEM YÜKLENİYOR...</p>
    </div>

    <div class="fixed inset-0 hero-gradient pointer-events-none"></div>

    <div class="z-10 text-center space-y-8 max-w-2xl">
        <div class="animate-bounce-slow">
            <img src="1000413588.png" alt="KuryeAI Logo" class="mx-auto max-w-[250px] drop-shadow-[0_0_15px_rgba(6,182,212,0.5)]">
            <p class="slogan-text text-sm md:text-base animate-pulse mt-4">Akıllı Teslimat.</p>
        </div>

        <p class="text-slate-400 text-lg md:text-xl font-light italic">
            "Lojistikte yapay zeka dönemi başladı."
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-8">
            <button onclick="window.location.href='restaurant.html'" class="glass hover:bg-orange-500 hover:text-white transition-all duration-300 p-6 rounded-3xl flex flex-col items-center gap-3 group">
                <i class="fa-solid fa-store text-3xl text-orange-500 group-hover:text-white"></i>
                <span class="font-semibold text-lg">Restoran Paneli</span>
                <span class="text-xs text-slate-500 group-hover:text-orange-100 uppercase tracking-widest">Sipariş Oluştur</span>
            </button>

            <button onclick="window.location.href='courier.html'" class="glass hover:bg-cyan-500 hover:text-white transition-all duration-300 p-6 rounded-3xl flex flex-col items-center gap-3 group">
                <i class="fa-solid fa-motorcycle text-3xl text-cyan-500 group-hover:text-white"></i>
                <span class="font-semibold text-lg">Kurye Paneli</span>
                <span class="text-xs text-slate-500 group-hover:text-cyan-100 uppercase tracking-widest">Siparişleri Yönet</span>
            </button>
        </div>

        <div class="pt-12 flex justify-center gap-8 text-slate-500 text-sm font-['Orbitron']">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bolt text-orange-500"></i>
                <span>ANLIK</span>
            </div>
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-shield-halved text-cyan-500"></i>
                <span>GÜVENLİ</span>
            </div>
        </div>
    </div>

    <script>
        // Loading Ekranını Kapatma Fonksiyonu
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500);
        });
    </script>
</body>
</html>
