<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;display:flex}
.sidebar{width:220px;background:#020617;padding:20px;height:100vh}
.sidebar button{width:100%;padding:10px;margin:5px 0;background:none;border:none;color:white;cursor:pointer}
.content{flex:1;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
.map{height:300px;border-radius:10px}
input{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
.btn{padding:6px 10px;border:none;border-radius:6px;cursor:pointer}
.red{background:red;color:white}
.green{background:green;color:white}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('restaurants')">Restoranlar</button>
</div>

<div class="content">

<div id="dashboard">
<h2>Harita</h2>
<div id="map" class="map"></div>
</div>

<div id="restaurants" style="display:none">
<h2>Restoran Yönetimi</h2>

<div class="card">
<input id="newName" placeholder="Restoran adı">
<input id="newEmail" placeholder="Email">
<button onclick="addRestaurant()" class="green">Ekle</button>
</div>

<div id="list"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

window.show = id=>{
document.getElementById("dashboard").style.display="none";
document.getElementById("restaurants").style.display="none";
document.getElementById(id).style.display="block";
if(id==="restaurants") load();
}

/* MAP */
const map = L.map('map').setView([39.92,32.85],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers={};

/* LOAD RESTAURANTS */
async function load(){
const list=document.getElementById("list");
list.innerHTML="";

const snap=await getDocs(collection(db,"restaurants"));

snap.forEach(d=>{
const r=d.data();

/* MAP */
if(r.lat && r.lng){
if(!markers[d.id]){
markers[d.id]=L.marker([r.lat,r.lng]).addTo(map);
}else{
markers[d.id].setLatLng([r.lat,r.lng]);
}
}

/* UI */
const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<input value="${r.name}" id="name-${d.id}">
<input value="${r.email}" id="email-${d.id}">
<button onclick="updateRestaurant('${d.id}')" class="green">Kaydet</button>
<button onclick="deleteRestaurant('${d.id}')" class="red">Sil</button>
<button onclick="selectLocation('${d.id}')">Konum Seç</button>
`;

list.appendChild(div);
});
}

/* ADD */
window.addRestaurant=async()=>{
await addDoc(collection(db,"restaurants"),{
name:newName.value,
email:newEmail.value,
lat:39.92,
lng:32.85
});
load();
}

/* DELETE */
window.deleteRestaurant=async(id)=>{
await deleteDoc(doc(db,"restaurants",id));
if(markers[id]){
map.removeLayer(markers[id]);
delete markers[id];
}
load();
}

/* UPDATE */
window.updateRestaurant=async(id)=>{
await updateDoc(doc(db,"restaurants",id),{
name:document.getElementById("name-"+id).value,
email:document.getElementById("email-"+id).value
});
alert("Güncellendi");
}

/* LOCATION PICK */
let currentId=null;
map.on("click",async e=>{
if(!currentId) return;

await updateDoc(doc(db,"restaurants",currentId),{
lat:e.latlng.lat,
lng:e.latlng.lng
});

alert("Konum güncellendi");
currentId=null;
load();
});

window.selectLocation=id=>{
currentId=id;
alert("Haritadan konum seç");
}

</script>

</body>
</html>
