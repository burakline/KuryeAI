<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdminAI</title>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0A0A0A;
color:white;
}

/* HEADER */
.header{
padding:20px;
font-size:22px;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
padding:15px;
backdrop-filter:blur(12px);
}

/* ORDER */
.order{
margin-top:10px;
padding:10px;
border-radius:10px;
background:#111;
}

/* STATUS */
.pending{color:#facc15}
.accepted{color:#00C2A8}
.delivered{color:#22c55e}

/* INPUT */
input, select{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:#1a1a1a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#00C2A8;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🧠 AdminAI</div>

<div class="grid">

<!-- METRICS -->
<div class="card">
<h3>📦 Toplam Sipariş</h3>
<div id="total">0</div>
</div>

<div class="card">
<h3>🚀 Aktif Sipariş</h3>
<div id="active">0</div>
</div>

<!-- SETTINGS -->
<div class="card">
<h3>⚙️ Sistem Ayarları</h3>

<label>Otomatik Atama</label>
<select id="autoAssign">
<option value="true">Açık</option>
<option value="false">Kapalı</option>
</select>

<label>Maks Mesafe (km)</label>
<input id="maxDistance" type="number" value="10">

<button onclick="saveSettings()">Kaydet</button>

</div>

<!-- ORDERS -->
<div class="card" style="grid-column:span 2">
<h3>📋 Siparişler</h3>
<div id="orders"></div>
</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { startAutoAssign } from "./autoAssign.js";

import {
collection,
onSnapshot,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* AUTO ASSIGN BAŞLAT */
startAutoAssign();

/* ELEMENTS */
const ordersDiv = document.getElementById("orders");
const totalDiv = document.getElementById("total");
const activeDiv = document.getElementById("active");

/* SİPARİŞLER */
onSnapshot(collection(db,"orders"),(snap)=>{

ordersDiv.innerHTML="";

let total=0;
let active=0;

snap.forEach(docSnap=>{

const o = docSnap.data();
total++;

if(o.status==="accepted") active++;

ordersDiv.innerHTML += `
<div class="order">
<b>${o.customer}</b><br>
${o.address}<br>

<span class="${o.status}">
${o.status}
</span>

<br>💰 ${o.price}₺
</div>
`;

});

totalDiv.innerText = total;
activeDiv.innerText = active;

});

/* AYARLARI YÜKLE */
async function loadSettings(){

const snap = await getDoc(doc(db,"settings","config"));

if(snap.exists()){
const data = snap.data();

document.getElementById("autoAssign").value = data.autoAssign;
document.getElementById("maxDistance").value = data.maxDistance;
}

}

loadSettings();

/* KAYDET */
window.saveSettings = async function(){

const autoAssign =
document.getElementById("autoAssign").value === "true";

const maxDistance =
parseFloat(document.getElementById("maxDistance").value);

await setDoc(doc(db,"settings","config"),{
autoAssign,
maxDistance
});

alert("✅ Ayarlar kaydedildi");

};

</script>

</body>
</html>
