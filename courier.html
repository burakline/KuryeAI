<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';background:#0b0e14;color:#fff;}
.header{padding:15px;background:#020617;display:flex;justify-content:space-between;}
.status{padding:6px 12px;border-radius:20px;font-size:12px;}
.online{background:#00ff9c;color:#000;}
.offline{background:#ff4d4d;}
#map{height:35vh;}
.panel{padding:15px;background:#111827;}
.order{background:#1f2937;padding:12px;border-radius:10px;margin-top:8px;}
button{padding:10px;margin-top:5px;border:none;border-radius:6px;}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye Panel</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">

<button onclick="startTracking()">Online</button>
<button onclick="stopTracking()">Offline</button>

<h3>📦 Aktif Görev</h3>
<div id="activeOrder"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
onSnapshot,
doc,
updateDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user, marker;

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* ICON */
const bikeIcon = L.divIcon({
html:`<div style="font-size:26px;color:#00d4ff;">🏍️</div>`,
className:''
});

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){location.href="login.html";return;}
user=u;

/* 🔥 SADECE KENDİ SİPARİŞİ */
onSnapshot(
collection(db,"orders"),
snap=>{

const div=document.getElementById("activeOrder");
div.innerHTML="";

snap.forEach(d=>{
const o=d.data();

if(o.courierId===user.uid){

div.innerHTML=`
<div class="order">
<b>${o.customer}</b><br>
${o.address}<br>
💰 ${o.price}₺<br>

<button onclick="finishOrder('${d.id}')">
Teslim Et
</button>
</div>
`;

}

});

});
});

/* ONLINE */
window.startTracking=()=>{
document.getElementById("status").className="status online";

navigator.geolocation.watchPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker=L.marker([lat,lng],{icon:bikeIcon}).addTo(map);
}

map.setView([lat,lng],15);

await updateDoc(doc(db,"couriers",user.uid),{
lat,lng,online:true
});

});
};

/* OFFLINE */
window.stopTracking=()=>{
document.getElementById("status").className="status offline";
};

/* TESLİM */
window.finishOrder=async(id)=>{

const ref=doc(db,"orders",id);
const snap=await getDoc(ref);
const o=snap.data();

await updateDoc(ref,{status:"delivered"});

};

</script>
</body>
</html>
