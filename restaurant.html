<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI - Restoran Kontrol Merkezi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #map { height: 100%; border-radius: 0 20px 20px 0; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-right: 1px solid #1e293b; }
        .emergency-blink { animation: blink 1s infinite; border: 4px solid #ef4444 !important; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .detail-card { background: #1e293b; border-radius: 1rem; padding: 1rem; margin-top: 1rem; border: 1px solid #334155; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="w-96 glass-panel h-screen flex flex-col p-6 z-50">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center font-black">AI</div>
            <h1 class="text-2xl font-black italic text-cyan-400">Restoran Kontrol</h1>
        </div>

        <div id="emergency-box" class="hidden mb-6 p-4 bg-rose-900/40 border border-rose-500 rounded-2xl text-center">
            <h3 class="text-rose-500 font-black animate-pulse uppercase">🚨 ACİL DURUM BİLDİRİMİ</h3>
            <p id="emergency-info" class="text-sm mt-1 font-bold">Kurye kaza bildirdi!</p>
            <button onclick="clearEmergency()" class="mt-3 text-[10px] bg-rose-600 px-4 py-1.5 rounded-full font-black uppercase">Bildirimi Kapat</button>
        </div>

        <div class="flex-grow overflow-y-auto">
            <h2 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-4">Saha Personeli</h2>
            <div id="kurye-list" class="space-y-3">
                <div class="text-slate-500 text-sm animate-pulse">Veriler okunuyor...</div>
            </div>
        </div>

        <div id="kurye-detail" class="hidden mt-6 pt-6 border-t border-slate-800">
            <h2 class="text-cyan-400 font-bold uppercase text-xs mb-3 italic">Kurye Özgeçmiş & Araç Bilgisi</h2>
            <div class="space-y-2 text-[11px]">
                <div class="flex justify-between"><span class="text-slate-500">Ad Soyad:</span> <span id="det-ad" class="font-bold">-</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Kan Grubu:</span> <span id="det-kan" class="font-bold text-rose-400">-</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Motor / Plaka:</span> <span id="det-motor" class="font-bold">-</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Ehliyet:</span> <span id="det-ehliyet" class="font-bold">-</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Sigorta Bitiş:</span> <span id="det-sigorta" class="font-bold text-yellow-400">-</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Medeni Durum:</span> <span id="det-medeni" class="font-bold">-</span></div>
            </div>
        </div>
    </aside>

    <main class="flex-grow relative">
        <div id="map"></div>
        </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, markers = {};

        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // KURYE VERİLERİNİ DİNLE (CANLI KONUM + PROFİL)
        db.ref('kuryeler').on('value', (snapshot) => {
            const listDiv = document.getElementById('kurye-list');
            listDiv.innerHTML = "";
            const kuryeler = snapshot.val();

            for (let id in kuryeler) {
                const k = kuryeler[id];
                const profil = k.profil || {};
                
                // Liste Kartı Oluştur
                const card = document.createElement('div');
                card.className = "p-4 bg-slate-800/40 border border-slate-700 rounded-2xl cursor-pointer hover:border-cyan-500 transition-all";
                card.onclick = () => showKuryeDetails(profil);
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-black text-sm">${profil.ad || id}</p>
                            <p class="text-[10px] text-slate-500">${profil.plaka || 'Plaka Yok'}</p>
                        </div>
                        <span class="px-2 py-0.5 rounded-full text-[8px] font-black bg-emerald-500/20 text-emerald-400">AKTİF</span>
                    </div>
                `;
                listDiv.appendChild(card);

                // Harita Markeri Güncelle
                if (k.konum) {
                    if (markers[id]) {
                        markers[id].setLatLng([k.konum.lat, k.konum.lng]);
                    } else {
                        markers[id] = L.marker([k.konum.lat, k.konum.lng]).addTo(map).bindPopup(profil.ad || id);
                    }
                }
            }
        });

        // KURYE DETAYLARINI GÖSTER (PROFİLDEN GELEN VERİLER)
        function showKuryeDetails(p) {
            document.getElementById('kurye-detail').classList.remove('hidden');
            document.getElementById('det-ad').innerText = p.ad || "-";
            document.getElementById('det-kan').innerText = p.kan || "-";
            document.getElementById('det-motor').innerText = (p.motor || "-") + " / " + (p.plaka || "-");
            document.getElementById('det-ehliyet').innerText = p.ehliyet || "-";
            document.getElementById('det-sigorta').innerText = p.sigorta || "-";
            document.getElementById('det-medeni').innerText = p.medeni || "-";
        }

        // ACİL DURUM DİNLEYİCİ
        db.ref('acil_durumlar').on('value', (snapshot) => {
            const alert = snapshot.val();
            const box = document.getElementById('emergency-box');
            if (alert) {
                box.classList.remove('hidden');
                document.getElementById('emergency-info').innerText = `${alert.kurye}: ${alert.tur}`;
                // Haritayı kaza bölgesine odakla
                if(alert.lat) map.setView([alert.lat, alert.lng], 17);
            } else {
                box.classList.add('hidden');
            }
        });

        function clearEmergency() {
            db.ref('acil_durumlar').remove();
        }
    </script>
</body>
</html>
