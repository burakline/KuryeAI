<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KuryeAI REALTIME</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:45vh}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#020617;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.online{background:#22c55e;color:black}
.offline{background:#ef4444}

.card{
background:#0f172a;
padding:12px;
margin:10px;
border-radius:12px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:10px;
font-weight:bold;
}

.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#00d4ff;color:black}
.orange{background:#f59e0b;color:black}

.countdown{
font-size:20px;
color:#f59e0b;
text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="card">
<button class="green" onclick="goOnline()">Online</button>
<button class="red" onclick="goOffline()">Offline</button>
</div>

<div id="activeOrder"></div>
<div id="incomingOrder"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";
import {
getDatabase, ref, onValue, update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const db=getDatabase();
const auth=getAuth();

let user;
let map=L.map('map').setView([39.92,32.85],13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker,routeLayer;
let orders={};
let routeCache={};

/* AUTH */
onAuthStateChanged(auth,function(u){
if(!u) location.href="login.html";
user=u;
});

/* GPS */
navigator.geolocation.watchPosition(function(pos){

let lat=pos.coords.latitude;
let lng=pos.coords.longitude;

if(!marker){
marker=L.marker([lat,lng]).addTo(map);
map.setView([lat,lng],15);
}else{
let s=marker.getLatLng();
let i=0;

function step(){
i++;
marker.setLatLng([
s.lat+(lat-s.lat)*(i/15),
s.lng+(lng-s.lng)*(i/15)
]);
if(i<15) requestAnimationFrame(step);
}
step();
}

update(ref(db,"couriers/"+user.uid),{
lat:lat,
lng:lng,
online:true
});

});

/* ROUTE */
async function getRoute(from,to){

let key=from.lat+","+from.lng+"_"+to.lat+","+to.lng;

if(routeCache[key]) return routeCache[key];

let url="https://router.project-osrm.org/route/v1/driving/"
+from.lng+","+from.lat+";"+to.lng+","+to.lat+
"?overview=full&geometries=geojson";

let res=await fetch(url);
let data=await res.json();

routeCache[key]=data.routes[0];
return data.routes[0];
}

/* SOUND */
function playSound(){
let audio=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
audio.play();
}

/* COUNTDOWN */
let timer;

function startCountdown(orderId){

let time=10;

timer=setInterval(function(){

incomingOrder.innerHTML=
"<div class='card'><div class='countdown'>"+time+" sn</div></div>";

time--;

if(time<0){
clearInterval(timer);

/* otomatik reddet */
update(ref(db,"orders/"+orderId),{
status:"waiting",
courierId:null
});

incomingOrder.innerHTML="";
}

},1000);

}

/* ORDERS */
onValue(ref(db,"orders"),async function(snap){

incomingOrder.innerHTML="";
activeOrder.innerHTML="";
orders={};

snap.forEach(function(o){
orders[o.key]=o.val();
});

for(let id in orders){

let d=orders[id];

if(d.courierId!==user.uid) continue;

/* NEW ORDER */
if(d.status==="assigned"){

playSound();
startCountdown(id);

incomingOrder.innerHTML+=
"<div class='card'>"+
"<b>Yeni Sipariş</b><br>"+
"<button class='green' onclick=\"accept('"+id+"')\">Kabul</button>"+
"<button class='red' onclick=\"reject('"+id+"')\">Reddet</button>"+
"</div>";
}

/* ACTIVE */
if(d.status==="accepted" || d.status==="onway"){

if(marker && d.lat){

let route=await getRoute(marker.getLatLng(),d);

if(routeLayer) map.removeLayer(routeLayer);

routeLayer=L.geoJSON(route.geometry,{style:{color:"#00d4ff"}}).addTo(map);

let km=(route.distance/1000).toFixed(2);
let eta=Math.round(route.duration/60);

activeOrder.innerHTML=
"<div class='card'>"+
"<b>Aktif Sipariş</b><br>"+
km+" km | "+eta+" dk<br>"+
"<button class='blue' onclick=\"setStatus('"+id+"','onway')\">Yola Çık</button>"+
"<button class='green' onclick=\"setStatus('"+id+"','delivered')\">Teslim</button>"+
"</div>";
}

}

}

});

/* ACTIONS */
window.accept=function(id){
clearInterval(timer);
update(ref(db,"orders/"+id),{status:"accepted"});
};

window.reject=function(id){
clearInterval(timer);
update(ref(db,"orders/"+id),{
status:"waiting",
courierId:null
});
};

window.setStatus=function(id,s){
update(ref(db,"orders/"+id),{status:s});
};

/* STATUS */
window.goOnline=function(){
status.innerText="Online";
status.className="status online";
};

window.goOffline=function(){
status.innerText="Offline";
status.className="status offline";
update(ref(db,"couriers/"+user.uid),{online:false});
};

</script>

</body>
</html>
