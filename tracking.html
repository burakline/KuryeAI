<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const params = new URLSearchParams(window.location.search);
const orderId = params.get("id");

let courierMarker;

/* 📦 ORDER */
onSnapshot(doc(db,"orders",orderId), orderSnap=>{
const o = orderSnap.data();

if(!o || !o.courierEmail) return;

/* 🚴 COURIER */
onSnapshot(doc(db,"couriers",o.courierEmail), courierSnap=>{
const c = courierSnap.data();

if(!c) return;

if(courierMarker){
courierMarker.setLatLng([c.lat,c.lng]);
}else{
courierMarker = L.marker([c.lat,c.lng]).addTo(map);
}

map.setView([c.lat,c.lng],15);

});

});

</script>
