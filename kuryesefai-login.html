<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>KuryeŞefAI — Giriş</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6f8;--surface:#ffffff;--border:#e8eaed;
  --teal:#00c8d7;--teal-dk:#009aaa;--teal-bg:rgba(0,200,215,.07);
  --text:#0f1117;--text2:#4b5563;--text3:#9ca3af;
  --red:#ef4444;--red-bg:rgba(239,68,68,.08);
  --yellow:#f59e0b;
  --fh:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fh);-webkit-font-smoothing:antialiased}
.loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.loader.hide{opacity:0;pointer-events:none}
.ring{width:36px;height:36px;border:2px solid rgba(0,200,215,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.wrap{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative}
.wrap::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,200,215,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,215,.04) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%)}
.card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;position:relative;overflow:hidden;animation:up .65s cubic-bezier(.16,1,.3,1) forwards;box-shadow:0 12px 48px rgba(0,0,0,.12)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--teal),var(--yellow))}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;flex-direction:column;align-items:center;margin-bottom:1.8rem;gap:.6rem}
.logo-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--teal),var(--teal-dk));display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 40px rgba(0,200,215,.25)}
.logo-name{font-size:1.15rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
.logo-name em{font-style:normal;color:var(--teal)}
.logo-sub{font-size:.72rem;color:var(--text3);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);border-radius:999px;padding:.2rem .7rem;color:var(--yellow);font-weight:600}
.err{display:none;background:var(--red-bg);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:.65rem .9rem;font-size:.8rem;color:var(--red);margin-bottom:.9rem;line-height:1.5}
.err.show{display:block}
.fg{margin-bottom:.9rem}
.fl{display:block;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:.38rem}
.fi{width:100%;background:#f5f6f8;border:1px solid var(--border);border-radius:8px;padding:.7rem .9rem;color:var(--text);font-family:var(--fh);font-size:.88rem;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--teal)}
.pw-wrap{position:relative}
.pw-tog{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:.76rem;font-family:var(--fh)}
.btn{width:100%;padding:.8rem;border-radius:999px;font-size:.88rem;font-weight:700;border:none;cursor:pointer;font-family:var(--fh);transition:all .2s;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.3rem}
.btn:hover{background:var(--teal-dk)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.btn.loading .spin{display:block}
.btn.loading .btxt{display:none}
.footer{margin-top:1.4rem;padding-top:1.2rem;border-top:1px solid var(--border);text-align:center;font-size:.72rem;color:var(--text3)}
.footer a{color:var(--teal);text-decoration:none}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="ring"></div></div>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">⭐</div>
      <div class="logo-name">Kurye<em>Şef</em>AI</div>
      <div class="logo-sub">Bölge Şefi Paneli</div>
    </div>
    <div class="err" id="err"></div>
    <div class="fg"><label class="fl">E-posta</label><input class="fi" type="email" id="email" placeholder="sef@kuryeai.com" autocomplete="email"/></div>
    <div class="fg">
      <label class="fl">Şifre</label>
      <div class="pw-wrap">
        <input class="fi" type="password" id="pw" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-tog" id="pw-tog" onclick="togglePw()">Göster</button>
      </div>
    </div>
    <button class="btn" id="login-btn" onclick="doLogin()">
      <div class="spin"></div><span class="btxt">Giriş Yap →</span>
    </button>
    <div class="footer"><a href="/">← Ana Sayfaya Dön</a></div>
  </div>
</div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signInWithEmailAndPassword,signOut}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import{getFirestore,doc,getDoc}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyDhXZ4RoT6DDJlNZBYArC6Zvy-MZ5fFC9Y",authDomain:"kuryeai-99bf9.firebaseapp.com",projectId:"kuryeai-99bf9",storageBucket:"kuryeai-99bf9.firebasestorage.app",messagingSenderId:"1012295004135",appId:"1:1012295004135:web:0cceac0476175e19395742"};
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getFirestore(app);
onAuthStateChanged(auth,async user=>{
  const loader=document.getElementById('loader');
  if(user){
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()&&snap.data().isZoneChief===true){
      window.location.href='/kuryesefai-panel';return;
    }
    await signOut(auth);
  }
  loader.classList.add('hide');setTimeout(()=>loader.style.display='none',400);
});
window.togglePw=()=>{const i=document.getElementById('pw'),b=document.getElementById('pw-tog');i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'Göster':'Gizle';};
window.doLogin=async()=>{
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('err');
  err.classList.remove('show');
  if(!email||!pw){err.textContent='E-posta ve şifre gerekli.';err.classList.add('show');return;}
  btn.classList.add('loading');btn.disabled=true;
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pw);
    const snap=await getDoc(doc(db,'users',cred.user.uid));
    if(!snap.exists()||snap.data().isZoneChief!==true){
      await signOut(auth);
      err.textContent='Bu hesabın Bölge Şefi yetkisi yok.';err.classList.add('show');
      btn.classList.remove('loading');btn.disabled=false;return;
    }
    window.location.href='/kuryesefai-panel';
  }catch(e){
    const c=e.code;
    err.textContent=c==='auth/invalid-credential'||c==='auth/wrong-password'?'E-posta veya şifre hatalı.':c==='auth/too-many-requests'?'Çok fazla deneme. Bekleyin.':'Giriş yapılamadı.';
    err.classList.add('show');
    btn.classList.remove('loading');btn.disabled=false;
  }
};
document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin();});
</script>
</body>
</html>
