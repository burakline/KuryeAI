<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0F172A; --card: rgba(255, 255, 255, 0.95); --text: #1E293B; }
        .dark-mode { --bg: #020617; --card: rgba(30, 41, 59, 0.98); --text: #F1F5F9; }
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); overflow: hidden; transition: 0.3s; }
        #map { height: 100vh; width: 100%; position: absolute; top: 0; z-index: 0; }
        
        /* Menu Styles */
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: var(--bg); z-index: 200; transition: 0.4s; padding: 30px; color: white; }
        .sidebar.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
        .menu-btn { position: fixed; top: 20px; left: 20px; z-index: 150; background: #1E293B; color: white; padding: 12px; border-radius: 15px; }

        /* UI Cards */
        .bottom-card { position: fixed; bottom: 25px; left: 12px; right: 12px; background: var(--card); backdrop-filter: blur(10px); border-radius: 32px; padding: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); z-index: 50; color: var(--text); }
        .status-pill { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1E293B; color: white; padding: 10px 20px; border-radius: 99px; font-size: 11px; font-weight: 800; z-index: 50; border: 1px solid #334155; }
        
        /* Marker & Line */
        .kurye-marker { background: #06B6D4; width: 20px; height: 20px; border: 4px solid white; border-radius: 50%; box-shadow: 0 0 20px rgba(6,182,212,0.8); }
        input, select { background: #1E293B; border: 1px solid #334155; padding: 10px; border-radius: 12px; width: 100%; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <button class="menu-btn shadow-xl" onclick="toggleMenu()"><i data-lucide="menu"></i></button>

    <div id="sidebar" class="sidebar overflow-y-auto">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-black italic">PROFIL<span class="text-cyan-500 italic">IM</span></h2>
            <button onclick="toggleMenu()"><i data-lucide="x"></i></button>
        </div>

        <div class="flex flex-col items-center mb-6">
            <div id="p-img" class="w-24 h-24 bg-slate-800 rounded-3xl mb-3 flex items-center justify-center border-2 border-cyan-500 overflow-hidden">
                <i data-lucide="user" class="text-slate-500 w-10 h-10"></i>
            </div>
            <button class="text-xs font-bold text-cyan-400 uppercase">Fotoğraf Değiştir</button>
        </div>

        <div id="profile-form" class="space-y-1">
            <input type="text" id="p-ad" placeholder="Ad Soyad">
            <input type="text" id="p-dogum" placeholder="Doğum Tarihi (GG.AA.YYYY)">
            <input type="text" id="p-dogumyeri" placeholder="Doğum Yeri">
            <input type="text" id="p-marka" placeholder="Araç Marka / Model">
            <input type="text" id="p-plaka" placeholder="Araç Plakası">
            <button onclick="saveProfile()" class="w-full bg-cyan-500 py-3 rounded-xl font-bold mt-4">KAYDET</button>
        </div>

        <hr class="my-6 border-slate-800">
        <button class="flex items-center gap-3 font-bold text-slate-300 mb-6"><i data-lucide="history"></i> Geçmiş Kazançlar</button>
        
        <div class="flex items-center justify-between mt-auto pt-10">
            <button onclick="toggleTheme()" class="flex items-center gap-2 text-sm font-bold"><i data-lucide="moon"></i> Tema</button>
            <button onclick="location.reload()" class="text-rose-500 font-bold flex items-center gap-2"><i data-lucide="log-out"></i> Çıkış</button>
        </div>
    </div>

    <div id="status-pill" class="status-pill flex items-center gap-2 uppercase italic tracking-tighter">
        <span class="w-2 h-2 bg-slate-500 rounded-full"></span> Çevrimdışı • Mola
    </div>

    <div id="map"></div>

    <div class="bottom-card">
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Toplam Kazanç</h4>
                <p id="earnings" class="text-2xl font-black text-slate-900 italic">₺0,00</p>
            </div>
            <div class="text-right">
                <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Vardiya Süresi</h4>
                <p id="timer" class="text-lg font-bold text-slate-800">00:00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-6 border-t border-slate-100 pt-4 text-center">
            <div>
                <h4 class="text-[8px] font-bold text-cyan-600 uppercase">Hız</h4>
                <p id="speed" class="font-black text-sm">0 <span class="text-[8px]">km/s</span></p>
            </div>
            <div>
                <h4 class="text-[8px] font-bold text-cyan-600 uppercase">Toplam KM</h4>
                <p id="distance" class="font-black text-sm">0.0 <span class="text-[8px]">km</span></p>
            </div>
            <div>
                <h4 class="text-[8px] font-bold text-cyan-600 uppercase">Ort. Hız</h4>
                <p id="avg-speed" class="font-black text-sm">0 <span class="text-[8px]">km/s</span></p>
            </div>
        </div>

        <button id="main-btn" onclick="handleShift()" class="w-full py-5 rounded-2xl bg-cyan-500 text-white font-black text-lg shadow-xl shadow-cyan-500/20 uppercase italic flex items-center justify-center gap-3">
            <i data-lucide="zap" class="fill-current"></i> Vardiyayı Başlat
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const kuryeID = "burak_haskoy";

        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let isActive = false, startTime, timerInterval, watchID, marker, pathLine;
        let totalDistance = 0, lastCoord = null, pathCoords = [];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }

        function saveProfile() {
            const data = {
                adSoyad: document.getElementById('p-ad').value,
                dogum: document.getElementById('p-dogum').value,
                dogumYeri: document.getElementById('p-dogumyeri').value,
                markaModel: document.getElementById('p-marka').value,
                plaka: document.getElementById('p-plaka').value
            };
            db.ref('kuryeler/' + kuryeID + '/profil').set(data).then(() => alert("Profil Güncellendi!"));
        }

        function handleShift() {
            const btn = document.getElementById('main-btn');
            const pill = document.getElementById('status-pill');
            if (!isActive) {
                isActive = true; startTime = Date.now();
                btn.innerHTML = 'Vardiyayı Bitir'; btn.className = "w-full py-5 rounded-2xl bg-slate-800 text-white font-black uppercase italic shadow-xl";
                pill.innerHTML = '<span class="w-2 h-2 bg-cyan-400 rounded-full animate-ping"></span> Aktif • Çalışıyor';
                startTracking(); startTimer();
            } else {
                if(confirm("Vardiyayı bitirmek istiyor musun?")) location.reload();
            }
        }

        function startTracking() {
            pathLine = L.polyline([], {color: '#06B6D4', weight: 5, opacity: 0.7}).addTo(map);
            watchID = navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                const current = [latitude, longitude];

                if (!marker) {
                    marker = L.marker(current, {icon: L.divIcon({className: 'kurye-marker'})}).addTo(map);
                } else { marker.setLatLng(current); }
                
                map.panTo(current);
                pathCoords.push(current);
                pathLine.setLatLngs(pathCoords);

                const s = speed ? (speed * 3.6) : 0;
                document.getElementById('speed').innerHTML = `${s.toFixed(0)} <span class="text-[8px]">km/s</span>`;

                if (lastCoord && s > 1) {
                    totalDistance += map.distance(lastCoord, current) / 1000;
                    document.getElementById('distance').innerHTML = `${totalDistance.toFixed(1)} <span class="text-[8px]">km</span>`;
                }
                lastCoord = current;

                db.ref('kuryeler/' + kuryeID).update({ konum: {lat: latitude, lng: longitude}, hiz: s.toFixed(0), km: totalDistance.toFixed(2) });
            }, null, {enableHighAccuracy: true});
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                
                // KAZANÇ HESABI: 215 TL Saatlik + 8 TL KM başı
                const saatlikKazanc = (diff / 3600000) * 215;
                const kmKazanc = totalDistance * 8;
                const toplam = saatlikKazanc + kmKazanc;
                
                document.getElementById('earnings').innerText = '₺' + toplam.toLocaleString('tr-TR', {minimumFractionDigits: 2});
                document.getElementById('avg-speed').innerText = totalDistance > 0 ? (totalDistance / (diff/3600000)).toFixed(1) : 0;
            }, 1000);
        }
    </script>
</body>
</html>
