<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AdminAI</title>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#0A0A0A;
color:white;
}

/* HEADER */
.header{
padding:20px;
font-size:20px;
font-weight:bold;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
padding:15px;
backdrop-filter:blur(12px);
}

/* STATUS COLORS */
.pending{color:#facc15}
.accepted{color:#00C2A8}
.delivered{color:#22c55e}

/* ORDER LIST */
.order{
margin-top:10px;
padding:10px;
border-radius:10px;
background:#111;
}

/* TITLE */
h3{
margin:0 0 10px 0;
}

/* METRIC */
.metric{
font-size:22px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">🧠 AdminAI Dashboard</div>

<div class="grid">

<div class="card">
<h3>📦 Toplam Sipariş</h3>
<div id="total" class="metric">0</div>
</div>

<div class="card">
<h3>🛵 Aktif Sipariş</h3>
<div id="active" class="metric">0</div>
</div>

<div class="card" style="grid-column:span 2">
<h3>📋 Tüm Siparişler</h3>
<div id="orders"></div>
</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const ordersDiv = document.getElementById("orders");
const totalDiv = document.getElementById("total");
const activeDiv = document.getElementById("active");

onSnapshot(collection(db,"orders"),(snap)=>{

ordersDiv.innerHTML="";

let total=0;
let active=0;

snap.forEach(docSnap=>{

const o = docSnap.data();
total++;

if(o.status==="accepted") active++;

ordersDiv.innerHTML += `
<div class="order">
<b>${o.customer}</b><br>
${o.address}<br>

<span class="${o.status}">
${o.status}
</span>

<br>💰 ${o.price}₺
</div>
`;

});

totalDiv.innerText = total;
activeDiv.innerText = active;

});

</script>

</body>
</html>
