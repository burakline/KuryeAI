<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Cloud Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(226, 232, 240, 0.8); }
        .active-link { background: #0ea5e9 !important; color: white !important; box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3); }
        .nav-item { transition: all 0.2s; }
        .nav-item:hover:not(.active-link) { background: #f1f5f9; transform: translateX(5px); }
        #map { height: 400px; border-radius: 24px; z-index: 10; }
        /* Mobil Menü Kontrolü */
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 50; }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <div id="overlay" onclick="toggleMenu()" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden"></div>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="sidebar w-72 h-screen bg-white border-r border-slate-200 flex flex-col p-6 shrink-0">
            <div class="flex items-center gap-3 px-2 mb-10">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200">
                    <i data-lucide="zap" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tight text-slate-800 italic">KuryeAI <span class="text-sky-600">PRO</span></span>
            </div>

            <nav class="flex-grow space-y-2">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-4 mb-2">Genel Menü</p>
                <a href="#" onclick="showSection('dashboard')" class="nav-item active-link flex items-center gap-3 px-4 py-3.5 rounded-2xl text-sm font-semibold">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="#" onclick="showSection('couriers')" class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 text-sm font-semibold">
                    <i data-lucide="truck" class="w-5 h-5"></i> Kurye Yönetimi
                </a>
                <a href="#" onclick="showSection('finance')" class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 text-sm font-semibold">
                    <i data-lucide="banknote" class="w-5 h-5"></i> Finans & Ödemeler
                </a>
                <div class="my-6 border-t border-slate-100"></div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-4 mb-2">Sistem</p>
                <a href="#" class="nav-item flex items-center gap-3 px-4 py-3.5 rounded-2xl text-slate-500 text-sm font-semibold">
                    <i data-lucide="settings" class="w-5 h-5"></i> Ayarlar
                </a>
            </nav>

            <div class="mt-auto bg-slate-50 p-4 rounded-3xl border border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-sky-100 border-2 border-white flex items-center justify-center font-bold text-sky-600">A</div>
                    <div>
                        <p class="text-xs font-bold text-slate-800">Harun Kaya</p>
                        <p class="text-[10px] text-slate-500 font-medium">Yönetici</p>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-grow flex flex-col min-w-0 max-h-screen overflow-y-auto bg-[#f8fafc]">
            <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-4 lg:px-8 sticky top-0 z-30">
                <div class="flex items-center gap-4">
                    <button onclick="toggleMenu()" class="p-2.5 bg-slate-50 rounded-xl text-slate-600 lg:hidden">
                        <i data-lucide="menu"></i>
                    </button>
                    <h2 id="page-title" class="text-lg font-bold text-slate-800">Yönetim Paneli</h2>
                </div>
                
                <div class="flex items-center gap-2 lg:gap-4">
                    <div class="hidden md:flex items-center bg-slate-100 px-4 py-2 rounded-xl border border-slate-200">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                        <input type="text" placeholder="Kurye Ara..." class="bg-transparent border-none text-sm ml-2 outline-none w-32 lg:w-48">
                    </div>
                    <button class="relative p-2.5 bg-slate-50 rounded-xl text-slate-600 hover:bg-slate-100 transition">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span class="absolute top-2 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white"></span>
                    </button>
                </div>
            </header>

            <div class="p-4 lg:p-8 space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="glass-card p-6 rounded-[2rem] shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div class="p-3 bg-sky-50 text-sky-600 rounded-2xl"><i data-lucide="users"></i></div>
                            <span class="text-emerald-500 text-xs font-bold">+12%</span>
                        </div>
                        <p class="text-sm font-medium text-slate-500">Aktif Kuryeler</p>
                        <h3 id="count-active" class="text-2xl font-extrabold mt-1 text-slate-800">0</h3>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] shadow-sm">
                        <div class="flex justify-between items-start mb-4">
                            <div class="p-3 bg-rose-50 text-rose-600 rounded-2xl"><i data-lucide="alert-triangle"></i></div>
                        </div>
                        <p class="text-sm font-medium text-slate-500">Şüpheli KM</p>
                        <h3 id="count-alert" class="text-2xl font-extrabold mt-1 text-rose-600">0</h3>
                    </div>
                </div>

                <section id="table-section" class="glass-card rounded-[2.5rem] overflow-hidden shadow-sm">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white/50">
                        <h4 class="font-bold text-slate-800">Son Vardiya Hareketleri</h4>
                        <button class="text-xs font-bold text-sky-600 hover:underline">Tümünü Gör</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50/50">
                                <tr>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Kurye</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Mesafe (M/G)</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Durum</th>
                                    <th class="px-6 py-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">İşlem</th>
                                </tr>
                            </thead>
                            <tbody id="log-table" class="divide-y divide-slate-100">
                                </tbody>
                        </table>
                    </div>
                </section>

                <div class="glass-card p-2 rounded-[2.5rem] shadow-xl overflow-hidden">
                    <div id="map"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Lucide Icons Init
        lucide.createIcons();

        // Firebase Setup
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Menü Toggle
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        // Bölüm Değiştirme
        function showSection(name) {
            document.getElementById('page-title').innerText = name.charAt(0).toUpperCase() + name.slice(1);
            if(window.innerWidth < 1024) toggleMenu();
        }

        // Tablo Veri Çekme
        db.ref('arsiv').on('value', snap => {
            const table = document.getElementById('log-table');
            table.innerHTML = "";
            let alertCount = 0;

            snap.forEach(kurye => {
                kurye.forEach(log => {
                    const d = log.val();
                    const isAlert = Math.abs(d.manuelKM - d.gpsKM) > 2; // Örnek 2km sapma kuralı
                    if(isAlert) alertCount++;

                    table.innerHTML += `
                        <tr class="hover:bg-slate-50/50 transition">
                            <td class="px-6 py-5">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-500">${kurye.key.charAt(0).toUpperCase()}</div>
                                    <div><p class="text-sm font-bold text-slate-800 uppercase">${kurye.key.replace('_',' ')}</p><p class="text-[10px] text-slate-400">${d.tarih}</p></div>
                                </div>
                            </td>
                            <td class="px-6 py-5 text-center">
                                <span class="text-xs font-bold text-slate-700">${d.manuelKM} km</span>
                                <span class="text-[10px] text-slate-400 block italic">GPS: ${d.gpsKM} km</span>
                            </td>
                            <td class="px-6 py-5 text-center">
                                <span class="px-2.5 py-1 rounded-full text-[9px] font-black uppercase ${isAlert ? 'bg-rose-50 text-rose-500' : 'bg-emerald-50 text-emerald-500'}">
                                    ${isAlert ? 'Şüpheli Sapma' : 'Onaylandı'}
                                </span>
                            </td>
                            <td class="px-6 py-5 text-right">
                                <button class="p-2 hover:bg-white rounded-lg transition shadow-sm border border-slate-100"><i data-lucide="eye" class="w-4 h-4 text-slate-400"></i></button>
                            </td>
                        </tr>
                    `;
                });
            });
            document.getElementById('count-alert').innerText = alertCount;
            lucide.createIcons();
        });

        // Harita Başlat
        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    </script>
</body>
</html>
