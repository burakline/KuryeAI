<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{background:#020617;color:white;font-family:Arial;margin:0;}

.menu{
display:flex;
gap:10px;
padding:15px;
background:#020617;
position:sticky;
top:0;
z-index:10;
}

.menu button{
padding:10px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
cursor:pointer;
}

.active{background:#00d4ff!important;color:black!important;}

.container{padding:15px;}

.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.ok{background:#00d4ff;}
.no{background:#ef4444;}

#map{height:70vh;border-radius:10px;}
</style>
</head>

<body>

<div class="menu">
<button onclick="show('apps')" id="btn-apps" class="active">Başvurular</button>
<button onclick="show('orders')" id="btn-orders">Sipariş Havuzu</button>
<button onclick="show('couriers')" id="btn-couriers">Kuryeler</button>
<button onclick="show('map')" id="btn-map">Harita</button>
</div>

<div class="container">

<div id="apps"></div>
<div id="orders" style="display:none"></div>
<div id="couriers" style="display:none"></div>
<div id="mapPage" style="display:none">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const config = {
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

const app = initializeApp(config);
const secondaryApp = initializeApp(config,"Secondary");

const db = getFirestore(app);
const secondaryAuth = getAuth(secondaryApp);

/* NAV */
window.show = (page)=>{

["apps","orders","couriers","mapPage"].forEach(x=>{
document.getElementById(x).style.display="none";
});

document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));

if(page==="apps"){
apps.style.display="block";
btn_apps.classList.add("active");
loadApps();
}

if(page==="orders"){
orders.style.display="block";
btn_orders.classList.add("active");
loadOrders();
}

if(page==="couriers"){
couriers.style.display="block";
btn_couriers.classList.add("active");
loadCouriers();
}

if(page==="map"){
mapPage.style.display="block";
btn_map.classList.add("active");
initMap();
}

};

/* 📄 BAŞVURULAR */
async function loadApps(){
apps.innerHTML="Yükleniyor...";

const snap = await getDocs(collection(db,"applications"));
apps.innerHTML="";

snap.forEach(d=>{
const a = d.data();
a.id = d.id;

apps.innerHTML += `
<div class="card">
<b>${a.name}</b><br>
${a.email}<br>

<button class="ok" onclick='approve(${JSON.stringify(a)})'>Onayla</button>
<button class="no" onclick='reject("${a.id}")'>Reddet</button>
</div>`;
});
}

window.approve = async (a)=>{
try{

const user = await createUserWithEmailAndPassword(
secondaryAuth,
a.email,
"123456"
);

const uid = user.user.uid;

await setDoc(doc(db,"users",uid),{
email:a.email,
name:a.name,
role:"courier"
});

await setDoc(doc(db,"couriers",uid),{
name:a.name,
email:a.email,
lat:0,
lng:0,
online:false
});

await deleteDoc(doc(db,"applications",a.id));

alert("✅ Kurye oluşturuldu");
loadApps();

}catch(e){
alert(e.message);
}
};

window.reject = async (id)=>{
await deleteDoc(doc(db,"applications",id));
loadApps();
};

/* 📦 SİPARİŞ HAVUZU */
function loadOrders(){

onSnapshot(collection(db,"orders"),(snap)=>{

orders.innerHTML="";

snap.forEach(d=>{
const o = d.data();

if(o.status !== "pending") return;

orders.innerHTML += `
<div class="card">
<b>${o.product || "Sipariş"}</b><br>
${o.address || ""}<br>
Durum: 🟡 Bekliyor

<button onclick="assignCourier('${d.id}')">Kurye Ata</button>
</div>
`;

});

});
}

window.assignCourier = async (orderId)=>{

const email = prompt("Kurye email:");

if(!email) return;

const snap = await getDocs(collection(db,"couriers"));

let found = null;

snap.forEach(d=>{
if(d.data().email === email){
found = d.id;
}
});

if(!found){
alert("Kurye bulunamadı");
return;
}

await updateDoc(doc(db,"orders",orderId),{
courierId:found,
status:"assigned"
});

alert("🚀 Kurye atandı");
};

/* 🚴 KURYELER */
function loadCouriers(){

onSnapshot(collection(db,"couriers"),(snap)=>{
couriers.innerHTML="";

snap.forEach(d=>{
const c = d.data();

couriers.innerHTML += `
<div class="card">
<b>${c.name}</b><br>
Durum: ${c.online ? "🟢 Online" : "🔴 Offline"}
</div>`;
});
});
}

/* 🗺️ HARİTA */
let map;
let markers = {};

function initMap(){
if(map) return;

map = L.map('map').setView([39.92,32.85],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

onSnapshot(collection(db,"couriers"),(snap)=>{
snap.forEach(d=>{
const c = d.data();
const id = d.id;

if(!c.lat) return;

if(markers[id]){
markers[id].setLatLng([c.lat,c.lng]);
}else{
markers[id] = L.marker([c.lat,c.lng])
.addTo(map)
.bindPopup(c.name);
}
});
});
}

/* INIT */
loadApps();

</script>

</body>
</html>
