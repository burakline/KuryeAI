<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#f5f7fb;}

/* NAV */
.nav{
display:flex;
gap:10px;
padding:15px;
background:white;
position:sticky;
top:0;
box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

.nav button{
padding:10px;
border:none;
border-radius:10px;
background:#eee;
cursor:pointer;
}

.active{background:#00d4ff;color:white;}

.container{padding:15px;}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.ok{background:#00d4ff;color:white;}
.no{background:#ff4d4d;color:white;}

input{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ddd;
}

#map{height:70vh;border-radius:12px;}
</style>
</head>

<body>

<div class="nav">
<button onclick="show('settings')" class="active">⚙️ Ayarlar</button>
<button onclick="show('apps')">📩 Başvurular</button>
<button onclick="show('couriers')">🚴 Kuryeler</button>
<button onclick="show('mapPage')">🗺️ Harita</button>
</div>

<div class="container">

<!-- ⚙️ AYAR -->
<div id="settings">
<div class="card">
<h3>Sistem Ayarları</h3>

<input id="km" placeholder="Max Mesafe KM">
<input id="timeout" placeholder="Timeout sn">
<input id="hourly" placeholder="Saatlik ücret">
<input id="perkm" placeholder="KM ücret">

<button onclick="saveSettings()" class="ok">Kaydet</button>
</div>
</div>

<!-- 📩 BAŞVURULAR -->
<div id="apps" style="display:none"></div>

<!-- 🚴 KURYELER -->
<div id="couriers" style="display:none"></div>

<!-- 🗺️ HARİTA -->
<div id="mapPage" style="display:none">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
getDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* FIREBASE */
const config={
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

const app=initializeApp(config);
const secondaryApp=initializeApp(config,"sec");

const db=getFirestore(app);
const auth=getAuth(app);
const secondaryAuth=getAuth(secondaryApp);

/* 🔐 AUTH */
onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap = await getDoc(doc(db,"users",user.uid));

if(!snap.exists() || snap.data().role!=="admin"){
alert("Yetkisiz!");
location.href="login.html";
}

});

/* NAV */
window.show=(id)=>{
["settings","apps","couriers","mapPage"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
};

/* ⚙️ AYAR YÜKLE */
async function loadSettings(){

const snap = await getDoc(doc(db,"settings","config"));

if(snap.exists()){
const s = snap.data();

km.value = s.maxDistance || "";
timeout.value = s.timeout || "";
hourly.value = s.hourly || "";
perkm.value = s.perKm || "";
}

}

/* 💾 KAYDET */
window.saveSettings = async ()=>{

await setDoc(doc(db,"settings","config"),{
maxDistance:Number(km.value),
timeout:Number(timeout.value),
hourly:Number(hourly.value),
perKm:Number(perkm.value)
});

alert("Kaydedildi");
};

loadSettings();

/* 📩 BAŞVURULAR */
async function loadApps(){

const div=document.getElementById("apps");
const snap=await getDocs(collection(db,"applications"));

div.innerHTML="";

snap.forEach(d=>{
const a=d.data();
a.id=d.id;

div.innerHTML+=`
<div class="card">
<b>${a.name}</b><br>
${a.email}<br>

<button class="ok" onclick='approve(${JSON.stringify(a)})'>Onayla</button>
<button class="no" onclick='reject("${a.id}")'>Reddet</button>
</div>`;
});

}

window.approve = async(a)=>{

const user=await createUserWithEmailAndPassword(
secondaryAuth,
a.email,
"123456"
);

const uid=user.user.uid;

await setDoc(doc(db,"users",uid),{
email:a.email,
name:a.name,
role:"courier"
});

await setDoc(doc(db,"couriers",uid),{
name:a.name,
lat:0,
lng:0,
online:false
});

await deleteDoc(doc(db,"applications",a.id));

alert("Kurye oluşturuldu");
loadApps();
};

window.reject = async(id)=>{
await deleteDoc(doc(db,"applications",id));
loadApps();
};

loadApps();

/* 🚴 KURYELER */
function loadCouriers(){

const div=document.getElementById("couriers");

onSnapshot(collection(db,"couriers"),snap=>{

div.innerHTML="";

snap.forEach(d=>{
const c=d.data();

div.innerHTML+=`
<div class="card">
<b>${c.name}</b><br>
Durum: ${c.online ? "🟢 Online" : "🔴 Offline"}
</div>`;
});

});

}

loadCouriers();

/* 🗺️ HARİTA */
const map = L.map('map').setView([39.92,32.85],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers={};

onSnapshot(collection(db,"couriers"),snap=>{

snap.forEach(docSnap=>{

const c=docSnap.data();
const id=docSnap.id;

if(!c.lat) return;

const icon = L.divIcon({
html:`<div style="font-size:22px;color:${c.online?"#00ff9c":"red"}">🏍️</div>`,
className:''
});

if(markers[id]){
markers[id].setLatLng([c.lat,c.lng]);
markers[id].setIcon(icon);
}else{
markers[id]=L.marker([c.lat,c.lng],{icon}).addTo(map);
}

});

});

</script>

</body>
</html>
