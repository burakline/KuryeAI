<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro - Stabil Versiyon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #F8FAFC; --card: rgba(255, 255, 255, 0.98); --text: #1E293B; }
        .dark-mode { --bg: #0B1120; --card: rgba(30, 41, 59, 0.98); --text: #F1F5F9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); overflow: hidden; margin: 0; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 0; }
        
        .sidebar { position: fixed; top: 0; left: -100%; width: 85%; height: 100%; background: #0F172A; z-index: 300; transition: 0.4s; padding: 25px; color: white; }
        .sidebar.active { left: 0; }
        .menu-btn { position: fixed; top: 15px; left: 15px; z-index: 150; background: #1E293B; color: white; padding: 10px; border-radius: 12px; }

        /* Konum Bul Butonu */
        .locate-btn { position: fixed; bottom: 220px; right: 20px; z-index: 200; background: white; color: #1E293B; padding: 10px; border-radius: 50%; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }

        /* Hız Göstergesi - Kazancın Üstüne Binmeyecek Şekilde Yukarıda */
        #speed-overlay { position: fixed; bottom: 280px; left: 20px; z-index: 200; width: 60px; height: 60px; background: #1E293B; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 3px solid white; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* Alt Kart ve Buton (Küçültülmüş ve Stabil) */
        .bottom-card { position: fixed; bottom: 15px; left: 12px; right: 12px; background: var(--card); border-radius: 20px; padding: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; color: var(--text); }
        #main-btn { width: 100%; height: 45px; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 13px; }
        
        .ai-marker-wrapper { display: flex; flex-direction: column; align-items: center; }
        .ai-marker-label { background: #0F172A; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-bottom: 2px; border: 1px solid #06B6D4; }
        .ai-marker-circle { background: #06B6D4; width: 34px; height: 34px; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 12px; }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
    <button class="locate-btn" onclick="locateUser()"><i data-lucide="locate-fixed" class="w-5 h-5"></i></button>

    <div id="speed-overlay">
        <span id="live-speed" class="text-xl font-black">0</span>
        <span class="text-[8px] font-bold uppercase">km/s</span>
    </div>

    <div id="sidebar" class="sidebar">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-black italic">KURYE<span class="text-cyan-500">AI</span></h2>
            <button onclick="toggleMenu()"><i data-lucide="x"></i></button>
        </div>
        <div class="flex flex-col items-center mb-6">
            <div id="p-img-box" class="w-20 h-20 bg-slate-800 rounded-2xl mb-3 flex items-center justify-center border-2 border-cyan-500 overflow-hidden">
                <img id="p-preview" class="w-full h-full object-cover hidden">
                <i id="p-icon" data-lucide="user" class="text-slate-500 w-8 h-8"></i>
            </div>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="uploadPhoto()">
            <button onclick="document.getElementById('file-input').click()" class="text-[10px] font-bold text-cyan-400 uppercase">Fotoğraf Değiştir</button>
            <p class="text-[10px] text-slate-500 mt-2 font-mono">ID: <span id="kurye-id-display">...</span></p>
        </div>
        <div class="space-y-2">
            <input type="text" id="p-ad" class="w-full bg-slate-800 border-none p-3 rounded-xl text-sm text-white" placeholder="Ad Soyad">
            <input type="text" id="p-plaka" class="w-full bg-slate-800 border-none p-3 rounded-xl text-sm text-white" placeholder="Plaka">
            <button onclick="saveProfile()" class="w-full bg-cyan-500 py-3 rounded-xl font-bold text-xs uppercase text-white">Güncelle</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-card">
        <div class="flex justify-between items-end mb-2 px-1">
            <div>
                <h4 class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Toplam Kazanç</h4>
                <p id="earnings" class="text-xl font-black text-slate-900 italic leading-none">₺0,00</p>
            </div>
            <div class="text-right">
                <h4 class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Vardiya Süresi</h4>
                <p id="timer" class="text-md font-bold text-slate-800 leading-none">00:00:00</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-1 mb-3 border-y border-slate-100 py-2 text-center">
            <div><h4 class="text-[8px] text-cyan-600 font-bold uppercase">Mesafe</h4><p id="distance" class="text-xs font-black">0.0 km</p></div>
            <div><h4 class="text-[8px] text-cyan-600 font-bold uppercase">Ort. Hız</h4><p id="avg-speed" class="text-xs font-black">0</p></div>
            <div><h4 class="text-[8px] text-rose-500 font-bold uppercase">Saat/₺</h4><p id="hourly-rate" class="text-xs font-black">₺0</p></div>
        </div>

        <button id="main-btn" onclick="handleShiftToggle()" class="bg-cyan-500 text-white shadow-lg">
            <i data-lucide="play" class="w-4 h-4 fill-current"></i> Vardiyayı Başlat
        </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        let kuryeID = localStorage.getItem('kuryeAI_ID') || "KAI-7291";
        document.getElementById('kurye-id-display').innerText = kuryeID;

        var map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        let isActive = false, marker, pathLine, currentPos = null, startTime, timerInterval;
        let totalDistance = 0, lastCoord = null, pathCoords = [];

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
        function locateUser() { if (currentPos) map.flyTo(currentPos, 17); }

        // Vardiya Başlat/Bitir Mantığı (Kesin Çalışan Versiyon)
        function handleShiftToggle() {
            const btn = document.getElementById('main-btn');
            if (!isActive) {
                // BAŞLAT
                isActive = true;
                startTime = Date.now();
                btn.innerHTML = '<i data-lucide="square" class="w-4 h-4 fill-current"></i> Vardiyayı Bitir';
                btn.classList.replace('bg-cyan-500', 'bg-slate-800');
                lucide.createIcons();
                
                // Sayacı Başlat
                timerInterval = setInterval(updateStats, 1000);
                startTracking();
            } else {
                // BİTİR
                if(confirm("Vardiyayı sonlandırmak istiyor musun?")) {
                    clearInterval(timerInterval);
                    location.reload(); 
                }
            }
        }

        function updateStats() {
            const now = Date.now();
            const diff = now - startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            
            // Örnek Kazanç Hesaplama (Saniyede 0.1 TL gibi)
            let currentEarnings = (diff / 1000) * 0.05; 
            document.getElementById('earnings').innerText = "₺" + currentEarnings.toFixed(2);
        }

        function startTracking() {
            pathLine = L.polyline([], {color: '#06B6D4', weight: 4}).addTo(map);
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                currentPos = [latitude, longitude];
                const s = speed ? (speed * 3.6) : 0;
                document.getElementById('live-speed').innerText = Math.round(s);

                if (!marker) {
                    marker = L.marker(currentPos, {
                        icon: L.divIcon({
                            className: '',
                            html: `<div class="ai-marker-wrapper"><div class="ai-marker-label">Sen</div><div class="ai-marker-circle">AI</div></div>`,
                            iconSize: [60, 50], iconAnchor: [30, 50]
                        })
                    }).addTo(map);
                    map.setView(currentPos, 17);
                } else { 
                    marker.setLatLng(currentPos); 
                    if(isActive) map.panTo(currentPos);
                }
                
                if (isActive && lastCoord && s > 1) {
                    const dist = map.distance(lastCoord, currentPos) / 1000;
                    totalDistance += dist;
                    pathCoords.push(currentPos);
                    pathLine.setLatLngs(pathCoords);
                    document.getElementById('distance').innerText = totalDistance.toFixed(1) + " km";
                }
                lastCoord = currentPos;
            }, (err) => console.error(err), {enableHighAccuracy: true});
        }

        // Fotoğraf Yükleme Fonksiyonu (Düzeltildi)
        function uploadPhoto() {
            const file = document.getElementById('file-input').files[0];
            if(!file) return;
            const ref = storage.ref(`kuryeler/${kuryeID}/avatar.jpg`);
            ref.put(file).then(() => {
                ref.getDownloadURL().then(url => {
                    db.ref(`kuryeler/${kuryeID}/profil/photo`).set(url);
                    const img = document.getElementById('p-preview');
                    img.src = url;
                    img.classList.remove('hidden');
                    document.getElementById('p-icon').classList.add('hidden');
                });
            });
        }
    </script>
</body>
</html>
