<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restoran AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#020617] text-white flex h-screen overflow-hidden">

    <aside id="sidebar" class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col p-6 h-full">
        <h1 class="text-2xl font-black italic text-cyan-400 mb-10">RESTORAN</h1>
        <nav class="space-y-4 flex-grow">
            <button onclick="showTab('map-view')" class="w-full text-left p-4 rounded-xl bg-cyan-600 font-bold">📍 Canlı Harita</button>
            <button onclick="showTab('kuryeler')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800">🛵 Kuryeler</button>
            <button onclick="showTab('rapor')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800">📊 Raporlar</button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col h-full">
        <header class="h-16 border-b border-slate-800 flex items-center justify-between px-8 bg-slate-900/50">
            <div class="font-bold">Dashboard</div>
            <button class="text-xl">🔔</button>
        </header>

        <div id="map-view" class="flex-grow h-full active-view">
            <div id="map" class="h-full w-full"></div>
        </div>

        <div id="kuryeler" class="flex-grow p-8 hidden overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">Kurye Listesi</h2>
            <div id="kurye-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map = L.map('map').setView([39.9334, 32.8597], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function showTab(tabId) {
            document.getElementById('map-view').classList.add('hidden');
            document.getElementById('kuryeler').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');
            if(tabId === 'map-view') setTimeout(() => map.invalidateSize(), 200);
        }

        // Kurye Takibi
        db.ref('kuryeler').on('value', (snap) => {
            const list = document.getElementById('kurye-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const k = child.val();
                list.innerHTML += `<div class="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <p class="font-bold text-lg">${child.key}</p>
                    <button onclick="alert('Ödeme Yapıldı Bildirimi Gönderildi')" class="mt-4 w-full bg-cyan-600 py-2 rounded-xl text-xs font-bold uppercase">Ödeme Yapıldı</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
