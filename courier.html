<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';background:#0b0e14;color:#fff;}

.header{padding:15px;background:#020617;display:flex;justify-content:space-between;}
.status{padding:6px 12px;border-radius:20px;font-size:12px;}
.online{background:#00ff9c;color:#000;}
.offline{background:#ff4d4d;}

#map{height:35vh;}

.panel{padding:15px;background:#111827;}

.btn{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-weight:bold;}
.start{background:#00d4ff;color:#000;}
.stop{background:#ff4d4d;color:#fff;}

.order{background:#1f2937;padding:12px;border-radius:10px;margin-top:8px;}
.order button{margin-top:5px;width:100%;padding:8px;background:#00d4ff;border:none;border-radius:6px;}

.green{background:#065f46;}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.stat{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
font-size:13px;
}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye Panel</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">

<p id="info">Konum bekleniyor...</p>

<button class="btn start" onclick="startTracking()">Online Ol</button>
<button class="btn stop" onclick="stopTracking()">Offline Ol</button>

<div class="stats">
<div class="stat">⏱️ Süre<br><b id="time">0</b></div>
<div class="stat">📍 KM<br><b id="totalKm">0</b></div>
<div class="stat">📊 Ortalama<br><b id="avgKm">0</b></div>
<div class="stat">💰 Kazanç<br><b id="totalMoney">0</b></div>
<div class="stat">⚡ Saatlik<br><b id="hourly">0</b></div>
</div>

<h3>📦 Aktif Görev</h3>
<div id="activeOrder"></div>

<h3>📦 Sipariş Havuzu</h3>
<div id="orders"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
doc,
updateDoc,
collection,
query,
where,
onSnapshot,
runTransaction,
addDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

let map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker,watchId,user;

let startTime=null;
let totalDistance=0;
let lastPos=null;
let totalEarnings=0;
let totalOrders=0;

/* 🏍️ ICON */
const bikeIcon = L.divIcon({
html:`<div style="font-size:26px;color:#00d4ff;">🏍️</div>`,
className:''
});

/* 📏 MESAFE */
function calcDist(a,b){
return Math.sqrt(
Math.pow(a.lat-b.lat,2)+
Math.pow(a.lng-b.lng,2)
)*111;
}

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){location.href="login.html";return;}
user=u;

onSnapshot(query(collection(db,"earnings"),where("courierId","==",u.uid)),snap=>{
totalEarnings=0;
totalOrders=snap.size;

snap.forEach(d=>totalEarnings+=d.data().amount);

document.getElementById("totalMoney").innerText=totalEarnings+"₺";
});
});

/* ONLINE */
window.startTracking=()=>{
startTime=new Date();

document.getElementById("status").className="status online";
document.getElementById("status").innerText="Online";

watchId=navigator.geolocation.watchPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const current={lat,lng};

if(lastPos){
totalDistance+=calcDist(lastPos,current);
}

lastPos=current;

document.getElementById("totalKm").innerText=totalDistance.toFixed(2);

if(totalOrders>0){
document.getElementById("avgKm").innerText=(totalDistance/totalOrders).toFixed(2);
}

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker=L.marker([lat,lng],{icon:bikeIcon}).addTo(map);
}

map.setView([lat,lng],15);

await updateDoc(doc(db,"couriers",user.uid),{
lat,lng,online:true
});

});
};

/* OFFLINE */
window.stopTracking=()=>{
navigator.geolocation.clearWatch(watchId);
};

/* TIMER */
setInterval(()=>{
if(!startTime) return;

const diff=(new Date()-startTime)/1000/60;
document.getElementById("time").innerText=diff.toFixed(1)+" dk";

const hourly=(totalEarnings/(diff/60 || 1)).toFixed(0);
document.getElementById("hourly").innerText=hourly+"₺";

},3000);

/* HAVUZ */
const ordersDiv=document.getElementById("orders");

onSnapshot(query(collection(db,"orders"),where("status","==","bekliyor")),snap=>{

if(!document.getElementById("status").classList.contains("online")){
ordersDiv.innerHTML="Online ol";
return;
}

ordersDiv.innerHTML="";

snap.forEach(docSnap=>{
const o=docSnap.data();

ordersDiv.innerHTML+=`
<div class="order">
<b>${o.customer}</b><br>
${o.address}<br>
💰 ${o.price}₺
<button onclick="acceptOrder('${docSnap.id}',this)">Kabul</button>
</div>`;
});

});

/* LOCK */
window.acceptOrder=async(id,btn)=>{
btn.disabled=true;

try{
await runTransaction(db,async(t)=>{
const ref=doc(db,"orders",id);
const snap=await t.get(ref);

if(snap.data().status!=="bekliyor") throw "taken";

t.update(ref,{status:"yolda",courierId:user.uid});
});
}catch{
alert("Alındı");
btn.disabled=false;
}
};

/* TESLİM */
window.finishOrder=async(id)=>{
const ref=doc(db,"orders",id);
const snap=await getDoc(ref);
const o=snap.data();

await updateDoc(ref,{status:"delivered"});

await addDoc(collection(db,"earnings"),{
courierId:user.uid,
amount:o.price
});
};

</script>
</body>
</html>
