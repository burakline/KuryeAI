<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>KuryeAI Mobile PRO+</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
#map{height:45vh}

.card{
background:rgba(15,23,42,.6);
backdrop-filter:blur(12px);
padding:15px;margin:10px;border-radius:15px
}

input,button{
width:100%;padding:12px;margin-top:8px;border:none;border-radius:10px
}

.blue{background:#00d4ff;color:black}
.green{background:#22c55e}
.red{background:#ef4444}
</style>
</head>

<body>

<div id="app"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import "./firebase.js";

import {
getDatabase, ref, set, onValue, update
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
getAuth, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const db=getDatabase();
const auth=getAuth();

let map, courierMarker, userMarker;
let role;

/* AUTH */
onAuthStateChanged(auth, async user=>{
if(!user) return;

const res=await fetch(
`https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/roles/${user.uid}.json`
);

const data=await res.json();
role=data?.role||"courier";

render(user);
});

/* MAP */
function initMap(){
if(map) return;
map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

/* ================= CUSTOMER ================= */

function renderCustomer(user){

app.innerHTML=`
<div class="card">
<h3>🍔 Sipariş</h3>
<input id="address" placeholder="Adres">
<button class="blue" onclick="createOrder()">Sipariş Ver</button>
</div>

<div class="card">
<h3>💳 Ödeme</h3>
<button class="green" onclick="pay()">Ödeme Yap</button>
</div>

<div id="map"></div>

<div class="card">
<h3>📍 Canlı Takip</h3>
<div id="status"></div>
</div>
`;

initMap();

let activeOrderId=null;

/* CREATE */
window.createOrder=()=>{
navigator.geolocation.getCurrentPosition(pos=>{

const id="ORD-"+Date.now();
activeOrderId=id;

set(ref(db,"orders/"+id),{
id,
customer:user.uid,
address:address.value,
lat:pos.coords.latitude,
lng:pos.coords.longitude,
status:"waiting"
});

userMarker=L.marker([pos.coords.latitude,pos.coords.longitude]).addTo(map);

});
};

/* PAYMENT */
window.pay=()=>{
alert("💳 Ödeme başarılı (demo)");
};

/* TRACK */
onValue(ref(db,"orders"),snap=>{

snap.forEach(o=>{
let d=o.val();

if(d.customer!==user.uid) return;

status.innerHTML=`Durum: ${d.status}`;

if(d.courierId){

onValue(ref(db,"couriers/"+d.courierId),c=>{

let k=c.val();
if(!k || !k.lat) return;

if(courierMarker){
courierMarker.setLatLng([k.lat,k.lng]);
}else{
courierMarker=L.marker([k.lat,k.lng]).addTo(map);
}

});

}

});

});

}

/* ================= COURIER ================= */

function renderCourier(user){

app.innerHTML=`
<div id="map"></div>

<div class="card">
<button class="green" onclick="online()">Online</button>
<button class="red" onclick="offline()">Offline</button>
</div>

<div class="card">
<h3>📦 Siparişler</h3>
<div id="orders"></div>
</div>
`;

initMap();

/* GPS */
navigator.geolocation.watchPosition(pos=>{

set(ref(db,"couriers/"+user.uid),{
lat:pos.coords.latitude,
lng:pos.coords.longitude,
online:true
});

});

/* ORDERS */
onValue(ref(db,"orders"),snap=>{

orders.innerHTML="";

snap.forEach(o=>{
let d=o.val();

if(d.courierId!==user.uid) return;

orders.innerHTML+=`
<div class="card">
${d.address}<br>
${d.status}<br>

<button onclick="accept('${d.id}')">Kabul</button>
<button onclick="deliver('${d.id}')">Teslim</button>
</div>`;
});

});

window.accept=id=>update(ref(db,"orders/"+id),{status:"accepted"});
window.deliver=id=>update(ref(db,"orders/"+id),{status:"delivered"});

window.online=()=>alert("Online");
window.offline=()=>update(ref(db,"couriers/"+user.uid),{online:false});

}

/* ================= RESTAURANT ================= */

function renderRestaurant(){

app.innerHTML=`
<div class="card">
<h3>🏪 Siparişler</h3>
<div id="orders"></div>
</div>
`;

onValue(ref(db,"orders"),snap=>{
orders.innerHTML="";
snap.forEach(o=>{
let d=o.val();

orders.innerHTML+=`
<div class="card">
${d.customer}<br>
${d.status}
</div>`;
});
});

}

/* ROOT */
function render(user){
if(role==="customer") renderCustomer(user);
if(role==="courier") renderCourier(user);
if(role==="restaurant") renderRestaurant(user);
}

</script>
</body>
</html>
