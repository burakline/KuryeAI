<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI v11 - Acil Durum Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background: #0f172a; font-family: 'Inter', sans-serif; }
        #map { height: 40vh; width: 100%; z-index: 1; }
        .stat-card { background: rgba(30, 41, 59, 0.7); border-radius: 1.2rem; padding: 1rem 0.5rem; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .moto-marker { width: 34px; height: 34px; background: #000; border: 3px solid #22d3ee; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px #22d3ee; }
        .moto-marker::after { content: "AI"; color: #22d3ee; font-size: 11px; font-weight: 900; }
        #sidebar { transition: transform 0.3s ease; z-index: 9999; }
        .emergency-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 20000; }
    </style>
</head>
<body class="text-white flex flex-col h-screen">

    <div id="emergency-alert" class="fixed inset-0 emergency-modal hidden items-center justify-center p-6 text-center">
        <div class="bg-slate-800 p-8 rounded-[40px] border-4 border-rose-600 space-y-6 shadow-2xl max-w-sm">
            <div class="text-6xl animate-bounce">🚨</div>
            <h2 class="text-2xl font-black text-rose-500 uppercase">ACİL YARDIM ÇAĞRISI!</h2>
            <p id="alert-text" class="text-lg font-bold text-slate-300">Harun Kaya kaza yaptı!</p>
            <div class="flex flex-col gap-3">
                <a id="nav-link" href="#" target="_blank" class="bg-blue-600 py-4 rounded-2xl font-black uppercase text-sm tracking-widest">📍 YOL TARİFİ AL</a>
                <button onclick="closeAlert()" class="bg-slate-700 py-3 rounded-2xl font-bold text-xs">KAPAT</button>
            </div>
        </div>
    </div>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-900 transform -translate-x-full p-6 border-r border-slate-800">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-black text-cyan-400 italic">KuryeAI</h2>
            <button onclick="toggleMenu()" class="text-slate-400 text-3xl">✕</button>
        </div>
        <nav class="space-y-4">
            <button onclick="showPage('profile')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">👤 Profilim</button>
            <button onclick="showPage('reports')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">📊 Geçmiş Raporlar</button>
            <button onclick="showPage('earnings')" class="w-full text-left p-4 rounded-xl hover:bg-slate-800 flex items-center gap-3">💰 Geçmiş Kazançlar</button>
            <button onclick="showPage('main')" class="w-full text-center p-4 rounded-xl bg-cyan-600 font-bold mt-10">ANA EKRAN</button>
        </nav>
    </div>

    <header class="h-16 px-5 flex justify-between items-center bg-slate-900/90 z-[2000]">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h1 class="text-xl font-black text-cyan-400 italic">KuryeAI</h1>
        <div id="status-badge" class="px-3 py-1 rounded-full text-[10px] font-black bg-rose-500/20 text-rose-500 border border-rose-500/50">KAPALI</div>
    </header>

    <main id="main-view" class="flex-grow flex flex-col">
        <div id="map"></div>

        <div class="px-4 py-4 space-y-3 bg-slate-900/60">
            <div class="grid grid-cols-2 gap-3">
                <button id="btn-start" class="bg-emerald-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Vardiya Başlat</button>
                <button id="btn-end" class="bg-rose-600 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest opacity-30" disabled>Vardiya Bitir</button>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="sendEmergency('Kaza Yaptım')" class="bg-rose-800/80 border border-rose-500/50 py-3 rounded-xl font-bold text-[9px] uppercase">⚠️ Kaza Yaptım</button>
                <button onclick="sendEmergency('Aracım Bozuldu')" class="bg-orange-800/80 border border-orange-500/50 py-3 rounded-xl font-bold text-[9px] uppercase">🛠 Arıza Bildir</button>
            </div>
        </div>

        <div class="flex-grow p-4 bg-slate-900 grid grid-cols-3 gap-2">
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold uppercase">Hız</p><p id="speed" class="text-xl font-black text-cyan-400">0</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold uppercase">Toplam KM</p><p id="km-display" class="text-xl font-black text-yellow-400">0.00</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold uppercase">Süre</p><p id="timer" class="text-xl font-black">00:00:00</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold uppercase">Ort. Hız</p><p id="avg-speed" class="text-xl font-black text-blue-400">0</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold uppercase">Saat Verimi</p><p id="hourly-rate" class="text-lg font-black text-emerald-400">₺0</p></div>
            <div class="stat-card"><p class="text-[8px] opacity-50 font-bold uppercase">Kazanç</p><p id="earnings" class="text-xl font-black text-emerald-500">₺0.0</p></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map, marker, startTime, lastPos, kuryeAdi = "Harun Kaya";

        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ACİL DURUM GÖNDERME
        function sendEmergency(tur) {
            if(!lastPos) return alert("Konum alınamıyor!");
            if(confirm(tur + " bildirimini tüm ekibe göndermek istiyor musunuz?")) {
                db.ref('acil_durumlar').set({
                    kurye: kuryeAdi,
                    tur: tur,
                    lat: lastPos[0],
                    lng: lastPos[1],
                    zaman: new Date().toLocaleTimeString()
                });
                alert("Bildirim gönderildi. Lakin sakin olun, ekip bilgilendirildi.");
            }
        }

        // ACİL DURUM DİNLEME (DİĞER KURYELER İÇİN)
        db.ref('acil_durumlar').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data && data.kurye !== kuryeAdi) {
                document.getElementById('emergency-alert').style.display = 'flex';
                document.getElementById('alert-text').innerText = `${data.kurye} ${data.tur}! (Saat: ${data.zaman})`;
                document.getElementById('nav-link').href = `https://www.google.com/maps/dir/?api=1&destination=${data.lat},${data.lng}`;
                // Sesli uyarı eklenebilir
            }
        });

        function closeAlert() {
            document.getElementById('emergency-alert').style.display = 'none';
            // Bildirimi sistemden temizle (Opsiyonel: Sadece restoran temizlesin istenebilir)
            // db.ref('acil_durumlar').remove(); 
        }

        // KONUM TAKİBİ (Basitleştirilmiş)
        navigator.geolocation.watchPosition((pos) => {
            lastPos = [pos.coords.latitude, pos.coords.longitude];
            if (!marker) {
                marker = L.marker(lastPos, {icon: L.divIcon({className: '', html: '<div class="moto-marker"></div>', iconSize: [34,34]})}).addTo(map);
            } else { marker.setLatLng(lastPos); }
            map.panTo(lastPos);
        }, null, { enableHighAccuracy: true });

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        }
        
        // Vardiya Başlat Buton İşlevi
        document.getElementById('btn-start').onclick = () => {
            startTime = Date.now();
            document.getElementById('status-badge').innerText = "AKTİF";
            document.getElementById('status-badge').className = "px-3 py-1 rounded-full text-[10px] font-black bg-emerald-500/20 text-emerald-400 border border-emerald-500/50";
            document.getElementById('btn-start').disabled = true; document.getElementById('btn-start').style.opacity = "0.2";
            document.getElementById('btn-end').disabled = false; document.getElementById('btn-end').style.opacity = "1";
        };
        
        // Süre ve Kazanç simülasyonu devam eder...
    </script>
</body>
</html>
