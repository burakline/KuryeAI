<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Canlı Takip</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
}

#map{
height:100vh;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

/* MARKERS */
let markers = {};

/* 🔥 REALTIME */
onSnapshot(collection(db,"couriers"), (snap)=>{

const currentIds = [];

/* mevcut id'leri topla */
snap.forEach(doc=> currentIds.push(doc.id));

/* silinen markerları temizle */
Object.keys(markers).forEach(id=>{
if(!currentIds.includes(id)){
map.removeLayer(markers[id]);
delete markers[id];
}
});

/* çiz */
snap.forEach(docSnap=>{

const data = docSnap.data();
const id = docSnap.id;

if(!data.lat || !data.lng) return;

/* 🔥 BÜYÜK PROF ICON */
const icon = L.divIcon({
html: data.online
? `<div style="
width:26px;
height:26px;
border-radius:50%;
background:#22c55e;
border:4px solid white;
box-shadow:0 0 12px #22c55e;
"></div>`
: `<div style="
width:26px;
height:26px;
border-radius:50%;
background:#ef4444;
border:4px solid white;
box-shadow:0 0 12px #ef4444;
"></div>`,
iconSize:[26,26],
iconAnchor:[13,13]
});

/* marker */
if(markers[id]){
markers[id].setLatLng([data.lat,data.lng]);
markers[id].setIcon(icon);
}else{
markers[id] = L.marker([data.lat,data.lng],{icon})
.addTo(map)
.bindPopup(`
<b>${data.name || "Kurye"}</b><br>
${data.online ? "🟢 Online":"🔴 Offline"}
`);
}

});

/* 🔥 AUTO ZOOM (ilk yükleme) */
if(Object.keys(markers).length > 0){
const group = new L.featureGroup(Object.values(markers));
map.fitBounds(group.getBounds().pad(0.3));
}

});

</script>

</body>
</html>
