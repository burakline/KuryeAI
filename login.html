<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>

<!-- 🔥 SIRA ÇOK ÖNEMLİ -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>

async function login(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try{

    await auth.signOut(); // eski session temizle

    const res = await auth.signInWithEmailAndPassword(email,password);
    const uid = res.user.uid;

    console.log("UID:", uid);

    const snap = await db.ref("roles/"+uid).get();

    if(!snap.exists()){
      alert("❌ Role yok!");
      return;
    }

    const role = snap.val().role;
    console.log("ROLE:", role);

    if(role==="admin") location.href="admin.html";
    else if(role==="restaurant") location.href="restaurant.html";
    else if(role==="courier") location.href="courier.html";
    else alert("❌ Geçersiz role");

  }catch(e){
    alert(e.message);
  }
}

</script>

</body>
</html>
