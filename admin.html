<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
--bg: #0b1118;
--card: rgba(255,255,255,0.05);
--border: rgba(255,255,255,0.08);
--primary: #00e0ff;
--text: #ffffff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter, sans-serif}

body{
background: radial-gradient(circle at top, #0f1720, #020617);
color:var(--text);
display:flex;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:rgba(255,255,255,0.02);
backdrop-filter:blur(20px);
border-right:1px solid var(--border);
padding:20px;
}

.logo{
color:var(--primary);
font-size:22px;
margin-bottom:30px;
}

.menu div{
margin:12px 0;
padding:10px;
border-radius:10px;
cursor:pointer;
color:#aaa;
}

.menu div:hover{
background:rgba(255,255,255,0.05);
color:#fff;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* TOPBAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.btn{
padding:8px 14px;
border-radius:8px;
border:none;
cursor:pointer;
}

.logout{
background:#ff4d4d;
color:#fff;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(20px);
padding:20px;
border-radius:16px;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 30px rgba(0,224,255,0.2);
}

.card b{
font-size:26px;
}

/* SECTION */
.section{
margin-top:25px;
}

/* MAP */
#map{
height:300px;
border-radius:16px;
margin-top:10px;
}

/* ORDER */
.order{
background:var(--card);
border:1px solid var(--border);
padding:15px;
border-radius:14px;
margin-top:10px;
}

select,input{
width:100%;
margin-top:8px;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:transparent;
color:#fff;
}

.delete{
background:#ff4d4d;
color:#fff;
margin-top:8px;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">KuryeAI</div>

<div class="menu">
<div>Dashboard</div>
<div>Siparişler</div>
<div>Kuryeler</div>
<div>Restoranlar</div>
</div>
</div>

<div class="main">

<div class="topbar">
<h2>Admin Dashboard</h2>
<button class="btn logout" onclick="logout()">Çıkış</button>
</div>

<div class="grid">
<div class="card">Toplam<br><b id="total">0</b></div>
<div class="card">Hazırlanıyor<br><b id="prep">0</b></div>
<div class="card">Yolda<br><b id="road">0</b></div>
<div class="card">Teslim<br><b id="done">0</b></div>
</div>

<div class="section">
<h3>📊 Analiz</h3>
<canvas id="chart"></canvas>
</div>

<div class="section">
<h3>🗺️ Harita</h3>
<div id="map"></div>
</div>

<div class="section">
<h3>📦 Siparişler</h3>
<div id="orders"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// MAP
const map = L.map('map').setView([39.92,32.85], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// CHART
const chart = new Chart(document.getElementById("chart"), {
type:"doughnut",
data:{
labels:["Hazırlanıyor","Yolda","Teslim"],
datasets:[{
data:[0,0,0],
backgroundColor:["#00e0ff","#3b82f6","#10b981"]
}]
}
});

// AUTH
onAuthStateChanged(auth, async user=>{
if(!user) return location.href="login.html";

const u = await getDoc(doc(db,"users",user.uid));
if(u.data().role!=="admin") return location.href="login.html";

load();
});

// LOAD
function load(){
onSnapshot(collection(db,"orders"), snap=>{

let prep=0,road=0,done=0;

orders.innerHTML="";

snap.forEach(d=>{
const o=d.data();

if(o.status==="hazırlanıyor") prep++;
if(o.status==="yolda") road++;
if(o.status==="teslim edildi") done++;

orders.innerHTML+=`
<div class="order">
<b>${o.product}</b><br>
${o.address}<br>
Durum: ${o.status}

<select onchange="status('${d.id}',this.value)">
<option>hazırlanıyor</option>
<option>yolda</option>
<option>teslim edildi</option>
</select>

<input placeholder="Kurye email" onchange="assign('${d.id}',this.value)">
<button class="delete" onclick="del('${d.id}')">Sil</button>
</div>`;

if(o.lat && o.lng){
L.marker([o.lat,o.lng]).addTo(map);
}

});

chart.data.datasets[0].data=[prep,road,done];
chart.update();

});
}

// ACTIONS
window.status=(id,s)=>updateDoc(doc(db,"orders",id),{status:s});
window.assign=(id,e)=>updateDoc(doc(db,"orders",id),{courierEmail:e});
window.del=(id)=>deleteDoc(doc(db,"orders",id));
window.logout=()=>signOut(auth);
</script>

</body>
</html>
