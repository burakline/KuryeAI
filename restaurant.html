<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* SURGE */
async function calculateSurge(){

const settings = (await getDoc(doc(db,"settings","config"))).data();

if(!settings.surgeEnabled) return 1;

const orders = (await getDocs(collection(db,"orders"))).size;
const couriersSnap = await getDocs(collection(db,"couriers"));

let active=0;
couriersSnap.forEach(d=>{
if(d.data().online) active++;
});

if(active===0) return 1;

let ratio = orders/active;

if(ratio < settings.surgeThreshold) return 1;

return Math.min(settings.surgeMax, ratio/settings.surgeThreshold);
}

/* CREATE */
window.createOrder = async()=>{

const settings = (await getDoc(doc(db,"settings","config"))).data();

const surge = await calculateSurge();

const distance = 5;

const base = (settings.hourly/60*15)+(distance*settings.perKm);

const price = Math.round(base * surge);

await addDoc(collection(db,"orders"),{

status:"bekliyor",

});

alert("Sipariş oluşturuldu 💰 "+price+"₺");

};

</script>
