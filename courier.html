<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#0f2027;color:white}
#map{height:60vh}
.topbar{display:flex;justify-content:space-between;padding:15px;background:#020617}
.status{padding:8px 12px;border-radius:20px}
.online{background:#00ff9c;color:black}
.offline{background:#ff4d4d}
.panel{padding:15px}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-weight:bold}
</style>
</head>

<body>

<div class="topbar">
  <h3>🚀 KuryeAI</h3>
  <div id="statusBox" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">
  <button onclick="goOnline()">Online Ol</button>
  <button onclick="goOffline()">Offline Ol</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import "./firebase.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const db = getDatabase();

const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker;

// GPS TRACK
function startTracking(){

  navigator.geolocation.watchPosition(
    (pos) => {

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      if(!userMarker){
        userMarker = L.marker([lat, lng]).addTo(map)
          .bindPopup("Sen buradasın")
          .openPopup();
      }else{
        userMarker.setLatLng([lat, lng]);
      }

      map.setView([lat, lng], 15);

      const user = window.firebaseAuth.currentUser;

      if(user){
        set(ref(db, "canli_takip/" + user.uid), {
          lat: lat,
          lng: lng,
          zaman: Date.now()
        });
      }

    },
    (err) => {
      alert(err.message);
    },
    { enableHighAccuracy: true }
  );
}

// ONLINE
window.goOnline = async function(){

  document.getElementById("statusBox").innerText="Online";
  document.getElementById("statusBox").className="status online";

  startTracking();

  const user = window.firebaseAuth.currentUser;

  if(user){
    set(ref(db, "kuryeler/" + user.uid + "/durum"), "online");
  }

  await window.requestNotificationPermission();
};

// OFFLINE
window.goOffline = function(){

  document.getElementById("statusBox").innerText="Offline";
  document.getElementById("statusBox").className="status offline";

  const user = window.firebaseAuth.currentUser;

  if(user){
    set(ref(db, "kuryeler/" + user.uid + "/durum"), "offline");
  }
};

</script>

</body>
</html>
