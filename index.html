<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI | Geleceğin Lojistiği</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #0f172a; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { text-shadow: 0 0 10px #22d3ee, 0 0 20px #22d3ee; }
        .animate-float { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body class="text-slate-200">

    <div class="fixed inset-0 z-0 opacity-20 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-500 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-500 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 min-h-screen flex flex-col items-center justify-center p-6 text-center">
        
        <div class="mb-8 animate-float">
            <h1 class="text-6xl md:text-8xl font-black italic tracking-tighter text-white neon-text">
                KURYE<span class="text-cyan-400">AI</span>
            </h1>
            <p class="mt-4 text-slate-400 tracking-widest uppercase text-sm font-light">Yapay Zeka Destekli Teslimat Ağı</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
            
            <button onclick="window.location.href='courier.html'" class="glass p-8 rounded-3xl hover:bg-cyan-500/10 transition-all group text-left">
                <div class="flex items-center justify-between mb-4">
                    <i class="fa-solid fa-motorcycle text-4xl text-cyan-400"></i>
                    <i class="fa-solid fa-arrow-right text-slate-500 group-hover:text-cyan-400 transition-colors"></i>
                </div>
                <h3 class="text-2xl font-bold text-white mb-2">Kurye Paneli</h3>
                <p class="text-slate-400 text-sm">Vardiyanı başlat, siparişleri takip et ve kazancını yönet.</p>
            </button>

            <button onclick="window.location.href='restaurant.html'" class="glass p-8 rounded-3xl hover:bg-orange-500/10 transition-all group text-left">
                <div class="flex items-center justify-between mb-4">
                    <i class="fa-solid fa-utensils text-4xl text-orange-400"></i>
                    <i class="fa-solid fa-arrow-right text-slate-500 group-hover:text-orange-400 transition-colors"></i>
                </div>
                <h3 class="text-2xl font-bold text-white mb-2">Restoran Paneli</h3>
                <p class="text-slate-400 text-sm">Yeni sipariş oluştur, kuryeleri canlı izle ve rapor al.</p>
            </button>

        </div>

        <div class="mt-12 text-slate-500 text-[10px] uppercase tracking-[0.3em]">
            <a href="admin.html" class="hover:text-cyan-400 transition-colors">Sistem Yönetimi</a>
        </div>

    </div>

    <footer class="fixed bottom-6 text-center w-full text-slate-600 text-[10px]">
        © 2026 KuryeAI Technologies | Tüm Hakları Saklıdır.
    </footer>

</body>
</html>
