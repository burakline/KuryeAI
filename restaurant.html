<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestoranAI</title>

<style>
body{
margin:0;
font-family: 'Inter', sans-serif;
background:#0A0A0A;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.container{
width:90%;
max-width:400px;
padding:25px;
border-radius:20px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);

box-shadow:0 0 40px rgba(0,194,168,0.1);
}

/* TITLE */
h1{
margin-bottom:20px;
font-size:22px;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00C2A8;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
box-shadow:0 0 20px #00C2A8;
transform:scale(1.02);
}

/* PRICE */
.price{
margin-top:15px;
font-size:18px;
text-align:center;
color:#00C2A8;
}
</style>
</head>

<body>

<div class="container">
<h1>🍔 RestoranAI</h1>

<input id="customer" placeholder="Müşteri adı">
<input id="address" placeholder="Adres">

<button onclick="createOrder()">Sipariş Gönder</button>

<div id="price" class="price"></div>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
collection,
addDoc,
getDocs,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* POLYGON */
function isPointInPolygon(point, vs){
let x=point[0],y=point[1],inside=false;
for(let i=0,j=vs.length-1;i<vs.length;j=i++){
let xi=vs[i][0],yi=vs[i][1];
let xj=vs[j][0],yj=vs[j][1];
let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
if(intersect) inside=!inside;
}
return inside;
}

/* CREATE ORDER */
window.createOrder = async()=>{

const customer = document.getElementById("customer").value;
const address = document.getElementById("address").value;

if(!customer || !address){
alert("Bilgileri doldur!");
return;
}

/* DEMO KONUM */
const lat=39.92;
const lng=32.85;

/* ZONE */
const zones = await getDocs(collection(db,"zones"));
let zone=null;

zones.forEach(z=>{
const data=z.data();
if(data.polygon && isPointInPolygon([lat,lng],data.polygon)){
zone={...data,id:z.id};
}
});

if(!zone){
alert("Zone bulunamadı!");
return;
}

/* SETTINGS */
const settingsSnap = await getDoc(doc(db,"settings","config"));
const settings = settingsSnap.exists() ? settingsSnap.data() : {};

/* SURGE */
let surge=1;

if(settings.surgeEnabled){
const orders = (await getDocs(collection(db,"orders"))).size;
const couriers = await getDocs(collection(db,"couriers"));

let active=0;
couriers.forEach(c=>{
if(c.data().online) active++;
});

if(active>0){
let ratio=orders/active;
if(ratio>=settings.surgeThreshold){
surge=Math.min(settings.surgeMax,ratio/settings.surgeThreshold);
}
}
}

/* PRICE */
const base = (zone.pricing.hourly/60*15)+(5*zone.pricing.perKm);
const price = Math.round(base*surge);

/* SAVE */
await addDoc(collection(db,"orders"),{
customer,
address,
lat,
lng,
zoneId:zone.id,
price,
surge,
status:"pending",
createdAt:Date.now()
});

document.getElementById("price").innerText =
"Sipariş oluşturuldu: "+price+"₺ 🚀";

};

</script>

</body>
</html>
