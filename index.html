<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI | Yapay Zeka Destekli Lojistik</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family:'Segoe UI', sans-serif; margin:0; background:#0b0e14; color:#fff }
header { background:#000; padding:1.5rem 0; text-align:center }
.hero { background:#1a1a1a; padding:3rem; text-align:center }

.cta-button { background:#00d4ff; color:#000; padding:15px 30px; border-radius:8px; border:none; margin:10px }
.btn-login { border:1px solid #00d4ff; color:#00d4ff; padding:10px; border-radius:8px }

#formBox,#courierForm {
display:none;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
background:#1e293b;
padding:20px;
border-radius:10px;
width:340px;
z-index:999;
max-height:80vh;
overflow:auto;
}

#formBox input,#courierForm input,#courierForm select{
width:100%;
margin:5px 0;
padding:10px;
border-radius:6px;
border:none;
}

#selectMap { height:200px;margin:10px 0 }
</style>
</head>

<body>

<header><h1>KuryeAI</h1></header>

<div class="hero">

<h2>Yapay Zeka Destekli Yeni Nesil Lojistik</h2>

<a href="#" class="cta-button">Hemen Kurye Çağır</a>

<button onclick="openForm()" class="cta-button">Restoran Başvurusu</button>

<!-- ✅ KURYE BUTON -->
<button onclick="openCourierForm()" class="cta-button">Kurye Ol</button>

<div>
<a href="login.html?type=restaurant" class="btn-login">Restoran</a>
<a href="login.html?type=courier" class="btn-login">Kurye</a>
<a href="login.html?type=admin" class="btn-login">Admin</a>
</div>

</div>

<!-- RESTORAN FORM -->
<div id="formBox">
<h3>Restoran Başvuru</h3>
<input id="name" placeholder="Ad">
<input id="email" placeholder="Email">
<input id="address" placeholder="Adres">
<div id="selectMap"></div>
<button onclick="submitForm()">Gönder</button>
<button onclick="closeForm()">Kapat</button>
</div>

<!-- 🚀 FULL KURYE FORM -->
<div id="courierForm">
<h3>Kurye Başvuru</h3>

<div style="text-align:center">
<label for="photo">
<div style="width:80px;height:80px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;margin:auto;cursor:pointer">
📷
</div>
</label>
<input type="file" id="photo" accept="image/*" capture="environment" style="display:none">
</div>

<input id="cName" placeholder="Ad Soyad">
<input id="cBirthDate" type="date">
<input id="cBirthPlace" placeholder="Doğum Yeri">
<input id="cBlood" placeholder="Kan Grubu">
<input id="cEducation" placeholder="Eğitim Durumu">

<input id="cLicense" placeholder="Ehliyet">

<select id="cP1">
<option value="">P1 Belgesi</option>
<option value="var">Var</option>
<option value="yok">Yok</option>
</select>

<select id="cSRC">
<option value="">SRC Kurye</option>
<option value="var">Var</option>
<option value="yok">Yok</option>
</select>

<select id="cCriminal">
<option value="">Adli Sicil</option>
<option value="yok">Yok</option>
<option value="var">Var</option>
</select>

<input id="cPhone" placeholder="Telefon">
<input id="cEmail" placeholder="Mail">

<button onclick="sendCourier()">Başvur</button>
<button onclick="closeCourierForm()">Kapat</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import { getStorage, ref, uploadBytes, getDownloadURL }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const storage = getStorage(app);

/* RESTORAN */
window.openForm=()=>{document.getElementById("formBox").style.display="block";}
window.closeForm=()=>{document.getElementById("formBox").style.display="none";}

window.submitForm=async()=>{
await addDoc(collection(db,"applications"),{
name:name.value,
email:email.value,
address:address.value,
type:"restaurant",
status:"pending"
});
alert("Başvurunuz alındı!");
closeForm();
}

/* 🚀 KURYE */
window.openCourierForm=()=>{
document.getElementById("courierForm").style.display="block";
}

window.closeCourierForm=()=>{
document.getElementById("courierForm").style.display="none";
}

window.sendCourier=async()=>{

let photoURL="";
const file=document.getElementById("photo").files[0];

if(file){
const storageRef=ref(storage,"couriers/"+Date.now());
await uploadBytes(storageRef,file);
photoURL=await getDownloadURL(storageRef);
}

await addDoc(collection(db,"applications"),{

type:"courier",
status:"pending",

photo:photoURL,
name:document.getElementById("cName").value,
birthDate:document.getElementById("cBirthDate").value,
birthPlace:document.getElementById("cBirthPlace").value,
blood:document.getElementById("cBlood").value,
education:document.getElementById("cEducation").value,
license:document.getElementById("cLicense").value,
p1:document.getElementById("cP1").value,
src:document.getElementById("cSRC").value,
criminal:document.getElementById("cCriminal").value,
phone:document.getElementById("cPhone").value,
email:document.getElementById("cEmail").value

});

alert("Kurye başvurusu gönderildi 🚀");
closeCourierForm();

}

</script>

</body>
</html>
