<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0b0b0b;
      color:white;
    }

    .header {
      padding:20px;
      font-size:22px;
      font-weight:bold;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logout {
      background:#ff4d4d;
      border:none;
      padding:10px 15px;
      border-radius:8px;
      color:white;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      padding:15px;
    }

    .card {
      background:#1a1a1a;
      padding:20px;
      border-radius:15px;
    }

    .btn {
      width:100%;
      padding:12px;
      background:#00d4aa;
      border:none;
      border-radius:10px;
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="header">
  🧠 AdminAI
  <button class="logout" onclick="logout()">Çıkış</button>
</div>

<div class="grid">
  <div class="card">
    📦 Toplam Sipariş
    <h2 id="total">0</h2>
  </div>

  <div class="card">
    🚀 Aktif Sipariş
    <h2 id="active">0</h2>
  </div>

  <div class="card">
    ⚙️ Sistem Ayarları

    <p>Otomatik Atama</p>
    <select id="autoAssign">
      <option value="true">Açık</option>
      <option value="false">Kapalı</option>
    </select>

    <p>Maks Mesafe (km)</p>
    <input id="maxDistance" type="number" value="10">

    <button class="btn" onclick="saveSettings()">Kaydet</button>
  </div>

  <div class="card">
    📋 Siparişler
  </div>
</div>

<script type="module">
import "./firebase.js";

window.saveSettings = async () => {
  const autoAssign = document.getElementById("autoAssign").value === "true";
  const maxDistance = document.getElementById("maxDistance").value;

  const { getDatabase, ref, update } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
  const db = getDatabase();

  await update(ref(db, "sistem"), {
    autoAssign,
    maxDistance
  });

  alert("Kaydedildi");
};
</script>

</body>
</html>
