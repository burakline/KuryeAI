<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Restaurant</title>
</head>

<body>

<input id="customer" placeholder="Müşteri">
<input id="address" placeholder="Adres">
<button onclick="createOrder()">Gönder</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* POLYGON */
function isPointInPolygon(point, vs){
let x=point[0],y=point[1],inside=false;
for(let i=0,j=vs.length-1;i<vs.length;j=i++){
let xi=vs[i][0],yi=vs[i][1];
let xj=vs[j][0],yj=vs[j][1];
let intersect=((yi>y)!=(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);
if(intersect) inside=!inside;
}
return inside;
}

/* CREATE */
window.createOrder = async()=>{

const lat=39.92;
const lng=32.85;

const zones = await getDocs(collection(db,"zones"));

let zone=null;

zones.forEach(z=>{
const data=z.data();
if(isPointInPolygon([lat,lng],data.polygon)){
zone={...data,id:z.id};
}
});

if(!zone) return alert("Zone yok");

const settings = (await getDoc(doc(db,"settings","config"))).data();

let surge=1;

if(settings.surgeEnabled){
const orders = (await getDocs(collection(db,"orders"))).size;
const couriers = (await getDocs(collection(db,"couriers")));

let active=0;
couriers.forEach(c=>{
if(c.data().online) active++;
});

if(active>0){
let ratio=orders/active;
if(ratio>=settings.surgeThreshold){
surge=Math.min(settings.surgeMax,ratio/settings.surgeThreshold);
}
}
}

const base = (zone.pricing.hourly/60*15)+(5*zone.pricing.perKm);
const price = Math.round(base*surge);

await addDoc(collection(db,"orders"),{
customer:customer.value,
address:address.value,
lat,lng,
zoneId:zone.id,
price,
surge,
status:"bekliyor"
});

alert("Sipariş: "+price+"₺");
};

</script>
</body>
</html>
