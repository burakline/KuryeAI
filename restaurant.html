<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant</title>

<style>
body{margin:0;background:#0f172a;color:white;font-family:Arial;}
.panel{padding:15px;}
input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;}
button{width:100%;padding:12px;background:#06b6d4;border:none;border-radius:10px;font-weight:bold;}
</style>
</head>

<body>

<div class="panel">
<input id="customer" placeholder="Müşteri">
<input id="phone" placeholder="Telefon">
<input id="address" placeholder="Adres">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<input id="note" placeholder="Not">
<input id="price" placeholder="Fiyat">
<button onclick="createOrder()">Sipariş</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
  authDomain: "kuryeai.firebaseapp.com",
  databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kuryeai"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="/login.html";

  const { get, ref } = await import("https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js");
  const snap = await get(ref(db,"roles/"+user.uid));

  if(!snap.exists() || snap.val().role !== "restaurant"){
    alert("Yetkisiz!");
    return location.href="/login.html";
  }
});

window.createOrder = async function(){

  await push(ref(db,"orders"),{
    customer:customer.value,
    phone:phone.value,
    address:address.value,
    lat:Number(lat.value),
    lng:Number(lng.value),
    note:note.value,
    price:Number(price.value),
    status:"waiting",
    createdAt:Date.now()
  });

  alert("Sipariş oluşturuldu");
}

</script>

</body>
</html>
