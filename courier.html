<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b0e14;color:white}

.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#020617;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.online{background:#00ff9c;color:black}
.offline{background:#ff4d4d}

#map{height:50vh}

.panel{padding:15px}

.card{
background:#111827;
padding:12px;
margin-top:10px;
border-radius:10px;
}

.btn{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.accept{background:#00d4ff;color:black}
.reject{background:#ff4d4d;color:white}
.done{background:#22c55e;color:white}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">

<div id="stats"></div>

<h3>📦 Siparişler</h3>
<div id="orders"></div>

<h3>🚀 Aktif Sipariş</h3>
<div id="activeOrder"></div>

<button onclick="startShift()" class="btn accept">Online Ol</button>
<button onclick="endShift()" class="btn reject">Offline Ol</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot,
query,
where,
doc,
updateDoc,
getDoc,
runTransaction
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* CONFIG */
const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;

/* ✅ FIX */
const orders = document.getElementById("orders");
const activeOrder = document.getElementById("activeOrder");
const status = document.getElementById("status");

/* GLOBAL */
let user;
let courierData=null;
let lastOrderCount=0;

/* DISTANCE */
function getDistance(lat1,lng1,lat2,lng2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* 🔔 NOTIFICATION */
function notify(){
try{
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}catch{}

if(navigator.vibrate) navigator.vibrate(200);

alert("🚀 Yeni sipariş geldi!");
}

/* AUTH */
onAuthStateChanged(auth, async(u)=>{

if(!u) return location.href="login.html";

user=u;

/* COURIER */
onSnapshot(doc(db,"couriers",u.uid),(snap)=>{
courierData = snap.data();

if(courierData?.online){
status.className="status online";
status.innerText="Online";
}else{
status.className="status offline";
status.innerText="Offline";
}

loadActiveOrder();
});

/* ORDERS */
const q = query(collection(db,"orders"), where("status","==","bekliyor"));

onSnapshot(q,(snap)=>{

orders.innerHTML="";

if(snap.size > lastOrderCount){
notify();
}
lastOrderCount = snap.size;

snap.forEach(d=>{
const o=d.data();

if(o.rejectedBy?.includes(user.uid)) return;
if(!courierData?.online) return;

let score = 0;

if(o.lat && courierData?.lat){
const dist = getDistance(courierData.lat,courierData.lng,o.lat,o.lng);
score = 100 - dist;
}

if(score < 50 && Math.random()>0.3) return;

orders.innerHTML+=`
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>

💰 ${o.price}₺ 🔥x${o.surge||1}

<button class="btn accept" onclick="acceptOrder('${d.id}',${o.price},${o.surge||1})">Kabul</button>
<button class="btn reject" onclick="rejectOrder('${d.id}')">Reddet</button>
</div>`;
});

});

});

/* SHIFT */
window.startShift=()=>{
navigator.geolocation.watchPosition(async(pos)=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker = L.marker([lat,lng]).addTo(map);
}

map.setView([lat,lng],15);

await updateDoc(doc(db,"couriers",user.uid),{
lat,lng,online:true,status:"available"
});
});
};

/* OFFLINE */
window.endShift=async()=>{
await updateDoc(doc(db,"couriers",user.uid),{online:false});
location.reload();
};

/* ACCEPT */
window.acceptOrder = async(id,price,surge)=>{
const ref = doc(db,"orders",id);

try{
await runTransaction(db, async(t)=>{
const snap = await t.get(ref);
if(snap.data().status!=="bekliyor") throw "taken";

t.update(ref,{status:"yolda",courierId:user.uid});
});

await updateDoc(doc(db,"couriers",user.uid),{status:"busy"});

alert("🚀 Sipariş alındı!");

}catch{
alert("Başka kurye aldı!");
}
};

/* ACTIVE */
function loadActiveOrder(){

const q = query(collection(db,"orders"), where("courierId","==",user.uid));

onSnapshot(q,(snap)=>{
activeOrder.innerHTML="";

snap.forEach(d=>{
const o=d.data();
if(o.status!=="yolda") return;

activeOrder.innerHTML=`
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>

<button class="btn done" onclick="finishOrder('${d.id}')">
Teslim Edildi
</button>
</div>`;
});
});
}

/* FINISH */
window.finishOrder = async(id)=>{
await updateDoc(doc(db,"orders",id),{status:"delivered"});
await updateDoc(doc(db,"couriers",user.uid),{status:"available"});
alert("Teslim edildi 🎉");
};

/* REJECT */
window.rejectOrder = async(id)=>{
const ref = doc(db,"orders",id);
const snap = await getDoc(ref);

const prev = snap.data().rejectedBy || [];

await updateDoc(ref,{
rejectedBy:[...prev, user.uid]
});
};

</script>

</body>
</html>
