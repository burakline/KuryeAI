<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f5f7fb;padding:20px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;}
button{padding:10px;margin-top:5px;border:none;border-radius:6px;cursor:pointer;}
.ok{background:#00d4ff;color:white;}
.no{background:red;color:white;}
</style>
</head>

<body>

<h2>⚙️ Sistem Ayarları</h2>

<div class="card">
<label>Max Kurye Mesafesi (KM)</label>
<input id="maxDistanceInput" type="number">
<button onclick="saveSettings()">Kaydet</button>
</div>

<h2>📩 Başvurular</h2>
<div id="apps"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const config={
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

const app=initializeApp(config);
const secondaryApp=initializeApp(config,"sec");

const db=getFirestore(app);
const auth=getAuth(secondaryApp);

/* AYAR YÜKLE */
async function loadSettings(){
const snap=await getDoc(doc(db,"settings","config"));

if(snap.exists()){
document.getElementById("maxDistanceInput").value=snap.data().maxDistance;
}else{
document.getElementById("maxDistanceInput").value=10;
}
}

/* KAYDET */
window.saveSettings=async()=>{
const val=Number(document.getElementById("maxDistanceInput").value);

await setDoc(doc(db,"settings","config"),{
maxDistance:val
});

alert("Kaydedildi");
};

loadSettings();

/* BAŞVURULAR */
async function loadApps(){

const div=document.getElementById("apps");
const snap=await getDocs(collection(db,"applications"));

div.innerHTML="";

snap.forEach(d=>{
const a=d.data();
a.id=d.id;

div.innerHTML+=`
<div class="card">
${a.name} - ${a.email}<br>
<button class="ok" onclick='approve(${JSON.stringify(a)})'>Onayla</button>
<button class="no" onclick='reject("${a.id}")'>Reddet</button>
</div>`;
});
}

window.approve=async(a)=>{

const user=await createUserWithEmailAndPassword(auth,a.email,"123456");
const uid=user.user.uid;

await setDoc(doc(db,"users",uid),{
email:a.email,
role:"courier"
});

await setDoc(doc(db,"couriers",uid),{
name:a.name,
lat:0,lng:0,online:false
});

await deleteDoc(doc(db,"applications",a.id));

alert("Kurye oluşturuldu");
loadApps();
};

window.reject=async(id)=>{
await deleteDoc(doc(db,"applications",id));
loadApps();
};

loadApps();

</script>
</body>
</html>
