<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#020617;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#020617;
border-bottom:1px solid #1e293b;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

/* SIDEBAR */
.sidebar{
position:fixed;
left:-220px;
top:0;
width:220px;
height:100%;
background:#020617;
padding:20px;
transition:0.3s;
z-index:10;
}

.sidebar.active{
left:0;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
background:none;
border:none;
color:#94a3b8;
text-align:left;
cursor:pointer;
}

.sidebar button:hover{
color:white;
}

/* CONTENT */
.content{
padding:15px;
}

/* CARD */
.card{
background:#0f172a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:15px;
}

/* MAP */
#map{
width:100%;
height:300px;
border-radius:12px;
}

/* BUTTON */
.btn{
background:#00d4ff;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

/* RESPONSIVE */
@media(min-width:768px){
.grid{
grid-template-columns:1fr 1fr;
}
}

@media(min-width:1024px){
.grid{
grid-template-columns:1fr 1fr 1fr;
}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>KuryeAI</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('apps')">Başvurular</button>
</div>

<!-- CONTENT -->
<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>🚀 Canlı Sistem</h2>
<div id="map"></div>
</div>

<!-- APPLICATIONS -->
<div id="apps" style="display:none">
<h2>📩 Başvurular</h2>

<div id="appList" class="grid"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

/* FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);

/* MENU */
window.toggleMenu=()=>{
document.getElementById("sidebar").classList.toggle("active");
}

/* NAV */
window.show=id=>{
dashboard.style.display="none";
apps.style.display="none";
document.getElementById(id).style.display="block";
}

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* APPLICATIONS */
onSnapshot(collection(db,"applications"),snap=>{
appList.innerHTML="";

snap.forEach(d=>{
const a=d.data();

appList.innerHTML+=`
<div class="card">
<b>${a.name || "İsimsiz"}</b><br>
${a.email || "Email yok"}<br><br>
<button class="btn">Onayla</button>
<button class="btn">Reddet</button>
</div>`;
});

});

</script>

</body>
</html>
