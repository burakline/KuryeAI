<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b0e14;color:white}

.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#020617;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
}

.online{background:#00ff9c;color:black}
.offline{background:#ff4d4d}

#map{height:50vh}

.panel{padding:15px}

.card{
background:#111827;
padding:12px;
margin-top:10px;
border-radius:10px;
}

.btn{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-weight:bold;
}

.accept{background:#00d4ff;color:black}
.reject{background:#ff4d4d;color:white}
.done{background:#22c55e;color:white}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">

<div id="stats"></div>

<h3>📦 Siparişler</h3>
<div id="orders"></div>

<h3>🚀 Aktif Sipariş</h3>
<div id="activeOrder"></div>

<button onclick="startShift()" class="btn accept">Online Ol</button>
<button onclick="endShift()" class="btn reject">Offline Ol</button>

</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- FIREBASE COMPAT -->
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.10.0/firebase-auth-compat.js"></script>

<script>

/* 🔥 CONFIG */
firebase.initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = firebase.firestore();
const auth = firebase.auth();

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let marker;

/* ELEMENTS */
const orders = document.getElementById("orders");
const activeOrder = document.getElementById("activeOrder");
const status = document.getElementById("status");

/* GLOBAL */
let user;
let courierData=null;
let lastOrderCount=0;

/* DISTANCE */
function getDistance(lat1,lng1,lat2,lng2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a =
Math.sin(dLat/2)**2 +
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* 🔔 NOTIFICATION */
function notify(){
try{
new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg").play();
}catch{}

if(navigator.vibrate) navigator.vibrate(200);

alert("🚀 Yeni sipariş geldi!");
}

/* AUTH */
auth.onAuthStateChanged(async(u)=>{

if(!u) return location.href="login.html";

user=u;

/* COURIER */
db.collection("couriers").doc(u.uid).onSnapshot((snap)=>{
courierData = snap.data();

if(courierData?.online){
status.className="status online";
status.innerText="Online";
}else{
status.className="status offline";
status.innerText="Offline";
}

loadActiveOrder();
});

/* ORDERS */
db.collection("orders")
.where("status","==","bekliyor")
.onSnapshot((snap)=>{

orders.innerHTML="";

if(snap.size > lastOrderCount){
notify();
}
lastOrderCount = snap.size;

snap.forEach(d=>{
const o=d.data();

if(o.rejectedBy?.includes(user.uid)) return;
if(!courierData?.online) return;

let score = 0;

if(o.lat && courierData?.lat){
const dist = getDistance(courierData.lat,courierData.lng,o.lat,o.lng);
score = 100 - dist;
}

if(score < 50 && Math.random()>0.3) return;

orders.innerHTML+=`
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>

💰 ${o.price}₺ 🔥x${o.surge||1}

<button class="btn accept" onclick="acceptOrder('${d.id}',${o.price},${o.surge||1})">Kabul</button>
<button class="btn reject" onclick="rejectOrder('${d.id}')">Reddet</button>
</div>`;
});

});

});

/* SHIFT */
function startShift(){
navigator.geolocation.watchPosition(async(pos)=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker = L.marker([lat,lng]).addTo(map);
}

map.setView([lat,lng],15);

await db.collection("couriers").doc(user.uid).update({
lat,lng,online:true,status:"available"
});
});
}

/* OFFLINE */
async function endShift(){
await db.collection("couriers").doc(user.uid).update({
online:false
});
location.reload();
}

/* ACCEPT */
async function acceptOrder(id,price,surge){

const ref = db.collection("orders").doc(id);

try{
await db.runTransaction(async(t)=>{
const snap = await t.get(ref);
if(snap.data().status!=="bekliyor") throw "taken";

t.update(ref,{
status:"yolda",
courierId:user.uid
});
});

await db.collection("couriers").doc(user.uid).update({
status:"busy"
});

alert("🚀 Sipariş alındı!");

}catch{
alert("Başka kurye aldı!");
}
}

/* ACTIVE */
function loadActiveOrder(){

db.collection("orders")
.where("courierId","==",user.uid)
.onSnapshot((snap)=>{

activeOrder.innerHTML="";

snap.forEach(d=>{
const o=d.data();
if(o.status!=="yolda") return;

activeOrder.innerHTML=`
<div class="card">
<b>${o.customer}</b><br>
${o.address}<br>

<button class="btn done" onclick="finishOrder('${d.id}')">
Teslim Edildi
</button>
</div>`;
});

});
}

/* FINISH */
async function finishOrder(id){
await db.collection("orders").doc(id).update({
status:"delivered"
});

await db.collection("couriers").doc(user.uid).update({
status:"available"
});

alert("Teslim edildi 🎉");
}

/* REJECT */
async function rejectOrder(id){
const ref = db.collection("orders").doc(id);
const snap = await ref.get();

const prev = snap.data().rejectedBy || [];

await ref.update({
rejectedBy:[...prev, user.uid]
});
}

</script>

</body>
</html>
