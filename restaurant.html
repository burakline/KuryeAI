<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KuryeAI - Restoran Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { background-color: #0f172a; color: white; }
        #res-map { height: 350px; border-radius: 1.5rem; margin-bottom: 1rem; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(51, 65, 85, 0.5); }
        input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
    </style>
</head>
<body class="pb-20">

    <header class="p-4 flex justify-between items-center border-b border-slate-800 glass-card sticky top-0 z-50">
        <div>
            <h1 class="text-xl font-bold text-cyan-400 italic">KuryeAI</h1>
            <p class="text-[10px] text-slate-400">Restoran Yönetim Ekranı</p>
        </div>
        <button onclick="window.location.href='index.html'" class="text-xs bg-rose-500/10 text-rose-400 border border-rose-500/20 px-3 py-1 rounded-lg">Çıkış</button>
    </header>

    <main class="p-4 space-y-6">

        <div class="grid grid-cols-1 gap-4">
            <button onclick="cağır()" class="bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-black text-lg shadow-lg shadow-cyan-900/40 transition-all active:scale-95 flex flex-col items-center">
                🚀 HEMEN KURYE ÇAĞIR
                <span class="text-[10px] font-normal opacity-80 italic">En yakın kuryeye sinyal gönderilir</span>
            </button>
        </div>

        <div class="glass-card p-5 rounded-3xl space-y-4">
            <h2 class="text-sm font-bold text-slate-300 uppercase tracking-widest">📦 Yeni Sipariş Detayı</h2>
            <div class="space-y-3">
                <input type="text" placeholder="Müşteri Adresi (Mahalle/Sokak)" class="w-full p-3 rounded-xl text-sm outline-none focus:ring-2 focus:ring-cyan-500">
                <div class="grid grid-cols-2 gap-3">
                    <select class="p-3 rounded-xl text-sm outline-none">
                        <option>Ödeme: Nakit</option>
                        <option>Ödeme: Kredi Kartı</option>
                        <option>Ödeme: Online</option>
                    </select>
                    <input type="number" placeholder="Tutar (₺)" class="p-3 rounded-xl text-sm outline-none">
                </div>
            </div>
        </div>

        <div class="space-y-3">
            <h2 class="text-sm font-bold text-slate-300 flex items-center gap-2">📍 Yakındaki Kuryeler & Takip</h2>
            <div id="res-map" class="shadow-2xl shadow-cyan-900/20"></div>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-card border-t border-slate-700 p-3 flex justify-around items-center z-50">
        <button class="flex flex-col items-center gap-1 text-cyan-400">
            <span class="text-[10px] font-bold">PANEL</span>
        </button>
        <button onclick="alert('Geçmiş Siparişler Listesi Yakında!')" class="flex flex-col items-center gap-1 text-slate-500">
            <span class="text-[10px] font-bold">GEÇMİŞ</span>
        </button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Harita Başlatma (Ankara - Kızılay civarı)
        var map = L.map('res-map').setView([39.9208, 32.8541], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Restoran Konumu (Sabit İkon)
        var resIcon = L.divIcon({className: 'bg-cyan-500 w-4 h-4 rounded-full border-2 border-white'});
        L.marker([39.9208, 32.8541]).addTo(map).bindPopup('<b>Sizin Restoranınız</b>').openPopup();

        // Yakındaki Kurye Simülasyonu
        var kuryeMarker = L.circleMarker([39.9250, 32.8600], {
            radius: 7,
            fillColor: "#fbbf24",
            color: "#fff",
            weight: 2,
            fillOpacity: 1
        }).addTo(map).bindPopup('Yakın Kurye: Ahmet (3 dk)');

        function cağır() {
            alert("Sinyal Gönderildi! Yakındaki 3 kurye bilgilendiriliyor...");
            kuryeMarker.setStyle({fillColor: "#10b981"}); // Kurye rengini değiştir (aktifleşti)
        }
    </script>
</body>
</html>
