<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';display:flex;background:#020617;color:white}
.sidebar{width:240px;background:#020617;padding:20px;height:100vh}
.sidebar h2{color:#00d4ff}
.sidebar button{display:block;width:100%;padding:10px;margin:5px 0;background:none;border:none;color:#94a3b8;cursor:pointer}
.sidebar button:hover{color:white}
.content{flex:1;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px}
input{padding:10px;margin:5px;border-radius:8px;border:none;width:100%}
#map{width:100%;height:60vh;border-radius:12px}
</style>
</head>

<body>

<div class="sidebar">
<h2>KuryeAI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('orders')">Siparişler</button>
<button onclick="show('couriers')">Kuryeler</button>
<button onclick="show('restaurants')">Restoranlar</button>
<button onclick="show('applications')">Başvurular</button>
</div>

<div class="content">

<div id="dashboard">
<h2>🚀 Canlı Sistem</h2>
<div id="map"></div>
</div>

<div id="orders" style="display:none">
<h2>📦 Siparişler</h2>

<input id="oProduct" placeholder="Ürün adı">
<input id="oLat" placeholder="Enlem">
<input id="oLng" placeholder="Boylam">

<button onclick="createOrder()">Sipariş Oluştur (AI)</button>

<div id="orderList"></div>
</div>

<div id="couriers" style="display:none">
<h2>🚴 Kuryeler</h2>
<input id="cName" placeholder="Ad">
<input id="cMail" placeholder="Email">
<button onclick="addCourier()">Ekle</button>
<div id="courierList"></div>
</div>

<div id="restaurants" style="display:none">
<h2>🍔 Restoranlar</h2>
<input id="rName" placeholder="Ad">
<input id="rMail" placeholder="Email">
<button onclick="addRestaurant()">Ekle</button>
<div id="restaurantList"></div>
</div>

<div id="applications" style="display:none">
<h2>📩 Başvurular</h2>
<div id="appList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore, collection, addDoc, onSnapshot,
deleteDoc, doc, updateDoc, setDoc, getDocs
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* NAV */
window.show=id=>{
["dashboard","orders","couriers","restaurants","applications"]
.forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(id).style.display="block";
}

/* MAP */
const map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* 🚴 KURYELER */
let courierMarkers={};

onSnapshot(collection(db,"couriers"),snap=>{
snap.forEach(d=>{
const c=d.data();
if(!c.lat) return;

if(courierMarkers[d.id]){
courierMarkers[d.id].setLatLng([c.lat,c.lng]);
}else{
courierMarkers[d.id]=L.marker([c.lat,c.lng])
.addTo(map)
.bindPopup("🚴 "+(c.name||"Kurye"));
}
});
});

/* 🧭 GERÇEK ROTA */
let routeLine=null;

async function drawRoute(fromLat,fromLng,toLat,toLng){
const res=await fetch(`https://router.project-osrm.org/route/v1/driving/${fromLng},${fromLat};${toLng},${toLat}?overview=full&geometries=geojson`);
const data=await res.json();
const coords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
if(routeLine) map.removeLayer(routeLine);
routeLine=L.polyline(coords,{color:"lime"}).addTo(map);
}

/* 📦 SİPARİŞ + HEATMAP */
let orderMarkers={};
let heatPoints=[];

onSnapshot(collection(db,"orders"),snap=>{
orderList.innerHTML="";
heatPoints=[];

snap.forEach(d=>{
const o=d.data();

orderList.innerHTML+=`
<div class="card">
${o.product} - ${o.status}<br>
Kurye: ${o.courierEmail || "Atanmadı"}<br>
ETA: ${o.eta || "-"} dk
<button onclick="reassign('${d.id}')">Kurye Değiştir</button>
</div>`;

if(o.lat){
heatPoints.push([o.lat,o.lng,0.5]);

if(!orderMarkers[d.id]){
orderMarkers[d.id]=L.marker([o.lat,o.lng])
.addTo(map)
.bindPopup("📦 "+o.product);
}

if(o.courierEmail){
Object.values(courierMarkers).forEach(m=>{
const c=m.getLatLng();
drawRoute(c.lat,c.lng,o.lat,o.lng);
});
}
}
});

if(window.heatLayer){
map.removeLayer(window.heatLayer);
}
window.heatLayer=L.heatLayer(heatPoints,{radius:25}).addTo(map);

});

/* 🤖 AI */
async function findBestCourier(lat,lng){
const snap=await getDocs(collection(db,"couriers"));
let best=null,min=999;

snap.forEach(d=>{
const c=d.data();
if(!c.lat) return;

const dist=Math.sqrt(Math.pow(c.lat-lat,2)+Math.pow(c.lng-lng,2));
if(dist<min){
min=dist;
best=c;
}
});
return best;
}

/* 🚀 CREATE ORDER (ETA + WHATSAPP) */
window.createOrder=async()=>{

const product=oProduct.value;
const lat=parseFloat(oLat.value);
const lng=parseFloat(oLng.value);

const best=await findBestCourier(lat,lng);

/* 📏 MESAFE */
let distance=0;
if(best && best.lat){
distance=Math.sqrt(
Math.pow(best.lat-lat,2)+Math.pow(best.lng-lng,2)
);
}

/* ⏱ ETA */
const eta=Math.round((distance/40)*60);

/* 📦 ORDER */
const orderRef=await addDoc(collection(db,"orders"),{
product,lat,lng,
status:best?"assigned":"pending",
courierEmail:best?best.email:null,
eta:eta,
createdAt:new Date()
});

/* 🔗 LINK */
const link=`https://kuryeai.com/tracking.html?id=${orderRef.id}`;

/* 📲 WHATSAPP */
const phone=prompt("Müşteri telefon (5XXXXXXXXX)");

if(phone){
const msg=`🚀 Siparişiniz yolda!
📦 Ürün: ${product}
⏱ Tahmini süre: ${eta} dk

📍 Canlı takip:
${link}`;

const url=`https://wa.me/90${phone}?text=${encodeURIComponent(msg)}`;
window.open(url,"_blank");
}

alert("Sipariş oluşturuldu 🚀");

}

/* OVERRIDE */
window.reassign=async(id)=>{
const snap=await getDocs(collection(db,"couriers"));
let list=[];
snap.forEach(d=>list.push(d.data().email));

const selected=prompt("Kurye seç:\n"+list.join("\n"));
if(!selected)return;

await updateDoc(doc(db,"orders",id),{
courierEmail:selected,
status:"assigned"
});
}

/* COURIERS */
onSnapshot(collection(db,"couriers"),snap=>{
courierList.innerHTML="";
snap.forEach(d=>{
const c=d.data();
courierList.innerHTML+=`
<div class="card">${c.name}
<button onclick="delC('${d.id}')">Sil</button>
</div>`;
});
});

window.addCourier=async()=>{
await addDoc(collection(db,"couriers"),{
name:cName.value,
email:cMail.value
});
}

window.delC=id=>deleteDoc(doc(db,"couriers",id));

/* RESTAURANTS */
onSnapshot(collection(db,"restaurants"),snap=>{
restaurantList.innerHTML="";
snap.forEach(d=>{
const r=d.data();
restaurantList.innerHTML+=`
<div class="card">${r.name}
<button onclick="delR('${d.id}')">Sil</button>
</div>`;
});
});

window.addRestaurant=async()=>{
await addDoc(collection(db,"restaurants"),{
name:rName.value,
email:rMail.value
});
}

window.delR=id=>deleteDoc(doc(db,"restaurants",id));

/* APPLICATIONS */
onSnapshot(collection(db,"applications"),snap=>{
appList.innerHTML="";
snap.forEach(d=>{
const a=d.data();

appList.innerHTML+=`
<div class="card">
${a.name}<br>${a.email}
<button onclick="approve('${d.id}','${a.email}')">Onayla</button>
</div>`;
});
});

window.approve=async(id,email)=>{
const user=await createUserWithEmailAndPassword(auth,email,"123456");

await setDoc(doc(db,"users",user.user.uid),{
email,role:"restaurant"
});

await updateDoc(doc(db,"applications",id),{
status:"approved"
});

alert("Restoran oluşturuldu!");
}

</script>

</body>
</html>
