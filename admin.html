<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root{
--bg:#0b1118;
--card:#121a22;
--text:#fff;
--primary:#00e0ff;
--border:#1f2933;
}

body.light{
--bg:#f5f7fb;
--card:#ffffff;
--text:#111;
--primary:#00bcd4;
--border:#ddd;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:sans-serif;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:var(--card);
padding:20px;
}

.menu div{
padding:10px;
margin:8px 0;
cursor:pointer;
border-radius:8px;
}

.menu div:hover{
background:var(--primary);
color:#000;
}

/* MAIN */
.main{
flex:1;
padding:20px;
}

/* CARD */
.card{
background:var(--card);
padding:15px;
border-radius:10px;
margin:10px 0;
border:1px solid var(--border);
}

/* INPUT */
input, select{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid var(--border);
background:transparent;
color:var(--text);
}

button{
margin-top:5px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
}

.delete{background:red;color:#fff}
.add{background:var(--primary)}

/* MAP */
.map-wrapper{position:relative;}

#map{
height:300px;
border-radius:12px;
}

.fullscreen-btn{
position:absolute;
top:10px;
right:10px;
z-index:999;
background:var(--primary);
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
}

/* FULLSCREEN */
.map-fullscreen{
position:fixed !important;
top:0;
left:0;
width:100vw !important;
height:100vh !important;
z-index:9999;
border-radius:0 !important;
}
</style>
</head>

<body>

<div class="sidebar">
<h3 style="color:var(--primary)">KuryeAI</h3>

<div class="menu">
<div onclick="show('dashboard')">Dashboard</div>
<div onclick="show('orders')">Siparişler</div>
<div onclick="show('couriers')">Kuryeler</div>
<div onclick="show('restaurants')">Restoranlar</div>
</div>

<button onclick="toggleTheme()">🌗 Tema</button>
<button onclick="logout()">Çıkış</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<div class="card">Toplam: <b id="total">0</b></div>

<canvas id="chart"></canvas>

<div class="map-wrapper">
<button class="fullscreen-btn" onclick="toggleMap()">⛶</button>
<div id="map"></div>
</div>

</div>

<!-- ORDERS -->
<div id="orders" style="display:none">
<h2>Siparişler</h2>
<div id="ordersList"></div>
</div>

<!-- COURIERS -->
<div id="couriers" style="display:none">
<h2>Kuryeler</h2>

<input id="courierEmail" placeholder="Kurye email">
<button class="add" onclick="addCourier()">Ekle</button>

<div id="courierList"></div>
</div>

<!-- RESTAURANTS -->
<div id="restaurants" style="display:none">
<h2>Restoranlar</h2>

<input id="restEmail" placeholder="Restoran email">
<button class="add" onclick="addRestaurant()">Ekle</button>

<div id="restaurantList"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, deleteDoc, addDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* MAP */
const map = L.map('map').setView([39.92,32.85], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* FULLSCREEN MAP */
let isFull=false;
window.toggleMap=()=>{
const el=document.getElementById("map");
isFull=!isFull;

if(isFull){
el.classList.add("map-fullscreen");
}else{
el.classList.remove("map-fullscreen");
}

setTimeout(()=>map.invalidateSize(),300);
};

/* CHART */
const chart = new Chart(document.getElementById("chart"), {
type:"doughnut",
data:{
labels:["Toplam"],
datasets:[{
data:[0],
backgroundColor:["#00e0ff"]
}]
}
});

/* AUTH */
onAuthStateChanged(auth, async user=>{
if(!user) return location.href="login.html";

const u = await getDoc(doc(db,"users",user.uid));
if(u.data().role!=="admin") return location.href="login.html";

load();
});

/* NAV */
window.show=(id)=>{
["dashboard","orders","couriers","restaurants"].forEach(x=>{
document.getElementById(x).style.display="none";
});
document.getElementById(id).style.display="block";
};

/* THEME */
window.toggleTheme=()=>{
document.body.classList.toggle("light");
};

/* LOAD */
function load(){

onSnapshot(collection(db,"orders"), snap=>{
ordersList.innerHTML="";
let total=0;

snap.forEach(d=>{
const o=d.data();
total++;

ordersList.innerHTML+=`
<div class="card">
${o.product}<br>${o.address}
<button class="delete" onclick="delOrder('${d.id}')">Sil</button>
</div>`;
});

document.getElementById("total").innerText=total;
chart.data.datasets[0].data=[total];
chart.update();
});

onSnapshot(collection(db,"couriers"), snap=>{
courierList.innerHTML="";
snap.forEach(d=>{
const c=d.data();

courierList.innerHTML+=`
<div class="card">
${c.email}
<button class="delete" onclick="delCourier('${d.id}')">Sil</button>
</div>`;
});
});

onSnapshot(collection(db,"restaurants"), snap=>{
restaurantList.innerHTML="";
snap.forEach(d=>{
const r=d.data();

restaurantList.innerHTML+=`
<div class="card">
${r.email}
<button class="delete" onclick="delRest('${d.id}')">Sil</button>
</div>`;
});
});

}

/* ACTIONS */
window.addCourier=()=>addDoc(collection(db,"couriers"),{
email:document.getElementById("courierEmail").value
});

window.delCourier=(id)=>deleteDoc(doc(db,"couriers",id));

window.addRestaurant=()=>addDoc(collection(db,"restaurants"),{
email:document.getElementById("restEmail").value
});

window.delRest=(id)=>deleteDoc(doc(db,"restaurants",id));

window.delOrder=(id)=>deleteDoc(doc(db,"orders",id));

window.logout=()=>signOut(auth);
</script>

</body>
</html>
