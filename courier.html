<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KuryeAI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background: #0f172a; font-family: 'Inter', sans-serif; }
        #map { height: 40vh; width: 100%; }
        .modal-overlay { background: rgba(0,0,0,0.9); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .active-view { display: block !important; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="text-white flex flex-col h-screen">

    <div id="km-modal" class="fixed inset-0 modal-overlay">
        <div class="bg-slate-800 p-8 rounded-[40px] w-full max-w-sm border border-slate-700 text-center">
            <h3 id="modal-title" class="text-xl font-black text-cyan-400 mb-4 uppercase">KM GİRİŞİ</h3>
            <input type="file" accept="image/*" capture="camera" id="km-photo" class="w-full mb-4 p-2 bg-slate-900 rounded-xl text-xs">
            <input type="number" id="km-input" placeholder="Güncel KM" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-700 text-2xl text-center text-cyan-400 mb-6">
            <button onclick="processShiftStep()" class="w-full py-4 bg-emerald-600 rounded-2xl font-black mb-3">SİSTEME KAYDET</button>
            <button onclick="closeModal('km-modal')" class="text-slate-500 text-xs">VAZGEÇ</button>
        </div>
    </div>

    <header class="h-16 px-5 flex justify-between items-center bg-slate-900 border-b border-slate-800">
        <button onclick="toggleMenu()" class="text-2xl">☰</button>
        <h1 class="font-black italic text-cyan-400">KuryeAI</h1>
        <button onclick="openNotif()" class="relative">🔔<span id="badge" class="absolute -top-1 -right-1 w-2 h-2 bg-rose-500 rounded-full hidden"></span></button>
    </header>

    <main id="main-view" class="flex-grow flex flex-col">
        <div id="map"></div>
        <div class="p-4 grid grid-cols-2 gap-3">
            <button id="btn-start" onclick="openKMModal('start')" class="bg-emerald-600 py-4 rounded-xl font-black uppercase text-xs">Vardiyayı Başlat</button>
            <button id="btn-end" onclick="openKMModal('end')" class="bg-rose-600 py-4 rounded-xl font-black uppercase text-xs opacity-30" disabled>Vardiyayı Bitir</button>
        </div>
        <div class="p-4 grid grid-cols-3 gap-2 flex-grow">
            <div class="bg-slate-800/50 p-4 rounded-2xl text-center"><p class="text-[8px] opacity-50 uppercase">Süre</p><p id="timer" class="text-xl font-black">00:00:00</p></div>
            <div class="bg-slate-800/50 p-4 rounded-2xl text-center"><p class="text-[8px] opacity-50 uppercase">GPS KM</p><p id="gps-km" class="text-xl font-black text-yellow-500">0.0</p></div>
            <div class="bg-slate-800/50 p-4 rounded-2xl text-center"><p class="text-[8px] opacity-50 uppercase">Kazanç</p><p id="earnings" class="text-xl font-black text-emerald-500">₺0</p></div>
        </div>
    </main>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 transform -translate-x-full transition-transform z-[10001] p-6 border-r border-slate-800">
        <div class="flex justify-between items-center mb-8"><h2 class="text-xl font-black italic text-cyan-400">MENÜ</h2><button onclick="toggleMenu()">✕</button></div>
        <nav class="space-y-4">
            <button onclick="logout()" class="w-full text-left p-4 bg-rose-900/20 text-rose-500 rounded-xl font-bold">🚪 Oturumu Kapat</button>
        </nav>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const kuryeID = "harun_kaya";

        let map = L.map('map').setView([39.9334, 32.8597], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let startTime, timerInterval, gpsDist = 0, startKM = 0;

        function toggleMenu() {
            const s = document.getElementById('sidebar');
            s.style.transform = s.style.transform === 'translateX(0px)' ? 'translateX(-100%)' : 'translateX(0px)';
        }

        function openKMModal(mode) {
            window.shiftMode = mode;
            document.getElementById('km-input').value = "";
            document.getElementById('km-photo').value = "";
            document.getElementById('modal-title').innerText = mode === 'start' ? 'Vardiya Başlangıcı' : 'Vardiya Sonu';
            document.getElementById('km-modal').style.display = 'flex';
        }

        function processShiftStep() {
            const kmVal = parseFloat(document.getElementById('km-input').value);
            if(!kmVal) return alert("KM giriniz!");

            if(window.shiftMode === 'start') {
                startKM = kmVal;
                startTime = Date.now();
                document.getElementById('btn-start').disabled = true; document.getElementById('btn-start').style.opacity = "0.2";
                document.getElementById('btn-end').disabled = false; document.getElementById('btn-end').style.opacity = "1";
                startTimer();
            } else {
                clearInterval(timerInterval);
                const fark = kmVal - startKM;
                db.ref('arsiv/'+kuryeID).push({
                    tarih: new Date().toLocaleString(),
                    manuelKM: fark,
                    gpsKM: gpsDist.toFixed(1),
                    kazanc: (fark * 8).toFixed(0)
                });
                alert("Vardiya sonlandırıldı.");
                location.reload();
            }
            closeModal('km-modal');
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        function logout() {
            localStorage.clear();
            alert("Oturum kapatıldı.");
            location.href = "index.html";
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    </script>
</body>
</html>
