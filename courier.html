<!DOCTYPE html>
<html>
<head>
<title>Courier</title>
</head>

<body>

<h2 id="status">Offline</h2>
<button onclick="online()">Online</button>
<button onclick="offline()">Offline</button>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
  authDomain: "kuryeai.firebaseapp.com",
  databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kuryeai"
};

firebase.initializeApp(firebaseConfig);

firebase.auth().onAuthStateChanged(async(user)=>{

  if(!user) return location.href="login.html";

  const snap = await firebase.database().ref("roles/"+user.uid).once("value");

  if(!snap.exists() || snap.val().role!=="courier"){
    alert("Yetkisiz");
    location.href="login.html";
  }

});

function online(){

  navigator.geolocation.getCurrentPosition(pos=>{

    firebase.database().ref("couriers/"+firebase.auth().currentUser.uid).update({
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      online:true
    });

    status.innerText="Online";

  });

}

function offline(){

  firebase.database().ref("couriers/"+firebase.auth().currentUser.uid).update({
    online:false
  });

  status.innerText="Offline";

}

</script>

</body>
</html>
