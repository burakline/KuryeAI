<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI Admin</title>

<style>
body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background:#0b1118;
    color:#fff;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#161b22;
    border-bottom:1px solid #30363d;
}

.logo {
    color:#00d4ff;
    font-size:20px;
    font-weight:bold;
}

.logout {
    background:#ff4d4d;
    border:none;
    padding:10px;
    border-radius:8px;
    color:#fff;
}

/* CONTAINER */
.container {
    padding:15px;
}

/* STATS */
.stats {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(120px,1fr));
    gap:10px;
    margin-bottom:20px;
}

.card {
    background:#161b22;
    padding:15px;
    border-radius:10px;
    border:1px solid #30363d;
}

/* ORDER */
.order {
    background:#161b22;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    border:1px solid #30363d;
}

select, input {
    width:100%;
    margin-top:5px;
    padding:8px;
    background:#0d1117;
    border:1px solid #30363d;
    color:#fff;
    border-radius:6px;
}

button {
    margin-top:5px;
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.delete { background:#ff4d4d; }
.assign { background:#00d4ff; }

h3 {
    margin-top:25px;
}
</style>

</head>

<body>

<div class="header">
    <div class="logo">KuryeAI Admin</div>
    <button class="logout" onclick="logout()">Çıkış</button>
</div>

<div class="container">

    <div class="stats">
        <div class="card">Toplam<br><b id="total">0</b></div>
        <div class="card">Hazırlanıyor<br><b id="prep">0</b></div>
        <div class="card">Yolda<br><b id="road">0</b></div>
        <div class="card">Teslim<br><b id="done">0</b></div>
    </div>

    <h3>🟡 Sipariş Havuzu</h3>
    <div id="pool"></div>

    <h3>📦 Tüm Siparişler</h3>
    <div id="orders"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
 authDomain: "kuryeai.firebaseapp.com",
 projectId: "kuryeai"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// AUTH
onAuthStateChanged(auth, async user=>{
    if(!user) return location.href="login.html";

    const u = await getDoc(doc(db,"users",user.uid));
    if(!u.exists() || u.data().role!=="admin"){
        alert("Yetkisiz");
        return location.href="login.html";
    }

    loadOrders();
});

// LOAD
function loadOrders(){
    onSnapshot(collection(db,"orders"), snap=>{

        let total=0, prep=0, road=0, done=0;

        document.getElementById("orders").innerHTML="";
        document.getElementById("pool").innerHTML="";

        snap.forEach(d=>{
            const o = d.data();
            total++;

            if(o.status=="hazırlanıyor") prep++;
            if(o.status=="yolda") road++;
            if(o.status=="teslim edildi") done++;

            // HAVUZ
            if(o.status=="hazır" && !o.courierId){
                document.getElementById("pool").innerHTML += `
                <div class="order">
                    <b>${o.product}</b><br>
                    ${o.address}

                    <input placeholder="Kurye email" onchange="assign('${d.id}', this.value)">
                    <button class="delete" onclick="deleteOrder('${d.id}')">İptal</button>
                </div>`;
            }

            // TÜM
            document.getElementById("orders").innerHTML += `
            <div class="order">
                <b>${o.product}</b><br>
                ${o.address}<br>
                Status: ${o.status}<br>
                Kurye: ${o.courierEmail || "-"}

                <select onchange="status('${d.id}',this.value)">
                    <option ${o.status=="hazırlanıyor"?"selected":""}>hazırlanıyor</option>
                    <option ${o.status=="hazır"?"selected":""}>hazır</option>
                    <option ${o.status=="yolda"?"selected":""}>yolda</option>
                    <option ${o.status=="teslim edildi"?"selected":""}>teslim edildi</option>
                </select>

                <input placeholder="Kurye değiştir" onchange="assign('${d.id}', this.value)">
                <button class="delete" onclick="deleteOrder('${d.id}')">Sil</button>
            </div>`;
        });

        document.getElementById("total").innerText=total;
        document.getElementById("prep").innerText=prep;
        document.getElementById("road").innerText=road;
        document.getElementById("done").innerText=done;
    });
}

// ACTIONS
window.status = async(id,s)=> await updateDoc(doc(db,"orders",id),{status:s});
window.assign = async(id,email)=> await updateDoc(doc(db,"orders",id),{courierEmail:email,courierId:email});
window.deleteOrder = async(id)=> confirm("Sil?") && await deleteDoc(doc(db,"orders",id));
window.logout = ()=>signOut(auth);
</script>

</body>
</html>
