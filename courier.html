<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kurye Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
}

.status {
  background:#00d084;
  padding:10px 15px;
  border-radius:10px;
}

#map {
  height:60vh;
}

.controls {
  padding:15px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.online { background:#00d084; }
.offline { background:#444; }
.logout { background:#ff4d4d; }
</style>
</head>

<body>

<div class="header">
  🚀 KuryeAI
  <div class="status" id="status">Offline</div>
</div>

<div id="map"></div>

<div class="controls">
  <button class="online" onclick="goOnline()">Online Ol</button>
  <button class="offline" onclick="goOffline()">Offline Ol</button>
  <button class="logout" onclick="logout()">Çıkış Yap</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">
import "./firebase.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const map = L.map('map').setView([39.9208, 32.8541], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap'
}).addTo(map);

let marker = null;
let watchId = null;

const db = getDatabase();
const auth = getAuth();

// ONLINE
window.goOnline = () => {
  if (!navigator.geolocation) {
    alert("GPS desteklenmiyor");
    return;
  }

  document.getElementById("status").innerText = "Online";

  watchId = navigator.geolocation.watchPosition(async (pos) => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    // marker
    if (marker) {
      marker.setLatLng([lat, lng]);
    } else {
      marker = L.marker([lat, lng]).addTo(map);
    }

    map.setView([lat, lng], 15);

    // firebase yaz
    const user = auth.currentUser;
    if (!user) return;

    await set(ref(db, "canli_takip/" + user.uid), {
      lat,
      lng,
      online: true,
      time: Date.now()
    });

  }, (err) => {
    alert("GPS hata: " + err.message);
  }, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 10000
  });
};

// OFFLINE
window.goOffline = async () => {
  document.getElementById("status").innerText = "Offline";

  if (watchId) navigator.geolocation.clearWatch(watchId);

  const user = auth.currentUser;
  if (!user) return;

  await set(ref(db, "canli_takip/" + user.uid), {
    online: false
  });
};
</script>

</body>
</html>
