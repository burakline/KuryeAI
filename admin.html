<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KuryeAI PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';display:flex;background:#020617;color:white}
.sidebar{width:240px;background:#020617;padding:20px;height:100vh}
.sidebar h2{color:#00d4ff}
.sidebar button{display:block;width:100%;padding:10px;margin:5px 0;background:none;border:none;color:#94a3b8;cursor:pointer}
.sidebar button:hover{color:white}

.content{flex:1;padding:20px}
.card{background:#0f172a;padding:15px;border-radius:12px;margin-bottom:15px}

#map{
width:100%;
height:50vh;
min-height:300px;
border-radius:12px;
}

@media(max-width:768px){
.sidebar{width:80px}
.sidebar h2{display:none}
.sidebar button{font-size:12px}
}
</style>
</head>

<body>

<div class="sidebar">
<h2>KuryeAI</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('orders')">Siparişler</button>
<button onclick="show('couriers')">Kuryeler</button>
<button onclick="show('restaurants')">Restoranlar</button>
<button onclick="show('applications')">Başvurular</button>
</div>

<div class="content">

<div id="dashboard">
<h2>🚀 Canlı Sistem</h2>
<div id="map"></div>
</div>

<div id="orders" style="display:none">
<h2>📦 Siparişler</h2>
<div id="orderList"></div>
</div>

<div id="couriers" style="display:none">
<h2>🚴 Kuryeler</h2>

<input id="cName" placeholder="Ad">
<input id="cMail" placeholder="Email">
<button onclick="addCourier()">Ekle</button>

<div id="courierList"></div>
</div>

<div id="restaurants" style="display:none">
<h2>🍔 Restoranlar</h2>

<input id="rName" placeholder="Ad">
<input id="rMail" placeholder="Email">
<button onclick="addRestaurant()">Ekle</button>

<div id="restaurantList"></div>
</div>

<div id="applications" style="display:none">
<h2>📩 Başvurular</h2>
<div id="appList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore, collection, addDoc, onSnapshot,
deleteDoc, doc, updateDoc, setDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* NAV */
window.show=id=>{
["dashboard","orders","couriers","restaurants","applications"]
.forEach(x=>document.getElementById(x).style.display="none");
document.getElementById(id).style.display="block";
}

/* MAP */
const map=L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let restMarkers={};

/* RESTAURANTS */
onSnapshot(collection(db,"restaurants"),snap=>{
document.getElementById("restaurantList").innerHTML="";

snap.forEach(d=>{
const r=d.data();

document.getElementById("restaurantList").innerHTML+=`
<div class="card">
${r.name} - ${r.email}
<button onclick="setLocation('${d.id}')">Konum</button>
<button onclick="delR('${d.id}')">Sil</button>
</div>`;

if(r.lat){
if(restMarkers[d.id]){
restMarkers[d.id].setLatLng([r.lat,r.lng]);
}else{
restMarkers[d.id]=L.marker([r.lat,r.lng]).addTo(map);
}
}
});
});

/* KONUM */
window.setLocation=id=>{
map.once('click',async e=>{
await updateDoc(doc(db,"restaurants",id),{
lat:e.latlng.lat,
lng:e.latlng.lng
});
alert("Konum kaydedildi");
});
}

/* ADD RESTAURANT */
window.addRestaurant=async()=>{
await addDoc(collection(db,"restaurants"),{
name:rName.value,
email:rMail.value
});
}

/* DELETE RESTAURANT */
window.delR=id=>deleteDoc(doc(db,"restaurants",id));

/* COURIERS */
onSnapshot(collection(db,"couriers"),snap=>{
courierList.innerHTML="";
snap.forEach(d=>{
const c=d.data();

courierList.innerHTML+=`
<div class="card">
${c.name} - ${c.email}
<button onclick="delC('${d.id}')">Sil</button>
</div>`;
});
});

window.addCourier=async()=>{
await addDoc(collection(db,"couriers"),{
name:cName.value,
email:cMail.value
});
}

window.delC=id=>deleteDoc(doc(db,"couriers",id));

/* ORDERS */
onSnapshot(collection(db,"orders"),snap=>{
orderList.innerHTML="";
snap.forEach(d=>{
const o=d.data();

orderList.innerHTML+=`
<div class="card">
${o.product} - ${o.status}
</div>`;
});
});

/* APPLICATIONS (🔥 GERÇEK SİSTEM) */
onSnapshot(collection(db,"applications"),snap=>{
appList.innerHTML="";

snap.forEach(d=>{
const a=d.data();

appList.innerHTML+=`
<div class="card">
<b>${a.name}</b><br>
${a.email}<br>
<button onclick="approve('${d.id}','${a.email}')">Onayla</button>
</div>`;
});
});

/* 🔥 APPROVE = USER OLUŞTUR */
window.approve = async (id,email)=>{

try{

const password = "123456";

/* AUTH */
const userCred = await createUserWithEmailAndPassword(auth,email,password);

/* ROLE */
await setDoc(doc(db,"users",userCred.user.uid),{
email,
role:"restaurant"
});

/* STATUS */
await updateDoc(doc(db,"applications",id),{
status:"approved"
});

alert("Restoran oluşturuldu!\nŞifre: 123456");

}catch(e){
alert(e.message);
}

}

</script>

</body>
</html>
