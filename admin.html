<style>

<body>

<button onclick="show('mapPage')" id="btnMap">Harita</button>
</div>

<div class="container">

<div id="apps"></div>
<div id="couriers" style="display:none"></div>
<div id="mapPage" style="display:none">
<div id="map"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
setDoc,
deleteDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* CONFIG */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const secondaryApp = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
},"Secondary");

const db = getFirestore(app);
const auth = getAuth(app);
const secondaryAuth = getAuth(secondaryApp);

/* 🔐 AUTH KORUMA (EN KRİTİK) */
onAuthStateChanged(auth, async(user)=>{

if(!user){
location.href="login.html";
return;
}

const snap = await getDocs(collection(db,"users"));

let isAdmin = false;

snap.forEach(d=>{
if(d.id === user.uid && d.data().role === "admin"){
isAdmin = true;
}
});

if(!isAdmin){
alert("Yetkisiz!");
location.href="login.html";
}

});

/* NAV */
window.show = (id)=>{
["apps","couriers","mapPage"].forEach(x=>{
document.getElementById(x).style.display="none";
});

document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");

document.getElementById(id).style.display="block";
};

/* 📩 BAŞVURULAR */
async function loadApps(){
const div = document.getElementById("apps");

const snap = await getDocs(collection(db,"applications"));

div.innerHTML="";

snap.forEach(d=>{
const a = d.data();
a.id = d.id;

div.innerHTML += `
<div class="card">
<b>${a.name}</b><br>
${a.email}<br>

<button class="ok" onclick='approve(${JSON.stringify(a)})'>Onayla</button>
<button class="no" onclick='reject("${a.id}")'>Reddet</button>
</div>`;
});
}

window.approve = async (a)=>{

const user = await createUserWithEmailAndPassword(
secondaryAuth,
a.email,
"123456"
);

const uid = user.user.uid;

await setDoc(doc(db,"users",uid),{
email:a.email,
name:a.name,
role:"courier"
});

await setDoc(doc(db,"couriers",uid),{
name:a.name,
email:a.email,
lat:0,
lng:0,
online:false
});

await deleteDoc(doc(db,"applications",a.id));

alert("Kurye oluşturuldu");
loadApps();
};

window.reject = async (id)=>{
await deleteDoc(doc(db,"applications",id));
loadApps();
};
