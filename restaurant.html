<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RestoranAI | Mağaza Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #fcfcfd; }
        .active-tab { background-color: #f9f5ff; color: #7f56d9; border-right: 3px solid #7f56d9; }
        #map { height: 100%; width: 100%; border-radius: 24px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-white border-r border-gray-200 hidden lg:flex flex-col p-6">
        <div class="flex items-center gap-2 mb-10">
            <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center"><i data-lucide="store" class="text-white w-5 h-5"></i></div>
            <span class="text-xl font-bold tracking-tight text-gray-900">Restoran<span class="text-purple-600">AI</span></span>
        </div>
        <nav class="space-y-1">
            <button onclick="switchTab('map')" class="active-tab w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold transition">
                <i data-lucide="map" class="w-5 h-5"></i> Canlı Harita
            </button>
            <button onclick="switchTab('drivers')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium text-gray-500 hover:bg-gray-50 transition">
                <i data-lucide="users" class="w-5 h-5"></i> Kuryelerimiz
            </button>
        </nav>
    </aside>

    <main class="flex-grow flex flex-col overflow-hidden">
        <header class="h-16 px-8 flex items-center justify-between bg-white border-b border-gray-100">
            <h2 id="page-title" class="font-bold text-gray-800">Canlı Takip Paneli</h2>
            <button class="p-2 text-gray-400 hover:bg-gray-50 rounded-xl transition"><i data-lucide="bell" class="w-5 h-5"></i></button>
        </header>

        <div id="content-map" class="flex-grow p-6">
            <div class="h-full w-full bg-white rounded-[32px] border border-gray-200 shadow-sm p-2 overflow-hidden">
                <div id="map"></div>
            </div>
        </div>

        <div id="content-drivers" class="flex-grow p-8 hidden overflow-y-auto">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="driver-list">
                </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        lucide.createIcons();
        const firebaseConfig = { apiKey: "AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw", authDomain: "kuryeai.firebaseapp.com", databaseURL: "https://kuryeai-default-rtdb.europe-west1.firebasedatabase.app/", projectId: "kuryeai", storageBucket: "kuryeai.firebasestorage.app", messagingSenderId: "655930514402", appId: "1:655930514402:web:379321cbb83f48daf077bb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let map = L.map('map', {zoomControl: false}).setView([39.9334, 32.8597], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        function switchTab(tab) {
            document.getElementById('content-map').classList.toggle('hidden', tab !== 'map');
            document.getElementById('content-drivers').classList.toggle('hidden', tab !== 'drivers');
            document.getElementById('page-title').innerText = tab === 'map' ? 'Canlı Takip Paneli' : 'Kuryelerimiz';
            if(tab === 'map') setTimeout(() => map.invalidateSize(), 200);
        }

        db.ref('kuryeler').on('value', snap => {
            const list = document.getElementById('driver-list');
            list.innerHTML = "";
            snap.forEach(c => {
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-[24px] border border-gray-200 shadow-sm">
                        <div class="flex items-center gap-3 mb-6">
                            <div class="w-12 h-12 bg-purple-50 rounded-full flex items-center justify-center font-bold text-purple-600">${c.key.charAt(0).toUpperCase()}</div>
                            <p class="font-bold text-gray-900 uppercase">${c.key.replace('_',' ')}</p>
                        </div>
                        <button class="w-full py-3 bg-purple-600 text-white rounded-xl font-bold shadow-lg shadow-purple-100 uppercase text-xs">Durum Bildir</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
