<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Kurye</title>
</head>

<body>

<h2>Kurye Panel</h2>

<div id="orders"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
getFirestore,
collection,
onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user;

/* AUTH */
onAuthStateChanged(auth,u=>{
if(!u) location.href="login.html";
user=u;

/* ORDERS */
onSnapshot(collection(db,"orders"),snap=>{
orders.innerHTML="";

snap.forEach(d=>{
const o=d.data();

/* ZONE FILTER */
if(o.courierId && o.courierId!==user.uid) return;

orders.innerHTML+=`
<div>
<b>${o.customer}</b><br>
${o.address}<br>
💰 ${o.price}₺ 🔥x${o.surge}
</div>`;
});
});

});

</script>
</body>
</html>
