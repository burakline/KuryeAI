<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurye Panel</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:'Segoe UI';background:#0b0e14;color:#fff;}

.header{padding:15px;background:#020617;display:flex;justify-content:space-between;}
.status{padding:6px 12px;border-radius:20px;font-size:12px;}
.online{background:#00ff9c;color:#000;}
.offline{background:#ff4d4d;}

#map{height:35vh;}

.panel{padding:15px;background:#111827;}

.order{background:#1f2937;padding:12px;border-radius:10px;margin-top:8px;}
</style>
</head>

<body>

<div class="header">
<h3>🚴 Kurye Panel</h3>
<div id="status" class="status offline">Offline</div>
</div>

<div id="map"></div>

<div class="panel">

<button onclick="startTracking()">Online</button>
<button onclick="stopTracking()">Offline</button>

<h3>📦 Siparişler</h3>
<div id="orders"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

/* 🔥 FIREBASE */
const app = initializeApp({
apiKey:"AIzaSyAAupWOvjL9ZlW8855_lD52_vkc8BCqGtw",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

/* 🔥 DİNAMİK KM */
let MAX_DISTANCE_KM = 10;

onSnapshot(doc(db,"settings","config"), snap=>{
if(snap.exists()){
MAX_DISTANCE_KM = snap.data().maxDistance || 10;
}
});

let user, currentPos, marker;

/* MAP */
const map = L.map('map').setView([39.92,32.85],13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* ICON */
const bikeIcon = L.divIcon({
html:`<div style="font-size:26px;color:#00d4ff;">🏍️</div>`,
className:''
});

/* DISTANCE */
function getDistanceKm(lat1,lng1,lat2,lng2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLng=(lng2-lng1)*Math.PI/180;

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2;

return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* AUTH */
onAuthStateChanged(auth,(u)=>{
if(!u){location.href="login.html";return;}
user=u;
});

/* ONLINE */
window.startTracking=()=>{
document.getElementById("status").className="status online";
document.getElementById("status").innerText="Online";

navigator.geolocation.watchPosition(async(pos)=>{

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

currentPos={lat,lng};

if(marker){
marker.setLatLng([lat,lng]);
}else{
marker=L.marker([lat,lng],{icon:bikeIcon}).addTo(map);
}

map.setView([lat,lng],15);

await updateDoc(doc(db,"couriers",user.uid),{
lat,lng,online:true
});

});
};

/* OFFLINE */
window.stopTracking=()=>{
document.getElementById("status").className="status offline";
document.getElementById("status").innerText="Offline";
};

/* ORDERS */
const ordersDiv=document.getElementById("orders");

onSnapshot(query(collection(db,"orders"),where("status","==","bekliyor")), snap=>{

ordersDiv.innerHTML="";

if(!currentPos){
ordersDiv.innerHTML="Konum bekleniyor...";
return;
}

snap.forEach(docSnap=>{
const o=docSnap.data();

if(!o.lat) return;

const dist=getDistanceKm(
currentPos.lat,currentPos.lng,
o.lat,o.lng
);

if(dist<=MAX_DISTANCE_KM){

ordersDiv.innerHTML+=`
<div class="order">
<b>${o.customer}</b><br>
${o.address}<br>
📏 ${dist.toFixed(2)} km<br>
💰 ${o.price}₺
</div>
`;

}

});

if(ordersDiv.innerHTML===""){
ordersDiv.innerHTML="Yakında sipariş yok";
}

});

</script>
</body>
</html>
