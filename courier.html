<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const app = initializeApp({
apiKey:"AIzaSy...",
authDomain:"kuryeai.firebaseapp.com",
projectId:"kuryeai"
});

const db = getFirestore(app);
const auth = getAuth(app);

let user;

/* 🔐 AUTH + ROLE */
onAuthStateChanged(auth, async(u)=>{
if(!u){
location.href="login.html";
return;
}

const snap = await getDoc(doc(db,"users",u.uid));

if(!snap.exists() || snap.data().role !== "courier"){
alert("Yetkisiz!");
location.href="login.html";
return;
}

user = u;
});

/* ONLINE */
window.startTracking = ()=>{
navigator.geolocation.watchPosition(async(pos)=>{
await updateDoc(doc(db,"couriers",user.uid),{
lat:pos.coords.latitude,
lng:pos.coords.longitude,
online:true
});
});
};

/* OFFLINE */
window.stopTracking = async ()=>{
await updateDoc(doc(db,"couriers",user.uid),{
online:false
});
};

</script>
